body:
  text: 綏冦紀略卷八國子監祭酒吳偉業撰汴渠墊洪武三年大封諸子列聖相承家法建置維屏訖于季代二百八十餘載或除或絶存者三十王太行以西曰晉曰瀋雁門以東曰代覃懷以北曰趙曰鄭曰潞河濟之間曰魯曰德海岱曰衡洞庭以南曰岷曰滎曰吉曰桂豫章以西曰益曰淮蒼梧界蠻徼曰靖江此十六王者所封敻絶河山或僅以免即先後被兵中十餘年獲休息焉君子于其事也始之書終之書非不一書而足也大梁溯洛入汝惟四王周髙皇帝第五子封開封定王橚以下十傳而端王之子恭枵紹封為周王唐髙皇帝第二十三子封南陽定王桱以下九傳而裕王之子聿􅀈紹封為唐王崇英宗第五子封汝寧簡王見澤以下七傳而昭王之子由匱紹封為崇王福神宗第二子常洵封洛陽為福王又封其次子由嵩為德昌王關中絶隴道惟五王秦髙皇帝第二子封西安愍王樉以下十四傳而闕王之子存樞紹封為秦王肅髙皇帝第十四子封甘州改蘭州莊王楧以下九傳而憲王之子識鋐紹封為肅王慶髙皇帝第十六子封慶陽改寧州又改寧夏靖王㮵以下九傳而憲王之子帥鋅紹封為慶王韓髙皇帝第二十子封開原改平凉憲王松以下十一傳而敬王之子亶􅱃紹封為韓王瑞神宗第五子常浩封漢中為瑞王自鄂達郢屬之蘄春惟四王楚髙皇帝第六子封武昌昭王楨以下八傳而恭王之子華奎紹封為楚王襄仁宗第五子封長沙改襄陽憲王瞻墡以下八傳而靖王之子翊銘紹封為襄王荆宣宗第七子封建昌改蘄州憲王瞻缸以下九傳而定王之子慈紹封為荆王惠神宗第六子常潤封荆州為惠王梁山跨劒閣惟一王蜀髙皇帝第十一子封成都獻王椿以下十三傳而恭王之子至澍紹封為蜀王冦初起西延闔鎮反慶肅國被邊地唇齒而臨洮寧夏之兵疾討賊不與于亂韓恃固原為捍蔽秦有金城之固瑞有雲棧之阻秦將吏既破賊則桐封以草竊為不足憂崇禎之六七年賊渡河再入關往來豫楚而窺蜀諸侯王之被兵者其鬼神以震擾闕其禋祀田疇以茀穢棄其耔耘民人則辛苦墊隘罔敢寧居聘問則淹洫雍閼失于期㑹卒至乎枝葉凋本根撥底喪亡而莫之救也跡其形勢楚懸絶大江則緩周秦蜀通都居重則緩荆處蘄春非上游肅洮河之陽慶賀蘭山下逺則亦緩唐與福負秦嶺距關崇涉于淮泗韓據涇渭西控隴瑞綰梁益出褒中襄惠通庸濮而楗之江七王不幸當天下之衝疆場日駭大懼社稷之顛隕以恥王室故數以賊情上聞瑞王之言曰臣賴先帝休德獲奉西藩未朞年而冦至比晉賊再渡河闌入漢興七年正月十五日破洵陽紫陽平利白河繼陷督臣洪承疇來救單騎布甲披荆棘入險阻搜捕山間冦臣助犒軍及賑饑銀七千餘兩賊始奔遁近境以寧既而鳳縣再陷蜀賊入秦州楚賊上興安六月自興安西鄉犯郡界游擊唐通憑漢江力拒不能渡賊方東鈔澤北據鳳西擾沔縣寧羌南鄭孤城在萬山絶谷中賊四面至覆亡無日臣于肺腑至親近也于藩封至僻陋也于冦盜至危迫也惟陛下哀憐韓王之言曰賊以七年九月初五日攻平凉東西兩門交急賊已從東關之北攀而上都司李應孝劉添祿手擊賊殺七人膊之擲其首城下賊乃轉而東自辰薄旰行始盡崇信靈臺涇州相繼失又轉入平凉之郭為李應孝所却而鎮原華亭咸被圍平凉屬城十破其五邠乾汧隴鄰封鈔略殆遍聲言芟夷四境即平凉在掌握無所逃國初設平凉衛屯田碁置列三百寨官二百軍三千有竒今僅存尫羸百十老卒何以守前一年皇上念潞王苦冦急增設一參將兵三千人即潞州衛屯糧充餉臣願以韓比潞邀親親之恩焉初賊才過河入豫楚也雒稍偏宛汝荆襄各有警而荆州當陽先陷故惠王奔命告急南陽城庳薄唐王捐千金謀修築太守陳振豪弗授功又與王因他事齟齬王以為言帝震怒逮振豪下之理王請以陳永福為專將亦援潞事以比帝弗許八年冬賊再犯南陽王又奏曰臣有莊田數百頃為朝廷恩賜及臣祖父之所封殖以十月十一日之交賊燔燒聚落儲偫略盡守舍輔國將軍顧煜遇害其母梅夫人重創死賊往來瓦屋石橋臣祖墳園咫尺繫臣心腑旦夕靡寧南陽恃鄙而不警備臣出私財蓄火藥布渠答賊是以避弗犯而焚我郊保今七月不雨二麥未藝臣鄉沈家冲飢民揭竿有平林下杜之志可為寒心又曰臣府護衛千二百人近制以其半為汴梁班軍畨直給撫臣以下由使甚無謂也惟明詔念臣困厄以全軍見還臣得賴國恩周廬擊柝逺斥堠無恐帝報之曰南陽班軍畨直祖宗朝定制已久朕不敢變諸可以為王捍禦者不愛于王當帝之從信邸入也篤宗廟厚同姓以崇重諸侯之禮郡縣吏弗詘體于王者王得自言即所持非是帝輒骫天下法以右王帝又數召見宗人遴其才擢之官欲以通宗祿之窮而變其制其後上書言事得乘置至京師日益衆或非所宜言帝亦浸厭之不能有以禁也帝發金匱書得髙皇帝制曰宗室子孫入為中朝官者得以其階換授有司議議者曰將軍中尉皆一品如此即三公九卿一朝而盈廷者數百人非所以為法帝拂然曰親親任賢古之道也何不可却其奏再詳之有朝士顯謂儀制郎吳之屏曰君胡不以有唐故事告上乎夫入為卿士出為牧伯此三代制唐室諸侯王兼官借職不必以其階如曹成王者傳稱其為參軍刺史可考而知也今宗人坐糜國儲奈何不講求通變于當世可施行者而專以固陋逆上意吳愕眙弗應宰相大僚無一人讀書識國體者以此大不慊禮侍郎陳子壯署部事主覆奏遂欲以守官堅執為名髙各藩皆知帝意所向懷廷論切弗敢爭而唐王獨貽書子壯相駁難王素辨博喜文詞其書稱說典訓援據經傳皆有本廷臣顧弗及知特以諸侯厲鋒氣持異同為足畏而已帝尋惡子壯疏詞强諍下之獄衆口惜子壯者輒以尤王王亦浸驕薄公卿為不足重當髙皇帝時諸王得巡行所部革除後網漸密京師所置吏握其事禁私車將從輕媠出即送喪至諸墳園非詔令不許南陽既冦衝八年後彌甚王嘗望烽火接天思海內且大亂終日守空宮對僕隸拊髀太息曰安能鬱鬱效龎涓死此下乎中州督撫大臣見諸藩各以輕重逼冦患周王好行其德福王日閉閣飲醇酒崇王奉浮屠戰守事皆聽將吏所為而南陽日陳兵自衛得材武稱然王血氣方剛恣自用又不能恤其宗人過寖淫上聞非真有淮南濟北之心伍被開章之計也帝既撓羣下重骨肉漸聞諸王怙恩德驕盈不自簡束南陽要害地而王建請轉廣書辭不遜順失藩臣禮傾側擾攘之際恐有赤睂樊崇平陵方望詿誤王以成狂狡之謀意不能無纖介㑹都門有急王請提軍入援事不行廷臣輒文致其罪帝乃下詔廢為庶人禁錮之自此諸藩惵息不敢復言兵事矣帝為討賊需餉嵗百萬民力大屈有司捐薪俸有紀録民入錢佐軍者假清卿秩優之下詔褒美風示海內焉武清侯李誠銘者慈聖皇太后姪也先朝待外戚有體太后母天下詎肯金錢私其親熹廟失御纍朝所積無訾省有傳其在李氏宮省事祕人莫知侯有孽子其母微家衆不以為兄弟齒侯亡爭財忿鬩告其兄藏禁物精鏐瓌寶纍萬萬帝召見侯長子諭令輸助國以自為名固對曰無有因發怒稍迫趣之亡何得病死帝追感先后取田宅還之餘弗問誠銘長子錦衣百户李國瑞次子李國臣孽子李國正國正奏莊房地土金銀外它珍寶數百萬帝命遵吉解部以襄城工國瑞娶于新樂又與嘉定為婚姻故新樂太夫人及嘉定伯奎皆為之請帝弗許後以慈聖憑語于皇子而免時有上書者曰諸王跨土連城衣租食稅此皆縣官力也今天子憂勞日昃苦征繕之不給王髙枕而王一郡天下有急王獨得安耶願下明詔遣近臣諭㫖其上國帑以贍軍用帝曰朕以方內不靖為諸王憂維王骨肉兄弟共吾一體詩不云乎瓶之罄矣維罍之恥其詔有司弗復言久之卒莫應國初親王祿五萬石後改為一萬石秦晉楚蜀地相埒周于後徙封皆極天下膏腴商賈百貨所輳殖其富比京師萬厯中人傳楚王名他人子為子後嗣王姊張郡主索資財不能滿宗人相告言楚恭王無子取舅王大之子子之其家亦取家人子一人以進乃後封通山王者也恭王長女張郡主為討蘆洲不應又宗人雙橋負王府資五百金被鎖郡主請寬不從怒而發其事帝遣官即訊王行金纍億萬事得解楚坐此少減耗而四國俱完他王雖髙帝子不及也文皇靖難後自言我子不得與先帝子等祿不及十之五纍聖所封後親屬漸以疏即恩賚亦浸薄惟神宗四子帝叔父最親瑞惠桂在熹宗朝始之國開邸之日淺土瘠而多故天下皆憐之獨福王在兄弟中莫得以為比福王神宗之愛子也母鄭貴妃最幸王皇后無子光宗于兄弟居長繫中外心帝意亦素定苐貴妃早貴顧天下有出鄭氏上者即􅔵望雖至尊亦兩難之仗廷諍力稍自强浸尋乃日為離間諸大臣調護萬端元良既冊命而四子同日出閣恩寵惟均凡以為鄭氏也福王大婚費三十萬營洛陽府第二十八萬帝非貴妃不寢食妃一子雖長猶不離抱聞其將逺離日夜泣請之國日期者數十百奏置弗省最後妃弟子鄭養性亦言之雖非至誠顧以太子名號久正帝春秋髙久病不乘此時早就邸為王富貴計何庸復待乎妃亦心動言之帝不能戀戀母子情獨辦治國裝宜厚帝喟然從之當是時海內全盛帝所遣稅使礦使數十人月有奉日有進廣南明珠滇黔丹砂空青寶石豫章磁陜西異織文毳蜀重錦齊楚礦金礦銀他搜括嬴羡億萬計名人主私財入貴妃掌握擬斥十之九以資王諸宮人中使竊言曰王本共天下此不足計也特為下詔賜莊田四萬頃所司爭之力得減半中州腴土苦不足度山東湖廣界以充王又奏乞江陵故相所沒産江都至太平沿江荻洲雜稅并四川鹽井榷茶銀自益舊制王府田聽民占而徵其賦王左右勸王多規肥饒地入府為永業既則伴讀承奉諸官假履定步畝為名乘傳列旌旗笳吹所至索輿皂餼廩無算田之良楛租之多寡胥懸其口常過汝州擅殺人山東江楚之間富家憂攘奪農夫疲供億天下騷動其請福府食鹽也于洛中設邸閣中使至淮揚支王鹽一千三百引乾沒要求輒倍中州舊食河東鹽有令㫖非王店所出不得鬻淮商開中既詘晉引復滯九邊軍餉無所資帝悉其故命換給長蘆然去洛陽遠以為不如河東便弗肯改自慈聖登遐未兩月而愛子去膝下帝忽忽不樂瑞王年二十有四婚未成惠桂齒相亞無選擇命羣臣交章叩閣率寢遏而福邸信使通籍中左門一月數請朝上夕報可四方奸人亡命之徒探風㫖走利如鶩閔不畏死張差龎保劉成之變緣是而生然兩宮慈孝無間王亦專奉已無所睥睨訖于三朝繼統骨肉晏如原本祖宗家法之善而光廟因心篤愛為卓絶已及崇禎中王失神考久貴妃亦前歿內官宮媪為王中詗京師者多失勢老病死河南大亂王于國家屬尊地近在宮中時幾奪宗獨性不喜賓客智謀奇計之士莫進乎前所好惟婦女娼樂中外為不足忌然終用敗十三年河南大旱蝗人相食王謹録籥牡不憂念宗人百姓援兵之過洛者口語籍籍或詈道中曰王府金錢百萬厭粱肉而令吾輩枵腹死賊手南大司馬呂維祺在城中聞之惟以大計動王王不用先是秦大破李自成于潼關原餘衆散略盡自成竄漢南秦兵蹙其北左兵扼其南窘不知所為伏一年有餘不復出食且盡謀自經養子李雙喜止之是年秋自成令軍中盡殺所掠婦女以五十騎突圍走由鄖均向伊洛河南饑民相率歸之復大振十二月李自成陷永寧殺萬安王采􅀈熊耳以西民保聚山澤者連拔四十八寨遂陷宜陽十四年正月壬寅黃霧四塞日眚無光河南分守道王𦙍昌率邑紳警備總兵王紹禹偕劉羅二副將引其兵抵洛王召三將入賜宴加禮出糒醪犒軍十七日紹禹請以兵入城王箋阻者三不可止劉羅二軍背東南關而舍薄暮有呌呼聲束苣燒土門詐云逐賊抵七里河與之合十九日賊至羅用其火軍反攻東城見乘障有固志護保者訊應實報曰城守嚴馮太守一俊守南王兵備𦙍昌守西張知縣正學守東王總兵暨衛推官靖忠主行檄而西北陬為衛分地賊命其下向西北攻二十日王見事急出千金募士縋而出用矛以入賊營昏時賊漸退夜半王紹禹親軍反從城上呼賊相笑諾執王𦙍昌屬刃于其頸口噤齘索餉紹禹從旁解軍以手推之曰此豈老總兵當言時邪揮刀殺守堞者燒城樓開北門賊入王逃匿民舍中明日賊跡而執之道遇呂維祺年已邁為賊反接奮其首視王謂曰王死生命也名義至重無自辱王瞪不語尋遇害賊踞王宮醵飲荐王于俎汋其血雜鹿醢嘗之曰此福祿酒也維祺大罵賊死之有兩承奉伏王尸哭賊捽去承奉呼曰王死某不願生就若乞一棺收王骨即齏粉不恨賊義而許之桐棺一寸載以下車兩人即其旁自縊東關迎恩寺僧道濟者鄭貴妃所剃度以替王入道者也乘賊間舁其櫬止廡下祠而哭之審理李春茂典膳張守賢典樂劉文魁縋城遁世子亦走免遇官兵疑腰有寶物裂其裳裸露道旁得一護衛軍牽挽過河廬于孟縣訪求福王妃尚在相見不復識抱持哭初賊之入王府也珠玉貨賂山積裝縑囊負任以入盧氏山中發王府中金及倉粟大賑饑民時杞縣人李巖術者宋獻策起從賊教自成為好言紿衆曰王侯貴人剝窮民視其凍餒吾故殺之以為若曹令饑者以遠近就食男子二十以上願從軍者月食四十金趫敢能為將者倍之從我可富貴無為交手死民奔走赴之者百萬燒王宮火三日不絶用雒陽掾邵時昌為僞總理俾守城實棄之去也豫撫李仙風于二月十日至河南府取時昌及從逆張旋吉以下十數人梟懸之稱恢復功其道府推知等官皆在惟白尚文死不得其尸云已為饑民所噉食矣叛將羅泰劉見義不知何以見獲伏法王紹禹初傳死于兵後膠致京磔于市事聞帝震悼輟朝三日泣謂羣臣曰王皇祖愛子遭家不造遘于閔凶其以特牛一告慰定陵特羊一告于皇貴妃之園寢河南有司改殯王具弔襚世子在懷慶授館餽餐備凶荒之禮焉帝發御前銀一萬坤寧宮四千承乾宮三千翊坤宮三千太子一千又慈慶宮懿安后銀一千慈寧宮皇祖宣懿康昭妃銀五百皇考孝溫定懿妃五百俱著王裕民冉興讓葉髙標齎往以慰恤福藩世子嗚呼春秋之義大責帥以上相專征之重而親王不以其道終君子謂督師之罪無所辭矣夫洛陽周王城自漢以來都之三川天下之中地四達善戰者所必爭嗣昌乃專力于鄖襄而緩備于京洛賊因抵隙蹈瑕而王紹禹羅泰之軍得以動于惡乃道路所傳有謂兩王繼陷福隕而襄隨之者帝與羣臣弗信也嗣昌之將行言于帝曰臣請以襄陽為根本其規度襄陽城也仞深溝方洫而三環之造飛梁設橫枑陳利兵而譏訶非符要合者不得渡嗣昌雖移駐夔峽軍資甲仗在焉諸將左良玉以下并帑于城中江漢間列城數十倚襄陽為天險賊之得志于洛陽也移師汴梁百道攻城者七晝夜周王出庫金五十萬資守陴者而特懸賞有殪一賊者豫五十金士跔籍大呼擊賊賊未退同時南陽汝寧皆午道疲敝唐新立崇僅堞宮垣以守帝詘指念磐石諸宗曰秦蜀逺楚與豫接壤而荆僻處江介一州當有虞心襄陽宿重兵即惠邸在郢中可無恐况襄王乎一日御武英方進炙咄咄顧左右問汴梁云何忽宗人丞傳襄府福清王有表帝推案起曰果爾襄王真不免矣福清王奏曰臣常澄襄王之次子也臣藩奉國厚恩世守赤社不意二月初四日夜半南門火一城糜沸傳曰監軍道家丁反臣父殿廬火亦起融風吹之延爇萬屋臣睡夢中聞人馬聲飛鏃著臣頭目見城中兵亦與格鬬天明賊大至太守王承曾保臣及臣弟進賢王常淦突圍出臣遣人探父動定始知初五日被賊執至西城樓殺死放火燒城肢體為燼拾頭顱骨數寸以歸臣一慟殞絶臣宗弟貴陽王常法于西城門外被殺臣兄已故世子宮柩盡焚殺死蘭陽王母夫人徐氏太和王妃郎氏宮人李氏等四十三口臣父國寶內官張進喜投井得存臣兄襄世子常添先于崇禎十三年十一月二十五日薨妃聶氏繼逝臣父前經赴告道梗未奉愍綸痛念臣父托體王家沒身賊手臣不能相從灰土慚負天地惟皇上早殄此賊俾微臣雪父兄暴骨之恨帝覽之感動命所司喪葬一如福邸禮襄王追諡忠王葬城西青安山拊几歎曰襄洛天下形勝而襄建瓴東南憲王以仁宗愛子徙封于襄有深意襄亡陪京必震恐且曰朕為天下討賊浹辰之間兩王皆以國斃是天厭我家而剪棄其子孫也不然賊何以至此顧疑楊嗣昌獨無奏久之知張獻忠邀殺閣部解餉官于路竊其文書傳箭以入城嗣昌所積五省餉金弓刀火藥數十萬及守兵數千人皆歸賊洛陽國帑而襄陽軍資兩藩陷闖獻遂不可復制嗣昌在重慶聞亂返荆州將謁惠邸王命閽者謝曰先生願見寡人者請先朝襄王嗣昌慚乃縊是年東宮田貴妃薨妃帝所愛幸生兩男皇五子早殤永王年少帝感天下亂悽愴骨肉傷懷有老宮人及見定陵問以宮中往事稱神宗晚年王皇后稀進見福王辭之國出宮門召還數四期以三嵗來入朝大漸時顧視貴妃用洛陽為念因言孝恪皇太后病篤光宗請㫖得往省孝恪目已盲兩手捫太子欲有告光宗遽曰皇父鄭娘娘待兒子厚今鄭娘娘長御隨以來孝恪悟其意嚙指曰我所嘗備極天下苦兒知之足矣復何言遂訣光宗即位之三日懸母畫像對之拜且哭㑹宴駕無人言貴妃時事者果母子專寵擅天下邪以今觀之亦何益帝為欷歔起周皇后居坤寧宮宮禁禮重太子定王既出閣非帝命不得朝一日帝坐便殿太子前致請案上有急奏河南冦以某月日破某城而上歎曰若不知得幾見而母而動關我乎今後弗復泥常也宮中所奉宣懿康昭劉太妃者神宗妃嬪中推謹厚撫愛諸王帝以主慈寧宮禮之如太母常朝嵗節畢見帝就便坐俄缺申偃别榻太妃戒勿驚命尚衣謹覆之左右植立以俟頃之帝覺乃起攝衣冠謝曰神祖時海內少事至兒子苦枝梧多難兩夜省文書未嘗交睫心煩悶輒廢餐自以年才踰壯為國事磨耗蚤困劣在太妃前惛然不自持一至此太妃為之泣下帝亦汍瀾者久之諸宮人莫能仰視劉太妃以十五年薨年八十有六帝之憂汴急也尋聞圍解乃由王故得全則大喜既下詔褒王且加勞曰此髙皇帝神靈憫宗室子孫維城莫固啓王心而降之福也又以其意諭秦蜀楚諸藩曰王不鑑洛陽已事乎茍能如周王城何患不完冦何患不滅先是肅王親廟不戒于火祏主犧象皆亡賊登臯蘭山涉乾鹽池入慶藩國界荆王見革左詭降欲與為好召入宴盛帷帳陳女樂具百人之饌以饗兵見者皆憂其啓冦心荆王嘗戴小帽過酒肆茶坊游戲曰如此世界且圖樂耳其它王初因逺不及冦皆以書來省難比李青山蠢戾于濟北呂瘦子跳梁于湖南益王益王端王十一世孫定王由术之子亦稱建昌妖人密教實繁有徒江湖海岱亡命蜂起而臨藍平凉乃云宗人通賊長沙城內有榖城主撥置奸黨楊吐虹等為賊內應帝以為此同姓深恥皆由諸王平昔不能樹之以德董之以教故窮竒叨餮棄親即異生其禍心論天潢支屬惟周為睦故惓惓以周王為宗室儀表周自定王啓土憲守其共德而加之以文東書堂集古法書手自臨摹勒石暇則製樂府被新聲梁園士女弦歌之渢渢乎盛世之響焉髙皇諸子蜀獻王好學帝呼為蜀秀才妙選名儒侍講幄繕寫購藏圖書甚富而周有中原文物之盛比肩儷美稍欲加尚之萬厯初周鎮國中尉睦㮮為宗正招延通儒講串經義以教同姓諸生作五經稽疑帝系世表竭四十年之力訪求遺書牙籤識别登萬二千五百餘卷自大內祕本所未有者西亭竹居悉丹鉛讎勘西亭即中尉竹居者其子也王即趙宋故宮為寢城南有繁臺遺址四方賢士大夫曳裾來游比于相如嚴助它王小子侯雞鞠狗馬多豪少年之戲獨汴梁宗人贍文詞被服嫻雅左右列敦卣樽壺丹青竹素在昔髙皇剖符之日備物典䇿申之以訓詞分之以彞器百年有道𢎞長詒謀燕翼子孫多彬彬三代之風詩曰世之不顯厥猶翼翼其周宗之謂乎夫國于天地命祀山川河與嵩髙周之望也周之始封即憂河圯而遷洛尋復返舊都嵗有事于河至端王末載發祕記讀之曰王室將衰河決為害王告其世子以為大戚曰後二十年必驗今王立冦難作河益南徙匠人置𣙗準水形以測望地平河身髙出王殿檁者尺有二寸每春漲嚙隄吏民刑牲沈璧走馬傳籌報水至何所與烽燧等自汴梁受圍帝以中原為急用丁啓睿為督師赦傅宗龍用為秦督擢巡按髙名衡代李仙風為豫撫九月宗龍兵敗死于項城秦撫汪喬年誓師出關于襄城被殺自成乘勝圍南陽總兵猛如虎戰死十一月四日南陽陷唐王遇害于麒麟閣唐王之遇害也有湘安王尚在帝令附近州縣居住又唐王裕妃張氏顛沛居襄陽有詔撫按官護衛供膳俟修整府第迎養舊邸十二月自成陷禹州州徽王故封地王廢專城太康王以下七郡王多死二十四日李自成引羅汝才之衆再圍汴梁髙名衡偕巡按御史任濬總兵陳永福為城守丁啓睿在許州不能戰入汴梁避賊周王盡出庫金犒師被傷者與殺賊同賞賊衝車撞擊負户穿穴城壞二十七處皆距躍可上坦如大逵永福率吏士力鬬賊飛火發機洞胸達脅愛弟親將碎于背後終不為動矢射自成中目手㸐巨炮殺其巨帥上天龍等擐甲四十晝夜鬚眉焦灼指血滲漉生馘三十三人斬一千七百十有八級城乃克全賊以十五年正月十四日退屯朱仙鎮三月癸亥賊復進為攻城折傷士卒遂起長圍期以必拔帝先起孫傅庭為秦督至是更用侯恂率援勦官兵救汴左良玉壁于近境憚賊弗敢擊汴梁食盡人相食九月十五日河流驟決其聲如雷水沸鬱數十丈王露次闉闍七日督師侯恂率總兵卜從善以舟師迎王王與二妃世子後宮貴戚三十餘人乘夜達堤口止于河北柳圈坊太康伯張皇親之第人民枕籍死者纍巨萬或乘髙縛筏銜繩浮渡以水湍悍非柎絓屋角即身槁樹顛游涌而逸者十不得一城中淤泥反土信宿填滿水由來家集分三股一直衝破汴城至二十二日水將與城齊西分二股圍住賊巢賊奔吹臺避水或云賊由馬家口決河灌城河決後改從杞縣唐邑亳州以入淮河賊竟往西南一帶易曰地上有水比先王以建萬國親諸侯禹導九河𤣥冥效職魚鱉咸若玉帛來同逮乎三后之季汾洮弗宣榖洛交鬬龍蛇起陸百川沸騰自古記之周為國之分子奄宅土中析圭之後麟趾發祥騶虞告瑞古稱魯衛今有周京何意䝟貐蚩尤跳宕赤縣而支祈肆虐河伯助殃頓使士女化為沙蟲廟社淪于陷井十王之典章物采故家之禮樂詩書無不昏墊洪流堙沈息壤可不痛哉初李自成非能知水亡人國效王賁之灌大梁者也彼恃其纍勝下睢陳捲宛洛苟得一都㑹則􅏌然欲自王及見汴沒于巨浸乃聚其徒謀返據襄陽或曰楊文嶽以真保之兵守汝寧崇王尚在若秦將吏出關而汝蔡復犄其後中原之勢尚未有所分也十一月某日自成乃下汝寧殺文嶽取崇王及世子行賊圍急有通謀崇王中貴矯王㫖議降者文嶽砍柱厲聲曰誰為此言吾當手刃之王亦誓死守或勸之去曰我去如百姓何其被執也賊令諭降州邑之未下者王不從遂于泌陽遇害并世子慈焲俱死尚有王之弟河陽王由材王之次子慈焜亦與難而以兵臨襄陽福清王以社稷之鎮公子兵至走免是賊再克而襄再亡也襄不言陷言易也惠尤不辰惠王諱常潤以全郢之重鄖與沅二撫之左右我而不能一矢加賊奉王以次于湘潭天子以上游形便有司之過裨王失守不得已下璽書慰勞焉十六年正月闕日張獻忠陷蘄州荆王先薨賊下令圍王宮盡掠其所見妓樂蘄人初憂王為誨盜果驗左良玉畏自成之逼過武昌以軍事謀之楚王王又畏良玉之逼而恐其弗行也默不應良玉辭而下王乃自募承天德安之潰兵給以餉用長史徐學顏領之謂之楚新兵獻忠破漢陽五月二十九日于煤炭洲以二十艘輕軍潛渡楚新兵開門降賊參將崔文榮長史徐學顔死之故相賀逢聖正衣冠投于水王為獻忠所得遺資尚百萬賊縛王置所乘輦舁而沈之江惠王之走湘潭也舟遇風于陵陽磯楚士大夫從孥于王者多漂沒王僅以免張獻忠陷長沙吉王惠王走衡州獻忠陷衡州吉惠桂三王走永桂王諱常瀛皇七子李貴妃出與惠王同母獻忠追三王于永湖南巡按劉熙祚遣人護三王入西粵以身當冦入永州死守城陷不屈遂殉難時湖南諸邸岷以他事遇于亂榮先薨榮憲王由榑之子慈照崇禎闕年封闕年薨絶武岡常德望塵而奔豫楚十二王皆沒而孫傅庭以十萬之衆折于河南李自成西入關西安宵潰秦王有軹道之辱獨劉妃慟哭以國破家亡不如死長史章世炯自縊自成入據秦府僭僞號榆林諸將猶苦戰力不敵三邊覆沒慶肅同燼平凉受圍四日執韓王屠之賊渡河陷汾州懷慶福邸德昌王諱由嵩即福王再走免與太妃相失河北山東諸王避冦南下賊攻太原取晉晉恭王十一世孫穆王長子求桂以萬厯四十一年紹封入大同取代代簡王九世孫鼐勺以萬厯十四年進封自成以三月十七日至京師向彰義門坐其左右兩人人有識之者曰此晉王代王也夫紀侯去其國春秋是之蜀之盟蔡侯許男不書乘楚車謂之失位所以存滅國重舊封也先朝以空名奉骨肉實奪之權故處天王伯叔之尊勢乃制于黔首詩曰瑣兮尾兮流離之子于諸王又何尤焉禮國君死社稷君子于襄洛也則著之于秦晉也則微之城郭壞宗廟隳若是而王存焉者稀矣自成既以犯京師國亡而獻忠于嶽陽渡江由荆門走蜀蜀錦綺百貨甲天下而世盛傳蜀王能作黃金自獻王得鴻寶之書于內府子孫善黃白冶化然皆積不用王恃其都為金城石郭蜀士大夫以蠶叢本不通中國此遺種處弗復多憂成都令吳繼善江南人才辨濶達有謀見賊據秦揉楚而北都之問不至痛哭于蜀王之朝以書諫曰髙皇帝衆建藩輔碁置繡錯數年以來踣命亡氏失其國家此數王者非真有敗道失德見絶于天也直以擁富貴之資狃便安之計為賊所利而不思自全此非殿下前車之鑒乎今楚氛日惡秦關失守曹闖徭黃陸梁左右殿下付之悠悠而不恤夫全蜀之險在邊不在腹若設重戍于䕫關劒閣誠足自固否則黃牛白帝亦屬彛庚黑水陽平更多岐徑乃欲坐守門庭謂為設險不可解者一也往者藺酋撲滅獻賊逃遁止以藺兵力有虧獻地利不習今者荆襄撤其藩籬秦隴寒其唇齒揣量賊情益無瞻忌而欲援引前事冀幸將來不可解者二也至于錦城之固不及秦關白水之險寧踰湘漢此可恃以無虞彼何為而失守且城如孤注救援先窮時及嚴冬長驅尤易纍卵不足喻其危厝火不足明其急而猶事泄泄以幸茍免不可解者三也為殿下計宜召境內各官咨諏謀議發帑金以贍戍卒散朽粟以慰饑氓出明禁以絶厮養蒼頭蠲積逋以免流離溝瘠募民兵以守隘結彛目以資援政教內修聲勢旁震則可易危為安轉禍為福苟或不然蜀事誠莫知所終矣竊為殿下危之蜀世有共德王亦賢見其書太切不無動特以祖宗之法不典兵不與民事而蜀撫陳士竒迂緩不達時務巡按御史劉之渤稍彊執失人心皆弗能力諍繼善再三告以髙皇帝之制于諸王寄以討賊委之保邦萬一不戒以至失守王縱不愛身獨不恤國家不念祖宗何終弗從五月而審知國信七月而䕫門傳賊遽至成都一日數驚闕夜呼曰闖至矣明日又呼曰獻至矣王不知所為謀以其宮人遁于荒富家亦從孥以出之渤持不可乃已八月四日獻忠傅城下王始出其金懸之市購戰守者莫應賊攻圍三日夜以巨炮穴城東北陬而震之城崩遂乘以入王遇害劉之渤罵賊死吳繼善閣門死者三十六人同時成都府推官劉士斗華陽知縣沈雲祚俱死嗚呼蜀竟亡矣當獻忠初入蜀而瑞王先以漢中瓦解奔竄于重慶為賊所執殺之天無雲而震者三瑞王好佛從不近女色丞監以下皆化之吳民有解瑞府糧者無導行之費輒大獲早歸其死于重慶也見一道氣直沖天王端坐其中冉冉而上人謂之兵解云瑞王在宮中衣服禮秩降等兄弟王善地而已王醜地日苦兵秦將吏不能救資蜀帥以援故其急也歸蜀而卒死于蜀悲夫綏冦紀略卷八
