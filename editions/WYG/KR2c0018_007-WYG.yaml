body:
  text: 綏冦紀略卷七國子監祭酒吳偉業撰開縣敗楊嗣昌常徳武陵人也與父鶴先後舉進士天啟中逆璫魏忠賢兵部尚書崔呈秀用事鶴以南贑巡撫放為民嗣昌為户部郎移病父子皆齟齬歸楚人多稱之烈皇帝立僇大憝大學士黄立極在内閣首條奏閹舊惡中慚帝新即位以輔弼大臣有翊戴功優容之閻鳴泰為兵部尚書於崔魏交至深亦得弗坐六卿皆閹黨也天子新簡用閣員華亭錢龍錫等六人大半起謫籍未至在直者倡執中之說以相持自劉鴻訓從長山近先入為帝分别黑白奏之異論者稍稍詘天子思任老成手詔召蒲州韓爌為首輔而國事始定鳴泰以人言罷改刑部尚書王在晉代之在晉太倉人有當關舊勞鴻訓力稱其籌邊練職為人醇謹無他略時楊鶴以左僉都御史召用而嗣昌病良已入朝定州知州陳新甲亦由遷官同日廷見崇禎元年五月之二十九日也鴻訓尋以他事與在晉皆被譴而韓爌柄國大起廢籍以工部左侍郎王洽為兵部尚書洽臨邑人由忤璫召拜舉朝以為賢然未許以知兵也當崔魏時詞臣最著節者江南髙攀龍姚希孟文震孟江西姜曰廣等十數人既湔祓隠然負公輔望而史館倪元璐黄道周有重名天子夢想賢傑再以資地推擇閣員臺諫舉攀龍居首禮侍郎周延儒尚書溫體仁皆不得與延儒緣召對承恩眷體仁銳身出借科塲事訐攀龍目為黨魁排去之延儒體仁相繼晉用其間邊人不戒兵尚書洽有罪下獄死左侍郎申用懋攝部務拜為真事定自劾免方倉卒時户部郎梁廷棟一言當帝意驟用以督撫薊遼故總督張鳳翼官簿逺出廷棟右尋召之俾襲其後守關門而令廷棟入代用懋為兵部尚書時流冦已大起西北楊鶴改左副都御史總督陜西三邊不能討賊乃主撫廷棟鄢陵人目偏盲伉健有智謀在部與職方李繼貞論賊事調度頗合卒不能有所戡定他隂事蜚語聞帝怒其懐詐負恩遂落職而楊鶴撫賊不效致於理嗣昌已從關内道巡撫永平矣席藁請身代父帝為其子故骩法減死論鶴請室疏謝略曰朝廷未嘗講究兵食徒以重任責二三疆吏號為知兵臣本書生力過其任故顛蹶至此今羣臣又謬舉臣之子嗣昌鎖鑰關門臣既不効於前子豈能効於後兵者危事非一人智力所能辦也大司馬虚位難其人江西熊明遇在熹廟初為九卿至是由南刑部尚書改任以秦督承疇所請剿冦餉不覆奏召詰責明遇惶恐不能對罷之次第用張鳳翼鳳翼選懦不學顧老吏頗熟諸將姓名善候伺人主意得為兵部尚書最久當是時流冦已踰畿輔擾中原且上犯山陵天下洶洶指目二三執政延儒早謝事體仁總機務為首臣在帝前遇兵事不敢可否帝嘗有所訪逮輒推謝曰臣夙以文墨待罪禁林帝不知其駑下擢至此盜賊日益衆誠萬死不足塞責顧臣愚無知自審票擬勿欺耳兵食大計獨帝神聖裁決而鳳翼既當職無可避得楚豫急奏輒頓首省户下曰臣曉夜治文書調兵食非不盡狗馬力如將士不用命何惟帝死生之天子輒哀憐以為此歸誠無私且久故不忍廢然亦不甚重也初帝之任相也虚已禮遇之甚自劉鴻訓錢龍錫相繼得罪不能無疑而體仁伺間用朋黨中之又自以排廷論取中旨得相日夜患詹翰諸臣之偪已其才且賢者必害之以事抑勿使前取癃篤謹愿無能之人布腹心引與同列苟以充位塞爭且假之形已長而固寵故體仁用事八年他相非病免物故即以他事去職帝寖厭薄館閣侍從謂儒緩不習事而祖宗朝内外得並相於是外寮爭以他途進矣淄川張至發者以兵侍郎拜為特恩木彊無所長體仁窺帝意于將謁歸進其黨薛國觀由太常少卿入國觀狠鷙而隂沉不及體仁又不熟掌故每調㫖瞪目不能下筆堂吏皆非笑之帝又疑京朝官起家清要不更吏職惟封疆勞苦之臣練習機宜間察諸督撫獨楊嗣昌在宣大可用方以艱歸即家拜兵部尚書且倚以相非它司馬比也嗣昌為人不如其父鶴鶴得罪由秦按臣興化吳甡劾奏甡本同年生鶴出獄無怨言曰吾儒生不閑軍旅興化以國事劾我何嫌乎嗣昌自緣邊臣進於朝士無纎介特以父喪奪情憂天下姍已又帝倚之辦冦一不稱而廷臣用故事責我且無計自全以此左却右顧積猜多忌識者竊憂之曰此復為體仁矣當體仁之用事也忮而專臺諫有異已攻之者内銜刺骨所罷斥甚衆獨慈谿馮元颷得為都給事中而東陽張國維撫江南數以事觸體仁賴帝知之故弗斥此兩人同鄉里時浙東稱為多賢諸詞臣惟文震孟至相值體仁在告日帝出不意驟命之已而顯為難不兩月罷震孟初入直體仁有票擬必請正有改必從震孟曰溫公虚懐乃爾何云奸同官何吾騶曰是人伏機甚深何可信越數日體仁知其疎凡震孟票擬徑抹去不用震孟拍案大呼以諸疏擲體仁體仁亦不顧未㡬許都諫譽卿被謝冢宰陞糾擬㫖為民震孟力爭之不得曰言官以革職為榮體仁持其語入奏并吾騶罷之曰廣希孟元璐皆為體仁所中傷而黄道周數廢數起官至少詹事潔廉無比於書無所不窺天下望以為相道周性忠直好面折廷諍時相多舒緩養望浮沈取大位道周羞之不忍為天子一日開文華延詞臣問以用人理財策道周據古今條對甚切帝亦名重之呼先生者三知其博洽故以見聞相折辨它翰林楊廷麟楊士聰等多所指陳其大者論考選考選者賢守令以材望咨訪備近臣而吏尚書田唯嘉欲從之取賕不得則先期撮其尤者補部主事名為移陞衆不服於帝前發之且及他奸私并相至發交關狀帝乃命在召者得一切賜考拔張縉彦等授翰林臺諫官縉彦為秦中清澗三原兩縣令清澗僻處賊巢環而攻之者百萬率鄉勇死守幸不沒調三原壯邑扞禦仍有功移陞已歴司農郎帝自識而用之嗣昌之為中樞也陳新甲用知兵顯亦以遭喪起復為宣大總督道周儒者念國家即無人奈何數以墨衰從政貽後世笑慨然思論之仰視熒惑逆行太白晝見嗣昌所籌冦事滋失策顯謂馮元颷等天象如此此人必誤國宜率同列固爭道周前召對時補牘被譴訶㡬不免矣中夜讀書至宋臣真德秀𫝊拊几歎曰古人立朝一月三十六封事而吾儕黙然已乎每見詔書有不便輒屏人削牘不起草手自書之有一字更定曰此誠不足以格主屏弗奏其欲糾嗣昌也為數劄子論邊事冦事其一言奪情并論新甲未上也帝傳部院舉閣員時至發行惟嘉逐吏尚書商周祚初視事諸君子浸向用馮元颷謂枚卜無出道周上者獨苦其好言事疏入或觸忤即推且弗用道周重國事於已進退固弗恤元颷等遣所知日守之曰公得政所挽囘者大奈何必以口舌爭即輕宰相獨不為天下計乎以此久不發帝初用詞臣言去一相一冢宰諸大寮多側目比論相帝意黙有所屬故再三駁廷推以觀之周祚素所無執持乃盡籍坊局之資輕者名以上其同官先達中摘瑕疵爭同異語浸尋至帝前帝震怒切責周祚濫狥而自用嗣昌等五人入閣皆卿貳官五人者自嗣昌方逢年外程國祥素以清節著為司農倡間架之說請預借民房租一年蔡國用召見時嘗力言把持朋黨以中帝意然其人無才不能與體仁比范伏粹奉佛最謹晨夕跽拜不輟此三人皆無所表見惟方逢年係翰林亦以禮侍郎拜云帝素知道周學行謂其性偏執非救時相故後之道周亦非以不相少有鞅望特恨為同列所誤不早擊嗣昌竟就初藁為三疏以進帝之相嗣昌疑非朝士意道周又衆所推而出身强諫憚其詞直欲以理折服召諭羣臣曰嗣昌久歴巖疆守制已踰小祥奪情原有舊例黄道周彼時不言今因簡入内閣借名妄詆朕聞無所為而為者謂之天理有所為而為者謂之人欲道周已不見用而出此當與卿等共議之公卿見帝變色皆戰栗流汗嗣昌陽引救徐出微言挑激道周頓首力爭終無撓詞既對畢叩頭入班帝目而斥之曰佞口道周再入至帝前曰請為上分别忠佞反覆數百言帝益怒緹校在殿下惴惴將有所收縛帝終以儒者優容之奪三官得江西幕僚以去已而編修劉同升趙士春都給事中何楷皆以爭奪情謫官南九卿有公奏帝怒主藁者兵尚書范景文削其籍南御史成勇金吾騎逮訊而嗣昌權益重它相不敢與侔矣嗣昌既相之次年夏帝以蜀撫傅宗龍為兵部尚書還嗣昌於内閣嗣昌幸於解機務㡬得以功名終未浹日而張獻忠反嗣昌自念帝數貰我罪榖城事熊文燦又其所薦再負國討賊之任將安歸帝亦漸悟嗣昌之麄疎言過其實終不足仗顧已撓羣議而用之庶一出行師邀萬一功有以謝天下嗣昌知之乃自表請行十二年八月二十八日詔諭嗣昌曰間者邊陲不靖卿雖盡瘁不免為法受罰朕比因優叙還卿前所奪官卿引愆自貶堅請再三所執甚正難相聽許朕聞春秋之義以功覆過方當降徒干紀西征失律以卿才識戡定不難可馳傳往代出郊之事不復内御特賜尚方劒以便宜誅賞卿其芟剪蝥賊早奏膚功詩不云乎無徳不報賊平振旅朕且加殊錫焉晝漏上二刻被詔日晡時嗣昌上書請對翼日帝乃召閣臣薛國觀等吏尚書謝陞户尚書李待問兵尚書傅宗龍來平臺嗣昌避與閣臣齒需再命而後入見畢上問待問曰楚軍及豫皖二撫告缺餉卿部前已發乎方專征度何道而足待問曰督餉臣伯鯨軍興是其專責微臣關掌文書而已今輔臣係皇上特遣宜就臣部題留款項設處開支多寡伏候進止帝問宗龍曰張獻忠舍豫楚而冦秦三路見兵㡬何人宗龍曰臣至部閱實其數近十萬人矣帝問陞曰嗣昌行以何銜陞曰臣以為宜用督師輔臣帝召嗣昌前曰朕以冦亂煩卿遠行朕不忍卿去左右嗣昌曰微臣實不稱職致方内多儆仰廑宵旰咎皆在臣蒙皇帝又貰其罪而用之臣敢不竭其駑駘之力繼之以死帝曰卿行軍以何者為先嗣昌曰兵難豫度容臣馳至襄陽條方略上之嗣昌又請合剿與練二餉為一用緩急為期㑹帝恐因變制滋濡滯不可嗣昌因言户部為京運不足借剿之半以充今派練餉及補缺額餉共五百萬經制有餘可還舊額資軍費帝從之嗣昌曰兵事煩倚監軍以辦冦今其人多不可用帝曰卿自擇可者嗣昌曰若張克儉宋一鶴皆其選也嗣昌曰賊勢初散今合先後不同張伯鯨遠駐池州轉輸遼緩户部咨均糧溢地二餉一半解京一半解剿剿餉侍郎張伯鯨奏為遵均溢半留之㫖酌派督理治數目事内晉蜀二省應於秦撫項下解還户部外實半留銀一百一十三萬二千三百八十六兩若以崇禎十年額派二萬八千兩計之僅得十分之四尚有皖鄖二撫共十八萬有竒不與焉臣遵照舊款各以四分為率于理臣項下派三十萬兩秦督派十四萬兩楚撫派十萬兩豫撫派十六萬七千六百兩皖撫衙門創設别無支持不得不仍派一萬兩鄖撫以特請奉㫖照原數仍派八萬兩沅撫二萬八千三百八十五兩先奉部派已定不敢增減者也以上共派一百二十四萬六千七十五兩内不敷銀十一萬三千六百八十九兩臣撥事例銀補之有細數開呈御覽宜移之楚豫用兵地其江南用一司官催運便左良玉雖敗其人有大將才兵亦可用當進為平賊將軍帝命皆允行嗣昌曰臣聞君言不宿於家臣朝受命夕當上道從丁廏馬衣装鎧仗惟所司早給便臣辦嚴帝曰卿能如此朕復何憂大悦諸臣叩頭退駕還宮漏下二鼓矣越日詔賜嗣昌精鏐百大紅紵絲表裏四斗牛衣一襲賞功銀四萬銀牌一千五百紵絲緋絹各五百佩以督師輔臣印撥剿餉五十萬予之九月六日嗣昌陛辭先期光祿寺設饗於平臺之寢殿北面重席帝親為之起手揚斚酌醴命左右宥以飫之者三樂作一小黄門奉黄封立於旁發之御製七言詩一章御製詩鹽梅今暫作干城上將威嚴細栁營一掃冦氛從此靖還期教養遂生民帝笑曰朕為卿贈行其詩比之於周方叔漢亞夫嗣昌跪而誦之拜且泣宴畢尚有造膝語中官皆屏於東廂見帝諈諉者再嗣昌頓首曰必死既而命撤饗具以賜之曰已令有司祖於國門朕需卿早飲至為勞旋之宴九月初一日楊嗣昌奏臣昨奏剿餉練餉當相乗除恐徵解不前必至兩誤皇帝面諭剿餉自剿餉練餉自練餉頭緒原各分明再有更張恐生遲滯欽此但户部前因缺餉議將剿餉一半留用一半解至京中其後議派練餉四百餘萬兩又派補缺額餉一百餘萬且欽遣科臣守催則京餉有餘不宜分剿餉明矣乞勅户科勿分剿餉為蕩冦第一急務既行十五日於磁州疏謝恩十九日過河抵汴檄有司諭帝意以救民水火二十九日至襄陽入文燦軍中先是左良玉羅􅀈山之敗獻忠謀入秦秦督鄭崇儉率副將張應元汪之鳳賀人龍李國竒扼興安賊犯蜀興山太平等縣屯於永寧關大巴山分水嶺秦蜀之交境又從義溪走馬家洞沙子嶺以窺合江從鹿耳坡髙竹坪以窺大寧蜀撫邵捷春遣其兵二千人同副將王之綸方國安分地拒險八月官軍敗績於湯家灞王之綸力戰不支都司何闕明沒於陣裨校多傷九月方國安所部將岳宗文譚􅀈破賊於三尖峰又破之於黑水河張獻忠羅汝才分其軍自白水之碧魚口入秦合江之蕭家坡入楚文燦待罪襄陽兩月自審禍及羣帥詭稱冶父聽刑不受發召賊狂走巴山庸部文燦不知所出張縉彦奏以為秦督鄭崇儉兵一譁再譁駐師興安茫無進取總兵陳洪範誤信五營貼兵被創今逍遙何地左良玉署掌河南總兵關防未見成功河南總兵應否别推用嗣昌既視事十月朔大誓三軍方孔炤左良玉劉元斌自當陽陳洪範自鄖陽來㑹楊素有口辨加使相威重為諸君述詔語申訓誡又自以受厚恩誓必滅賊誅賞所必行副將以下皆失色退與文燦語頗尤之文燦訴兩年剿餉不至者六十餘萬又新附諸人不從逆均州五營雖亡去其中多思自拔者欲以此為解嗣昌納其說累疏聞李萬慶願從征請得比劉國能給以餉張伯鯨以乏興貶秩司官王揚基李為珩白衣視事從督師請也是月也彗星見詔傳㫖修省以王紹禹為河南總兵賊格里眼等掠葉縣圍沈邱入項城之郛焚之犯光山副將張琮刁明忠率禁旅踰山行九十里及其巢賊大營已移挑其銳返鬬先驅射賊殪絳袍而馳者二人知光山吳敏師齎糗糒至士益奮追奔四十里斬首一千七百五十級嗣昌稱詔頒賞十一月王國寧再自歸以其衆千人馬五百匹願從良玉自効請得比李萬慶嗣昌於襄陽受之處其妻子於樊城然而熊文燦竟逮治矣左良玉受平賊將軍印浸驕恥以櫜鞬禮見遣侯閹以書來謝嗣昌不能無望十二月賀人龍以秦兵大破賊嗣昌請加職賜奬欲漸貴之以其班抗左左窺見萌芽恨之兵部尚書傅宗龍奏事失指下獄傅宗龍因洪承疇請推總兵劉肇基部議不允帝以違㫖藐抗故意掣肘阻撓􅃧視封疆革職提究帝素憤中樞失職嗣昌權譎免宗龍戅猥承其後偶不當意輒移積怒怒之時冬月已盡大司馬考成用小故被重譴百寮震慴嗣昌軍中聞之亦心動十三年庚辰正月楚師敗績於麻黄嗣昌歸獄於撫臣方孔炤詔命逮治以荆南宋一鶴代之楚制府鎮上游兵多下游稍薄而撫臣自以護陵為重分漢南屬治臣王鰲永調容美土司增當陽逺安戍以備荆州而已提陵兵五千標兵一萬五千專斷徳黄兼顧陵寢其敗也無所辭咎故得譴而嗣昌亦戴罪然以初至軍為法受過帝意不甚責也當是時賊分為三西則獻忠負嵎蜀楚之界東則革左四營豕突隨應麻黄南則曹過十營鷙伏漳房興逺曹過尋從興逺入寧昌在是年之臘月我師視東略為緩河南江北自撫鎮外藉朱大興盧九徳為䇿應而麻黄千里委之郭金邦二三裨校以設防其京兵滇兵多聚西南議以左將軍先行獻忠之誅餘可次第剪滅閣部迺大計兵食規形勝之地專倚襄陽為根本濬城外為三濠造機橋列横枑以啟閉每門設一副總兵文移出入譏訶驗問立軍府監以道臣張克儉儲備甲仗累億萬諸道餉皆輸之申嚴號令大會師襄陽之射堂斬後期者興安路監軍殷太白以殉所奏薦萬元吉等起自廢籍監諸道軍元吉有識略委以軍謀進止所言無不用閏正月檄諸道進兵左良玉於二十四日合諸軍擊賊於枸坪關獻忠敗走乃請從漢陽西鄉入蜀追之閣部前調秦督率賀人龍李國安之兵從西鄉入蜀於良玉則欲其駐兵興平别遣偏師追剿良玉不從嗣昌與元吉計而疑之移檄良玉曰觀賊形勢似不能入川仍當走死秦界將軍今從漢陽西鄉入川西太兵多紫興兵少萬一賊從舊路折囘疾趨平利仍入竹房將用何兵禦之不則走寧昌以入歸巫與曹操合我以大將尾追趨賊入楚非算也依幕府本謀秦督提兵入川秦府駐兵西紫我兵仍駐興平此為正著量遣偏裨入蜀追剿此為竒著其詳議以聞良玉報曰蜀地饒衍賊渡險任其奔逸後將難制且逆獻被創入川則有糧可因囘鄖則無地堪掠良玉料之賊非萬分窘急必不復竄楚境鄭嘉棟前報折囘吉家莊者此捍子手乃老􅉰􅉰一斗粟之殘賊嘉棟誤以為獻耳夫兵合則强分則弱今已留劉國能李萬慶守鄖若再分三千入蜀即駐興平兵力已薄逆賊折囘能遏截之邪良玉所統乃剿兵非守兵若主兵不出戰而戰兵又代為守賊將何時盡乎今日惟當出其不意盡銳疾攻一經大創自然瓦解縱使折囘房竹間人跡俱斷彼且從何得食况鄖兵扼之於前秦撫在紫興抄之於右庸能狂逞若寧昌歸巫險而且逺曹獻兩不相下倘獻窮而歸曹其中必有内相併者可無慮也良玉已於二月朔涉蜀界之漁渡溪矣嗣昌得其書以示元吉元吉曰良玉初稱入蜀之路定於西鄉今倐易而大竹進退皆主之不復稟承督府何邪嗣昌曰良玉書詞慷慨惟敵是求將在外不中制古也宜從之於時獻忠營太平縣之大竹河規取其邑以休士馬良玉駐軍漁渡溪之兩日而秦督崇儉亦引其兵來㑹獻忠聞兩道俱至乃移營九滚坪以待我兵見瑪瑙山險峻將據之以決勝左兵秦兵以初四日追賊於九滚坪不見賊部勒行伍指劃形勝初七日始抵瑪瑙山而賊已奔山巔結壘乗髙鼔噪其氣甚盛左將軍下馬披荆榛相險易周覽者久之既而謂所親信曰吾知所以破賊矣分所進道為三左兵當其二秦兵當其一令曰聞鼓聲而上我所部兵或衝其中或衝其右而賀李二將從左路夾擊賊置陣堅不可動我師奮勇鏖戰賊潰墜崖澗者亡算追奔四十餘里左兵斬首二千二百八十有七内有掃地王曹威白馬鄧天王等十六級皆賊將而張大經亦為官軍所殺獻忠妻妾九人被擒者七獲偽金印一鏤金龍棒一偽令旗令箭各八卜卦金錢二馬驘千餘頭甲仗軍貲以數千計陣降賊將三百三十八人秦兵斬首一千三百三十有三降賊將二十五人人龍所將卒獲帝賜熊文燦准撫獻忠勅書别將收獻忠大刀上鏤天賜飛刀四字是役也左良玉功第一賀人龍次之閣部主調遣而秦督在行楚巡按御史汪承詔方差次其績以上制府先被二月十四日詔書帝以閣部在行間鬚髮白又調度有方賞罰明信所以勞勉切至發御前賞功銀一萬兩賜嗣昌斗牛服御廏良馬金鞍各二使者甫出國門而瑪瑙山露布告捷帝大悅時陳新甲由宣大總督入為兵部尚書召見賀楚捷帝先免嗣昌良玉戴罪再發五萬金錦幣千端為軍賞令新甲定諸將功格而急趣進軍是月也楚將張應元汪之鳳乗勝逐北十六日及之於水右壩斬馘九百獻忠又走岔溪千江河蜀將張令方國安十九日與戰復破之張令者故奢崇明降將年七十餘能馬上用五石弩中必貫革為賊所憚獻忠乃由千江河之十二灣轉入柯家坪其地崇牙錯峙菁薄綿亘賊彌山漫谷依阻其中張令於二十七日分其軍為五路負勇爭利賊衆我寡方國安支軍後距取儳道得脫而令深入被圍居絶坂之中猛氣彌厲挽强持滿屢奔賊營應弦以斃甚衆而水逺士渴賴天雨得濟圍終不解鄖襄道張克儉犒軍入蜀謀於秦督崇儉曰張令健將奈何棄之急呼張應元汪之鳳從八台山進賀人龍從滿月嶆進三月八日過箐入坪楚兵先至張令方與賊鬬呼聲動岩谷内外合勢賊乃解去應元之鳳功居多是役也張令以五千人當賊數萬相持十三日力戰得不沒所殺賊亦已數千雖救自諸將人皆服其勇云當是時獻忠既遁興歸山中尋自鹽井竄興歸界上鹽井屬四川賀人龍李國竒髙􅇐等以三月初九日追賊及之于寒溪寺翼日再及之于鹽井共斬首一千五百有竒賊目三人先後率所部降于陣已而木瓜渡黄墩兩戰秦楚蜀之師皆會木瓜溪斬首一千二百八十有二黄墩斬首三千四月左良玉大軍進屯興安平利諸山連營百里諸軍憚山險圍而不攻賊重賄山氓市鹽芻米酪其人有反為賊耳目者獻忠收散亡養痍傷氣乃稍稍振久之自興房走白羊山而西西即羅汝才入寧昌道也初汝才之在寧昌其地阻江為險汝才與過天星分兵出羊頭坂窺渡二月二十四日大昌參將劉貴擊之半濟尋犯巫山三月十一日石砫女將秦良玉盛兵雒門百子溪扼渡再縛筏巴霧河四月初四日秦翼明以三千人設守大昌游擊楊茂選力戰郤之既屢挫不得渡潛求附於獻忠獻忠之走白羊山即巫巴深險處掩息旗鼓轉入轉西汝才之聲援漸近既至遂與之合獻忠剽悍雖累敗不以氣下汝才汝才分士馬以資之語次頗憂江險為難渡獻忠曰不然立馬江岸有不前赴者斬之其下爭死鬬我師劉貴等皆退賊乃由魚住溪渡江結營萬頃山苦桃灣其别部陣於紅茨崖青平寨歸巫之間震焉督師在襄陽聞之曰二賊合西郵必儆急引其軍出彛陵彛陵與巫山接壤荆楚之門户先是宋一鶴鎮當陽以滇兵劉元斌控荆門以禁旅地勢相為犄角督師標兵三萬餘人張伯鯨解餉至者八十七萬幕府如袁繼咸萬元吉皆竒士有智謀故總兵猛如虎以白衣從征自效文武將吏一志專力賊且旦夕可滅乃嗣昌虚恢自用又煩碎無大略其上彛陵也偕幕士飲酒賦詩流連名勝酷好形家者術遇梵刹邱隴指興替以訪其驗否舉鞭於馬上算之萬元吉以為不急廢務然亦未敢强諫躬親文簿過於米鹽反滋叢脞軍行必自裁進止千里待報動失機宜偏裨駕馭難周輒經年無所調發將吏以之解體鄖治王鰲永因關門共事之舊乗間言之終不見聽鰲永既罷疏曰臣目擊督輔行間盡瘁舉鳳皖秦豫楚蜀諸撫分任之而不足者嗣昌獨任之而有餘但賊情瞬息變換檄文往返動稽時日比至而情形已變又須另請調度所以有經年不戰之兵其將所自為出竒僅得瑪瑙山一戰若遵督撫之令則左良玉應守興安無此捷功矣臣以為督撫之責成諸撫不必人人而授之機宜止核其條上機宜之當否可也駐彛陵一月不進取華嚴第四卷謂可詛蝗已旱公然下教郡邑且以上聞朝士聞而歎曰文若其將敗乎擁百萬之衆戎服講經其衰已甚將何以戰五六月間曹過再越巴霧河侵開縣開縣失陷鄭嘉棟擊之于仙寺嶺賀人龍擊之于馬溺溪各有斬獲馬溺溪斬一千二百七十九級羅汝才同小秦王等東奔而過天星特過開縣而西賀人龍李國竒又折囘追之過天星之突遇開縣為閏六月廿日當是時諸將士馬居山谷中罹災蒸瘴毒疾疫物故者十二三京兵之在荆門雲兵之在簡坪楚兵之在馬蝗坡久屯思歸多中夜亡去關河旱蝗人相食土冦蠭起秦有竇阿婆賊破名城殺長吏豫有李際遇等賊河汝之間多從之嗣昌乞恩請罪帝為發帑金五萬軍前營療醫藥二萬賙恤饑民于嗣昌傳旨切責而已王鰲永緣議不合解任代以監軍道袁繼咸秦督崇儉老不任事謝病詔不許俾率鄭嘉棟歸秦留劉賀李三將討賊秦之長武楚之羅田蜀之新寧大竹皆告陷嗣昌不得已規以便宜招撫為諭帖萬紙散之賊中革左全營自歸未㡬颺去王光恩素有善意并說其八營俱降見閣部猶豫不能專決久之八營之降者復叛七月中羅汝才小秦王混世王等自蜀折囘興山楚兵之備興遠者副將王允成王之綸等京營總兵孫應元等以十四日擊之豐邑坪大有斬獲賊之折囘也尚有滿天星一連鶯共五股賊在興山連營舒洞口初圍香爐寨繼走白草坪豐邑坪京楚官軍擊走之惟豐邑坪斬二千三百餘級生擒五百餘人亦瑪瑙山之亞也十六日小秦王混世王降惟汝才佚去嗣昌見楚地不足憂決䇿以八月二十六日出師入蜀嗣昌楚人不欲賊一騎蹂楚其初至軍也即謀以蜀困賊勢不得不先困蜀撫恐蜀之門户堅反而致死凡撫戲下之强者輒調之以飭他備撫邵捷春提弱卒二萬守重慶恃秦良玉張令為左右手張令忠勇善戰軍中號神弩將秦良玉自將兵三萬援夔城過夔一步即其石砫司守夔亦守家也知綿州陸遜之罷官歸撫遣之按行營壘過秦秦冠帶佩刀出見見左右男妾十餘人然能制其下視他將加肅為陸置酒歎曰邵公不知兵吾一婦人受國恩應死所恨與邵同死耳陸請其故秦曰邵公移某自近去其所駐重慶三十四里而遣張令守黄泥窪固已失地勢矣賊在歸巫萬山之上俯瞰吾營鐵騎建瓴而下張令破次及我我敗尚能救重慶之急乎且閣部驅賊入蜀無愚智皆知之邵公不及此時爭山奪險令賊毋敢即我而坐以設防此覆軍之道也時又有降賊自言於邵公曰某降幾日矣而公不從我計有疑我心乎邵曰軍機大事汝新從賊來固不能無疑為鄭重然且圖而用汝賊曰吾作賊久恨失身欲于國家圖報効故背以自歸公若疑則速殺我否則當早用吾計賊大衆飢疲乗之可殄滅倘有它賊以軍糧接濟者雖百萬衆無能破之矣邵俯仰從其䇿賊盛言山中賊所窖金銀處以動諸將而又道上所遇皆餓殍無人色其死者剖其腹皆草樹皮謂可信乃盡邵新軍二萬人以深入而皆為所沒無何楚兵於土地嶺敗績先是監軍萬元吉集川將守巫巴諸隘而秦將賀人龍李國竒楚將張應元汪之鳳張奏凱專使擊賊楚兵自達州入夔營於土地嶺而賀人龍逗撓不至楚兵多新募不習鬬獻忠悉銳來攻應元等苦戰不決賊分兵從後山下突入其營官兵譁賊乗之合圍應元中流矢突圍出收其兵稍稍集賊度巴霧河猶力與之爭之鳳走他道所將潘映奎沒於陣餘士卒從東平散囘巴霧川之鳳苦戰久山行道渴飲斗水而臥血凝臆而死賊退屯圎渡坪元吉馳赴楚軍命應元兼領其衆楚蜀兵勢皆危嗣昌惟以受降為得䇿九月過天星聞小秦王混世王之既降也亦請降求内徙嗣昌徙小秦王於房縣過混於竹溪山中初嗣昌之用蜀困賊也蜀險且曠再逺則松潘徼外諸蠻吾藉將士力蹙賊而致之蜀蜀能守則守不能守而棄涪萬松雅之間以啗賊秦兵斷棧道臨白水滇兵屯曲靖扼白石江我率大兵掩擊其後驅入松潘諸蠻在豫楚取蜀為阱在蜀又取徼外為壑策固當乃賊謀尤狡覘嗣昌喜諛詭言畏督師天威諸部悉捧馬足督師慮降者與行營雜處非便輒發内地安插以逺之先時兵圍賊久而大軍反為賊所圍嗣昌不悟川東道康四海鄖襄道張克儉區畫新附日不暇給賊得免死牌莫肯散自擇便地連營數百里河南北大祲饑民就食襄漢者日數萬賊因之闌入張克儉心憂之上書督府曰襄陽自古要區在本朝筦鑰獻陵視前代尤重近者西河饑民雲集新舊降丁逼處其間一夫呌嘑皆足致亂况秦兵以長武之變西歸鄖房軍府初立降營碁置何啻放虎自衞紫漢西興初無重門之備可不為之懼乎嗣昌報曰昔髙仁厚六日降賊百萬卒擒阡能故事可法也參軍何怯邪於是嗣昌遣親将至京師上進軍狀且曰臣嗣昌駑怯竊冀奉神靈揚威討逆獻指日授首然後掃除餘孽拜見闕廷帝亦以功必成出其章示羣下兵都給事張縉彦言于帝曰督師專征以來所上章前後多不相讎瑪瑙山獻忠單騎奔逃已而突巫山掠巴東所在見告革左全營歸命不數日皖將又以陣亡今謂過渠束手竹房漳保已無内顧泝歸巫而上盡敵可期在督師定有成算迥非前事之比然臣不能不慮之也十月張獻忠陷大昌先是萬元吉駐巫山邵捷春駐大昌相聲援捷春用其將邵仲光之言以大昌之上中下馬渡水淺地平難持久乃扼水寨闕之觀音巖為第一隘而夜义巖三黄嶺磨子巖魚河洞下涌諸處各分兵三四百人以守元吉以兵分力弱為憂賊以九月先突觀音巖三黄嶺窺上馬渡無備破之元吉急檄諸將邀之於譚家嶺七箐坎乾溪而張奏凱以專兵屯淨壁捷春用羅洪政沈應龍二將兵助之已而獻忠從竹􅌲坪突過淨壁進屯開縣嗣昌聞蜀兵潰取觀音巖守將邵仲光斬以狥是時張令秦良玉皆敗張令性輕敵有賊䇿一騎于山呼其壘曰誰是張將軍令易之躍馬出賊曰若善弩今用相報矢中項以殪令宿將死藝川人惜之賊大至秦石砫兵亦覆沒秦單騎見撫曰事急矣盡發吾溪洞之卒可二萬我自廩其半半餼之官足破賊土官家用一箸一帚調兵者最急箸以能飯者畢至帚則掃境内出也邵見嗣昌與已不相中而蜀無見糧峒寨之人詎可信遂謝良玉計不用令竟以死而捷春自收其兵扼梁山羅汝才自豐邑坪返走再與獻忠合獻忠以梁山河水深不得渡乃與汝才謀曰達州河淺不如自開縣西走復東向而趨達州時方國安奔敗引殘兵保達之郊獻忠至不敢與之爭賊既渡遂長驅深入捷春退屯綿州扼涪江賊疾走陷劒州趨廣元將從間道入漢中趙光逺賀人龍拒之於陽平百丈二關不能進乃踰昭化復走巴西張應元合楚蜀官兵邀之于梓潼戰小利賊返鬬被衂蜀將曹志耀王光啟張世福等力戰却之降將張一川張載聖俱陷陣遇害萬元吉命䘏一川妻子於彛陵捷春涪江師遂潰賊屠綿過浮橋直抵成都嗣昌先以大昌失事糾捷春罪用監軍道廖大亨代之邵撫蜀有惠政其逮也成都巷哭蜀王為引救不得卒論死十一月嗣昌進軍重慶萬元吉大饗將士于保寧以諸軍進止不一立大帥以綂之用猛如虎為正總綂張應元副之率其軍趨綿州諸將分屯要害而元吉自間道趨射洪扼藤溪以待賊賊方屯安岳之周里塲諜知官軍且至宵遁抵内江猛如虎選驍騎逐賊元吉與應元營安岳城下以遏賊歸路十二月嗣昌在重慶下令赦汝才罪能降者授都司以下官惟獻忠不赦有能擒斬者賞萬金爵通侯次日堂皇庖湢徧題有斬閣部來者賞銀三錢嗣昌瞠視咄叱疑左右皆賊勒三日進兵㑹雨雪道斷再戒期視師三檄賀人龍驕蹇不奉約束初嗣昌憂左良玉跋扈人龍屢破賊有功私許以人龍代左為平賊將軍賀大喜過望已而良玉有瑪瑙山之功嗣昌禮重之如故顧謂賀將軍且需後命賀不得意具以前語告左左深阻内恨而人龍褊中顯謂其衆曰閣部不足為盡力當獻忠之敗瑪瑙山而走也追急遣賊馬元利操重寶說左曰獻忠在故公見重公獨不之思乎公聽所部多殺掠而閣部猜專無獻忠即滅不久矣左心動實縱之去獻忠在山中得收集潰亡左兵驕玩久不之擊督師數移文責讓於左賊窺知其故於所過要路故署其壁曰某日候戰又不到欲挑兩人釁而乗之左憂閣部之聞而按之也順㫖請亟戰然其中實不用命萬元吉雅知兩將皆怨望進曰軍心不一未可以戰盍令前軍躡賊後軍為繼中軍從間道出梓潼扼歸路以徐俟濟師此萬全策也嗣昌有驕色曰賊易與耳焉用分軍示弱邪是月也張獻忠陷瀘州瀘州三隅皆形銳而面江止立石站一路可北走賊既走絶地元吉謀以大兵自南搗其老巢伏兵旁塞玉蟾寺蹙賊北竄永川逆而擊之可以盡殲永川令戴堯雲者先期遁猛將軍詢嚮導無一人應者元吉輕騎按行城中惟見丞簿一二人我師宿西關空舍不戒於火延燒民屋已而抵立石賊營先移秦師屯小市廂隔水而陣賊渡南溪返走秦兵隔水詭云追之不及賊遂越成都走漢川德陽元吉單騎至籍田舖賊渡綿河入巴州閣部先既詘監軍謀不用將以十四年辛巳正月自綂舟師赴雲陽檄三軍陸行疾趨追賊毋令他佚諸將迺盡從瀘州躡賊後賊折而東返歸路盡空不可復遏猛如虎所將寧國兵止六百騎餘皆平賊鎮兵驕悍不法焚屋于永州掠馬于仁夀皆其卒也惟叅將劉士傑深思立功諸軍從良玉多優游不戰今從如虎馳逐山谷風雪中軍中謠曰想殺我左鎮跑殺我猛鎮時賀人龍兵已大譟西歸閫外所賴止此一旅人心如此元吉深用為憂諸將軍會于瀘州中軍陳可立擁纛牛頭山飲酒奏倡樂以觀鬬元吉令之赴敵背道馳去賊之入巴州也自巴抵達逡巡及於新開正月某日我師追賊及于開縣之黄陵城日晡雨作諸將請以詰朝戰劉士杰奮曰吾四旬逐賊今乃及之舍而不擊縱使佚去吾不能也擐甲持矛大丈夫獨取獻忠耳如虎激其衆鼔而並進士􅇐所當摧陷賊大披靡獻忠登髙以望我師見無秦人旗幟而左兵亦攜阻不前士杰孤軍跳盪後無繼者迺密抽壯騎潛行箐谷中乗髙大呼馳下左兵先潰士杰及游擊郭開如虎之子猛先捷皆戰死前兵既覆如虎率牙兵苦戰中軍馬智挾如虎潰圍圍開衝突以出旗纛軍符盡失嗣昌在雲陽聞敗頓足曰吾悔不用萬叅軍之言故敗今引兵急歸楚顧根本再破賊退囘重慶傳箭召潰兵順流東下賊已席卷出川西燒新開驛置楚蜀消息中斷襄陽尚未審知敗問賊大隊已至當陽鄖治袁繼咸方謀出軍獻忠令汝才與之持自以輕騎一日夜馳三百里未抵襄陽先遣劉興秀等二十八騎偽為官軍持軍符令箭日晡叩城門曰督府調兵守者合符信啓關入夜半賊從中起放機橋納大衆城陷鄖襄道張克儉推官鄺曰廣死之襄王被執獻忠坐王堂下屬之酒曰吾欲斷楊嗣昌頭嗣昌在蜀今當借王頭使嗣昌以陷藩伏法王其努力盡此酒遂害之嗣昌出蜀抵荆州沙市之徐家園方圖告敗曰帝待我厚謀再舉俄聞襄陽破遂不復食迺李自成陷雒陽福王先以正月遇害報踵至於是撫膺大慟曰無面目見帝以後事付元吉伏毒死焉帝聞其死也且恨且憐之得元吉所上死狀歎曰督師功雖不成志亦堪憫宜用輔臣禮歸葬既而詔諭羣臣嗣昌二載辛勤一朝盡瘁雖有瑪瑙山功不能掩其闖獻鴟張兩藩罹禍之罪下所司㑹勘以聞中外皆知帝意引傅輕典即議功為解帝可之中軍會議嗣昌中外纔知有二府三州十九縣之失前此兵刑都科俱不知以密本不下部也嗚呼當嗣昌在軍中薛國觀早得罪因召周延儒為首臣乃先後並坐法賜死餘相雖或枋用不次其任遇皆不及嗣昌繼起筦中樞者傅宗龍使過陣亡陳新甲失職棄市才亦逺出其下惟張國維馮元颷相繼受任元颷初以侍郎署部事帝問誰可大司馬元颷以史可法李邦華張國維三人對帝以邦華在戎政為兵士所恨而南樞不可無可法故用國維國維到未兩月而得罪即以元颷代之國維再下獄見釋元颷被帝知遇最深因病獨得放還癸未年袁時中被擒帝念舊樞臣馮元颷調度功特發上傳加太子太保病痊即與起用而張縉彦由庶僚超拜賊已躪秦蹂晉逡巡乎畿輔矣其爭奪情諸臣黄道周㡬斃詔獄復原官范景文召用遂擢為相帝亦深悔前撓廷論專任責成之非然十六年遣輔臣吳甡討賊面諭以自楊嗣昌死後廷臣無復能督師者以此知君臣之際其相知為深也十一日召輔臣語曰朕昨夕夢故輔嗣昌稽顙庭下曰臣鞠躬盡瘁死而後已為諸臣不公不平連章見詆故歸訴皇上朕語之曰如某疏猶公平否嗣昌搖首曰亦不然語畢天顔慘惻久之見筆記張獻忠陷武陵發楊氏兩世冢破其骨有血自二年彗星見楊鶴節制三邊受流冦降父子遂與冦禍終始鶴有弟曰鶚辛未進士帝以嗣昌故遂用為兵侍郎撫薊後改川湖雲貴總督而國已亡矣外史氏曰嗣昌之敗在乎用良玉而不能得其心信元吉而不能行其計然皆以筦樞失䇿有以致之不待督師而後悟也嗣昌實畏討賊而引文燦以為已貳恐其顛覆乃曲意護之初以良玉威名足仗欲文燦倚以就功不知其短于駕馭榖城之役良玉既顯相齟齬嗣昌終信文燦以左右其謀比受降事壊又不欲顯其是非故薄羅􅀈山之罰而反加委任良玉有以窺見其微且從而心輕之矣區區一平賊鎮印謂足以服豪傑而得其死乎元吉見兩帥離心其意實主於不戰即嗣昌非不知持重萬全顧其生平本不識用兵竭其私智專以揣摩迎合日舉六月盪寇之言以摩切閫外明知其勢之未可冀倖身不在行姑以之塞帝意而規自脫既不得已受專征去左右在萬里之外自念往昔在帝前謂智略輻輳功在反掌今出師經年糜餉百萬情見勢屈責我者且四面而至矣故雖將驕卒惰終僥倖於一決其戰也初非辭元吉而别有成算斯其所以敗也嗣昌奏臣受理臣交代之兵新收王國寧之兵與續調遼兵合之京營勇衞大同之兵一月約餉十萬餘兩又楚鄖二撫派餉未足于理餉内通融支給約每月楚撫支二萬七千鄖撫支一萬三千合之前數共為十五萬元吉之為人果達精警其從嗣昌也初無意於富貴特以識事機習勞苦將乘機㑹以垂功名於竹帛其自保寧進達州賊燒絶驛置七百里不見烟火單騎﨑嶇箐銑間舍騎放舟始及大軍故一見督師即請分兵以為後距開縣之敗元吉親至戰處為文以祭陣亡將士劉士杰等哀動三軍在䕫門收召殘兵登白帝以望賊騎歴歴在山谷間我師川湖諸將反出其後無一人禦之者不覺拊髀流涕而痛吾謀之不用也嗣昌之縊於沙市雖曰無面目以見天子亦緣良玉因其敗平牒倨傲不復存節制之體故憤而自裁元吉畏禍未敢深言又逆揣帝㫖知在元臣正終援春秋之義微之而已帝覽表歔欷亦以監軍有勞敗非其罪後之君子追論其事者於君臣朋友之間有三歎焉嗚呼嗣昌一生心力不專用於辦賊跡其議論奏疏亦可謂之能臣而機變有餘忠誠不足國事僨而身亦從之小雅節南山之詩曰不懲其心覆怨其正此秉國成者所當引以為戒也附紀當嗣昌之討賊於楚蜀也秦中大旱土寇蠭起長武被陷環縣以借賑殺鄉紳白水以徵糧殺縣官皆岌岌為長武之續賊首竇阿婆闖子黄三鵠等為雄竇阿婆名竇開逺咸陽諸生也十三年六月三日賊同其黨渠魁百人自桃虢川赴料峪關漢羌總兵趙光逺率諸軍追之賊初據關山嶺繼據張家後山皆為我軍所奪監軍道伍右文催諸將趙大𦙍魯文彬党威疾擊之於西雒峪闖子懼而逃於牛圈子竇阿婆謀走於娘娘山西遁我師覺之先伏山之左右以待文彬威夾擊驅賊賊勢急奔山大𦙍迎頭截殺竇賊在陣被擒闖子來救不及東西奔潰凡擒斬共一千七百有竒運籌則伍右文力戰則趙大𦙍為上魯文彬党威次之秦撫丁啓睿以聞李長祥曰閣部之駐彛陵也下檄曰賊東走大寧大昌山彛陵下荆襄者我當之賊西走紫興房竹入秦者左良玉當之賊西入䕫關者蜀撫邵捷春當之蜀之險在䕫門而大寧大昌與竹溪房縣聨界有三十二隘口閣部以為隘多而力分不如厚集兵勢以專守䕫門棄大寧大昌以啗賊我師四面蹙之以決勝邵撫曰令甲失一城者撫坐之且有諸隘口不守而使賊得入是閣部殺我也欲分兵出關堅守三十二隘閣部乃命猛如虎以兵至䕫關助扞禦焉時張令死矣四川總兵為方國安隘將楊茂選覃思岱者有驍名而不相得思岱譖茂選于邵撫曰通賊捷春召令計事而戮之即以茂選之兵隷覃部茂選之兵怨覃相率驟委去賊遂從此一路入既入諸隘兵俱潰賊乘夜斬䕫關䕫將士尚臥未起遂驚亂方國安兵敗收殘卒數百騎過達州達州設守嚴獻忠從白馬渡過江壁達之西關僅三千人已而閣部亦率其兵至有數萬人相守旬日未交綏獻忠偽為閣部之旗幟穿其營遁去閣部引兵追賊已過蓬溪綿州而攻成都再往瀘州而閣部追及賊又掣其兵轉至達州開縣我師與之戰而大敗按全蜀形勢䕫門去達州八百里而開縣在其中間長祥達州人親拒賊設守其言極推重嗣昌而專以邵撫為失䇿雖議論稍偏未必無所見也内江王于蕃曰當武陵視師獻忠由大寧大昌開縣達州以入綿竹界遂逼内江内江有土司家將毛文者設守賊至文大敗之於東瓜崖殺其渠魁曰曹四獻忠乃偃旗鼓疾走成都成都城龜形其下皆甃石惟北角樓用土填築少瑕賊夜至穴城數處將穿矣覺之城中出董卜蠻者與之戰獻忠大敗殺其卒萬人乃遁走其後甲申八月之九日成都陷沒賊仍從北角樓以入盡殺蜀人所以報董卜蠻之怨也鄒漪曰世之議武陵者指摘㡬無完膚予心以為太過及讀其中樞奏議又未嘗不服其才亮其心也武陵嘗上四正六隅一疏謂下三箇月苦死之功了數十年不結之局及為督師建圎盤議㸃滴不漏謂滅獻一股以全勝之力制闖可無餘孽若果其言得行釜魚阱獸賊自可平無奈撫臣邵捷春未必同心鎮將左良玉全不効命卒致剿局無成中原糜爛殺藩王隳名城而督師以身殉之其亦異於後之受賄偷生欺君伏法者矣特以處分漳海一事為不理於衆口然觀獻忠初納降時遣腹將薛姓者入京朝士無不婪其厚利而不受獻忠錢者止武陵一人亦可見其清執矣迨其後兩世之棺遭賊發掘襄王之死也賊語之曰吾欲斷嗣昌頭而嗣昌在蜀今當借王頭使嗣昌以陷藩伏法則賊之致恨於武陵者極至不可以見武陵之心邪夫元和討賊全倚裴度建興恢復獨任武侯武陵受帝知遇亦欲為國宣勞獨是薦熊文燦為首功絀洪承疇為首罪功罪混淆人心不服而開縣之敗由不用萬元吉之言此則有難為武陵解者然予友李翰林長祥推許不啻口出而杜貢士濬亦言其才可用豈阿私所好乎至以加餉殃民為武陵罪則剿冦需兵用兵需餉前督師盧象昇早已建議請行矣世之君子未嘗設身處地而苛求不已恐未可為定論也宜乎思陵有云功雖未成志亦可憫武陵亦可瞑目於九原矣綏冦紀略卷七
