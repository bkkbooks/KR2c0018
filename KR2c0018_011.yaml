body:
  text: 綏寇紀略卷十一國子監祭酒吳偉業撰九江哀左良玉字崑山臨清人少失父為其叔所養其貴也不知其母姓年十八從軍剽掠行旅坐法當斬有邱磊者與同犯請以身獨任罪而良玉得免死去而事昌平督治侍郎侯恂給侍左右嘗命以行酒冬至宴上陵朝官良玉大醉失四金巵旦日惶恐請罪侍郎曰此非若所當給事向者吾誤若非若罪也有詔調昌平兵邊郡赴援榆林人尤世威時為總兵以護陵不得行侍郎與之謀今欲遣將誰可者世威曰獨左良玉可耳顧其人方走卒奈諸將何侍郎曰果爾吾獨不能重良玉乎即夜遣世威諭意且曰吾將自往請之良玉聞世威至疑其捕已也繞牀走曰得非邱磊事發耶匿牀下世威排闥呼曰左將軍富貴至矣速命酒飲我引出告以故良玉失色立移時乃定跪世威前世威且跪且掖起之而侍郎至面與期詰旦㑹轅門大集諸將以三千金送良玉行賜之巵酒三令箭一曰三巵酒者以三軍屬將軍也令箭如吾自行諸將士其聽左將軍命左將軍今已為副將軍位諸將上矣良玉出而以首觸轅門誓必有以報已而有功遂為總兵官良玉自起謫校至元戎首尾僅歲餘年三十二長身頳面驍勇善左右射目不知書惟通曉解文義有喻布衣者為掌記性方嚴良玉以父事之賊至自立陳前說降曰汝等良人家子弟失計陷叛逆至此左兵不可犯盍早降賊不聽而後兵隨之既勝勸勿太掩殺曰其中保無威脅不得已者良玉每出軍勝先遣人報喻知喻草屩迎三十里左下馬歡甚以其輿輿歸喻飭中厨備飯為笑樂或敗喻南面坐見左不為起左長揖不敢就席喻呼其名責數之曰良玉朝廷待汝厚今折損官家士馬又日糜其餉金何以為顔乎左封寧南時喻已前死每飯酹酒于地呼喻大兄其待士識道理如此左初用兵山西戰疾力矢報效無他心在懷慶與督撫議不合始圖緩追養寇收其降者以自重所部既多餉不給軍行採掠不禁緣此屢被詰責然終以得衆名為强同時諸將如曹文詔以忠死鄧玘以亂死祖寬以誅死良玉老將持重勝不務深入雖敗常以中軍自全故不為患聽其下以所得而已不私士皆樂其寬易為之用故不致亂威名為閫外所伏隱然若一敵國故不受誅軍行進止得失成敗之算為前後督府所莫及以此益自專不受節制在諸公有以致之非盡良玉過也張獻忠之在榖城良玉請擊熊文燦曰彼雖懷二釁未成也君雖敢鬬衆未集也驟而擊之他寇必動脫不能勝所失實多不如徐之良玉曰不然逆賊利野戰不利城守今以吾衆出不意彼士有駭心糧無後繼諸部觀望必不能前賊怠我奮賊寡我衆攻之必拔襲之必擒若失此機悔無及矣文燦苦禁之而止獻忠既焚榖躪房竄入鄖竹山中文燦請追之良玉不可文燦曰將軍逗撓耶賊已絶地窮竄急追毋失良玉曰向云疾擊懼其逸也今非不擊避其鋭也箐薄深阻前逃後伏我失其便非絶地也二叛往矣九營從之同惡氣盛非窮竄也負米入山顛頓山谷十日糧盡馬斃士饑果行也我師必敗已而羅􅀈喪績良玉具條前後與理臣爭者以聞于朝大司馬楊嗣昌諱言文燦失策而又知過不在左也故于其督師特表左為平賊將軍俾刷孟明曹沫之恥左雅知其意不為用當嗣昌誓師襄陽諸大帥惴惴奉指麾恐後左獨守便宜不甚受所下方略楊亦寬假銜轡以優容之官兵之追獻忠于蜀也良玉受命先驅其機宜往復所不同于制府者有三于取道也嗣昌曰興平良玉曰大竹于遣兵也嗣昌曰偏師良玉曰全軍于料敵也嗣昌曰吾恐其折回平利良玉曰賊不敢復瞰鄖房嗣昌曰八賊將必旁竄歸巫良玉曰逆獻必不逺投曹過監軍道萬元吉以其不相承稟深以為言嗣昌能降心曲從故瑪瑙山賴以取勝夫合楚蜀之事觀之羅􅀈山左良玉以為不可戰者也文燦違之以致敗瑪瑙山左良玉以為不可不戰者也嗣昌從之以奏功彼其老于行間審敵制勝智略誠有大過人者若又能加之以恭慎將之以忠誠不伐其勞不矜其智雖古名將何以加焉乃自以一籌之得笑文臣為不知兵而嗣昌以使相之尊賜劍之重九調而九不至馴至窮寇生其羽毛羣帥離其心膂兵熸于開縣地覆于襄陽此可僅諉之賀人龍而于良玉不知責乎及夫督師縊藩王亡賊于是乎伐蔡侵隨漢東大擾然良玉當新敗之餘下當陽出宛葉一再戰于麻城洵陽之間賊遂以破獻忠漏刃破膽奉頭奔竄之不遑其前之亡羊則緩追也其後之脫兔則逸獲也江漢巴蜀之民當肝腦塗地于此賊之手故使良玉不成其功嗚呼此孰非天為之哉左軍之强由于破獻忠而有其士馬者大半分所部為三十六營營一副將領之有馬數萬餘匹計其軍食于度支者不及什之一餘皆剽掠以為資百姓畏之甚于賊然較士伍論强弱略與李自成相埓自成起草竊得行已意驅其衆可赴蹈湯火良玉憑藉威靈而不能免于觀望貪功避罪前瞻後卻弗克盡其所長以此勢常不敵郾城被圍而莫支汪喬年覆沒而不救論者頗以此訾謷良玉幾與賀人龍同類而言之矣帝既恨開縣項城之再逃斬人龍以肅軍政其意未嘗不在左而恐其有疑朝廷之心也乃發帑金五萬大司農再撥十萬錦綺綵物千端空頭告身數百道使者齎至軍前頒賞出故尚書侯恂于獄以兵侍郎代丁啓睿為督師拔河內知縣王漢為御史命監平鎮軍而趣良玉救汴恂與漢未至軍而良玉已敗于朱仙鎮矣良玉之在朱仙鎮也賊營于西官軍營于北良玉謀作甬道屬之城通于河北以便饋餉汴人疑左之擾已也閉門填之以石弗與通天大雨數日良玉夜召諸將計事辨色猶未明隱隱見營南有山若雲者衆愕視不知云何良玉舉刀擊地曰唉此必瞎賊築土山立炮臺打我矣立遣騎覘之果然凡築土為山者三山立一臺臺下各宿精兵一萬掘深溝官軍至賊伏其下兵去而轟雷震裂左命軍中亦立臺應之賊更番迭休不能支乃拔營去自成見左營之移也曰左健將此來必死戰慎無與爭惟待其過而從背擊之蔑不濟矣左步在前騎在後賊于步則聽之行于騎則鬬而不鏖鋒才交即退左兵喜于得逸疾馳八十里賊早于其前穿巨塹深二尋廣如其深之數環而繞之者百里自成率百萬之衆遮于後追之左陳已亂無鬬志相率下馬渡溝負輜重攜刀槊僵仆溪谷中後人趾乘前人之顛以過自成從而蹂之左大敗棄馬騾萬匹器械無算自此走之襄陽初侯恂之在請室也七年矣左用兵于豫嘗三過之令其下曰侯公家在此敢擾及草木者斬入城謁恂父太常卿侯執蒲拜伏如家人不敢自居于客將帝知其故特湔祓恂且用之已而聞敗恂請疾馳良玉于軍帝曰朕所以用恂者以其致良玉而奔汴之急也今赴良玉軍則一襄陽之客而驕鎮之故人耳于援汴之謂何乃命拒河圖賊而令良玉以兵來㑹良玉新敗畏自成無意行不得已于舊帥遣其將金聲桓以五千人從而詭云身率三十萬衆㑹恂于河北恂懼餉無所出且逆探其情好謂之曰將軍之士大半不餼於縣官今逺來就我固善苐散其衆則不可若悉以來而自謀食咫尺畿輔將安求之久之良玉竟不至汴遂以亡帝怒恂罷其官尋致之罪而李自成之破汴也遽引而西謀拔襄陽為根本時良玉壁于樊城大造戰艦驅襄陽一郡人以實軍賊帥惠登相常國安馬進忠馬士秀杜應金吳學禮皆附之士馬滋益衆然親軍愛將死而降人不奉約束左亦氣漸衰多病不能復與自成戰矣自成乘勝來攻良玉退兵南岸結水寨舉炮相擊賊臨江策馬而濟水沒其鬛與腹猶不止有一洲差淺向獻忠所渡處良玉以萬人守之自成用十萬人來爭良玉大駭宵遁引其舟師左步右騎而下武昌入見楚王豫我二十萬人餉為王保境固城楚可無恙也王噤不能應良玉縱兵大掠火光照江中士民宗室奔走通山崇陽間多為土著所害驛傳道王楊基麕其資先期奪門出舟未發盡為左所掠子女皆入左軍中良玉以十二月二十四日至正月十六日啓行艨艟蔽江而下五晝夜九門堅壁居人登蛇山以望師皆呼呌幸更生曰左兵過矣自漢陽以下降將叛兵所在蜂屯假竊左軍號以剽掠蘄州守將王允成者實亂首良玉中軍尚未達小孤允成收賊白貴等為先驅已破建德劫池陽去蕪湖四十里舟師泊于三山荻港漕艘鹽舶盡奪以載兵聲言諸將寄帑南京請以親信三千人俱入文武操江陳師江上為守禦士民一夕數徙商旅中斷南大司馬熊明遇錯愕不知計所出都御史江右李邦華故南樞臣也即家被召命道出湖口聞變有勸令東行由浙江取京口入北邦華叱曰是何言耶身為大臣忍坐視東南决裂袖手而去乎乃倚舟草檄正告良玉曰本部院四朝老臣遭時多難投身為國仰望貴鎮與我同仇頃傳麾下全軍南潰所過殺掠陵京震驚何輕易舉動如此以列聖英靈主上神武羣醜游魂稍稽膏斧不逺貴鎮不以此時枕戈礪劍輿疾討賊乃甘自菲薄貽誤身名本部院所不解也舊京文武足髙喙長倘不諒心跡飛章上告其將何辭以對海內豪傑人各有心各鎮及麾下將領保無從中觀變者舉事一不當辱身家而汚青史為千古笑談智者所不出也貴鎮宜即日嚴戢兵丁疏通江路捩柁回船刻期還鎮缺餉事情候本部院到𤾂設法措處勿過安慶一步以實流言良玉得檄心折又用其客李猶龍胡以寧輩開示禍福主上拊髀頗牧入見當力為保全功名釋中山箱篋之疑得元侯弓矢之賜良玉大喜過望邦華飛騎貽書皖撫發九江庫銀十五萬補六月糧軍心大定南都始解嚴翼日具威儀入其營良玉紅襪首韡袴握刀插矢俯立鷁首邦華辭乃用師弟子禮見良玉請坐樓船大閲士馬邦華慰勞諸將詢問部曲姓名宣諭軍中矢忠義殺賊良玉令于軍斬淫殺者四人以徇釋被掠男婦四千餘人還漕鹽船五百餘號臨别誓以餘生效頂踵邦華退謂人曰東南有事此一軍必能自效良玉不負我矣然邦華行後良玉息肩于皖皖守將杜𢎞域文煥子也杜應金文煥族子也以賊帥降左左之東下應金為前驅先以書抵𢎞域言情故皖及𢎞域得無恙左軍士有逸入杜麾下者杜斬之因其客以謝奉管鑰執鞭弭而後左即安之張獻忠初襲廬陷舒治舟巢湖聞左之下皖遂去而棄疾于楚傅國都而沉其王于江左時巳溯流九江熟視其君若民之糜爛焉而弗救即帝亦不能詰責也邦華之見帝也曰良玉潰兵之罪請以王允成除帝亦因以歸獄允成而奬良玉以誅叛定變允成出入左帳中自如卒不死十六年八月良玉奏誅叛事屬訛傳有㫖王允成速赴楚撫殺賊自贖獻忠以七月二日大焚武昌從咸寧蒲圻以上嶽州良玉于十六日提其兵出湖口湖口令謝所舉者湘潭人倜儻士居人聞左兵至亡失魂魄或勸令亦走令笑曰無恐我去將安之先期戒牛酒芻糗兵至拏小舟突入其圍中長跪涕泣左怪而問之曰公有所請乎對曰無有惟就公乞一早字耳左笑曰解人也遂去獻忠之初去武昌也有自寶慶下者曰劉兵自沅縣下者曰張兵自夔門下者曰郭兵借官軍恢復為名擒捕僞官搜括富人割剝良善楚人不聊生左先驅馬進忠至而小戢良玉以八月入武昌城中四十八公署及民居皆燼故禮侍郎郭正域第獨存乃即之以立軍府遣其人以旗幟招百姓出軍船所掠下江貨物賤其價以通市商賈聞之頗來郡邑太守以下官亡城失印或竊伏塢壁或徒步還家聞兵至自出者咸復其所巡按御史黃㴻有權略與左議頗合黃州守周大啓修築獻忠所毁故城知沔陽章曠率州人倡義旅郡邑有聞而應者楚下流稍稍復完張獻忠已盡陷湖南諸郡遣其僞都督張其在趨江西楚新撫王揚基聞獻忠之駐長沙而餘黨入江西也以兵復嶽州江西巡撫郭都賢提兵拒境上賊已從醴陵犯萍鄉之插嶺官軍扼黃花橋賊從别道濟萍鄉令走賊入之張其在自瀏陽萬載分道趨袁州袁人開門納賊良玉先在九江命副將吳學禮援袁學禮至而賊將邱仰拒守我師髙山先登斬仰學禮放兵大掠袁臨吉之民郊保者洶洶仇殺都賢檄學禮歸而自募土人置戍賊聞左兵之撤也張其在從長沙突犯吉安陷之吉水永新安福泰和諸令同日遁賊復入袁州而我水軍方國安之在楚也别將王世泰楊文富遇獻忠所遣賊將自長沙返而顧嶽者既合戰賊佯敗我師奪輜重舟不前賊乘之殺溺無算嶽州復陷江夏亦震恐㑹良玉遣馬進忠以步騎進常國安杜應金等繼發圍袁州賊突門走斬首二千而馬士秀郎啓貴率水師再合世泰文富以敗賊于臨湘追之及于嶽州城下賊大敗遂并收袁嶽而江右湖南略定時李自成跨有荆襄承德漢黃以上與應隨接壤者塢壁之人多與賊通而輸之糧良玉初以許州之陷妻女為自成所得常置軍中厚奉養之賊將王四者自成配以良玉女遣之至武昌道其家無恙欲以致左左不應然多金帛以復使之歸竟亦不能殺也先是詔用兵侍郎吕大器總督江楚應皖軍務以代侯恂恂解任中道逮下獄良玉知因已故致舊督再得罪有鞅鞅心與吕輒齟齬吕所仗惟李輔明馬科二將馬已改調關寧輔明不足用建議招募柯陳二姓與皖營私鬬南昌關廂被焚吕髙坐江省漫以恢復吉安為解乃賊盡陷建昌撫州南豐大器不能救為左軍所揶揄而賊將先驅艾四者屯嘉魚鋭甚馬進忠與之戰于三十六灣而敗再戰于蒲圻又敗左軍勢亦不振㑹獻忠從荆河入蜀良玉遣兵追之距荆州七十里偵荆襄之為賊守者聞自成西入關亦盡懈左乃遣副將盧光祖上隨棗承德而惠登相自均房劉洪起自南陽犄賊後收其空虛之地以恢復自為功十七年正月帝既封良玉為寧南伯畀其子以平賊將軍印俾功成後世守武昌仍下特詔責其與江督大器見駐何所作何進軍而鳳督主合殱黔粵各督分救援楚皖江沅各撫任犄角即科臣之前受命察核者左懋第以便道催戰良玉乃條日月進兵狀為疏以聞曰臣以十六年八月復武昌聞江西有警遣副將吳學禮于十月十三日復袁州糧絶兵回賊乘閒再據臣乃定計水師徐發先遣副將馬進忠率騎兵由陸十一月二十七日再復袁州十三日復萍鄉十二月初二日復萬載過此即入楚境初五日復醴陵二十六等日復長沙湘潭湘隂諸處擒僞守道以下尹先民等官次遣副將馬士秀等率步兵由水趨湖南十六年十一月二十四日復嶽州臨湘十七年正月十六日復監利二十二日復石首二月十一日復公安臣先已密調副將惠登相率所部由均州東下十七年正月二十四日登相協同副將毛顯文復惠安二十六日復隨州計期三月復府州縣一十有四臣與監軍職方司主事李猶龍先後馳報疏在御前可按也并言江督吕大器不發兵及舊撫臣王聚奎狼狽回省狀時道路梗塞騎置稽緩疏入未奉㫖而京師陷賊之信至矣良玉審知登遐凶問三軍縞素率諸將旦夕臨翼日諸將前請曰天下事皆當關我公今南中立君挾天子以坐詔我輩宜乘其未定引兵東下可也良玉拊膺而號曰不可世守武昌此非先帝之㫖乎先帝甫棄天下而我背之是幸國家之變以自利也封疆之大臣應守封疆南中立君我自以西藩為效有過此一步者良玉誓之以死盡出所藏金銀綵物凡二三萬散之諸將曰此皆先帝賜也受國厚恩禍變至此良玉何心獨有之乎于是良玉哭諸將噭然皆哭副將馬士秀奮曰有不奉公令復言東下者吾擊之以巨艦置炮斷江衆乃定當良玉出所藏其子夢庚有吝色良玉曰爾以此為若物耶向者吾散之乃所以為若也太息曰左氏不得世有此軍矣大學士史可法馬士英定策奉福藩世子立于南都奏以寧南伯左良玉靖南伯黃得功並進爵為侯䕃一子錦衣衛正千户封髙杰為興平伯劉澤清為東平伯劉良佐為廣昌伯與得功開藩淮揚為四鎮而上流之任專以委左詔書到楚而良玉賀表亦至時李自成敗于關門楚西境稍可乘良玉得以其間復荆州德安承天承天獻皇帝弓劍地詔以收復陵園為左功責所司速補給十六年楚餉缺額四十萬而何騰蛟為楚撫袁繼咸為江督騰蛟共良玉收拾武昌為同心固守繼咸係李邦華所推許邦華死北都難其客李猶龍輩又在左幕中繼咸用忠義相勉故兩人交頗合左兵無慮八十萬號百萬前五營為親軍後五營為降軍每春秋肄兵結隊武昌諸山以一山職志為一色左建大將旗鼓于射堂周麾一呼斾而立者山谷為滿其閲軍法用兩人夾馬而馳名曰過對馬足動地殷如雷聲聞數十餘里南中所恃者四鎮東平廣昌弱黃靖南獨以其身敢戰髙杰士馬十倍三鎮視左軍皆逺莫及故當時推寧南為强然朱仙鎮之戰左精鋭已盡其後歸者多烏合厮役扈養之人居大半稍黠有力者牟什一以自救樓船偶泊即有質庫屠宰百商為軍市法令總不相攝識者知其不足用左家室盡于許州在武昌諸營娼優歌舞達旦元帥獨塊然一榻無姬人侍側者既老而被病南中楊生者善醫栁生者善談笑左大歡樂之奏楊為武昌同知攝守事而栁生不願官以客將出入卧內最親信嘗月夜飲僚佐李猶龍等召某將官營妓十餘人行酒杯斚縱橫履舄交錯少焉左顧而咳命以次引出賔客肅然左右莫敢仰視其將百萬軍正已率衆為下所服皆此類也懷寧阮光祿大鋮者負縱橫才以閹黨故廢歸德侯方域嘗偕其友移書罵之方域侍郎恂次子也當左兵南潰方域僑寓陪都大鋮頌言良玉為賊而目侯以同反左具知其情恨之比大鋮附馬士英起用舉朝力爭時四鎮參預國是左無一言阮既柄用謾語因其客為修好實隂鷙而猜忌李邦華侯恂故東林黨魁而良玉其所薦異時必有借左以難已者隂結黃靖南為榰柱左武人初不知所為朋黨既見板磯築城為西防歎曰西今復何所防直防我耳不免有沿流之計矣㑹朝事日傎錯而楚餉不至御史黃澍請入朝觀之澍面奏觸柄臣既返而金吾逮治澍數士英十罪且言得張獻忠僞官周文江銀八千兩題授參將罪可斬志孔助澍言甚力韓贊周叱之始退左留澍不遣隙遂開諸將日以清君側為請左自念所將皆亂人降卒幸天子在下流假其聲號相縻繫若縱之東下且擇利散走是屬寧復可制乎默勿應無何王之明事起中外皆歡譁楚西陲之報日急左亦心動黃澍乃召三十六營大將與之盟方登樓密畫左沉吟未有所定中一將拂衣竟起曰疑事無成若主帥必不動者某等請自行不能鬱鬱久居此矣左不得已從之左初畫楚疆為各鎮自惠登相駐漢陽外諸將咸有分地楚人多苦之王之綱者在武昌縣尤殘忍好以人為糧祼而懸之于柢灌沸湯以蕩盡其腸腑而後烹之之綱别號扛子百姓聞其名皆奪魂魄楚紳士之不能去者出子女財帛所以奉鎮將者百端冀得免瀕行乃悉取而棚考于營中或夾以兩門俾健兒行其上以索賄賄未盡入其人已折脅拉骼祝世英樊維城諸君于其地皆死舊江撫劉宗祥與之綱約為兄弟軍既發掠其資十餘萬殺之不能得其尸云左以乙酉三月二十六日傳檄討馬士英空國行自漢口達蘄州火光接天者二百餘里至九江袁繼咸過相見于舟中坐未定俄見岸上火起報云城已破左右曰袁兵燒營自破其城左罵曰此是我兵耳大悔恨椎胸浩歎曰我負臨侯臨侯者袁字也嘔血數升病遂革召諸將謂曰吾不能報效朝廷諸君又不甚用吾法制故憤憊以至于此自念二十年來辛苦戮力成就此軍吾沒之後出死力以捍封疆上也守一地以自效次也若散而各走不惟負國且羞吾軍良玉死不瞑目矣諸將皆哭請刑牲誓後營總兵惠登相當㰱拔佩刀橫膝上曰我公百年後有不服副元帥號令者齒此劍諸將皆曰諾副元帥謂夢庚也登相固降寇所謂過天星者感左再造力有忠實心左殁後七日軍東下惠率其黑旗軍殿舟行不近岸有紀略而前鋒中軍大亂自彭澤以下皆陷夢庚不能制兵至池州東風急黃得功遏其鋒諸將飽摽掠獨遺池州不破貽書登相曰留此以待後軍登相得書大詬曰若此則不如我前日為流賊其如先帥末命何撤其軍返夢庚見黑旗船往往西上疑之問而得其故索輕舸往追之登相相見大慟以夢庚不足事引其兵絶江而去初邱磊者坐斬繫刑部獄十三年良玉捐萬金救之得不死侯恂之再為督師也奏以為山東總兵與劉澤清不相得構以罪馬阮殺之于淮南或以為良玉東下蓋亦因磊死故云外史氏曰豫觀思陵末造天下之勢在于良玉中原糜潰朝廷之法令不可復行唯自成能號召饑民以為難于我唯良玉能招誘降寇以致死于賊為國家計者宜舉河南以委之而無責其速戰斂天下之兵以守河守江漢守關餽良玉以屯種之粟俾且耕且鬭而與之持久彼視自成力均勢敵又竊天子之寵靈而繼之餫餉以收李際遇劉洪起沈萬程之徒其勢宜日强自成草竊烏合羅汝才袁時中不能相下羣心必攜不出二年其衆將折而歸于左矣功成之後分一州為節使彼能北向而爭天下乎今計不出此而區區于救汴之一戰以至于敗此謀國者不知駕馭之過也若夫兵敗之後退于襄陽潰于湖口歸于武昌向之猛氣實力澌滅殆盡身已落于降兵叛卒之手而談者謂其專制上流憂必為變嗟乎良玉兵非昔日之兵將非昔日之將天子用爵賞以羈縻我而我即用以羈縻其軍彼豈不知清君側制國柄足以得行其志勢不可耳唐末藩鎮皆父子兄弟之兵故用以專制一方長戈指闕彼將百萬之衆出門一步渙然崩散此豈可與作賊者哉跡其生平識機變饒方略可以謂之智將顧用其私意揣摩主指翕集軍心張形勢以便身圖而逃國法主亡身病而下亦叛之九江舟中自審不濟而後發負恩之歎晚矣曹文詔黃得功忠而能勇苦不長于謀良玉能謀矣而無忘身殉國之心坐長禍亂以視兩公真有餘愧然若以劉澤清之侵權牟利者比類同觀則寧南固一時之傑未可槩而棄之也附紀豫撫陳益吾與同年許霞城書云豫事之壞由于吏部為人擇地不為地擇人巧者鑽營閩粵浙直美缺以去一種闒茸無能之人不諳趨避者則坐名填缺以功令驅之到官久之列城皆然一片暮氣地方全無料理寇來避之山寨寇去依舊入城甚至有如鄢陵舞陽之開門迎賊者中原重地拱手付賊職此之故至于督撫身臨賊場偏禆佐二宜聽其隨才選用勢成臂指年來該部攬權營私即守巡標下中軍無一不從部授何况督撫一切部內走差偵探久慣積猾乞恩進奉題授管事名曰酬勞此輩非中官厮養即市井遊食既乏智勇之能又熟躲閃之技見賊輒遁事敗彌縫恃有部王平日情面少加呵譴即布流言至于領兵大將官非功授氣以勢盈墻壁既牢去來由已如往歲左良玉移催數十次始為一行甫望賊而掉臂去之者弟所以有調兵如請客馭將如驕子之疏又如李重鎮一賊不殺而舊樞婪其重賄屢疏代為鋪張左良玉訛報躲賊略加抨彈便為瞋目攘臂朝堂之上曰如何難為我將官弟所以有將官不殺賊則罪巡撫巡撫參將官之不肯殺賊則又罪巡撫之疏諸如此類未易悉數朱仙鎮之敗良玉以七千之衆率先倡逃致十八萬人馬一齊潰散而中原之事遂不可復問嗚呼誰為之哉憶弟入豫即過舊鎮臣劉超見其不堪棄去又物色舊鎮臣許定國見其尤不堪棄去而其後樞部俱用之封疆今許逮劉叛矣甚者舊司農本非將才而舉為保督曰能駕馭左良玉驅策劉超也及檄良玉而良玉付之一哂超且顯然為難至于保督揚兵河北秦督駐兵潼關兩軍自為表裏以一為正以一為竒乃保兵未渡河一步而秦兵先撩虎鬚甫出函谷一敗塗地用兵之效竟何如哉南都之詔至武昌也楚撫何騰蛟以劍自隨曰社稷之安危在此若不開讀此身有付三尺劍耳㑹良玉腹心盧鼎者力勸其拜詔事乃定及良玉從黃澍之謀東下也以騰蛟不從謀劫取其印騰蛟急解付家人令速出城毋為所得良玉令四將守之逼與偕行騰蛟至漢陽門乘閒投江順流十里許至竹牌門遇一漁舟救之起登岸視之則關帝廟而懷印出走之僕亦在相視大驚喜亟覔漁舟不知所之說者以為神救也綏寇紀略卷十一
