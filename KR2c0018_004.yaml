body:
  text: 綏冦紀畧卷四國子監祭酒吳偉業撰朱陽潰崇禎八年秋七月初五日告敗疾置聞時慶陽之冦乘勝傅烽下火照西安城中臨鞏平涼諸賊又十四五萬我師如左光先張應昌等皆逺在漢中檄徴未集曹變蛟裒文詔散卒鳩他將見兵𨽻戲下者纔二千餘人不復能軍承疇張疑設伏力遮涇陽三原之衝裹粮決戰賊見督師之不可動也乃由耀州走朝邑渡渭入華謀突潼闗承疇以十五日次華州賊復由朝邑折而北奔澄城郃陽而全營混世王等聲向渭城承疇晝夜馳于十七日入西安漢中諸將之兵亦至張全昌兵自清水汧鳯已到涇陽催赴省城合勦議衆擊賊奄至西安東偏我兵疲未出詰朝恐賊之東逸也先令張全昌曹變蛟儳道走渭華格其前承疇親至紅鄉溝遇賊游擊李效祖栢永鎮力戰賊始卻登山隂䂓越闗而下承疇従藍田取山路出其背擣之二十二日賊覺遁商雒山中承疇又命張全昌趙光逺提兵三千截潼闗大峪口遊奕及閿鄉靈寳界其耀州之賊已破澄城澄城知縣毛昻霄初任公謁上司七月十五日城䧟圍郃陽不下承疇還師救之始解去趨平涼邠州承疇留勦澄城兇醜兼顧商雒欲追擊無兵可分上書言狀朝廷加曹變蛟副總兵示激勸厲軍鋒而令延綏總兵王承恩以五千人受號令益甘寧兵五千鎮筸二千收回蜀兵九千蒐卒乘補士伍以㑹督師之乏絶軍勢㡬于復振夫襄樂湫頭雖敗于中靈陜鄖津尚堵于外豫楚完守賊未能越軼堵勦之局猶可得而収也而尤世威徐來朝之潰聞矣世威先守蘭草之隘徐來朝守南北朱陽闗為犄角朱陽闗即古函谷漢武移其守于新安斥故闗為𢎞農千百年來嶔崟既闢民人之所走集百二之險蕩為彛庚包原陵藪澤而為守千里連營兵法所忌謀國者莫之戒也徐來朝兵首變強令設防比賊至跳身遁一軍盡亡天津營楊明相領潰兵奔入左營徐來朝不知何往尤世威經時暴露師大疫二十八日猝遇失利世威與㳺擊劉肇基羅岱皆扶傷其衆左次自潰八月二十七日賊在索峪河係河南盧靈交界尤世威于二十六日帶傷回盧頭傷一刀面臂中箭劉肇基右臂中一刀賊遂越盧氏奔永寧豫撫𤣥嘿候代未謝事八年六月初十日部覆𤣥嘿革任候代徴左良玉自内鄉陳治邦馬良文等自雒陽援盧氏維時楚撫已改盧象昇由鄖撫改任而岢嵐道宋祖舜為鄖撫許成名于七月解任用秦翼明為湖廣總兵鄖撫以翼明之兵邀于豐陽闗隘賊不得過監軍道苗祚土率川兵營副將賈一選周繼先與賊在豐陽闗連戰又豐陽後有小徑罩川口可通鄖西鄖撫發㳺擊周士鳳率兵六百人守之秦翼明乗夜架梁絶壑透入賊營後山連破青崖河吴家堰袁家坪三處斬一百四十九級賊始退又轉出朱陽分為十三營于靈寳號數萬南光禄卿陳必謙為豫撫必謙以六月廿六日拜豫撫命未至按臣金光宸累疏陳危逼帝于是不憂秦而憂豫且憂江淮河北之為豫楚續也召諭户兵二部以淮撫兵二千三百楊御蕃兵千五百扼南畿要害䕶祖陵以董用文兵五千走彰懐倪寵兵三千牟文綬兵二千赴齊豫之交相機調遣劉澤清推福山副將未行令暫防曹濮馬爌移鎮潁亳陳洪範召募健丁三千䕶陵又以龍固闗㕘將李重鎮兵四千遼東總兵祖寛兵三千先後馳援河南念秦冦在商雒者入豫餘數十萬尚在涇陽三原洪承疇勢不能舍秦入豫命楚撫盧象昇總理直𨽻河南山東四川湖廣等處軍務用道臣于豫則戴東旻于楚則苗胙土于江北則史可法為監軍其承天兵三千屬巡按御史余應桂居守如秦冦盡入豫則承疇勦西北象昇勦東南如賊復入秦則象昇入闗合討初老􅉰􅉰久伏商雒整齊王掃地王蝎子塊後至共出闗其留秦為闖王闖將二股于是知其中李自成為特勁云闖王西走武功扶風闖將東走富平固州其衆各七萬承疇兵止九千人馳赴蒲同東勦而闖王西走無兵可追官軍闗山一戰同州再戰各有斬獲乃折而西闖王闖將合為一八月初五日秦賊李自成䧟咸陽殺知縣趙躋昌初七日張應昌左光先與戰斬四百四十九級獲其軍師劉某李自成遁歸涇陽屯醴泉之石鼓趙村别部屯七里原為淳化耀州交境十四日官軍乘夜渡涇河于王橋頭被賊小挫二十四日賊將髙傑不得志于自成竊其妻邢氏以降㳺擊孫可法挾以破賊在富平馬家村乗夜出奇殺賊二百取立效為信豫撫陳必謙于二十日始受事是日豫賊攻中牟二十三日賊抵開封入其郛俄遁去攻長葛郾城扶溝其令皆秦人能完守再攻鄢陵鄢陵故大司馬梁廷棟邑里也告急趨兵援之二十六日左良玉敗賊于鄢陵之張橋偏將李雲程馮良文敗之子彭祖店賊自鄢陵敗後趨西華商水焚沈邱豫撫所遣將陳永福従鹿邑遮擊賊分為二道一走項城由上蔡入江北之太和一走潁川䝉宿而太和之賊合之淮撫朱大典與巡按䘖史張任學以楊御蕃兵専䕶陵而令㳺擊朱子鳳援太和楊振宗援䝉副將劉良佐援懐逺九月初三日秦兵追賊于渭南臨潼間賊退走逐之賊恃衆還戰承疇督麾下苦鬬大敗之初六日豫賊自嵩華趨郟禹攻宻縣知縣苗之庭敗之城下李重鎮頓不進事緩用解圍奏捷李重鎮者司馬張鳳翼私人豫撫陳必謙遣之援宻以五日有半行二百三十里至宻圍解已三日推官湯開逺促之追勦去賊營僅十里兩日不動第三日發馬撥八十名殺賊五人擒二人離營二十里宻邑村落為空自郾城至汝寧以六日走百八十里逗遛恇怯如此司馬反謂必謙為吝賞為苛求云帝以豫撫疏召對閣臣文震孟等議撤尤徐病潰之兵以省餉司馬欲留尤徐之半豫撫令全撤徐兵而尤營僅撒病兵留千二百人以尤將劉肇基羅岱領之若津兵則聞賊便奔一查便噪徐來朝劣而貪兵月縻餉八千餘金一撤而中州禍根拔矣左良玉躡賊于郟之神垕山賊連營數十里番休更戰良玊收其卒而止趙柱被困㡬不脱初七日江北賊與朱子鳳所領廟灣兵五百人遇于懐逺之龍崗集子鳳力戰死之劉良佐楊振宗能郤賊官軍亦傷不利十一日豫賊于潁州南召集編筏渡淮陳永福追及之我師大克賊不得濟豫撫以潁上逼近鳳泗祖陵攸係故别命永福出境二百餘里堵禦是日豫賊攻信陽州官兵敗之于北闗及中山舖斬三百級百户葉正芳力戰被執罵賊死二十日秦賊破扶風殺知縣王國訓二十一日豫賊恨宻令再破之城下謀必殘其城城庳而土惡攻圍三晝夜令乗堙殺賊三百餘人河南府監紀推官湯開逺趣左良玉自郟援之乃去左將騎湯將步其勞與武臣同是月豫賊自光羅趨黄安麻城自麻城趨羅田西犯蘄水楚撫盧象昇以九月初九日聞總理命初以全楚主客兵一萬八千人分之以三千䕶陵寢一千六百人守鄖四千四百人備㐮陽光化其援隨應孝感則筸兵千五百人㕘將馮時早領之援麻黄蘄州則筸兵辰兵二千人都司周元儒領之鎮臣秦翼明川兵四千筸兵一千駐隨棗而象昇自率楊世恩雷時聲三千人赴光山羅田迎擊十月象昇至羅山再檄李重鎮陳永福入楚而整齊王従信陽走孝感應山其衆特盛象昇命李重鎮雷時聲陳永福以六千人自羅信而南楊世恩鄧祖禹以二千人自麻黄而西秦翼明周繼先以五千人自棗隨而東夾勦或告以宜急趨宛洛者象昇曰賊大勢在豫而前鋒皆向楚吾不能舍楚而示賊以瑕也楚按余應桂疏曰秦督新敗皇上調楚筸兵入秦此謂楚豫暫寧也今賊在汝汴楚疆震隣鄖之龍駒寨告急汴賊駸駸従魯召唐汝入境撫臣屯棗隨䕶獻陵門户臣亦發郢兵出屯三里峽之松林寺香花園創設闗隘扼守若遽調筸兵五千則隨棗不能軍而臣之力孤矣總兵張全昌降于賊初承疇遣全昌與趙光逺截大峪口也兵大囂殺掠全昌亂兵入滎澤縣刼庫殺人豫撫請急援盧氏不應光逺擅歸秦至是全昌值賊蝎子塊等于潁之瓦店集即潰為所縳脅之共攻蘄黄黄梅之賊由宿松入潜太應撫張國維檄許自強救皖操江王道直以水軍為㳺邏安池道史可法入潜山之天堂寨窮捜捕豫賊掃地王等别自霍山趨英山分掠潜山宿松太湖英霍舒城皆陷應撫于皖屬邑募土著二千人為久戍是月遼東總兵祖寛勒兵至豫豫撫陳必謙推官湯開逺引之同左良玉抵靈寳官軍剪賊于靈寳六十里之澗口焦村焦村即朱陽闗地也必謙書云三年以前流冦尚畏官軍邇來勢益强熾有伏路静聴以防襲殺有前撥倒撥左翼右翼以備䇿應收一壯丁即給一良馬授以美妻一人逃出即殺其管隊一陣退縮立置之重典故人皆為盡力死鬬賊聮三大營待秦賊至而逞秦賊李自成在乾州陣失其弟詭乞撫于監軍道劉三顧三顧知其譎弗受真寧知縣王家永被紿見執豫賊陷盧氏知縣白楹自刎死十月二十八日秦賊李自成為左光先擊之子髙陵富平間斬四百四十有奇十月二十九日是月秦兵于渭河南北三擊賊共斬千餘級秦賊闖王髙迎祥自華隂南原絶大嶺夜出朱陽李自成亦東走左光先追之失利曹變蛟提刀陷堅戰甚力十一月朔秦賊悉其衆薄豫之閿鄉葢秦賊至是凡三出朱陽闗惟自成最後别股已下淮楚而張獻忠等久盤踞靈寳迎祥自成與合左良玉禦之靈寳東祖寛禦之靈寳西不能支祖寛兵以十一月朔晚刻入閿鄉城而賊大衆踰閿趨靈左良玉棄大營來靈欲與祖寛合勢七十里間被賊隔㫁以初四日早據城外髙坡為營以禦之賊伏精騎溝中誘左軍左持重不動遂馳驟東下左軍自寅至申尚未食又與祖營隔㫁故不能追賊賊于是日晚従陜城破垣突入矣初四日陜州陷賊以初五日早出陜東去賊東下雒汝汴皆空虛金光宸檄牟文綬之兵溯歸入汴豫撫陳必謙監軍道戴東旻分率左祖二軍兼行救雒賊已攻雒聞兵至而去髙迎祥李自成走偃師鞏縣張獻忠走嵩汝左良玉出雒追迎祥自成撫臣領李雲程等督左軍祖寛分擊獻忠救汝監軍道戴東旻督祖軍十二日祖寛敗賊于嵩縣之九皋山祖鎮于十二日向汝州將至佛店探得賊營在葛家莊時當四更督副將祖克勇銜枚疾馳黎明遇賊祖鎮身先士卒躍馬砍入賊整齊王逃奔九皋山阻險不下祖乃伏二軍于山溝偽退而誘之賊果以三股従山脅而下伏發大捷十四日又與劉肇基羅岱大敗賊于汝州之圪料鎮監軍分巡河南道戴東旻報攻靈破陜盧之賊于十一月初五日抵永寜長水張村東旻親督劉羅朱李官兵與之相持數日于蘇羊斬二十八級劉羅二將自蘇羊敗賊後再赴汝州賊果至汝為二將擊回而祖軍適至于是劉羅擊賊之後祖兵擊賊之前圪料鎮在楊家樓地方一名姑家廂十六日委官勘驗賊屍山積約長二十餘里北至楊家樓南至樊家坪東至靈官廟西至李家樓除已經割級九百一十有二未上首功者七百四十有三先後擊斬一千四十七級俘八十四人中朝以汝西之捷為戰功第一獻忠憤遼兵之再勝也糾合迎祥自成等聲攻雒陽報圪料之役以二十日與祖寛遇于龍門白沙設為數軍以牽綴前行伏起衝我師為二寛身自㫁後鬬士無不一當百自晨接戰至夜半卒大克之而左營别將有宜陽黄澗口之捷左雖不在行其指蹤力也盧象昇見楚氛小定聞汝雒急倍道而前歴鄖襄宛葉馳千四百里以二十五日入汝命李重鎮雷時聲于城西三十里連戰二日飛矢殪賊千餘人斬一百七十七級十三營大賊有精騎五六千四山賊有五萬其日狂風大作揚塵呌噪官軍植立不動用砲攻打馬丁施長弓勁弩直前樸擊戰正酣内丁都司米文進従賊中冲殺而入賫汝州知州伏見龍所運糧糒至士飽益奮賊死不下千餘葢秦督自亡曹艾二將張全昌叛張外嘉為其下所殺陜按錢守亷疏報㳺擊李建功尅減各軍鹽菜銀兩以致軍變建功逃而外嘉以主將被殺王承恩以十月従延綏至十月十四承恩以兵至西安三原縣亦未肯效命威望稍損理臣新受事為天子誅不服有清中原之心其在汝也馭羣帥甚有紀以楊世恩雷時聲兵合之祖寛營羅岱趙柱兵合之左良玉營而劉肇基朱三才兵汰不用罷周繼先舉鄧玘所遺蜀卒𨽻之他將秦翼明用逗撓被糾責後效象昇曰秦翼明疏請援鄖臣壯其志既而冦突豐陽有功及聞曹文詔陣亡尤世威挫衂遂談虎色變事事觀望不前左良玉近來怯戰以視翼明則彼猶然烏獲孟賁也但其性行純謹尚可鞭䇿後效余應桂疏曰秦翼明擊蝎子塊則不前援獻陵則後至十月十六日以後一戰于蔡陽舖筸將劉九思敗之喪卒二百再戰于唐縣鎮部將孫振武周繼先之兵復潰鎮臣皆不以實聞比之舊帥許成名更為不及軍令一變所至輒有功十二月髙迎祥李自成従魯葉窺光固初九日陷光州之南城十六日象昇次信陽尋敗迎祥自成于確山斬五百六十四級確山之捷祖寛功也余應桂疏曰理臣盧象昇與闖王相遇既敗之于汝州又敗之于確山賊距楚已逺而後來之大賊又復自桐栢唐縣而逼于隨州九年丙子正月先是帝以冦未平齋居武英殿素服減膳撤樂象昇率諸臣于元旦表稱臣等暴師經年不能摧殄兇醜貽君父宵旰憂罪萬死總督臣朱爕元臣洪承疇臣朱大典撫治臣張國維臣陳必謙臣李懋芳臣甘學濶臣吳甡臣王維章臣宋祖舜請大駕還宫御常服嘗法膳臣等誓捐軀命為效帝優詔答焉象昇又自為奏疏畧曰賊横而後調兵賊多而後增兵無人不落後局兵至而後議餉兵集而後請餉時時寓有危形況請未必敷致卒從賊而將為冦是八年來絡繹而請之兵反樹賊黨積累而用之餉適賫盗糧也極言督理宜有専兵有専餉請調咸寧甘固之兵屬督薊遼闗寜之兵屬理山林奔竄騎兵不善扳緣再調川筸滇黔兵便習險阻者一二萬佐騎兵所不及每月需餉銀各一十三萬而聴承疇辭三邉象昇辭全楚所在撫臣不得以一方有賊輒求調援分督理之兵餉各省直撫臣俱有封疆重任一處有賊一處求援一處需兵一處求調不應便成吳越分應何以支持夫粉飾太平尚可調停遷就用兵勦賊豈容委曲那移臺諫毋従中苛求俾臣等不能専心辦賊不問事之難易不顧人之死生一味求全責備在識力不堅者必致因人以自餒不肯向前即清白自矢者亦且避忌而灰心従何展布又云中外勿惜浩費有司毋憚苦難各省直毋吝餉金諸紳士勿事横議大家齊心合力效順除兇待賊悔禍乞降再議散遣安挿然後輕徭薄賦卹死弔生保固元氣此則勦蕩之大局也臣與督臣有勦法無堵法有戰法無守法其言切中事宜論者韙之因糧輸餉實自象昇之疏發之以報國大計不得已出此故中外皆服詔起左通政王夢尹為楚撫如理臣指十七日李自成攻廬州太守吴大樸知合肥縣熊文舉堅守賊不得下南樞臣范景文遣池河提督杜𢎞域大將文煥子往救二十四日圍解李自成連陷含山和州和大州也賊以數萬騎仰攻夜半怪風作城上火盡滅守陴者不能立賊乗以入知州黎𢎞業州人御史馬如蛟教官康正諫運判馬如虬生員馬如虹皆死操江臨淮侯李𢎞濟遣其將薛有年援和以遲發賊已破和而北有年中道失勢遂敗諜者云賊將據浦口江浦二邑以謀渡江職方郎錢位坤趣戰都司汪之斌以七百騎與賊鬬神機營都司徐元亨先軍滁州聞之斌急移營救之元亨戰歿之斌負重創賊圍江浦應撫發其將蔣若來助知縣李維越繕守賊登若來膞諸城上又縋而下與之角矢著其頰左臂傷裹而還戰賊已退復來更與陳于王同捍蔽攻圍九晝夜疾鬬得無陷李自成圍滁州連營百餘里盡鋭攻城將穴西北門而上賊之攻滁州也城頭火礟交發奪其雲梯焚之賊死無筭賊掠村落婦女數百裸而淫之已盡㫁其頭環向堞植跗倒埋露下私以厭諸礟城上燃礟礟迸裂或喑不鳴城中遑遽太僕寺卿李覺斯命取民間囬牏亦數百枚如其數懸堞外嚮以厭勝之燃礟始發賊乃大創盧象昇在西沙河聞警遣祖寛羅岱祖克勇乗夜疾馳平明抵滁賊分其騎來戰兩軍相擊日出至晡時賊始北我兵従城東五里殺至闗山之朱龍橋横尸枕藉水為填咽不流象昇自引楊世恩之兵従定逺至躬援枹鼓大呼直前搏賊時淮撫朱大典亦引其兵至賊披靡斬級六百七十有八奪獲馬騾無筭其奔蹂而死未割級者自城東至朱龍橋闗山查驗一千二十有四其沒溺濠塹者不在數中守滁太僕寺卿李覺斯知州劉大鞏開城門勞軍其下讙呼曰我徒更生微救至者殆矣賊北走鳳陽礟卻之十二日焚正陽鎮過河攻夀州不能破邑紳御史方震儒捍禦之力懐寧無城殘之漕撫朱大典以劉良佐苗有升等戰䝉城之陳搏橋所殺傷相當餘騎奔潁霍或趨蕭碭掠靈壁虹縣窺曹單劉澤清防河不能渡賊走考城儀封而西其大賊走亳亳州知州葉景先同守備查應才二十日有盧家廟之捷復折入歸徳永寧豫撫陳必謙檄總兵祖大樂壁于歸徳要之先是祖寛滁州一捷大樂自恨勿如其麾下有吴竇二將者偏師挫賊于白龍廟大樂怒其貪小獲為己功罵曰豎子不報我待大軍至而覆取之耶我無所用汝叱使去二將大恚走數十里道逢監軍監軍道王繼謨訴曰我何罪監軍顧左右􅀢豆秣其馬慰曰賊旦至候大軍戰儳而助為擊帥必喜有功何慮不見禮如初二將悟揖而去徐驅至龍山之穀熟集遇大樂與賊戰大勝榖熟集之勝為十九日追來二將以其屬逢迎急擊賊號呼走曰何處來此鐵帽子軍六家大冦漏刃破膽竟全開歸焉二十七日賊走汴梁陳永福従歸徳秣馬馳一百四十里及朱仙鎮過河日天大風賊不虞官軍至蹙之武穆廟中砍一銀甲賊或云闖王非也二月初二日賊攻宻縣不利走登封初八日王進忠周維墉敗之于登封郜城鎮賊走石陽闗與伊嵩之賊合故總兵湯九州従軍自效以千二百人由嵩縣深入敗歿左良玉従宜赴嵩與九州有夾勦之勢不意良玉中道遄歸九州以孤軍殺賊大勝窮追四十餘里悮入深崖賊數萬據險攻圍九州見勢不敵乗黒移營為賊所乗以敗賊一走裕州一走南陽知南陽事何騰蛟設守有方畧必謙驟兩晝夜以十六日至南陽賊在安皋山下騰蛟具糗糧必謙中夜擊鼓起陳永福陳治邦于帳中銜枚傅賊壘收禽挾囚還而象昇由葉向裕祖寛祖大樂羅岱等大戰于七頂山殱李自成精銳幾盡闖賊精鋭馬賊七八千在滁州朱龍橋渰死殺死者二千又以登封朱仙鎮楊家橋七頂山連敗死逃畧盡以去冬攻光州時氣焰比之江北折入豫中強弱大不相侔理臣力也十九日象昇至南陽誓衆曰我逐賊至此諸君努力無令得逸命祖大樂趨唐縣新野備汝寧祖寛趨光化備鄧撫臣提親軍繞出鎮平而已建大將旗鼓由正道期至鄧州進取使人告于襄陽曰賊疲矣東西攔截前阻漢江可一戰擒也楚撫夢尹鄖撫祖舜慢弗應漢以南無一兵陣而待者賊于三月従光化之羊皮灘渡矣鄖兵三千祖舜以五百戍南陽又有張大節田景夀川筸之兵一千四百人而不能禦賊雖入鄖襄其在内淅山中者大小共七營尚二三萬象昇移軍捜討騎兵利野戰不利阻隘率之入山驕不用命祖大樂之兵強于祖寛其人稍恭謹兩家所部皆緣邉鐵騎又養曳落河為摧鋒虓闞而狠戾二將常倚以立功寛部五百人方過河噪而逸其在大樂軍者一千二百飲食嗜欲不與中土同非可以法令使也往者官軍多秦人臨陣以鄉舊相勞苦抛生口棄軍重即縱之去邉兵不通語言交手即殺然所過爇廬舍淫婦女恃功不戢又見賊逺竄淹旬朔未可定自以為客將無持久心將吏俱買香扇作親識人事全無殺賊意象昇諭以朱龍橋穀熟集之勝宜勉竟大功始俛而聴令進至黨子口仍按甲不動與素恇怯之李重鎮同跂踵思歸四月朔王進忠一軍譁于三峽口羅岱劉肇基之兵多逃追之則彎弓内嚮因祖氏羅兵被汝陽上蔡官兵斬獲㡬盡劉兵被河北道發砲打沉一舩因此少定然諸軍生心㡬成不測象昇上言入山捜捕之難豫楚大山綿亘宻箐深林馬不能進賊抵突榛莽出沒無端我兵攀木踰崖日行三四十里車驢不能饋饟人負米二斗踵兵而往十日糧盡遇賊勝負未可知以千兵入需千人運萬兵入需萬人運過期則兵夫同歸于盡矣可出臣章與有識㕘之兵部議淅川通鄖襄江口恐透販濟賊宜禁絶運船豫撫馳書總理乞檄楚中通運但禁私販龍駒寨南華不宜并禁淅川絶官兵咽喉也帝初聞中州累捷甚悦既知祖軍殺良抄奪諸部帝怒下璽書鐫責曰即如是賊何由得平樞部以豫士大夫苦客兵也乞練鄉兵代之天子下其議象昇曰賊皆百鬬邉兵驍悍僅能克之宛雒蕭條若用土團即販區病坊傭保小兒耳毋乃貽賊嗤靳乎茍求其便祗應充拓主兵募壯丁買馬費百億以上従何出其説遂詘不行豫餉奏請日急屬城殘敝旱蝗少穀以思歸之衆牢廩不給持矛相詬厲譌言匈匈在事者外憂冦内憂兵不得已建祖寛李重鎮入闗討賊之䇿葢資秦餉安邉兵非中州殺賊本指也迺承疇亦以為請其六月十一日疏曰賊之在秦者闖將可三四萬過天星滿天星可三萬混天星可二萬臣見統馬步官軍合之川兵無慮二萬人承疇以正月在臨潼渭華將入秦大賊老􅉰􅉰闖塌天蝎子塊等屢次勦殺俱従峪口遁逃乃定計専勦闖將等臣以今年二月追闖將混天星二賊起澄城歴韓郃過宜雒循鄜延入環慶涉寧夏固原界楊武乎海喇都西安州隃香山一日數合鏖看透山下所捕斬鹵獲已累疏報聞其過天星滿天星伏合水真寧山中潜出髙陵三原焚掠臣在萬安監聞之回軍南下而于混闖則分命諸將躡之混賊狼狽逃于萌城至延綏再與闖合過天星滿天星在西安以假撫肆搶臣追及之于中部破之四賊遂糾結西奔謀犯蘭州河州臣檄左光先與甘肅總兵栁紹宗并力于乾鹽池大挫其衆賊怖慴乞降撫臣甘學濶監軍道臣劉三顧因加慰納延綏賊藪同惡膠互逋逃歸之者首尾不絶臣固䇿其必變續被四月二十八日詔書允樞臣奏命職方員外郎包鳳起頒告赦令賊猶不悛放兵自如今且以叛告矣此未出闗之賊官兵得失之大畧也若闖王闖塌天蝎子塊等自江北河南敗後經鄖襄以趨興安漢中臣逺在西陲聲援不接承疇時在同官以五月五日選趫敢三千三百人授之栁紹宗由畧陽赴救自同官耀州前往武功鳯翔寳鷄鳳縣徽州馳赴畧陽漢中夾勦又發兵一千餘名飛馳徽州畧陽兵圖扼勦此十數萬賊亦非三千官軍所能掃滅而老􅉰􅉰整齊王等見在永寧盧氏山中賊在秦之商南雒南山中約一二萬欲從商雒透出藍田西安雖有川兵五千扼險道岐多襍防勦為難臣所備者多分額兵嵗有折耗不能分支軍以往計理臣憂邉兵入山道險乏食而楚疆卑濕即調遣亦違所長惟闗中平原曠野此用騎之地闗寧兵雖疲餘勇可鼓願以祖李二將受臣節制與理臣合力辦賊惟明詔博諮公卿以時聴許當是時賊大勢盡歸秦闖王髙迎祥蕩拆漢南自冬徂夏道臣樊一蘅一蘅調監軍守備唐通通調守大同以遷調行天雨壊城瑞藩幾不守李自成踞南山險隘穿商雒間走延西官軍敗績于羅家山失亡甚多自成謀于綏徳渡河入晉為定邉副將張天禮所持不果延綏總兵俞冲霄狃于髙梁之捷五月十四日以三千人戰安定中賊伏以殪延撫髙斗光不能救鎮兵精鋭殱焉過天星之叛也侵綏徳襲安定執華亭令郭養民奪其印釋之謀入山西渭河水漲不能渡登黄鹿山乗髙呌噪聲振通谷距巖闗不百里承疇以追賊東還于五月二十八日出闗與象昇㑹而定議既同拜表不及俟報用便宜先遣祖寛李重鎮二將隨秦督西行而象昇計豫楚諸將惟左良玉差強其衆率中州人故獨得久留寔亦驕忼難用因以孔道興代其偏將趙柱令駐靈寳防雒西左良玉與羅岱駐宜永防雒東祖大樂未行分其軍駐雒汝就餉并遏内淅逗出嵩盧之賊而用陳永福守吴村錢繼功守白亭周維墉守花園闗以専備内淅部分定而襄陽告警矣賊之由羊皮灘過也漢江春淺均州之沙陀營鄖之舞陽河陜西之洵陽白河偷渡均州宜城穀城上津環山皆賊竹山知縣黄應鵬竹溪知縣魏鎮安鄖西知縣劉伯元各遁秦翼明以步卒逐賊于南漳深入山中轉戰浹旬不能一大創均州土冦為嚮導焚武當太和宫㑹于襄陽楚撫王夢尹不能制象昇議入楚㑹勦進軍雒陽待發其内淅捜勦専委之豫撫陳必謙六月混十萬等従山中直薄淅川此時黄河吴村尖角梳洗樓黄裏瓦屋半川巡檢司板橋一帶俱賊屯聚以傳砲為號一股由花園闗犯内鄉一股由板橋一股由黄河竟犯浙境陳永福以初九日蘇家溝大戰十八日襲之于閙峪混十萬老􅉰􅉰并新來整齊王等十家逆賊自蘇家溝大戰後盡移江南依山為勢據水作險自東西閙峪住起直至鄖陽地方亘長百里賊在閙峪髙山歇凉我兵暗渡都司錢繼功等從西山口進㕘將江槱等従東山口進時直二更兩路齊上賊奪路墜崖敗走南山去訖二十四日襲之于清泉山賊因人多糧少徙東南就食潜聚白亭清泉山永福由鳥道暗遶清泉山谷左右藏匿夜深襲之賊驚遂㧞營分三股往東南而下明日又破之于興化寺賊一由江北張壑店一由西北種子坪一由江南朱家扁來犯内淅三鼓俱到興化寺前永福分其軍為四路邀之従中截㫁伏兵齊出賊死戰自夜至二十六日午時首尾不能相顧逃入東南深山樵谷一帶賊既不得志于内淅畏象昇駐黨子口不敢東下天雨糧絶于淤村縛筏謀再渡漢江為永福所覺擊之半濟遂遁入山中賊混十萬不沾泥黒虎揺天動張妙手老􅉰􅉰等營于淤村黎明半渡我兵伏發賊一半仍奔回東南大山一半入東北山内窺淅之賊係老􅉰􅉰混十萬等七營衆三萬陳永福以二千饑疲之卒與之爭衝四十餘日副將王進忠㳺擊周維墉坐守内鄉縻餉數萬去淅川百里而近畧不應援七月初六日象昇提兵入襄陽賊聞之従淅川以犯汝雒内地八月豫撫必謙以初四日移軍唐泌舞陽撤左良玉陳永福兵従汝裕反顧根本㑹象昇因京師有急入援初六日由泌陽轉趨確山衝西平口而出汝寧賴以無患賊苗頭已􅔰舞陽去汝寧之西遂咫尺以此遂折而并奔許郾東北汝寧得無恙良玉永福兵尋抵汴梁大賊仍遁登宻其道舞陽者為楊四所敗楊四者舞陽土冦也與確山之郭三海為黨其部最強大梁道中軍尹先民招之勸以殺賊自贖北吴渡之役殺賊至二千餘人然其心未可信也舞陽楊四據九曲而泌陽人郭三海據平頭垜在遂平確山交境遂平侯馭民秦至剛與之合至剛結營槎枒山頂與三海賊巢相通他若舞陽間之張顯明裕州之張五魯山之何孟魁等皆踞險為塢壁擁衆以萬計楊四狡且強逐荘𣲖糧遍地勾丁圖大舉以郾城有河為之阻乃與羣賊會謀槎枒山期先取郾城郾城知縣李振聲與大梁道陳睿謨所遣中軍尹先民合兵夾勦七戰七捷楊四乃以七月二十九日乞降侯馭民以遂平縣鄉兵西平千總劉洪起等各有斬獲脱身遁泌陽知縣李蕃長于七月二十一日至二十九日合確山西平汝陽之兵圍秦至剛于槎枒山至剛降郭三海不至至剛以為其姪郭鎔所阻乃先取鎔首以獻侯馭民逃至上蔡以八月初四日自縛而郭三海亦于十一日挈其兵二千人歸命先民説楊四以殺賊自贖八月初六日流賊至舞陽之北吴渡楊四夜發兵大殺一陣遣陳百谷持首級三百獻功口稱殺賊二千餘人是役也先民之功居多云泌陽生員樊以屏散財募鄉兵逐賊頗有功淅川生員李宗理亦以鄉兵會同都司錢繼功在小水河逐賊時長葛郾城宻縣葉縣諸令皆有殺賊威名左良玉以二十八日殺賊于登封之唐荘唐荘官兵深入自辰至申鏖戰百十餘陣賊従大小金店西奔一越北山向鞏境奔去九月尹先民以初三日敗賊于郟縣之神道街陳永福以十四日由神道街之野豬峪進明日大敗之于髙家坡掃地王授首孔道興以十七日于葉縣之獨樹單騎提刀逐賊賊在郟縣神道山野豬峪敗後渡河越澗由魯寳走葉縣官軍以十五日従郟縣襄城馳赴葉縣繞出賊前十六日抵葉聞賊在舊縣三更乗月色行三十里前渡滍水往舊縣進發賊已㧞營南走十七日辰時追及于離葉縣八十里之獨樹敗之收兵暫歇裕州唐河後坡兩戰亦先登唐河即唐縣河也十八日賊従泌陽之繞涼店遇唐縣孔道興與李守業劉承訓等渡河追擊後坡為鄧州地二十日賊在鄧之九重郾官軍至已遁去乃追至後坡周家寨勝之左良玉以十九日敗賊于田家營斬獲頗衆田家營在唐縣之間左軍于二十日越嶺渡河至田家營宋家營大有斬獲追至倪家岡收軍左良玉敗賊于大石橋羅岱車登科敗賊混十萬于羅漢山又渡河追擊皆係唐河勦敗之賊自九月來各營斬級一千有奇而秦中新至蛤蜊圓一股與混十萬合營謀引荆州闖塌天等北渡大逞賊以八月朔内犯為老􅉰􅉰混十萬整齊王張四天王共四大營附以掃地王瓦背王興世王等三小營共為七營今張四一營為楊四斬殺幾盡掃地王死惟混十萬馬上精賊多整齊王次之老􅉰􅉰多權譎羣冦奉為謀主因屢敗憤而殺其管隊四人退入内淅謀掠鄖陽上流江船渡鄖襄大冦過北岸并力下山大戰我兵如祖寛李重鎮入秦非其本意尋與祖大樂皆以入衛撤回即陳永福為豫主兵其選騎半抽以勤王營中壯士好馬隨其子陳徳赴總理標下勤王奏請功次輒為部議所格陳永福南召集之捷遏賊不過淮河保祖陵朱仙鎮之捷保梁宋南陽安皋一捷保宛有􅔵􅔵心舉止自擅于撫臣不相承禀而楊四郭三海等伏莽叵測事同養虎必謙懼且憤上書疾陳曰臣區區一身内無同心之助外無片甲之援九年新餉不許動支内庫折色地畝均輸盡歸督理臣提軍所過郡縣不能供頓叩頭請士馬無淹久三軍為之氣索事勢如此臣能伸兩臂捍賊耶八月初四日帝念勦冦官軍離家日久地方荒涼衣食棲止必多缺乏失所況天氣漸寒深可軫念着兵部發冏金三萬兩忠勇營差官分解督撫軍前量兵數酌行犒賞未幾必謙為巡按御史楊繩武所劾老􅉰􅉰張四偽乞撫于内鄉知縣艾毓初遣其黨曹星文入見豫撫求安挿乾壕硤石澠池一帶必謙謬許之俟兵集而後合擊初不以為信也副將王進忠者收賊武成文為心腹成文姪與婿俱在賊營賊一條龍因成文以撫誘進忠入賊營而殺之巡按楊繩武以輕撫𠫭必謙而罷必謙奉㫖解任回籍在九年十月十二日與鄖撫祖舜皆以不稱罷用兵部左侍郎王家禎湖廣右𠫭政監軍道苗祚土代之自象昇歸朝闗兵回鎮賊亦大舉入秦中原不以殄冦為事廷臣屢以為言帝念總理難其人顧視諸大吏無可屬惟家禎初仗鉞疵瑕未露即令豫撫攝焉外史氏曰以余所聞洪承疇貎不踰中人苦身勤職每軍行頓舍未嘗蓐寢中夜治文書張燈達曙温卹士卒問所疾苦杅水乾飯與下共之得秦人之心嘗倉卒褁糧弗及貸之于民民爭投釡鍾為滿有一老婦蹩躠不前仆于道人問之曰我為洪軍門送乾糒來也象昇生長江南特以氣聞負膽决便弓馬臨陣用麾幢自隨旁睨他騎距躍輒上奪其刀便以擊賊好輕身獨將所親信棄大營趨利自其守大名跳軀臨洺闗瀕于死者數矣此兩人雖儒生茍獲盡其用豈出威寧新建下哉中樞責承疇以分兵曰督師兵七萬三千以三萬人分豫楚隘口而尤世威徐來朝以之潰逃以二萬人分三秦各郡而曹文詔艾萬年以之敗衂固也今使承疇不分兵不守險此七萬人皆帥以自従將中原不瓦注乎各撫不束手乎秦地之險逺者不甌脱棄之乎即不然豫楚諸路撤防盡以壁于朱陽闗蘭草隘而靈永以南鄖津以北其何以禁賊之無䦨出也承疇曰豫楚堵于外秦兵勦于内象昇曰臣與督臣有勦而無堵有戰而無守兩人公忠一體顧其持論不同何也曰督理空名轄五省就各撫之兵以為兵各撫之餉以為餉勢不得不就各撫之兵餉以為堵為守此豈承疇殺賊之本指哉襄平湫頭敗朱陽闗潰在閫外未嘗指授乖方而筦樞者貽之誤也兵食大計榰梧奏請不思暫費永寜徒云用少擊衆置人死地而不助以實力及其形見勢詘天下曉然知空拳不可撩虎一掌難以堙河即當宁亦推尋失䇿拊几恨之象昇乗其間得以嘔心肺抒憤懣猶不敢顯言亦曰臣等止知一戰已耳語有之後起者藉也而首事者時也在承疇可以為而不敢言象昇則可以言而為之已無及然象昇能言之亦未能盡行之也各撫以疆事為首鼠言路以廟筭為蜩螗此曰督理何不援彼曰督理何不戰主豫者曰救汝雒主江北者曰救安廬主楚者曰救徳黄隨棗史稱周亞夫下七國請以梁委之孝王太后愛子守便宜不救今賊攻一亭陷一堡剽掠用事者鄉里則譁然従之彼亦家在圍中憂念妻孥耳尚復知有國事乎董用文牟文綬之防河也馬爌倪寵楊御蕃之䕶陵也志在便文自營巧違節度邉將如李重鎮蜀將如秦翼明選懦逗撓䇿之不前左良玉拊循延攬諸將潰卒多歸之者有駕馭才然為人深沉持兩端無意殱賊求其伉健有氣挺身便鬬惟有祖家軍耳汝南歸徳二捷中原禍患少紓誰之力乎其部卒雖為百姓所苦亦為強冦所畏朝廷若加封侯之賞大示鼓舞而後以軍令齊之詘伸顛倒士氣自振今賞既淹月罰又踰時人言既入譙讓相屬彼見吾血戰之勲僅與坐甲觀望者伍怙功失意漸乖本圖無復向時殺賊之志矣陳必謙之屢捷也以隨理臣然委任陳永福亦其知人之力中樞以為黨人異己于必謙奏請將吏功狀多被寢遏而又與羊皮灘縦賊南渡之鄖撫同致其罰即疆吏將安所勸焉方事之殷獨承疇象昇可倚承疇八載馳驅疾呼將伯始得象昇之助兾左提右挈相與戮力成功象昇一嵗中初分全楚繼受専征將士麤調習而又移之于雲中九原南北東西不遑奔命是猶顔闔相東野子之御馬足已憊而鞭笞不止求其無破轅而折軸不可得也詩曰終其永懐又窘隂雨其車既載乃棄爾輔載輸爾載毋乃類是乎嗟乎當冦患交切國家猶急任人哉附紀盧象昇疏曰州縣庫藏如洗折色萬難措處本色顆粒無資勦兵所至率多閉門堅守惟以身聴𠫭拏臣以功令責之則曰餉銀原無欵項従何設處凡勦冦用兵之地即兵荒應免之地偶有一二完邑所輸無㡬不足以供防兵況勦兵乎賊行甚速且無定向窮兵力以追之尚虞不及今支領芻即吏隨手立辦定稽半日之程稍遲一日再遲二日斷無及賊之理矣據臺省動以尾擊責臣等持論非不甚善但均一勦也有追之者必更有一二重兵或堵之或扼之始無潰決之患若前無堵者旁無扼者止賴一追即有縮地之法逺出其前而賊巧于避兵轉身他向仍然尾賊也即欲不尾不可得也嗟乎廷臣多不知兵好為大言以訶責在事即此尾擊一語亦既章滿公車秦督充耳置之盧公拄頰與辨趙充國云兵者國之大事當為後法老臣不惜為主上别白言之盧公意在與國非為身也不則滁州之捷方聞何不侈言威靈而反陳尾擊之非過大臣告主夫豈不以其實哉盧象昇薦侯𢎞文疏曰原任髙平知縣侯𢎞文以守制道阻僑寓襄陽見臣叱馭鄖疆遂投袂而起散私財以募死士介馬従征臣欲昌言其功彼輒長揖告去臣比叨總理𢎞文大義䂓免意氣凛然因言及中原步兵不能追賊臣思得滇黔之人用之𢎞文願以孤身奔走萬里為臣奉檄往募有臣如此敢不聞于主上乎帝従其請命為監紀已而盧公移任宣雲𢎞文率所募兵重繭至楚為後事者所陷以驛騷上聞有㫖即訊公不勝憤懣上書曰𢎞文破家為主捐軀殺賊身罹法網臣竊痛焉臣初聞𢎞文譴問即遺書責之其報臣初不及已事惟以滇兵莫為綏輯兼乏餉為虞身雖對簿義切封疆懐忠報國之氣可槩従而抑沒之乎今羣臣欲以誤用𢎞文罪臣推其意且有故激滇兵之變以甚𢎞文罪者總之臣不請𢎞文為監紀必不至此此臣誤𢎞文𢎞文不誤臣也盧公名知人幕府初開𢎞文為首且蹤跡竒引救切非茍然者未幾督師死王事𢎞文于十四年論戍予痛夫䜛夫沮抑異才不用又重督師之能得士于閫外也故表而出之綏冦紀畧卷四
