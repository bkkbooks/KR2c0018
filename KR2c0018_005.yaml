body:
  text: 綏冦紀畧卷五國子監祭酒吴偉業撰黒水擒當盧象昇之移宣雲也其與洪承疇同殺賊者又得孫傅庭云傅庭代州振武衛人長身七尺二寸魁塞沉毅多大畧秦撫甘學濶騃不解事賊至不遣兵手記下都虞候縛治左右紿以親往則緩服盛輿従逐之薄暮宿一堡聞人馬聲其下將棄之去前驅傳曰督師來相見愕眙告以賊難扼輒怖急還走甃城門以瓴甓謹錄鑰牡不敢張目視賊秦士大夫譁于朝九年三月罷學濶推用傅庭往傅庭涖秦嚴徴發期㑹一用軍興法秦人愛之不如承疇然其才自足辦賊豫撫陳必謙與人書云秦撫孫白谷初入闗即發兵𠞰冦二千之衆敗歿千餘此總理親為必謙言之九月二十八日提兵三千入山勦冦全軍覆沒此必謙差官王衍範在彼所親見此二事必有所據留以備攷秦撫有標兵三千向従勦餉撥𣲖傅庭在事親出屯課銀十四萬兩以充其費故十年後秦標兵餉不復闗支于大農此與楚按臣余應桂自捐贖鍰十萬兩養兵以䕶獻陵皆所謂實心任事之人也闖王髙迎祥已陷漢中之石泉由陳倉子午出將闚西安傅庭以七月二十日戰于盩厔之黒水峪當陣生得迎祥及其領哨黄龍偽總管劉哲三人檻車膠致京師膊之于市楊嗣昌疏曰以賊攻賊今人人言之而亦有行之者文如孫傅庭武如左良玉是也良玉招降賊數十萬而與傅庭相提並論葢秦撫推心置賊腹中能收其用不比他撫云初兵科都給事中常自裕稱賊渠九十人闖王為最強其下多降丁甲仗精整步伍不亂非他鼠竊比宜合天下之力懸重購必得其首第獲闖餘賊不足平傅庭憑國威靈俘以獻餘黨復推其弟迎恩為長後敗入他賊中而秦人或云賊在黒水峪遇大雨野無所掠十萬餘衆半僵餓髙迎祥病痞卧石穴中一女子指之曰此闖王也遂擒之嗚呼秦中野如赭民饑賊亦饑其羸困無惑耳曾謂百萬之冦左右無寸刃义手萎股以就執者此媢功之言何足信哉御史黨崇雅疏云臣縣寳鷄為蜀漢咽喉遭冦十餘次九年春西平縣失利堡塞及各闗盪無餘苗胙土之始受事也賊入其郛者七營營萬人襄陽樵汲道絶賊將張某者獰而肥多智數七月十二日竪五丈木于郊之江神廟繫尺書其杪以示城中曰吾欲見軍門口畫便事胙土大喜命兩將延迎入盛供帳以饗之従賊皆霑醉期以八月定降乃命郡通守祝錫範一經歴一主簿􅔰其壁賊倨甚坐而受書留不遣為謾謝曰若治浮梁于漢上俾我全軍濟而後議之可也胙土猶幾幸其真開城門為互市賊陽陽出入貿易守者莫敢譏宜城令撤弓刀礟石藏諸庫曰無令賊疑我襄陽總兵秦翼明自言以二千餘騎與闖塌天等賊十萬戰于豐陽于界山于均州于官山于觀音闗于麗陽于七星店真武山大小數十鬬雖未嘗敗北賊益強終不能破翼明報賊八大王従均州入老􅉰􅉰従新野入蝎子塊従唐縣入二十餘股之賊不下二十餘萬理臣以楚士大夫史可鏡等言其髙卧汴梁置全楚度外有㫖切責乃遣兵救襄陽大戰于牌樓閣亦不能一創賊也楚按臣余應桂疏糾翼明今水潦將涸不時進兵勢且縦賊北渡賊果于十一月従羅漢灘填土過江矣始翼明謀于漢江淺處設防以李同陽劉大歸之五百人守廟灘幸無事賊竟于羅漢灘深處渡知淺有防而深無備也苗胙土罷以陜西右布政陳良訓代之命王威為延綏總兵雷火火其城樓鎮人大懼漢中賊破褒城漢中霪雨田禾沒城垣圮道臣劉宇陽且築且防工未畢賊至十月十三日二更襲破褒城瑞藩乞師于蜀蜀帥侯良柱救之禮部侍郎劉宇亮乃宇陽之弟以入都道遇侯帥勉以大義良柱乃命㳺擊侯應輔都司劉貴率兵一千四百五十人宇亮督之以救漢中十二月二十三日總理王家禎家丁三百人大譟燒汴梁西闗掠黒尾營殺五十餘人家禎夜歸急登城慰諭之遍加賞賜俾往南陽勦土冦楊四始定十年丁丑春正月辛丑朔日食免朝賀丙午賊老􅉰􅉰等趨江北時海内羣賊混天星侵軼商雒李自成盤踞西安過天星鴟張汧隴獨行狼螘動漢南蝎子塊雄視河西與西羌作約而老􅉰􅉰等久占鄖襄休糧息馬秋髙足食以其全軍合曹操闖塌天諸賊可二十萬長驅沿流東下蘄黄六合懐寧望江江浦在在震擾烽火及于儀揚樞臣以江淮天下要地陪京神靈宫闕之㑹而鳳泗比豐沛有陵寢至重京口綰漕輓𤓰儀綰鹽綱計吴兵二千新調浙兵三千蕪湖召募二千牟文綬兵二千鳳應二撫標兵率不滿二千操江水兵南樞標兵皆窳敝無步伍鳳陵泗陵孝陵周廬設卒合之無過數千而總理王家禎専任折衝其兵亦不滿萬未覩制勝之道不得已請以留都防禦責之南樞臣范景文江防責之操江都御史王道直臨淮侯李𢎞濟孝陵責之南和伯方一元鳳陵責之總兵楊御蕃泗陵責之潁州道而淮撫分標兵協守史可法鄭二陽杜𢎞域許自強桂本枝馬爌各整所部軍互䇿援江撫扼九江浙撫防獨松應撫分其兵守京口其處分非不嚴且宻亦可謂之急矣安池道史可法提兵營太湖城外以身當賊衝九年十二月二十九日史可法抵太湖扎營城外賊従間道突至石牌鎮三十日前鋒哨大石磯距安慶二十里巡按張煊告急安慶為應撫張國維分地而江北之浦口六合亦其所轄賊本分兩路來犯従楚來者由黄梅入潜山太湖以逼皖桐従豫來者由光固入定逺滁州以闚浦六國維先發川沙寳山劉河吴淞諸營兵令張載賡張天廣率以赴皖至是下流警急江浦知縣李維樾六合知縣鄭同𤣥繕守國維提新募兵二千人命永生洲副將程龍中軍守備蔣若來陳于王統之以分戍兩邑而安慶石牌之報亦至賊在白兔河修攻具謀必取桐城知縣陳爾銘守禦甚力𠫭將潘可大救之賊従舒城去而復來連營百里國維以道回逺不及請濟師權宜分六合守兵合之蕪湖新旅分𣲖守六合張人傑王定逺所將四百人従監軍推官李芳華之請調蕪湖新募壯丁四百人聊往應然無益也南樞臣范景文諜賊以正月二十四日奄至滁州朱龍橋出岱山道藕塘直奔池河此由河南光固南突之賊非石牌犯桐皖之楚賊也設醮太山寺薦亡大江山小江山皇甫山常山所在皆賊二十八日従尾埠哨至大樹街走易家集三十日壁全椒之西門謀東窺二月賊畧繩絙取竹木聲言縛筏渡江陵京大震景文先期以池浦為兵部屯儲地遣提督杜𢎞域以新營兵屯江外而金立功閻雄邉丁佐之其都城居重大計有神威營三千守紅墻内外屯于大教塲陸營兵一千䕶大奎門五顆松近郊之守粗完舟師則龍江闗以水操營駐焉江防係操臣職掌新江營則兵部所轄勛臣提督三營水軍景文再以水操營佐之景文下士喜奇計坐客多譚兵顧臨事無所用髙皇帝所置五營四十八衛僅存尺籍成祖江營戰船亦久廢景文慨然思整飭謀于南計臣錢春春曰留儲出者四十七萬入纔二十三萬軍士時慮呼庚癸遑復故額乎景文歎息而止臨淮侯前以援和事與景文相失勲臣多麤疏賊急謾為大言燈盞溝二里溝覆舟山咸有布置又自稱以舟師逆于老州頭樅陽鎮正月十四日賊至樅陽鎮焚官倉漕米桐城縣所輸也然都未見一賊江以北淮撫朱大典以䕶陵故多宿兵亦屢有挫衂獨其將劉良佐號驍果善戰有詔令大典與理臣合擊而撤中州左良玉徐州馬爌之軍救皖正月二十日爌敗賊于桐城之羅唱河三十日劉良佐戰于大安集二月四日戰于廬州二十里舗七日戰于六安州之茅墩初六日監軍同知楊正苾督㳺擊楊振宗都司張士儀陸宗美守備袁思有陶城鎮之戰初八日楊正苾有沙河之戰左良玉勦南陽土冦楊四侯馭民郭三海皆授首率師抵六安與賊遇部將羅岱孔道興乗勝疾擊初五日初八日比戰皆大破賊十一日賊走霍山深入潜山之天堂古寨潜山知縣朱家相與賊戰被執縋樓逃免其滁和之賊亦西遁二月初三日向黄山巢縣仍歸舊路陪京解嚴江北之警少息是月也秦撫孫傅庭報藍田兵變傅庭黒水峪捷後再破賊于渭南豫賊讋不敢西向又破賊于咸陽北原秦賊不敢闚涇三以揺西安威名幾軼于承疇矣正月十八日夜半商雒道中其親信健兒許忠劉應杰忽擐甲大譟據藍田縣略庫放囚連引混十萬等倒戈與大軍鬬邉兵許忠劉應杰等九百人𨽻撫標都司張一貴九年十二月二十五日與千總賀汝雄合謀叛形已成事阻未發新春撫臣遣勦商洛賊遂發難藍田遣其黨王應第郭友才約賀汝雄為省城内應幸早覺不果總兵左光先曹變蛟西追過天星聞亂回軍抵咸陽擒勦忠應杰乃與混十萬取道渭南遁去曹左于二月初六日移師初九日抵咸陽初十日進勦而叛兵與混十萬即于是日遁傅庭上書自劾以兵逃伍缺為憂帝為其變倉卒弗詰苐促發回入衛川兵四千令速赴軍前而已有㫖脅従擒獻首惡及自㧞東歸者許赦免以别順逆藍田縣官及逃避事情按臣確查馳奏先是秦人吏給事劉含輝為帝泣曰秦督止戰兵八千缺餉已四十餘日臣詢之同鄉舉人計偕者曰西安斗米值銀四錢衆兵索餉督臣無以應則好言姁姁勸諭其請益堅輒嚬蹙曰必不能留者聴若聞多有散而去者含輝又云撫臣孫傅庭辦賊有餘但所將三千人僅足守城當調邉兵一萬予之春末夏初賊人馬困乏州縣守城堡川兵守隘口督撫犄角可冀蕩平葢闗中大祲朝議以為賊饑可勦而不圖兵與民以饑故胥化而為賊承疇故縻之以恩僅而無動及傅庭稍厲威即挺而迸逸三勝之氣坐此沮索矣楚賊之羅漢灘渡也應城九年十二月破應雲夢孝感黄陂皆奔蹂巡撫王夢尹猶以細石嶺之戰秦翼明楊世恩各殱一賊渠翼明獲一條葱世恩獲新來虎白羊山之戰賊分為四而逸冀得償前過楚撫報老􅉰􅉰等十餘股闖塌天等九股入楚因闖冦被創商城八大王整齊王在白羊山被我兵大創衝作四股一従羅田去一從團風去一従蘄水去一従岐亭去亡何世恩之兵潰于棗隨隨州繼陷知州事王燾死之賊至麻城舊甘撫梅之煥率子弟固守修其沈荘别墅城之歛鄉人入収保命所蓄健兒出戰獲賊覘者一人竿其首示之闔境乃免賊在黄岡故吏部晏清等率父老搏顙于撫臣請師十三營之賊棄疾于黄殺黄人暴骨如莽晏清等公疏云自九年十二月初九日賊以破應城之衆并渡襄全隊分道抵黄團風新洲三店陽邏西北一帶民之被殺者六七萬人城守止黔兵五百人糧且盡垂陷不急救廷議以為夢尹罪議用按臣余應桂代之科臣羅志儒疏論總理王家禎奉詔討皖賊畏懦未常一出中州家禎強奏辨且上方畧曰逆賊自麻城分而為二東行者由商固蘄黄英霍六安徘徊舒城廬江桐城安慶之間又半月東轉窟于蘄黄商城太山之中西行者復轉入黄陂孝感而視其塵西向應山隨棗若南可以復入應城京山若北可以犯信陽此近日賊之情形也臣于在西楚賊則檄監軍張大經率副將龍在田㳺擊李元都司許名臣等以鎮兵九千追之在東江北之賊則檄左良玉由六安牟文綬由潁州劉昌祚由夀州視賊所向急擊臣仍暫駐光州南以扼蘄黄商城東以䇿應鳳泗西以防信陽新野従入之路兼勦撫羅息汝南餘孽居適中之地隨時布置䇿誠便帝以皖有左良玉馬爌所將各三千人兵力亦厚姑允其請意殊弗善也應撫國維赴皖議築太湖城因浦下輟警命他將守而躬提程龍蔣若來陳于王之兵西上國維疏曰賊既久住桐皖另發一枝犯滁椒以圖狂逞知各處有備宵遁舒六將出境為江北河南大兵所扼又従間道走潜臣疑其輾轉潜山之中倚為巢穴亦未可知臣捜選新舊營兵二千五百人定波水營兵四百六十人并沙船三十餘艘星馳西上葢賊在下流臣不能舍浦六趨皖今賊聚浦六臣自急皖而緩浦六矣三檄左良玉疾入山捜勦良玉不應放兵收畧婦女仰江南鹽穀徜徉自如河南監軍力促之始従舒城北去賊入英山阻險種田為持久㳺騎出太湖連引蘄黄諸賊四月以御史余應桂為湖廣巡撫河南賊陷淅川亳州兵變總理所遣劉昌祚救皖者不至皖兵敗衂于酆家店𠫭將程龍等四十餘人死之先是帝憂北京武備積弛樞臣景文意在振刷而未及就乃命闕備太監孫象賢張雲漢𠫭賛勲臣陳光裕方一元與景文協力清買閒核冒餉訓勵士伍盛修船艦鎧仗如二祖之舊以豫戰守帝諭水陸官軍向來不堪戰守因何不行飭練影占買間因何不行清理再查戰船板薄釘稀動輒破損是何情弊以拆脩冒新造以小艌冒大艌是誰侵朦一切銃砲鉛藥盔甲弓刀懸簾火礶等項是否備足堪用逐欵查騐従頭整理故大司馬張鳳翼數用選懦被譴讓後緣邉事卒于軍人謂其仰藥死帝四顧廷臣無知兵者惟故宣大總督丁父憂楊嗣昌楚士或可任中㫖起復為兵部尚書嗣昌者楊鶴子為人機警在帝前顓決兵事辨有口帝大信嚮之時軍政不修未浹月藍田汴梁亳州沙市兵四告變左良玉新有功刼掠自恣違調度不救淅川致陷沒山西總兵王忠援河南稱病數月而進一軍譁而歸帝臨朝太息曰如此朝廷何以使人嗣昌進曰尤世威張全昌並候勘世威全昌戍後復致失事先奉㫖勘問而全昌兵敗不死更従賊非世威比宜遣金吾騎逮問斬之以令諸將帝曰善乃用兵科都給事凌義渠言并逮王忠而良玉以六安功落職戴罪自贖酆家店之戰也程龍將應撫新兵三千六百人潘可大將皖兵九百人為兩營用火砲擊賊賊多死謀夜半盜我營覺之設兩翼以待賊中伏傷四月二十四日賊七營俱至兩將合屯拒賊賊麾數萬騎繞之許自強乗髙舉燎使知救至兩將潰圍出不得手自擊殺百人翼日力盡矢絶程龍引火自焚陳于王亦死溽暑十日視其元如生潘可大屍不獲蔣若來易馬圉服以免後自㧞還事聞贈陳于王為昭勇將軍都指揮使詹兆鵬等十二員為懐逺將軍署指揮同知他將皆殞陳于王蘇州衛百户以防浦功為守備詹兆鵬武舉首觸石死王希韓力戰本營士卒皆盡而死陸王猷武舉斬殺數多賊臠分其肉王𢎞猷劉河所百戸防六有功賊鋸齒㫁足罵不絶聲莫是驊唐世龍皆武舉王定逺鎮江衛千户周嘉方一月新婚力戰受刃少婦王氏絶粒亦死他若張全斌俞之䕫顧應宗蔣逵潘象謙季靖皆撫標同殉難先兩人為尤烈也應撫選吳材武良家子六千而成此軍一戰而盡聞難痛哭皖事愈不可為矣時老􅉰􅉰已病死衆推其妻掌營又分其支賊别名揺天動共八營二十餘萬結壘于桐城之練潭石井舗陶冲驛連延六十里捕得諜者云賊謀于潜山太湖度夏需秋涼英山諸賊畢㑹破桐城而犯揚州牟文綬本恊守鳳陵緣舒城急淮撫命監軍同知楊正苾要之援舒桐城非淮撫分地于舒城為脣齒文綬前驅至㑹皖兵大敗按臣張煊移書文綬請救閏四月十六日文綬偕劉良佐率馬步兵九千人抵桐城十八日與賊戰于掛車河戰皆克賊退尋以舒警行桐人遮道乞留牟鎮分二千人戍之乃去操江王道直疏曰臣于閏四月發把總閔洪舉胡長陽兵在皖城雄城嶺集賢闗長安嶺防守賊為牟帥戰于掛車河也謀犯樅陽鎮過江臣發兵守石牌江家嘴又親督標兵于長安嶺設伏賊登康皮山頭瞭望知江上有備由陸路遁去五月初十日賊過老鴉灘勢逼望江臣發兵守望江急水鎮埋伏于七里岡賊仍過老鴉灘西北遁去秦冦之踞富平闗山也綿亘三百里洪承疇率左光先曹變蛟副將張天福等合寧夏榆林固原各鎮兵前後捕斬要遮凶氣連沮而小紅狼鈔暴漢南止餘久戍川兵五千乗城賊衆力不敵餉道中梗斗米千錢諸將以雲棧險澁莫肯往承疇因賊破階州方提兵與戰大散闗弗及援漢中有詔譙責承疇部勒賀人龍之兵約輕齎由兩當往救是月四川地震者七地鳴者一初四日雅州十六日馬湖府新鎮叙州府建武廬州越巂衛皆大震二十九日葉縣地鳴蜀人工給事吳宇英言于朝曰臣鄉以詔書徴發救闗中者無已丁壯死于瘡痍老弱困于騷動以此城邑空虚闗梁不戒賊蹈瑕抵隙連陷南江通江二邑鎮臣侯良柱猶以賊遁為功易視賊占曰地震主兵又曰地鳴者伏尸流血灾不徒設臣切憂之五月總理王家禎令都司吴宣猷收殘卒三千人緣道督送租調抵皖成體士特以名救皖皖用左良玉為請家禎曰今楚賊佚而南江北之賊轉而東光羅商固信陽之間援兵登陴矣羅岱病金瘡卧付其兵孔道興駐内鄉車登科往伊陽捜瓦背餘孽鄭西之賊伏京索廣武山中即破浙川之賊伺隙逞豫主客兵止良玉兵五千道興兵二千若撤良玉梁鄭宛雒詎非朝廷之土其棄之也其願守便宜勿遣王家禎又奏勦冦獲級叛丁歸降有㫖左良玉劉洪起等復級授職余應桂以䕶顯陵有功超擢楚撫繼按楚者為御史徐之垣應桂之守獻陵也及二載捐贖鍰十餘萬金為養兵費至是既受畀全楚以獻陵至重復不遽諉之垣贖鍰又例歸按臣應桂費無所出而時事孔棘湖南北皆亂視前二載愈甚之垣非戡亂才應桂獨肩二任難于展措矣江賊吕痩子等煽動齊安興國大冶山中亡命遏絶行旅臨藍之賊入湘鄉以窺衡州黄州賊攻蘄水甚急知縣事龔鼎孳設守有方畧不能陷七月以史可法為安廬巡撫可法舉原任上海知縣劉暹為軍前賛畫割豫之光羅楚之黄梅廣濟𨽻之議者欲并轄江浦六合俾應撫耑守江毋牽制帝不許當是時樞臣楊嗣昌脩飾封事凡五次第上之請設兵十二萬措餉二百八十萬自闗陜以西江漢以北建牙之吏凡八各遮絶要害而河北三撫或犄或角舉數千里之地塹蹊坂鍵闗梁俾無蚍蜉螘子之隙而後逐賊其中禽掩而獸獮蹈藉焚刈之必盡陜西有闖過等賊大夥盤桓未能勦絶應使陜撫㫁商洛鄖撫㫁鄖襄楚撫㫁徳黄皖撫㫁英六鳳撫㫁潁亳而應撫之兵仍堵潜太江撫之兵仍堵梅濟而東撫之兵直詣徐宿晉撫之兵横絶陜靈保撫之兵飛渡延津一帶然後總理提邉兵監臣提禁旅楚豫撫提陳左等兵合勦中原為不盡不休之勢其措餉之道有四曰均糧主增曰溢地主覈曰驛地主裁曰事例主勸即家起傅淑訓為總督省直勦冦糧餉户部左侍郎得自請所用官吏以彊力敢行者充之分部郡邑不及額以乏興發論湖廣提學王永祚報開納之法大州縣十名小州縣五名淑訓稱其為天下先又奏賛理北直等處餉司官王揚基于本年十二月初六日抵池州到任此二人俱至巡撫帝為下詔告海内緣冦患不獲已暫累吾民一年帝諭允廷臣所議改因糧為均輸暫累吾民萬非得已嗣昌即請以十二月明年正月為師期勅疆吏無留賊重煩百姓貽主上憂賊雖熾不可殫盡聴嗣昌言若可滅帝亦忻然幸之曰非卿莫能辦之也嗣昌以王家禎不足任薦粤督熊文燦為總理文燦以六月杪聞召辦嚴過嶺未旦暮至家禎退為豫撫益厭玩専征矣左良玉耻皖人之怨已蜚語聞而鐫責及也急而求之堅不肯行皖賊東下襲六合川兵三百人設守無城知縣鄭同𤣥潰而走提督杜𢎞域不能救杜𢎞域營東葛賊従池河北趨安東襲六合川兵嘗㳺擊與賊遇于西門中流矢遂走賊攻天長與江南鍾山相值乗障者望北岸有火光聞礟聲知尚不下賊逼揚州揚大賈捐私財購竈丁及新舊官軍為四營賊分掠𤓰儀至僧道橋去揚僅一舍知有備乃北由坌澗破盱眙戕縣官回軍大紅山敺畜産入大營而去七月二十日賊破六合圍天長淮揚太監楊顯名遣把總王以寧守備程宏逺設法嚴防又揚州新舊四營官軍扎營半山堂賊由𤓰儀至僧道橋回馬横野山潘家丑而去八月豫士大夫劉之鳳熊奮渭等疏曰臣等以七月二十八日得河南撫臣所奏副封秦賊自潼闗入陜州以逼雒楚賊自鄖西圍淅川以逼宛江北之賊則自潁入上蔡以逼汝與開歸中州天下腹心逆徒四面而至一左帥恐不足捍蔽且醜徒萃于豫即地方急詎逾此而令往來奔命乎帝亦知其發蹤自良玉要朝廷以狥家禎請而豫患實棘不能有以難也洪承疇過隴設竒破賊漢中之圍始解瑞藩神宗皇帝子帝親叔父所封絶逺國被冦道不通賴將吏力戰得無恙大喜南鄭士民固守者命錄其勞饑戹者廪卹之皆所以優王賊遂轉入金牛道窺蜀㑹六合事聞帝特發禁旅勇衛營一萬二千人以内官劉元斌盧九徳副將孫應統之往江北與總理同討賊諭曰若等有不戢其下苦郡邑者悉論如律勿以禁旅故覬貸十月熊文燦至安慶所隨黔兵火攻手千人無騎上書請戰馬三千匹嗣昌用左良玉一軍𨽻焉王家禎罷以常道立巡撫河南御史張任學為巡按楚撫余應桂奏永州寳慶諸賊放崇陽獄入祚陽城兵給事鄒士楷疏稱河南賊犯茶陵逼江西之袁州鄱陽賊入都昌縣殺南昌通守甘肅零賊出沒河南巡撫湯道衡西寧總兵柴時華不能禁闗中大冦悉踰隴十月初三日破漢中之寧羗州寧羌者白馬氐羗境劉宋置東益州州北九十里陽平闗鍾㑹所由下蜀也今為驛其地有張魯城西北為七盤闗與百牢闗竝峙而近鳥道通蜀廣元之朝天嶺廣元古葭萌秦蜀所必爭地李自成混天星過天星等既入寧羌分其軍為三一由黄壩攻七盤一由梨樹口麥坪入廣元一由陽平過青岡坪土門塔向白水總兵侯良柱壁廣元死于陣初四日入闗于廣元烏龍山下結十七營初五日賊分兵守二郎闗初八日従淺灘過河破昭化知縣王時化死之湖廣乙酉解元贈尚寳丞初九日攻劒門州吏士塞石牛道不得過回屯江口初十日破劒州知州徐尚卿死之南平舉人贈𠫭議十二日破梓潼十四日又分其軍一往綿州一往鹽亭一往江油江油知縣馬𢎞源被執不死尋提問彰明安縣羅江徳陽漢州皆先賊至而潰諜告新都四門火鹽亭亦破温江縣丞簿縦繫囚而逃二十一日焚彭縣次日掠郫縣主簿張應竒死之贈按察司僉事次抄西充遂寧等縣趨潼川金堂縣典史潘夢科死之贈將仕郎其由江油入者徑薄成都重慶以下皆戒嚴矣是嵗也蜀先後中賊三而此舉創甚初蜀撫王維章以賊去而侯良柱撤隘口兵也相齟齬上書言之朝廷深以為憂維章守保寧良柱守廣元及廣元破良柱死良柱陣亡有屍無首後削去生前官職賊直逼成都而維章反在其下不及援按臣陳廷謨雖檄副總兵羅尚文集永遵松茂之兵來救自以使事訖新按臣梁士濟已至意可弛擔有詔維章良柱俱落職戴罪自贖廷謨降三級葢不知良柱之已死也時樞部専意清中原視西畧差緩當寧羗初破或傳賊以其半入蜀餘由漢興商雒以入楚豫主兵者方憂秦賊出闗亂勦局則以蜀事不足憂此劒外衡決始左支右詘懼本謀之弗騐欲委咎承疇而謂傅庭也才藉以搘梧川陜俾賊併力于西後可角中原取必勝然于時已十二月矣未覩所謂軍期也惟鄖撫陳良訓病且眊詭稱殺賊累萬騐問皆良民外史氏曰予讀武陵相所上封事而竊嘆其僣而無徴也其言曰合諸撫之力將皖桐襄漢之賊盡驅入豫大勦之以收底定夫賊剽疾猋涌鳥舉風發若諸撫可以驅之則所在皆足殄滅何必入豫賊豈芻狗與雉兔乎哉而任吾轢之道上逐之阹中然後加焚爇而施網罝也至于開採之説勢在必不可行帝英武有雄畧不幸所任非其人前之枋國者隂盭沉鷙其精神用之异同報復以排擠天下之賢能而已詭稱醇謹無他長惟奉唯諾治文書舉兵食大計聽主上自為之身無所闗其得失帝于是嘆羣臣為莫可仗最後乃得一武陵其才辨濶達大異乎質木闒茸者流而天子以為能每奏對輒移日所言皆聽拊几曰恨用卿晚迹其時天下已大亂新受帝倚任欲以補綻支壊䂓措良難然就大勢揆之曹變蛟敢戰有文詔之風左良玉雖䟦扈能用其衆不可謂之無將傅淑訓以新法徴調檄一下有司輸者數十萬不可謂之無糧秦督撫威名夙著有方面之勲史可法﨑嶇危疆空弮冒刃余應桂捐金養士功在獻陵不可謂之無才嗣昌由邉臣召見一月之間以知兵領天下他大僚拱手充位不敢復言誠于此時開誠心布長筭求主上寛假轡䇿相天下形勢之地設十數大鎮招募流移訓飭士馬以圖十年之耕戰即賊何患不平乃嗣昌計不出此持論専附㑹茍且倖成馬服君料其子括之必敗也曰兵危事也而括易言之夫易言不可況詐言之者乎秦穆公悔敗深戒截截善諞言又反覆于媢嫉有技之一个臣以為子孫黎民之殆君子重首禍毋専以此責嗣昌也附紀工科劉曰俊疏曰招安之失䇿乃回原籍三字誤之鄉里之人見賊非畏而不敢與居則羞而不肯與伍在彼亦面目難施輒悔而中敗臣在里中親見蝎子塊面訊諸賊情狀開口便以難回原籍為辭惟願在軍前立功又見鑚天鷂住居臣邑西闗極為安妥且屢資其力以保不虞由前規後信狡賊非戰與守所可辦也必叧設一法以賊攻賊以賊招賊推誠感格收拾解散之為便曰俊秦人其談賊情頗實後張獻忠住穀城羅汝才居房竹不回原籍曰俊實先發之終不若劉國能之立功軍前也爾朱榮之旣擒葛榮赦其脅従隨宜安挿百萬之衆一朝而散何嘗不回原籍所恃戰勝之氣有以致之耳熊文燦無専征才以至于敗豈招安誤之哉黄子威曰孝感以丁丑九月賊兵天眀突至攻甚急至午刻已將陷有喻勇士者従衆後奔而登城賊已露刄攀堞喻持一磚擊先登一賊與之俱墜而同斃餘賊退而城全後七年至癸未正月而後破孝感所以得偷安七年皆喻勇士力也河南府監紀推官湯開逺上言皇上于撫臣則用懲創一法于鎮臣則用優遇一法所少者分别之一法耳如撫臣竝失事也有怯縮不前有抗擅自命有兵食充而才力不及有才力濟而兵食艱難有在事而料事無聞有初任而綢繆不及有將士用命而調度失宜有布置已周而左右違指此可概以嚴譴置之乎武臣竝専閫也有紀律頗嚴有淫掠無忌有争先赴敵有觀望逗留有養士費財有朘削軍賜有計功索賞有虚級偽張此可概以寛假容之乎聖諭以諸臣中未始無才力乃寧甘褫革而不肯做不敢做為恨臣思其故其不肯做者則以做亦罪不做亦罪也其不敢做者則以不做之罪猶輕而做之罪更重也皇上宜與諸臣更始寛文法厚責成反覆于功罪之間必求其分别既已分别而不槩收亦分别而不槩棄則人心勸事功立疏聞奉嚴㫖責令回話開逺再奏疏云臣聞帝王磨厲天下止有賞罰然無分别之賞賞不足勸無分别之罰罰不足懲臣不敢漫引姑舉事闗辦冦者即秦晉本無賊而致有賊本可撲滅之賊而致成不可撲滅之賊如撫臣胡廷晏劉廣生仙克謹宋統殷許鼎臣數臣者何以當日處分視後皆極輕如練國事𤣥嘿承其極散掣肘之畫空拳之搏雖無救燎原其勤勞可錄何以處分較前更重臣歴數近日皇上為辦冦而誅督臣逮督臣者一逮撫臣褫撫臣者二按臣亦與竝論而并逮矣道府州縣則不可勝計試問前後在事諸帥臣有一誅且逮者乎不特帥臣即偏裨有一誅且逮者乎臣任中州再以中州一二事陳之按臣曾倜當舊撫艱去力障冦鋒捐贖八千金濟師料理防河苦心拮据值𤣥嘿蒞任覃懐方叱馭歸汝未嘗纎毫失事竟従逮配將來無肯做敢做之按臣矣道臣祝萬齡在河北經營兵食寢食俱廢疽發于背猶履戎行而致削籍將來無肯做敢做之司道矣宜陽令史𢎞謨冦従澠池突至偵備有素孤城得全聞今嵗之六安州之守本官之力獨多士民之公揭科臣入之叙疏坐令褫革將來無肯做敢做之州縣矣永寧鄉紳張論父子捐資募士夙夜登埤其子鼎延代父乞恩皇上即慎重名器何至并其子之官而奪之將來無肯做敢做之鄉紳矣臣伏讀明㫖謂失事處分俱經確核皇上所謂確核者以議處有銓部也議罪有法司也稽核糾舉有按臣也皇上試思下之銓部即議降議罰議革矣有執奏曰此不當以考功之法論者乎下之法司即議杖議配議遣矣有執奏曰此不當以司冦之法繩者乎至稽查糾劾在按臣不過舉失事奏聞有推原功中之罪與罪中之功將全局打筭及前後着數一一分晰為皇上告之者乎非諸臣之不肯為分别也知皇上一意重創言之必不聽且以甚諸臣之罪故不若不分别之為愈也開逺臨川人若士子有異才兩疏最為愷切既上帝怒錦衣逮治後釋為安滁備兵陳益吾與楊翠屏書云淅川為西南盡境豫鄖秦三省咽喉也必謙寘以兩營以其地非客兵所能久住兩營僅三千有奇又以宛中大疫將吏俱病賊乗虚以九營精騎奄至平昔所忌惟陳永福必欲取之永福與督陣㕘將江槱以二千之衆鏖戰八晝夜又值大雨兵士皆立深淖中火藥弓箭皆濕撤兵還淅少休伺隙夜搗其營賊狼狽入深山憤而并内鄉之賊數道竝進欲掩縣治永福先與錢繼功江槱入山分路伏隘奮鋭攻之遂報二十六日之捷其勞亦可錄矣必謙奬勵永福江槱二弁而優賞新降立功李虎李潮二賊以風示賊衆買運火藥鉛子火鎗弓箭連夜給發以濟淅軍之用此時理臺亦可抵淅必更有一番鼓舞妙用矣夫冦之入漢中也緣督臺以寧夏之變逺赴西陲得報遲而應着稍緩兵發而賊已入險遂不及禦比督臺飛書請兵必謙亟與理臺議發祖寛李重鎮入闗協勦葢一以應秦中之急一以省豫中之餉也祖兵前在鄖中歸思已自揺揺入秦非其志也理臺為之疏敘將領戰功而兵卒亦稍有捍網理臺欲有所施行且適聞三原遼兵之變聚謀洶洶幾致不測理行後必謙多方告誡始得成行而延賊闖將過天星等數萬突至朝邑逼近潼闗以渭河水深不得過而秦兵左右攔之遂登黄鹿山今祖李兵西入甚為合宜左良玉并管三營兵馬衆共七千有竒而驕惰玩敵理臺汰去十之三以羅岱替李三才孔道興替趙柱各管一營令孔道興駐靈寳以備雒西左羅駐宜永以備雒東而祖大樂營兵分駐雒汝就餉并備内淅逗出嵩廬之賊此宛雒賊情兵勢之大概也然豫中事有大可憂者三其一為舞陽葉縣裕州土冦舞賊楊四并糾西遂羣賊四出焚掠此時亟宜一大創之欲用客兵則驕不聽使且舞裕苦無供億而主兵盡堵淅川餘俱寥寥不能辦賊此可憂者一也因糧輸餉與内庫折色本省僅得三萬有竒部咨以抵透用新餉尚且不敷其省直捐輸奉㫖盡解督理軍前與必謙分毫無涉而九年新餉奉㫖不許那用違者重處大兵雲屯雒宛本折日費千金各屬庫橐如洗以思歸之士借缺餉之名一朝決裂為禍甚大此可憂者二也祖大樂祖寛兩營兵將雖為民間所苦亦為賊中所畏然其勢必不能久留王周二營已再噪矣李重鎮既非將材兵亦難馭其隨左兵求歸情勢必然則今冬實實留豫中堵勦之兵除主兵外只此左羅孔三營耳左弁積為賊所輕其兵亦引賊之媒也羅孔新入營尚未整頓倘秦鄖大冦潰決而來何以禦之此可憂者三也又與王總理軒籙書云豫人與某望公如望嵗矣此時宛雒俱有冦而雒嵩間勢輕左良玉得小捷而羅岱亦在新澠間可以無虞宛賊初有老􅉰􅉰整齊王混十萬張四賀雙泉等大小七營隴張四一股為土賊殱之幾盡而老􅉰􅉰等以其親督諸將東西夾勦連摧之于神道唐河大石橋後坡敗奔入淅川大小老􅉰􅉰整齊王等六營糾漢中新到西營八大王渡江合勢突走鄧唐入楚必謙發陳永福孔道興江槱等追襲之棗陽城下城將破矣救至獲全其時左羅尚在内鄉支抵混十萬與漢中新到蛤蜊圓黑蝎子于大山亦薄斬獲而雒嵩告警故亟遣歸捜勦左羅去而混十萬等又猝従深山逗出過馬口山下鎮平必謙亟遣陳永福等往鎮平以禦之永福以功不得陞内懐怏怏故獨樹後坡棗陽之戰不肯盡力止推孔道興當先其兵向來頗有紀律比來沿途甚擾有白秋搶集之事比従南陽發往鎮平以前二事詰之䟦扈自如一抵鎮平髙坐闗廂縱兵肆掠既不入山又不發撥混十萬馳騎攻西闗孔道興竭力堵禦陳江二營不出應接孔弁因此箭傷頗重初時永福與錢繼功以二千孤旅與老􅉰􅉰混十萬等大小七營鏖戰月餘而三捷者將氣鋭也今賊已去大半又增孔弁一營意氣稍阻不肯一矢相加遺矣左鎮以五六七月間整頓兵馬大有氣色故混十萬稍忌憚之羅岱亦戰將也而羅漢白河兩捷頗有殺良之議然其材未可輕棄逆冦雖有數十股其中兵精權譎者惟闖賊翁臺宜聚天下兵馬専勦闖王一股闖滅則羣冦喪膽自可次第削平耳此時髙迎祥巳擒其言闖賊指李自成也汝南土冦楊四郭三海最横楊四所倚為心腹爪牙者劉恩恩之驍悍倍于楊四而楊四弟楊五楊六頗與恩為讐大梁巡道中軍尹先民赴郾必謙語以従中用間若搆楊五楊六殺劉恩以去楊四手足則兇熖滅而内離矣又與舊按臺金天樞書言中州主客官兵左良玉兵雖加整而恇怯自如每道㕔二官苦求發兵單騎先行良玉不得已而隨之昨賊在郟良玉在雒以九月初四日尚置酒髙㑹至初七日發兵十五日始移營賊已先一日西去矣大石橋之役夜半乗賊零般而襲之既追及混十萬賊挑精鋭鏖鬬良玉無能難也其所領官兵三千馬一千猶僅如此至必謙所領陳永福外孔道興一千五百係趙柱舊管與羅岱所領朱三才二營皆積年打敗仗者營中好馬僅數十匹盡被趙柱盜去必謙多方設處二百匹而令二弁汰弱卒選壯丁漸補每人非二十金不可欲借五千金與之無一應者至新勇營官兵千餘即陳治邦先年敗兵暫付與督陣𠫭將江槱署管馬僅三十一匹其何以戰綏冦紀畧卷五
