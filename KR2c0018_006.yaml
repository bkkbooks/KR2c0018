body:
  text: 綏冦紀略卷六國子監祭酒吳偉業撰穀房變熊文燦黔之瀘州人五溪好役屬獠丁峒户故自詡知兵既貴僑楚之蘄水其督兩廣也以閩海招撫功即其術用之粵冦劉香而惠州三道員受紿被執䇿不效矣無何香死得褒賞益重嶺表稱富實而熊官南方久珠璣荃葛孔雀犀象日餉遺權貴人冀長制交廣弗徴曰吾為督撫幸效朱公朱公者川湖督燮元十年卧護西南彛者也帝初疑劉香不死且不識文燦何如人遣某璫名廣西採辦藥材往觀之璫至熊厚筐篚盛帳且留飲十日璫喜語次微及中原冦亂咄嗟無人為朝廷盡力熊時有酒擊案罵曰此行間諸臣誤國耳若文燦往詎令賊至是乎璫起立曰某非往廣西採辦者也銜上㫖觀公公信有當世具非公不足了此事某請復命召且旦暮至公宜思辦冦速裝熊殊不意悔失言隨設五難四不可規自脫璫笑曰此數事某見上立請之若主上通行無所吝者即公亦不得謝矣熊詞窮勉而應曰諾後特設督餉侍郎及奏事機速不關銀臺司皆此璫本謀也熊之僑蘄水與禮侍郎姚明恭為姻婭大司馬楊嗣昌新得帝意懼討賊規引一人以自解姚附嗣昌為相知帝所重者兵事兼欲倚熊以就功名言之楊曰此有內援可薦遂奏用焉熊得詔先請左良玉所將六千人為己軍而盛募粵人及烏蠻精習火器者一二千以自護弓刀鎧仗甚整九月辧嚴過嶺道廬山謁所善空隱和尚和尚迎謂之曰公誤矣熊愕眙屏人問狀和尚曰公自度所將兵足以制賊死命乎曰不能也然則諸將有可屬大事當一面不煩指揮而定者乎曰亦未知何如也公於此二者既不能當賊而上特以名使公厚責望且急其月日一不效恐禍及身矣熊却立良久曰吾欲撫之何如和尚曰吾固知公䇿必出於撫撫之誠善顧流冦非劉香比慎之熊長跽佛前曰得無恙願以餘年入道請留山中十日諸將不可既行鄱湖西有流星如火甕赤光燭水風作船桅折軍資士伍多漂沒占不利左良玉宿將専進止提空名奉節制其下與粵兵不和詬曰制府自有親軍安所用吾輩殺賊熊不得已托以南人不能水土遣之止留帳下兒五十餘人而左軍實不為之用嗣昌言之帝帝以馮舉苗有才之邉兵五千人屬之文燦氣稍振嗣昌倡四正六隅之說以討賊也謂鄖襄綰要害請撤鄖撫以總理兼之敇書既行而皖冦急用形勢駐總理於皖於鄖撫又議留奏請前後抵牾兵都給事凌義渠駁之曰鄖撫在文燦必不可兼陳良訓必不可不罷宜改總理敕書選賢能以速鎮之可也帝允其言用戴東旻為鄖撫於是駐皖之論定而劉元斌盧九德以禁軍至𤾂文燦之受事也神志惝恍自失疏言兵事宜知彼已馮舉苗有才之五千人力不敵再請邉兵且以清野困賊語尤鄙曰臣至蘄黃見被賊近一嵗而野有雞鶩倉有稻粱沿江饒給盜之招也若盡遷民與粟閉之城中俾賊無所掠當自退中朝見者無不姍笑即嗣昌亦建議非之帝覽其奏怒曰文燦特簡受事師期將踰不能一有所出請邉兵需發而後往是玩冦也命戴罪嗣昌力引救豫以前調真保山西之兵各三千人示不逆所請又以順帝意弗再動邉兵為兩善而劉盧兩中官所將禁旅數有功十年十二月之戰斬級千有七百十一年正月二十九日舞陽大破賊總兵黃得功敢戰鏖光固間四日三敗之得級二千九百有竒有㫖敘賚文燦未嘗不在行欲引之為已績帝意顧弗許時天下設三制府以討賊朱大典熊文燦皆有中人共事善候伺當寧意便奏請大司馬以聲勢相倚仗獨洪承疇去京師逺無援積勞久忠信自結於帝又能得秦士大夫心廷論多歸之秦冦蹂蜀蜀撫王維章不能禦陷三十六州縣圍成都二十日蜀王之墳柏刋輔臣劉宇亮宗人殱於綿竹告家難帝逮治王維章以滇中傅宗龍代之宗龍道逺而蜀帥羅尚文新受事蜀士大夫遼濶萬里憂家交口怨承疇縱賊詞臣馬之驊南道御史劉希伯力以為言楚蜀相比而嗣昌方尊任文燦為可任蜀士大夫抑承疇者即所以右熊主嗣昌也秦撫孫傅庭頗自許雄略嫌制府愛惜百姓為小仁未能定兵食大計於所上封事微及其端秦士大夫終以洪為歸傅庭所爭者國事公忠一體兩人初不知所為齟齬而嗣昌以為得傅庭以支西冦則承疇可得而排也言於帝曰今臺諫責臣不易置朱大典而疑熊文燦為不足任大典雖前失五縣念有護陵功即欲更用視中外諸臣誰可者文燦在事甫三月洪承疇七年不效論者繩文燦顧急而承疇縱冦宜有舉劾莫肯一言孫傅庭近有疏摘其釁瑕且屢為臣道之矣惟上裁察其時蜀冦復由徽階以返秦嗣昌意帝必譴承疇即文燦以新受事可無罪軍期幸以寬帝知承疇久勞非文燦粗疏者比又熊為嗣昌所薦逆探其情左右之傾他人隂為之地變色曰督理二臣俱責成及時辦賊奈何以久近藉之口乎人以此服帝明聖為不可測矣當是時豫楚之賊有十五家其後劉國能闖塌天張獻忠降改稱十三家馬進忠混十萬馬光玉老􅉰􅉰李萬慶射塌天羅汝才曹操惠登相過天星賀一龍革里眼藺養成左金王及順天順義王九家者尤著順天死順義為劉喜才所殺餘衆推許可變改世王主之又有胡可受安世王者與萬慶可變同降羅汝才之分九營汝才與一丈青小秦王一條龍為鄖縣四營惠登相與王國寧常國安楊友賢王光恩為均州五營其馬士秀杜應金者不知其所從起皆出自十三家者也文燦刋招撫之令懸之通都曰心示諭告諸家賊待以不死十一年正月初四日劉國能於隨州降二月十二日馬士秀杜應金夜半於信陽城下降張獻忠者少從軍𨽻總兵王威犯法當刑陳洪範以别將謁威獻忠等輩十八人已解衣伏斧鑕見陳仰而乞命洪範為之請威曰是犯淫掠者三不可赦獻忠縛最後年少修幹魁碩洪範目而竒之曰若必不可原者請特貰此兒威笑而頷之曰諾十七人者伏法獻忠鞭一百免亡而歸關中為羣盜獻忠天性凶黠然追思舊恩每飯必祝之數語其下曰陳總兵活我洪範不之知也洪範宿將功名在遵永登萊間中廢夤緣中人復起始與左良玉同討賊年老矣會獻忠新敗豫將羅岱射之中額其下大饑多散去知官軍中有陳將軍喜曰此豈吾故人耶詗之良是乃飾名姝賫美珠文幣以進曰獻忠向䝉公一言以免有大恩不及報公豈遂忘之耶今遇於此天也願率所部降隨馬足自效洪範故欲建大功聞之大喜言於文燦承制命監軍道張大經受其降巡按御史林銘球分巡道王瑞旃謀於左良玉謀獻忠至而執之文燦固以為不可獻忠時已入穀城據邑以請分屯羣賊四郊文燦命簡精兵二萬給餉餘散遣之獻忠言部曲皆壯士願舉軍從請十萬人餉文燦逡巡不敢決三月帝以御史張任學為河南總兵任學蜀人粗疏寡學術好以其官為矜倨朝士多羞之勿與交為御史按江北在兵間罕所條畫移按河南盜燒崇王墳園方切責上書極言諸總兵不足仗文吏中有知兵可使者其語率夸誕妄以此嘗帝意希節鉞帝乃即用以為總兵大沮悔在祖宗朝文武兩用帝嫌公卿不任戎馬特假之以更制易俗顧任學非其人為御史且不稱安所得大將材徒以解武夫之體為賊所笑楊嗣昌請用劉光祚兵屬之帝改用羅岱為任學親軍是月也熒惑犯月安民厰火秦撫奏西安大風霾黑氣屬於天兵刃出火焰聽之有聲羅山光山塢壁數十民入保者纍十萬馬進忠惠登相羅汝才等五家賊摧破之無所遺盤踞息縣長陵光州磔人而投之汝水水為赤賊馬光玉等於黃安之大霧山多張旗􅀈呼聲震原野麻城蘄州隨州信陽間合境糜爛僵尸相屬兵侍郎李若星初入朝為帝言之理撫昵而與中官比巧避文法噤不以聞四月嗣昌為剿限踰期上書言奉職無狀益窺帝意在不次用人薦職方郎趙光忭以自代帝慰勞中樞委以察行間諸臣功罪嗣昌分别奏曰總督洪承疇専辦秦賊者也賊自秦入蜀數十萬出蜀數萬左光先曹變蛟所擒斬僅五百有竒賊之損耗蜀人功非秦將士力也承疇云賊畏秦兵聞兵至即遁而出蜀夫賊茍畏秦當秦兵之入涪萬松雅可以東西奔竄何遂趨江油龍安北逆秦軍而與之偕出此謂之畏乎否耶故無功有罪者承疇是也總理熊文燦兼辦豫楚江淮之賊者也自安慶出師一月不奏功軍書稽緩臣因請㫖督責比舞陽光山二捷斬馘以數千劉國能張獻忠衆最強能奉國威靈俾就戎索漸以招納其餘豫楚事殆可就故有功無罪者文燦是也嗣昌毁譽恣意語失持平且以常道立為首功引朱大典與承疇同過而特寬之謂出承疇上白黑無所别即帝亦知之特以秦蜀事應有責成不得已用其章鐫承疇尚書宫保曹左二將各奪五官仍討賊而工給事吳宇英從而盛毁之曰陛下用一張任學天下知勸處一洪承疇天下知懲其傅會如此賊在秦蜀界者李自成為強其次一斗粟一座城一連鶯及八隊六隊諸賊洪承疇由階文返轡逐之前驅至禮縣覘者曰賊由松潘走臨洮鞏昌乃引而西窮馬力追之賊已出長城入西羌界曹變蛟率張天祿賈呈芳大戰於羌中左右搏擊不解甲者二十七晝夜賊還入塞變蛟再大戰於洮河方騎置入奏而孫傅庭以賊零隊東犯慶陽突寶雞徴商雒之兵不至有急書聞兵都給中姚思孝素知承疇者也亦言西安根本洪以戰洮河誤之疑非䇿五月祖大弼報斬及降者計數千秦督捷書踵至帝曰吾固知承疇往洮河非避賊今果有桑榆收宜益自效六月楊嗣昌晉東閣大學士仍典中樞召吳甡為兵侍郎以御史徐一范為河南巡按太監劉元斌盧九德報遂平解圍斬獲三千餘人秦冦由陽平白水再入蜀蜀撫傅宗龍以滇兵二千人與蜀帥羅尚文謀戰守秦蜀不相責望嗣昌毁不行楚撫余應桂者伉直人也雅自負顯陵功不肯絀節隨文燦委曲劉國能張獻忠之降皆在其地嗣昌心雖不合陽交厚之既與文燦議相左恐其撓成局㑹茶山合擊賊之佚而出者在楚部分文燦坐應桂以後期誤軍帝雅知應桂其信之不能如承疇嗣昌又從中驗正其罪竟下吏以南尚寶卿方孔照代之馬進忠羅汝才十三家之賊聚南陽文燦與監撫集議裕州専意招撫下令民殺一賊者償死賊不肯弭服者齎牲酒金帛隨之其撫也名曰求賊賊蹂豫界者甚於楚勿效姚思孝好面觸嗣昌等言於帝曰賊入楚則參楚撫以卸罪賊入豫則聽豫撫以叙功可乎張獻忠與劉國能有隙國能之降也頓首曰愚民陷不義䝉明府湔拭更生願悉其衆上幕府軍簿身入麾下盡死力獻忠怙強竊邑不肯放兵曰豫我十萬人餉為鄖襄荆三郡扞圉長保無警可也獻忠險而狡制府檄至捧手再拜見使者噫嗚流涕誓捐糜文燦及林銘球皆信之為請銜開餉得報許文燦即以六月餉給之獻忠具軍狀備調遣既而命推官程九萬等調其兵檄之者三不應余應桂坦中而疏先是言於文燦曰獻忠惡已有端可先未發擒也有漏言者獻忠知之公移文鄖撫東旻肆其桀驁曰公等疑我以余書為徴語甚悖文燦以之再糾應桂且曰南中人譁傳獻忠反如應桂等倡流言挑搆奈國事何帝乃下其書於刑部并按之文燦知帝將以安新附於應桂必重論而獻忠桀黠終慮反覆此書可以歸獄事成則已收其功不成則彼開其釁朝士浸寃應桂而謂文燦已甚嗟乎陷人以自免適趨禍耳七月豫撫常道立報功不以實帝命巡按御史徐一范核其事道立持軍不整饋遺供頓邑索千金久駐襄城陽言遮捍睢許實貪其無賊㑹議裕州潜師唐泌間待賊入桐柏山而後動賊有殿軍未盡候者傳曰賊至懼而顛左右掖之始上奔避民舍兩齒相擊陳永福曰無恐命嚴陳以待賊果不犯乃定初本依總理以持祿既憂撫局必敗後且并坐欲先事微見異同張虛捷以誑耀於帝自明有意殺賊於理臣所䇿不甚附大司馬惡之即令劉盧中官案劾而臺諫因發其所報首功及月日不相中禮給事中解學尹推舉隱情曰臣知道立之始也以畏賊之心轉而畏罪繼也以貪財之念不免貪功又曰理臣以一隙之疏委咎於楚撫豫撫以全局之壞歸怨於理臣此人臣不忠之計欲以免後責逃餘咎無同心并力為國立效之意帝以道立駑下如此何以得用命推求舉者嗣昌前兩月特奏其功疏在御前不能有以對也先是帝見文燦為人多易敢大言而無實遣刺事者詗之具得其狀下詔書譙讓之曰三軍所重惟威與斷熊文燦事權在握諸將多逗遛養冦郡縣之被賊者相與隱匿不言不能嚴賞罰行刺舉在軍中徒盛氣謾罵恣睢浮淺何以御人且進止機宜輕言寡斷軍之所大忌也如不懲改欲以身試法耶帝於秦督用璽書封蜀人所上章示之并以諭曹左二帥曰廷臣言秦將吏失亡多皆有狀朕以行間暴露良苦姑貰其罪今洪承疇五月不能平賊展期一年一年者謂今冬耶抑何時也詔書恩貸不可數得宜速以時進兵兩人得讓皆悚懼八月承疇與傅庭并兵逐賊大戰於申宜者移日尋遇賊邠寧間身自陷陳獲其渠皆俘之餘黨尚盛豫賊馬進忠馬光玉驅宛雒之衆將其輜重箕張而西叩關思入關吏傳遞曰賊來甚衆將士或失色傅庭按劒怒曰逆徒自來送死可勿擊耶乃辭承疇東出關嚴陳以待賊狃於便利驟見大軍而驚恃其衆前鬬傅庭麾士擊之賊拔營還走傅庭意豫撫必移軍犄角而理臣偕鄖楚二撫或營其前或絶其後則我之取混􅉰可以百全既久期不至而秦將士亦疲乃收其卒傳諭商雒朱陽蘭草諸隘無令得入而已科臣李清李希伉御史羅起鳳皆以尤文燦及道立坐失事㑹而豫士劉之鳳等力言招撫非䇿帝亦見關中兩臣剿撫有成畫文燦絶非其比矣九月熊文燦次於襄陽賊分踞鄖襄諸險諸將晨請曰數月來招撫不決今將吏憤踴致命肯令秦人獨擅其功耶文燦謀分其兵乘便掩襲盧九德曰不然兵分則力薄一處失利全軍必搖莫若厚集一路并力擊之勝則餘衆瓦解矣衆曰善乃以道臣張大經貴州舉人武昌同知以盧象升監紀升任監左良玉陳洪範之軍通判孔貞㑹監滇兵副將龍在田之軍擊賊於雙溝營大破之斬首二千餘級初盧象升調龍在田之兵以剿賊於九年九月內至襄而象升以入援行鄖撫陳良訓請收之尋奉㫖屬之文燦數有功因禁旅至襄親病懇求還里帝不許賊羅汝才率其衆九營去之均州李萬慶率其黨三人逸於光固自文燦出師以來雙溝之捷為第一其後汝才萬慶降獻忠不遽叛皆此捷有以持之也十月洪承疇謀於傅庭曰自吾與賊戰於羌中戰於洮河比再遣馬科賀人龍追之於陽平白水李自成勢窮蹙必奔潼關公能於其地設為三覆以待俾吾蹙而致之可一戰擒也傅庭乃於潼關原依邱阜蔽林木每五十里而立一營曹變蛟躬執長刀驅賊賊奔入伏中亂相蹈藉我軍驍雄跳蕩無不一當百飛走路絶遂無所逃其幸免者或棄刀與騎迸逸漢南之山中村塢山民又預奉督撫教令用白棓遮險遇輒棒殺秦賊遂盡降者猶數十萬委仗如邱陵或分𨽻鎮將或散歸農畝李自成妻女俱失從七人遁走是時曹兵最強各鎮兵皆依之以為固賊聞曹將軍至即破膽不敢復進變蛟每戰輒數日不食與下同其甘苦又能收降人為之用嘗得李自成中軍周山厚遇之倚為親信臨陳山必以身當賊曰我在若何敢為即錯愕散去初奉帝手敕副將張天祿賈呈芳言於變蛟曰上督吾曹切今秦賊有八吾輩任其三衆帥任其五庶功罪有分曷不告之督師變蛟曰賊不出三月盡矣安用告為已潼關原一戰遂奏蕩平計期尚在兩月諸將以此皆服是月也總督剿餉傅淑訓謝事即家起張伯鯨為户部侍郎代之十一月京師有急帝召孫傳庭洪承疇入援而羅汝才懼於雙溝之敗率九營賊從鄖陽淺渚亂流而渡叩太和山提督太監李繼政求撫繼政移咨總理文燦許之文燦疏言臣於射革順􅉰四股主剿其餘九股主撫今汝才輸誠已真請赦罪授遊擊將軍從征備調得㫖允行汝才猶豫不決房縣知縣郝景春單騎至其營與汝才及其下白貴黑雲祥唼血盟明日汝才率所部詣軍門降文燦令諸將宴之牲牢􅟿糒甚設汝才分保房竹上保四邑文燦檄之從軍立功汝才言不願為官并無所事餉願為百姓受山田以耕穀城張獻忠與汝才遙為聲援獻忠部賊時出野外行掠知縣執之以告其營將始猶少置之法既而掠愈甚阮之鈿往告皆不聽且曰上司不給餉借餐耳得餉自止由是村民逃徙盡遂略及闤闠稍拒吝迎刃相向殺數十餘人一城為囂鄖撫戴東旻奏曰羅汝才詭占屯部未嘗放兵作田此帶刀以耘一有勾稽即挺而起耳張獻忠據邑弄兵其人豺狼難與久處不過謀分居民東作飽食休甲以伺吾釁若兩部俱動荆襄之禍不知所終矣以臣愚計之賊散則難追合則易殄今猶檻羊阱獸圍聚於二三百里之中幸命理臣率鄢郢之卒督臣掃關隴之兵乘其不意銜枚疾至打張燕於黑山燒曹操於赤壁豈不快哉時孫傅庭已升兵部添設侍郎聞其至真定即用之代張其平駐尋加副都御史賜尚方劒提督援兵而洪承疇率陕西總兵左光先臨洮總兵曹變蛟兼程入援劉元斌盧九德禁旅北歸朝廷知文燦獨力不能平冦遂詘其謀勿用十二月帝以陕西左布政丁啓睿為右僉都御史巡撫陕西豫撫常道立調左良玉於陕州賊乘盧氏虛遁入內淅熊文燦糾之帝命御史徐一范核實定罪是月也賊馬進忠等營於信陽之龍井店蘄水之六廟柴家河松山馬光玉等營於蘄黃羅田之交境曰三里坂口詭乞降以其間破滴水巖楊家寨二十四日河南許州兵變初馬士秀杜應金降左良玉以其衆八千人命知許州董夢蘭處之郊許大州也左寄孥與賄諸將財物多在焉左久征不歸士秀應金在軍中僞請急其日傳左軍號入城夜半兵從府第出燒南城樓劫庫殺職官數人挈其資投李萬慶董夢蘭逃以免三十日李萬慶營於麻城之東義河十二年己卯正月朔李萬慶於信陽之遊河與官軍決鬬初六監軍武昌道袁繼咸率辰營兵擊馬光玉等於白雲寨却之初十日李萬慶營於應山之四望山黑山寺翼日移於德安之千石畋馬光玉營於黃陂之木蘭山柏木港楚撫方孔照率官軍分道逐賊十七日馬光玉等在信陽州營於北欄杆店又西移平昌關瓦營官軍與戰勝之十九日帝命洪承疇總督薊遼孫傅庭總督保定山東河北俱原官編修張縉彥改授兵科都給事中二十五日豫撫常道立革任二十九日以寧夏巡撫鄭崇儉為兵部右侍郎總督陕西三邉山西參政李仙風為河南巡撫二月楚撫方孔照提兵逐賊於木蘭山大破之以陕西按察使樊一蘅為寧夏巡撫總兵左良玉率新附劉國能入援至真定詔賜良玉銀三十兩還師河南討賊以御史王倓按陕西髙名衡按河南保督孫傅庭初入援獨先至不得朝京師坐軍事得公譴至是忤中官降㫖切責洪承疇在道軍多逃以是月二十九日始抵三河有詔逆勞左光先以下三軍人有賞而命承疇來陛見傅庭怏怏滋不悅左良玉援兵過壩頭吳橋大掠太監盧九德疏其罪帝以干軍紀大怒令戴罪務擒首惡正法三月帝念劉國能從征立效手詔諭兵部豫以官其下有功者分别升授張獻忠能率衆圖功者視此督餉侍郎張伯鯨以冦漸平餉重請汰兵詔弗允張任學同其中軍羅岱以下官報八戰八克任學不知兵假小利塞咎尋以岱失事貶秩帝召嗣昌問曰卿以陕撫丁啓睿何如人嗣昌曰秦督撫承疇傅庭與之共事久皆稱其才必可用帝頷之因進曰知人實難鄖撫戴東旻前在河南監左良玉軍為著節勞臣今撫鄖功效不進帝曰苟知其不可宜核之因諭誰可任保督者時孫傅庭以病請忤帝意思易之矣嗣昌曰傅庭材可惜雖有罪宜激使自贖今易傅庭難其人洪承疇於二十九日召見亦以傅庭請帝默然史可法丁父憂戴東旻解任以淮陽道鄭二陽為皖撫監軍道王鰲永為鄖撫户侍郎許世藎乏興與其屬俱下吏械繫之河南盧氏舉人牛金星以不法事論戍邉金星通賊有跡主者鬻獄故減死是月也滇營副將龍在田大破賊於固始獲級三千五百信陽道宋一鶴置堇毒誘賊賊中而死者千人總兵左良玉破賊馬進忠於鎮平關進忠降良玉同副將劉國能再破賊李萬慶於張家林七里河萬慶降賊順義王為其下所殺先是汝南道言射賊李萬慶西行熊文燦檄左良玉移軍新野由郭灘趨南陽賊保唐縣姚梁相拒我兵分為三金聲桓白我志傅定邦居左李佑何日德何大傑陳光裕居右王修政許謙亨寧崇節居中左翼迎頭截擊賊敗突入三山追奔五十里王修政武力絶人將中軍乘勝趨利挾雙矛躍丈五溝馬足陷於淖羣賊攢槊刺之傷於胸墜猶手刃數十人乃殪賊狡每乘官軍之勝徼極而擊之謂之打倒翻官軍不知墮其計修政一軍殱焉文燦收二營卒而止再檄良玉蹙賊至內鄉賊在赤眉城四平岡依山結壘願言率服良玉謀之文燦恐其為誘兵乃調豫將陳永福羅岱齊將金聲桓發鄧州歷南陽會於賈宋副將劉國能並進由張家林七里河分擊賊賊奔遣國能二十騎往偵且諭之李萬慶以五十騎馳而下我兵抽矢注欲發賊下馬拜見國能而言情遣其副朱國強見左口陳欲歸命久有于汝虎者故許州叛黨恐見誅倡異惑衆願縛之以為信二十三日反接汝虎降而處於內鄉城下者四千人初諸賊自潼關為孫傅庭所挫混賊馬進忠稍衰止推射革順􅉰四部而射為尤徑既進忠與萬慶相繼服馬士秀杜應金之反於許州者再自歸諸營轉相恐動有劉喜才者乃夜取順義王之首歸於信陽道宋一鶴餘黨推許可變主其衆文燦疏言臣兵威震懾降者接踵十三家之賊惟革左及馬光玉三部未伏厥辜可嵗月破也五月帝以四川參政邵捷春撫蜀蜀故撫傅宗龍召入為兵部尚書而楊嗣昌解樞務還內閣佐理嗣昌揚揚德色以薦文燦為知人一時公卿且謂天下無賊無何張獻忠於穀城反獻忠之初入穀城也新野丁舉人之妹婚於河南在塗為獻忠所得而生子獻忠即邑紳松江守方嶽貢之虛第以頓其孥方為守有清名獻忠移書謂之曰使人人不愛錢如公獻忠何自作賊丁舉人入與相見理撫厚遇之結獻忠心有瞽者王又天善星學監軍道張大經客也文燦檄大經入穀城為監護以又天從獻忠取已與其子干支示之又天再拜賀屏人請曰此貴不可言獻忠輒心動穀城舉人王秉真者恢竒士出入軍府無禁諸生徐以顯者隂譎無賴進獻忠以孫吳兵法造三眼鎗狼牙棒埋伏連弩團營方陳左右營諸法在穀城二年操演賊僣號用為左丞相獻忠大歡樂之頗用其計謀穀城城下有河漢沔所滙處獻忠立關梁徴其稅月辜校數千金陳洪範軍士獲義武營關防於草中請即以給獻忠兵都給事張縉彥持不可於是獻忠益驕要挾無厭知穀城事阮之鈿風以禍福曰公獨不見劉將軍乎此赤誠之效也之鈿雖不肖上書以百口保公朝廷宣騰詔書待公以不死挽車奉餉絡繹在道有何疑忌而復自蹈不義耶獻忠積猜恨醜言詈罵之鈿憂憤成疾題壁云讀盡聖賢書籍成此浩然心性勉哉殺身成仁無負賢良方正之鈿起家薦舉蓋自知不免云末書穀邑小臣阮之鈿拜闕恭辭自是不出視事五月初六日獻忠毁城劫庫放囚之鈿飲鴆未絶賊令馬元利索印之鈿搖手不與旁兩賊揮刀刃之之鈿死家人出印賊縱火焚衙舍之鈿骸骨為燼陳洪範所遣將馬廷寶徐起祚助防穀城者獻忠脅之去文燦密疏聞張縉彥駁之曰張獻忠包藏禍心無愚智皆知之文燦受賊紿弄日為之請頒階開賞而於殺人越貨之跡巧辭匿飾有發覺其謀者屏弗使聞令賊一逞其哮闞之鋒斬關喋血竄入巢穴之中為總理者宜自庸及濮分兵追捕比見御前所下密奏至謂獻忠鈔奪咨怨理臣之任事不力必如張大經請月餼之粟以饜其貪是可從乎不可從乎乃若攻州奪郡之雄而曰漏刃破膽奔山騰谷之勢而曰鼠竄路窮擁強兵負異志而曰反形未露不便先圖屠名城殺官吏而曰假命須臾無難縛取恢飾不倫欺朦已甚臣不能為理臣解也帝乃盡削文燦所領官冠帶辦賊自贖嗣昌疏言國家改置重臣兵餉必從新區畫方當左支右吾萬難更始故就見局責成不意竟負委任深以不早易總理為己罪而獻忠之出穀城也攻房縣甚急鄖屬四城灌莽獨房縣以才令郝景春召民收保山城粗完羅汝才依之以解甲耕屯為觀望獻忠曰吾必約汝才同反然房不破汝才反不決也景春子諸生鳴鸞力萬人敵聞穀城變謂其父曰吾城當賊衝羸卒二百何以守擐甲過汝才營曰君不念香火盟乎毋從亂汝才唯唯鳴鸞見其目動曰此不可信歸而與守備楊道選授兵登陴先斬賊前驅上天龍於城下遣間使縋城求援於文燦凡十四往不報五月二十五日獻忠騎大至守者乘堙瞰見獻忠兵白幟汝才兵赤幟俄白與赤交馬語白乃麾其衆分之一從北繞而西攻西城一從東繞而南攻南城曹營白貴黑雲祥䇿馬呼曰但以城讓我曹者開門相見保無他也獻忠又以張大經檄諭降景春怒罵之勿應鳴鸞且戰且守相持五日夜發大炮下礧石擊賊多死賊負板穴城城將崩鳴鸞積薪爇鑊油下灌之斃又擊獻忠傷左足殺其所愛馬兵民益奮景春用間入賊壁隂識獻忠所卧帳密計夜襲擒之鄖陽衛指揮張三錫者文燦向所遣以處分降衆者也宿與汝才通三錫守北門汝才之舊屯在其外二十九日汝才遣人揚徽而譟曰南城陷矣守者驚潰三錫開門揖汝才入城陷張大經欲得景春分其惡使汝才說景春降不應獻忠問曰倉庫銀米安在大叱曰死賊倉庫有物城豈為汝陷乎賊怒殺宋典史又殺一守備欲以懼景春不為動與其子鳴鸞俱被殺義僕陳宜亦死是時道路傳九營俱反均州新附之衆懼見討自疑又以獻忠強憂為所并㑹議日中不決王光恩獨奮曰丈夫自立門户耳今獻忠反我輩亦反是下之也即公等能我恥不為諸校皆憮然應曰善顧左右坎牲盟光恩遽嚙將指出血曰此不堪㰱耶王國寧亦出其指血惠登相常國安楊友賢以次從均州之通房竹者要地三王國寧願守分水嶺常國安願屯江廟惠登相願占白果樹約曰獻忠至者即逆擊勿使得佚六營中惟三營為強故認堵地餘王光恩楊友武自強祗為其輔光恩為牘上制府某等不反乃擊為反者也幸禁訛言分逆順定軍士心均州太監李維政上其事已而五營亦與於亂惟王光恩不從最後王國寧常國安從閣部討賊而惠登相事左良玉有終始未必非王光恩之言有以發之也癸未年自成攻光恩為所敗鄖撫徐啓元守道髙斗樞鄖邑柴孝亷招光恩入鄖同守自成從襄陽來攻二年有半而不下且纍為所挫秦豫楚皆破而鄖獨完金曹材志徐啓元墓曰啓元字貞復别號望仁遼東人壬子舉順天鄉試己卯授鄖陽同知壬午李自成從白馬洞渡江攻陷襄陽移其軍攻鄖我師殺三千餘賊乃去癸未二月劉宗敏以五萬人來攻凡七十日不能下賊築麥臺四十五座髙平城架炮內擊五月三日我師用火箭燒其臺殆盡始却已而秦督師敗自成入關秦楚皆瓦解鄖獨堅守乃用啓元為鄖撫治而自成以甲申正月遣驍賊路應標等來攻凡四十七晝夜三月又益兵萬餘人不能破五月又令賊武寅臺二人至城下要盟啓元即城下斬之賊退營揚溪鋪别築土城自守十二月六日我師進薄土城先期遣人入其營舉火內外夾擊賊窘急開東門遁去賊帥路應標殱焉余按啓元之功凡皆光恩力戰所效也因附記於此是月也帝以登撫楊文嶽為保督李昌齡為延綏總兵六月馬爌馬科李國竒官撫民四人先後充總兵爌天津科山海皆以前討冦功國竒陕西撫民寧夏國竒尋以兵亂鐫級收成命孫傅庭戴東旻各下獄孫托疾欺罔東旻梗撫議同金吾騎逮治張獻忠據房縣窺襄聲走興安漢中逼秦蜀文燦請以楚撫孔照防荆門當陽鄖撫鰲永防江陵安逺巡撫啓濬蜀撫捷春各嚴兵於其境而秦督崇儉主提師合擊秦三鎮兵多隨洪承疇北行惟柴時華中道還甘肅崇儉以變蛟請帝不可崇儉檄延寧兵及時華皆不至李國竒駐秦川經汧隴抵咸陽取道近崇儉以十三日於西安出師士馬單弱倚秦劉軍如左右手國奇以一千人趨命而步卒八百殿大噪於略陽剽瑞王國租一萬兩國奇既以事見殱七月帝乃用故總兵張天禮於陜西代左光先梁甫於臨洮代曹變蛟曹左所將卒在薊思歸變蛟逃者四十三人光先逃者六十一人馬科亦秦將逃者百人皆選將挾兩馬而馳出境云投賊崇儉以六月二十三日至咸陽踰月抵興安關中惟賀人龍兵最強崇儉畏其跋扈不用時帝方憂秦督為失職猶冀文燦復穀城之恥故且勿治而張獻忠以七月二十二日去房縣二十六日左良玉偕豫將羅岱率兵追之良玉易岱為前軍而已隨其後去房八十里為羅􅀈山軍乏食摘樹葉為糧賊伏兵山岨中以待岱與副將劉元捷分兵進劉從左羅從右兩山草木稠雜伏四起岱馬足挂於藤而止抽刀斷之蹶而復進棄馬登山賊圍急岱箙中有矢數十發之賊多傷矢盡被獲良玉大敗奔還軍符印信盡失棄軍資十餘萬士卒死者萬人事聞良玉以大帥輕進折衄貶秩三等張任學失中軍益不足任姑落職文燦首為穀城事而再辱國軍料理候代帝早有意誅之矣八月太監劉元賔總兵孫應元黃得功副將周遇吉等大破賊馬光王於淅川之吳村王家寨許可變胡可受以其衆於淅川降初馬玉於吳村詭乞撫隂窺渡漢江以應獻忠淅川令郭守邦知其中許可變胡可受有善意遣邑諸生王作霖挑與語可變隨霖夜至處之東關胡可受為光玉所持約未定應元得功從鄧州趨內鄉掩賊背遇吉與副將張一龍刁明忠分路别擊文燦遣陳洪範以兵來㑹二十四日至小黃河口𠫭將馬文豸偏禆曹雄張召等力戰胡可受敗登山而呼曰始與許王約降者我也將軍至今歸命遇吉遂駐馬受之而應元得功以二十七日進兵王家寨南北兩山賊分壁其上石壘木樵相聮不絶應元率參將馬文豸戰其南得功率副將林報國戰其北豫兵嚴遏鎮平之華陽關賊不得逞大敗斬首九百五十有八光玉遁走元斌以九月四日至淅川露檄除兩人罪豫官選鋭卒四百給以糧疏入侈其功謂大非穀城比時楊嗣昌既受詔督師矣文燦聞發代憂於見及而喜有此捷也顧謂陳洪範曰賴公淅川之功可以紓死洪範聊應謂然文燦之革任糾自豫按髙名衡有監軍孔貞㑹者文燦所表用名衡再核之重言其以撫愚理臣也嗣昌在道中儳而與之爭且微探帝指輕重曰流冦支蔓不可勝誅熊文燦受命以恩信納降料理楚豫江淮十得六七獨獻忠再叛八營惶惑遂搖西附以敗垂成之功今以一眚廢置并所用之人而訾謷之庸得為通論乎文燦則自奏辨曰臣以十一年春舞陽大捷提兵逐賊首尾兩年斬馘二萬散脅從十萬餘人其魁帥如劉國能馬士秀杜應金皆受朝命為官而馬進忠李萬慶劉喜才許可變胡可受等已傾心革面矣獻忠僄狡鄉化未醇臣固憂其難制屬去冬京師告急邉兵盡行茍不聽其約直鼓行而前耳臣恐中原擾動不得已而許之俾國家撤備於漢東而後可搘梧河北今廷論之責臣者誰有知之者哉初帝以五案失事於督撫諸臣不少假貸武臣中如祖寬倪寵李重鎮皆楚豫宿將也寬有朱龍橋之功竟重論文燦知帝用法嚴恐不免故先自言帝以臨敵易帥且遲之比度嗣昌到軍而收者已出國門矣文燦之入也道經蘄黃姚明恭初附嗣昌薦文燦者得相且歸矣文燦與之言亦以已未必誅乃陳洪範與穀城之謀中官為之請得移病文燦繫急某璫名廣西採辦者已前死遂棄市而余應桂貰罪復用戴東旻竟死獄中文燦止一子依明恭張獻忠破蘄水亦殺空隱云外史氏曰穀房之釀亂也固矣十三家之賊半就戎索而劉國能李萬慶等始終弗二此非楊鶴之金鎖關陳竒瑜之車箱峽也且中原冦禍論大勢惟此時為少衰觀乎張伯鯨減餉汰兵之請亦可以見矣得毋文燦尚自有功乎曰否否昔漢武之下南越也以路博德為伏波將軍楊僕為樓船將軍樓船將精卒挫粵鋒以數萬人伏波僅得罪人千餘道逺失期徐而與之俱進其至畨禺也樓船攻敗粵人縱火燒城伏波乃為營遣使招降者賜印綬復縱令相招日暮粵人不知伏波兵多少樓船力攻燒敵反驅而盡入伏波軍中又因降者以知吕嘉建德所在跡得之以此益封其校尉皆侯而樓船僅以陷堅得封而已請取今事比類觀之孫傅庭曹變蛟渭南之戰咸陽北原之戰此樓船之陷尋愜破石門而燒畨禺城也劉國能之於隨州李萬慶之於張家林馬光玉許可變胡可受之於淅川此粵人不知伏波兵少盡驅而入其軍中者也文燦亦何力之有焉語曰天道十年一變賊發難以來十年矣前賊之長計在奔得志在掠今也關箱聚落之殆盡剽略無所得食而部隊之分者漸以合捆載之輕者亦以重聚謀改計欲於山川厄塞之處規取二三大郡以資其餱糧休其士馬乃見我之備未盡弛彼之力未能克則且前且却以睥睨乎其間故彼之伏而思逞者謀甚狡而氣甚鷙此時事之大可憂者詎得謂賊勢之少衰哉若夫我將吏之擁兵玩冦因循者踰十年之久而異才忠憤如曹變蛟黃得功輩稍稍間出賊固已不能無忌且賊秦人也自其渡三晉過河南奔走萬里必以秦為歸今秦師大克不敢復叩關西入彼轉鬬數載功業無成而鄉里道斷能無倦而生悔乎其初劫於饑寒而懼於誅戮今見朝廷果有意招之且內料同類猜嫌勢必自相斬殺何不蚤乘此時臣事天子而顧甘心為賊故劉國能李萬慶之去逆效順較之榖房之徒其撫同其心不同如駕馭得宜必轉而為我用非僅不反已也此又時事之大可為者矣夫合天下之謀盡十年之力以圖賊今其可憂與可為者決機於十一十二之兩年苟得其人即剿功可成而撫局得就乃不幸付之貪庸躁怯熊文燦之手以至於甚敗嗚呼洪承疇孫傅庭其不主撫者也然此兩人者在關中而榖房安去關中而榖房叛剿撫皆因舉足有輕重若文燦者詎足為有無耶朝廷之失在用文燦而剿撫垂成之秦督撫又移之辦他事危亡之局實決於此噫嘻孰非天為之哉綏冦紀略卷六
