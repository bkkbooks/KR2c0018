body:
  text: 綏寇紀略紀事本末類提要臣等謹案綏寇紀略十二卷國朝呉偉業撰偉業字駿公號梅村太倉人明崇禎辛未以第三人及第入國朝官至國子監祭酒是編專紀崇禎時流寇迄于明亡分為十二篇曰澠池渡曰車箱困曰真寧恨曰朱陽潰曰黒水擒曰穀城變曰開縣敗曰汴渠墊曰通城擊曰鹽亭誅曰九江哀曰虞淵沈每篇後加以論斷其虞淵沈一篇皆記明末災異與篇名不相應考朱彞尊曝書亭集有此書跋云梅村以順治壬辰舍館嘉興之萬夀宫輯綏寇紀畧久之其鄉人發雕是編僅十二卷而止虞淵沈中下二卷未付棗木傳刻明史開局求天下野史盡上史館於是先生足本出予抄入百六叢書歸田之後為友人借失云云意者明末降闖勸進諸臣子孫尚存故當時諱而不出歟此本為康熈甲寅鄒式金所刻在未開史局之前故亦無虞淵沈中下二卷而彞尊所輯百六叢書為人借失者雖稱後十八年從呉興書賈購得今亦不可復見此二卷遂佚之矣彞尊又稱其書以三字標題倣蘇鶚杜陽襍編何光逺鑑戒録之例考文章全以三字標題始于繆襲魏鐃歌詞鶚光逺遂沿以著書偉業叙述時事乃用此例頗不免小說纖仄之體其回䕶楊嗣昌左良玉亦涉恩怨之私未為公論然記事尚頗詳悉彝尊所謂聞之於朝雖不及見者之確切而終勝草野傳聞可資國史之采輯亦公論也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:cdb844b25183dd87e685289a2f3b16a089377eab7e00b21396a06bb84f1598bc
