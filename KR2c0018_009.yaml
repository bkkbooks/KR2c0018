body:
  text: 綏冦紀略卷九國子監祭酒吳偉業撰通城擊萬厯三十四年丙午五月十日丁丑卯刻有星自西北流東北大如盂赤色有光翼日熒惑夜犯房宿六月陜西地震七月十八日乙酉雷震朝日壇風拔樹大雨雹涌水南京妖人劉元緒謀反詭稱闢地李王分其徒十二天十二星十六佛將以長至日李王出世事覺誅之八月二十一日丁巳李自成生于延安府米脂縣雙泉堡之農家與膚施人張獻忠同嵗父李守忠也隷行太僕為養馬户守忠之父海海之父世甫家頗饒守忠娶金氏而無子既以姪李自立為後矣禱于華山夢神告之曰以破軍星為若子而生自成父母異之呼為黄來兒六嵗教之識字大能記憶踰常兒顧跳踉不可禁守忠曰黄來兒後當富貴其如頑戾何長名鴻基改自成從延安人羅君彥者學刀槊頗盡其技守忠金氏先後死李過者兄子也相與為傲盪盡亡其父貲乞貸于邑之艾氏艾著姓有為府同知者邑人呼艾老舉人以自成負其子錢也執而抶之自成鬬狠無賴數犯法米脂令晏子賓者械而游于市將置之死得脫自成妻韓氏故倡也縣役葢君祿與之通自成殺淫者偕李過亡命甘州投甘督梅之煥所部叅將王國為兵國奉調遣過金縣兵譁自成縛縣令索餉并殺國遂反安塞人髙迎祥故馬賊逃兵李成龍糾為亂饑民王異應之異一名大良因自號大凉王迎祥自號闖王馬著門表馬賊且特起也自成于髙為甥舅往從之自將七千人立一隊號曰闖將其在山西也有闖塔天八隊闖將皆張姓不知其名自成不甚著澠池既渡河迎祥乃獨雄諸部而車箱峽已困復逸官軍稍稍知賊帥中有李自成矣初自成西冦鄖陽破竹山竹谿房縣官兵追及之賊走紫陽入漢中連雨四十日馬乏芻多斃弓矢俱脫自成大困于車箱峽詭乞降總督陳竒瑜受之自成既過雲棧出險入鳳翔掠隴州勢復振衆至十餘萬副將賀人龍張天禮為所敗斂兵守隴州自成圍之四十餘日洪承疇檄左光先赴援與人龍合擊大破之自成竄入終南山已而糾其衆東下鳳陽之陷也張獻忠與自成皆在焉獻忠得陵監所教響手小奄十二人每飲酒令之奏樂自成求之勿與固以請獻忠毀樂器而後以其人歸自成殺之兩人由此相失自成與迎祥再入秦自成從終南出大掠富平寧州副將艾萬年與自成同里有夙嫌賊攻益急萬年曰我早知自成無賴曾訴之官今必不利于我出砦大戰敗而被執罵賊死無何張全昌賀人龍皆為自成所挫衂總兵曹文詔百戰將于真寧陣亡迎祥自成兵益强出關為祖大樂所敗迎祥自成攻滁州盧象昇祖寛大破之朱龍橋遂走登封密縣復歸秦九年二月自成走慶陽邠寧四月自成犯鞏昌北境左光先曹變蛟破自成于固原之沐家營自成走慶陽環縣五月自成圍綏徳州六月自成犯朝邑七月黑水峪之戰秦撫孫傅庭生俘髙迎祥磔之都市賊黨以自成梟雄也共推為闖王然自成在關中自鬬别為一軍黒水峪敗自成不在固非迎祥死起而暴領其衆也是月也自成犯階徽八月自成匿隴州山中九月出汧隴犯鳳翔于渭河窺渡十年正月自成犯涇陽三原四月據階成十月自成偕過天星由七盤關入蜀于是陷寧羌昭化劒州梓潼江油崇寧等州縣十一年正月官兵破賊于梓潼賊分隊還秦自成走白水六月官兵至陽平關自成由陽平白水謀再入蜀不果當是時秦之白水階徽官兵分汛堵扼賊既不能轉而西北曹變蛟渡河邀賊去路賊又不得由江而東惟南繞西鄉突出漢中越江而北秦撫傅庭偕左光先駐漢中乘賊奔江斬千餘級賊渠祁總管等謀東奔豫楚官兵追之至升仙口又嚴守朱陽關賊不得逸祁總管降十月自成食且盡總督洪承疇偕傅庭共擊自成于潼關原大破之自成盡亡其卒以十八騎潰圍走十八騎者劉宗敏田見秀谷可成張世傑李彌昌任繼榮任繼光王虎劉文魁等竄伏崤函山中為小盜不復出尋督師入援總理主撫獻忠汝才約降我師無偵候獲賊諜者或云自成死已而榖房叛自成喜出招其徒復大集秦督鄭崇儉提兵圍之曰圍師必缺不若空武關一道俾之逸而設伏于商雒鄖均可一鼔擒也自成乘間走遂入楚依張獻忠獻忠欲圖之覺再遁走閣部在彛陵聞而以檄諭之自成出謾語崛强時賀左二將再大捷獻忠破膽自成為我師困于巴西魚復諸山其輜重在赤甲寒山不能進困戹數草間自屏養子李雙喜止之劉宗敏者藍田人鍛工也有勇力自成嘗離其大營偕宗敏步入道旁叢祠中惟孩兒軍張鼐者從後偽封侯賊中所稱小張侯也自成知宗敏亦有歸命意太息曰人言我有天下分若盍卜之于神吉即從我不則亟殺我以降宗敏曰諾納其刀于腰再拜三投之皆吉起而殺其兩妻曰吾今死生從若矣軍中壯士亦有殺妻子願從者自成燒屯攜輕騎間道而奔河南河南旱斛榖萬錢人心螘動杞縣舉人李巖者初名信熹廟大司馬李精白子也精白原籍穎州衞性倜儻非常嘗出家粟千石賑荒人德之爭稱李公子李公子父奄黨也士大夫羞與齒信恒以為憾因亂請之督府用扞衞鄉里權宜竊兵柄以報其所不平傳云授安義襄鄉備禦杞人士仇之緣他事文致為通賊中州時討紅娘子賊紅娘子繩伎女也獲信强委身事之信不得已而從後乘間竊歸為杞人所執紅娘子來救饑民開門納賊令亦惡其市名得衆遂執而錮之獄民之徳之者曰李公子向活我今有急迺殺令破械出之李公子之在獄也思自成既為衆所擁嘆曰今日反決矣遂往投自成自成聞其名禮重之改名巖偽署制將軍用事盧氏牛金星者亦舉人也以磨勘被斥與其邑醫尚絅善絅好挾妓遊遊晉為賊得賊得醫者輒不殺絅尤親幸介金星以見自成自成竒其辨與謀議帳中車優及女陬者亦盧氏人常在帳中供奉車優逃歸遇牛之叔狊言金星通賊狀舉宗唾詈之亡何金星私歸竊妻子宗人執首官以車優為徵坐斬後得減死論聞自成之出河南也謁見于牙門自成得之大喜偽署𢎞文館學士初自成無大志所至屠戮百姓保塢壁不肯從李巖教以據中原取天下宜拊循以收人心唱為迎闖王不納糧之謠教兒童傳歌之相鼓動而金星進所善卜者宋獻策身長三尺餘上讖記曰十八子主神器自成大悅過城不殺因以所掠散饑民民多歸之號為李公子仁義兵傳聞者或即以為自成不知有李巖也自成以十三年之十二月二十一日自南陽來破宜陽殺其令唐啟泰二十四日移軍攻永寧永寧先有邑紳蜀撫張論者以川將儆守論病死其子吏部郎鼎延率家僮捍禦有功會獄徒牛可敬魏之明勾賊而守城都司馬有義潛遁賊以二十七日四鼓登城殺知縣武大烈鼎延匿眢井免自成殺萬安王于永寧之西關兵大振攻偃師縣一日破之知偃師徐日泰罵賊為賊臠割至死不絶聲河南總兵王紹禹者貪而無厭好斷軍士縑榖以自肥賊近後載重堅請入雒陽又收福王犒士三千金入其槖兵益恨乗夜反招自成入洛陽陷福邸縋城至迎恩寺為所得呂尚書維祺亦被執自成見之于西關周公廟曰呂尚書日議兵餉殺我曹今當何如耶呂曰吾為兵部尚書恨無兵磔汝狗鼠今日之事惟有死耳死不愧天地不愧聖賢夫何憾賊欲跪之不屈北拜闕西拜父母伸脰就刃色不變福王趺坐于地賊逼之王閉目搖首不語已而大罵因遇害鄒妃世子得脫走河北世子繼妃李氏福王選侍孟氏蕭氏李氏皆自經内執事承奉劉顯典膳錢福門正李彰雲等三十六人外執事書堂官焦如星良醫張鳴臯杜一經等十一人皆死有司則通判白守文訓導張道脉冗官武職共九人為賊所戕守道王𦙍昌重傷賊退後數日死餘知府馬一俊推官衞靖忠知縣張正學俱在邑紳自呂尚書以下知縣劉芳奕韓金聲行人王明同知楊萃推官常克念舉人苟良翰等多死賊從李巖牛金星策發福邸中庫金及富人之貲以號召饑民仍以洛陽掾吏邵時昌為偽總理生員張旋吉梅鼎盛等次第授偽官月給銀八十兩取賑施贏金付之俾募兵守而自移其軍攻汴豫撫李仙風慰安福世子于河北孟縣叛將羅泰劉有義亦逃至河北獲送京師聞自成已去率其將髙謙入雒取邵時昌梟縣之名曰恢復而汴梁之急撫軍顧不在周王乃出帑金五萬兩犒士巡按御史髙名衡開封推官黄澍祥符知縣王夑同設守賊攻西北陬最急祥符令部分捍禦有功矢石不避賊穴城將入守者投之以火賊被爇而死積屍與城平七晝夜不能下始解而去過密縣怒而屠之登封望風瓦解帝初落仙風職以張克儉代之會克儉徇襄難即補以按臣髙名衡而保督楊文岳得進兵璽書先遣其將虎大威張徳昌率五千人渡河兩將從仙風于偃師憂衆少未敢嘗賊已而文岳親至軍為鳴臯之戰賊亦漸入山汴洛稱休息焉仙風之在偃師聞土賊孟三據河隂率髙謙張徳昌之兵殄滅之欲以此為解帝尋遣錦衣衞逮治懼不免一夕絶吭死初丁啓睿之出關也聞閣部亡將由承天入楚楚按汪承詔以荆襄幸息肩無所事秦軍斂漢津公私船啟睿徘徊五日不得濟折向鄧州州閉門詬之過内鄉内鄉令不與糴帝下詔重督師事權所過餉不給者乏興論而汪承詔止於切責亦以舍楚入豫從賊所急其言良是不足罪也于是左良玉自襄抵南陽賀人龍李國竒之兵亦至丁啟睿畏自成而不能已于入豫也見張獻忠在光固謀于諸將曰此亦一豫賊也其法當攻瑕請移軍當之避自成莫敢擊詔乃于五月十九日出故大司馬傅宗龍于獄拜兵侍郎為秦督專辦自成宗龍年老矣向時部曲皆滇黔人于西北非所習帝特以其宿負用之俾必盡死力識者固䇿其不效無何丁啓睿左良玉大破張獻忠于麻城羅汝才少與自成同里閈羅年長弟畜之後以榖城之役唇齒獻忠獻忠好凌折等輩浸不合既敗舍之去投自成于鄧州請改事為兄自成喜獻忠既敗鄖西前茅八哨之兵無所歸自成又邀而取之附者日益衆袁時中者豫土冦號小袁營據蒙隂之義門窺鳳犯泗朱大典以劉良佐之兵大挫之于龍徳寺盧九徳率禁旅于界溝逐之時中乗風雨渡河其衆尚二十萬往投自成自成黠譎工駕馭他冦莫及也傅宗龍以六月入關與秦撫汪喬年謀所以平賊喬年清正士帝初以王裕心代丁啟睿撫秦既因秦按臣張爾忠言其不足任改用喬年喬年以四月二十日聞命諜報自成將叩關西入喬年急跨馬傳箭率將士趙大𦙍等馳至商雒修烽堠部署未定而宗龍適至宗龍欲捜秦兵括秦餉掃境内以出而關中旱蝗閭左調發殫盡未能有以應也即秦兵之在豫者李國竒賀人龍之卒隷焉帝亦遣保督楊文岳率虎大威一軍與之會汪撫送宗龍出關曰公破賊喬年身率所領為後距相與涕泣行宗龍既與文岳遇以九月初四日至新蔡命軍中起浮橋期以明日過河自成亦過河窺汝寧我師與之值二督宿龍口夜召諸將謀邀擊遲明飛騎報賊過且盡所留惟殿後一軍我師至孟家莊諸將解鞍休士不為備賊匿精銳林莽間日旰出鬬賀人龍之卒先奔李國竒初接戰不能敵亦奔偕虎大威陳監軍同往沈邱避賊而兩督自以親軍與賊相持傅營于西南楊營于東北二更保兵北隊走有張副將者挾文岳馬上馳去秦督慷慨謂任監軍陳副將曰宗龍當死久矣今日陷賊中當與諸君并志決命不能效他人走也乃召其裨校李本實楊從義董朝宣陳尚才孔臣思所將六千人即文岳所置壁處重穿塹結壘誓必死文岳是夜奔項城次日奔陳州賀李于初九日晡時得宗龍小帖取二將來救不信曰此書從賊中來庸知非偽邪呼沈邱令開門令乘堙咤曰若不往救傅督師入城何為者不許乃同奔文岳于陳州自成見宗龍無救于圍外穿兩壕困之十一日我師糧盡殺馬十五日臝馬亦盡十六日二更開營突圍遂大潰宗龍以十九日未至項城八里被執賊詭稱為家將擁之趨城宗龍大呼曰此賊也身是傅督師不幸落賊手城上速用礟擊毋墮狡計賊刀斫傅右脇傷抉兩目削鼻礟聲起賊退家人盧三負其屍入城乃絶項人歛之于天吉寺哭祭之喬年聞敗仰天嘆曰傅公死討賊為無人矣我自知以肉餧猛虎然不可不出以持中原心誓師次陜縣聞襄城新破惶惑未敢進也襄城諸生李永祺率父老出迎官軍時李自成方殘葉縣殺副將劉國能而圍左良玉于偃城國能之守葉也力戰不能支城陷賊殺其令張我翼而好謂國能曰若我故人也何不服國能按劒罵曰我初與若同反今則王臣也奈何從賊遂遇害左良玉偃城之圍始于臨潁臨潁為賊守良玉兵過殺所置偽官而取其牛馬財物自成怒盡銳與爭良玉避入偃城自成圍之急聞喬年之出關也釋偃城之圍來戰初喬年之撫秦也嘗被命發自成祖父塚自成破雒後聲勢日益張或獻策疑其先塚有異者帝密下喬年圖之米脂令邊大受者河間府靜海縣舉人後遇執而以自成兵敗得脫仕至廣平太守有不死餘紀紀其事健令也有縣役詭孫姓實自成族令詗知之執而加拷則曰吾祖墓去此二百里在萬山中聚而葬者十六塚中一塚始祖也相傳穴為仙人所定有鐵燈檠醮火壙中曰鐵燈不滅李氏當興如其言跡之山徑仄險林木晦黑果得李氏村村旁纍纍十六冢中一冢發之有螻蟻數石火光尚熒熒然斵其棺骨青黑色毛被體而黄腦後一穴如錢大中盤赤蛇長三四寸有角見日而飛髙丈許以口迎日色而吞咋者六七反而仍伏喬年函顱骨并蛇腊之以聞賊後矢著其目舉大事無成葢天使之也自成為之嚙指恨既知喬年出厲色憤踊曰此發我祖塚者邪聞其多馬速圖之勿失喬年背襄城而舍交綏一軍盡覆斂殘卒數百人保襄城城壞未及修故受攻五日而穿潰喬年自刎弗殊副將李萬慶共死之萬慶及射塌天與劉國能俱降人忠于王事故書其官以媿不能盡節者尋詔祀襄城自成劓刖襄城諸生百九十人購永祺匿以免屠其族自成凡再覆秦師獲馬二萬匹降秦兵數萬十一月乗勝遂圍南陽用大礟攻城守將猛如虎破以計殺賊精兵數十已而他門陷如虎持短刀巷戰大呼殺賊手及袍袖有血數斗過唐府國門北面叩頭謝國恩自稱力竭賊剸刃以出其背焚麒麟閣刺唐邸于其宮張妃及湘安王﨑嶇走入楚豫撫名衡按臣任濬以汴梁危蹙貽書督師告急丁啓睿稱獻忠在商固山中庶幾旦夕擒今移之救汴恐復脫掌握良以左支右吾不獲已先事自言非失策其宛郡干陬出于不意即主上無如何下詔曲為解不欲明其譴也是月也李自成陷鄧州知州事劉振世死之鎮平令鍾其碩内鄉令龔新舞陽令潘𢎞通許令費令謀先後殉節死唐縣新野稽顙迎賊十二月李自成陷許州自許以南無完邑洧州長葛鄢陵陳留禹州相繼陷二十六日李自成再圍開封開封者宋故都金人所重築也厚可十丈次亦八九丈賊每攻城不用梯衝倣古法專取瓴甓為首功責一甲士取一甎得者即歸營解甲臥惟後退者必斬取甎已穿穴穴初僅容一人漸至十人百人次第傳土以出過三五步留一土柱巨絙繫之穿畢萬人負絙而絶之一呼而柱折城崩矣巡撫髙名衡總兵陳永福于城上鑿為横道聽其下有取土聲儲毒穢以薰灌之遇輒焦爛賊乃即城壊處環試火攻法以藥置甖中火震甖裂名曰大小放迸當其衝者無不糜碎十五年二月十三日汴城之圮者二十七處將迸火而攻之自成下令曰今日必拔列精騎數千其旁距躍鼓噪俟城摧擁以入賊之穴城也土石之積于外者邱陵然已而火作内土堅外土浮内未及穿火反外擊瓦土之漲者及于天數千騎殲焉迺駭而遁城之未穿者亦尋丈耳嗚呼危矣是役也陳永福之功稱最撫按以下有詔奬其勞雖楊文岳亦得刷陳州之恥惟丁啓睿不能外犄角引其軍入城㡬為賊所乗城既開而麾下散去且軍不戢汴人苦之遂獲罪焉賊不得志于汴梁攻陳州副使關永傑力戰被執知州侯君耀罵賊皆死邑紳崔泌之舉人王受爵等手刃賊嚼齒大罵賊怒而屠之少長無或免者睢州太康寧陵考城西華商水遇輒潰邑紳通政使李夢宸宣大巡撫張繼世各于其地嬰城殞歸徳者嚮為州後因亂政獨無藩封不置兵知商邱梁以樟者故鄖撫夢澤子也邑舉人徐作霖吳伯裔伯𦙍相與集鄉勇為守禦賊攻圍七日夜以二月二十七日攀堞入作霖伯裔伯𦙍死以樟被兵尋救甦遁于淮南家四十口悉以燼儀封杞縣空城逃開亳亦繼陷魯山令楊呈秀郟縣令李貞佐寶豐令張人龍皆死貞佐尤烈賊入城厲聲曰驅百姓死守知縣耳妄殺何為賊褫衣冠倒懸諸樹貞佐大呼請訴上帝賊斷其舌磔之母喬氏及妻皆死三月李自成復圍開封其下以前力攻而挫也懼而逃者日數千人自成乃下令圍而勿攻持久示必克帝先期赦孫傅庭罪召見問曰卿度㡬何人可破賊傅庭頓首曰陛下幸貰臣死臣星馳入關得精銳五千人足矣既西行偵汴事者曰賊碁置數十營望塵莫見其際傅庭乃圖上方略曰賊衆且數十萬臣縱得士死力詎可一當百以時勢料之非練兵二萬餉百萬不可帝省章大怒曰卿面奏云何而前後不讐努力練所發兵足餉一月即捲甲出關毋得逗撓取咎也賀人龍兵潰再逃陣失主帥且家在米脂與自成同鄉里諸賀多在賊中傅庭在道故為疏請曰人龍臣舊將也願貰其罪猶可用帝若不得已而後許傅庭至西安人龍從數十騎來謝傅庭面責數叱壯士收縛即剄之分其兵隷諸將或曰賀數敢戰有功與左良玉威名相軋以及于斃賊中酌酒相慶曰賀風子死取關中如拾芥矣夫開縣之潰陳州之逃誰則為之謂其㹥猘為賊憚者譌也帝既以僇人龍檄布告行間釋故尚書侯恂于獄因向為良玉舊帥起為督發帑金十五萬犒左營將士激勸之拔中州有司蘇京王漢王夑三人為御史京監延寧甘固兵趣孫傅庭出關漢監平賊鎮及保督楚蜀兵助侯恂保汴燮監陽懐東晉兵部勒諸將過河誅賞並行文武迭用中外赫然知帝意決于必戰矣于是左良玉虎大威楊徳政㑹師于朱仙鎮良玉以賊勢方盛宜相形勢為緩攻大威等議不合既進軍羣帥皆潰帝傳密㫖楊徳政正法徳政妄議練總以毒害天下又剝軍善逃罪大應死人人快之虎大威後在汝寧以攻寨中飛礟囘死于雨花菴其事在良玉傳中汴外援既絶敵圍日固劉澤清以朱家寨去汴八里提五千人南渡依河為砦疏水環之謀以次結八營可達大堤築甬道餽粟城中劉本逗怯壁壘未成賊引衆來爭恇擾奔迸㡬不及濟我師多聚于河北日夜望秦兵出關不獲以時至開封之樵採斷人相食羅汝才衆亦饑謀他徙自成出餘糧廩之重為盟畀以東城所掠為分地乃留不去九月十五日三更河決開封自成前後三攻汴士馬斃者無算積憤誓必拔長圍半載師老勢屈久懐灌城之謀顧以子女珍寶山積不忍委之洪波迨秦師已東恐汴圍一疎陽懐東晉之兵必躡其後將憂腹背受敵方圖改算會汴人有計決河以灌賊者時城傍羊馬城周王募民新築者皆堅厚為髙岸而賊營直傅大堤我兵以為河決則賊可盡而城中無恐故嚴雲京髙名衡從之早為自成所覺援師方鑿朱家寨口賊已移營髙阜多設巨筏艨艟驅所掠民夫數萬反決馬家口以灌城天大雨經旬不止黄流驟漲兩口一時並決聲聞百里丁夫荷鍤者隨堤漂沒賊營亦沈萬人河流直衝汴城自北門入穿東南門以出流入渦水汴人皆溺死開封初受圍官以城守閱民得百萬戸圍後民之死于疫與饑者十之二尚得八十萬戸水至周王從後山逃出率宮眷及寧鄉安鄉永夀仁和諸王露棲西城貫雨中撫按以下官從之督師侯恂遣總兵卜從善逆以舟師推官黄澍從王乘夜達堤口髙名衡陳永福囘城防賊侯恂嚴雲京偕監軍御史王燮擁護王及二妃世子止河北之栁圈坊士民從而濟者不及二萬河身改徙杞縣唐邑亳州以入于淮賊乃拔營向西南而去先汴京有散人褚生精數術言狂易不可曉事後輒竒中前一年别所知將自沈于河力挽之不肯止笑曰明年今月今日此中人盡如我人皆以發狂怪之已而果驗是役也譁云決河灌賊不意反為賊所灌帝以其孤城死守洚水天災堤決事不覆較髙名衡慰勞養疾歸而黄澍召見授御史錄守汴勞也十月孫傅庭兵至南陽李自成羅汝才西行逆之傅庭以髙傑魯甘為先鋒魯甘涼世將也與李自成遇于塚頭大戰髙魯大破賊追奔六十餘里為髙魯後距者左勷蕭慎鼎自成之敗也羅汝才旁來救遶出髙魯之後左勷紈絝不習敵望而怖曰髙魯沒矣遂奔餘衆聞之皆奔遂大潰喪材官將校七十八人髙魯所部失亡顧不多傅庭歸而執慎鼎斬之左勷以光先子令入馬二千匹贖罪當傅庭出軍天大雨糧車不進採青柿以為食士卒凍饑故遇賊至于甚敗豫人所謂柿園之役也傅庭上書自劾詔令圖功自贖是月也李自成收裕州李好為之用汝才由魯山走南陽李好從裕走唐縣自成走息縣舞陽連營五百餘里自成復陷南陽屠之閏十一月十三日圍汝寧保督楊文岳先以援汴不利有詔戴罪防汝賊之至也監軍道孔貞會駐東關師先潰文岳督兵戲下副將馮某戰于南湖賊砲擊南關營之我兵之被傷者濠水盡赤馮將軍自刎死文岳收散卒嬰城守西關叅將王某北關副將趙某猶苦戰勢不敵兩將自焚營柵收其兵入子城殺所乘馬而自殺從死者千餘人翼日賊從西北門入執文岳不屈自成曰先生朝廷重臣自不當屈然時勢乃爾公欲何為耶文岳曰我恨無兵以殺汝今日死耳復何言僉事王世琮者初授河南推官與賊戰流矢貫耳而不動人號為王鐵耳既就執厲聲罵賊與文岳同遇害賊瘞文岳尸立牌書銜以識之因感其忠也孔貞㑹被執去不知所終知府傅汝為投河北通判朱國寶知汝陽文師頤俱死賊拔營走確山信陽泌陽向襄陽挾崇王由樻及世子行崇王與其子三人暨河陽王懐安王皆被執王後遇害于泌陽縣時四川援勦總兵溫如珍以不能援汝被劾左良玉自朱仙鎮南潰退屯襄陽諸降賊附之有衆二十萬大治戰艦于樊城自成至樊人苦左兵淫掠殺稾桔燔燒之良玉怒奪巨商峩艑重裝待發身率諸軍營于髙阜漢東之人牛酒迎賊十二月初四日賊趨白馬渡良玉移營扼之江水淺及馬腹賊死數千渡如故良玉拔營南行鄖撫治王永祚棄城走襄陽陷賊將賀一龍以十二日破徳安襄陽屬城如棗陽令郭裕宜城令陳美榖城令周建中光化令萬敬宗皆城破不屈死賊再破彛陵荆門州沅撫陳睿謨至荆奉惠王走湘潭睿謨平峝賊有功荆州非所轄奉㫖故至護藩以行自成以十八日入荆州湘隂王儼􅀈全家遇害二十八日攻獻陵陵軍柵木為城從城内射賊賊發薪燒之木城穿遂毀享殿三十日攻承天十六年正月初二日陷之總兵錢中選被創歿楚撫宋一鶴留守都司沈夀崇並遇害知鍾祥事蕭漢賊以其賢戒勿殺幽之寺命寺僧謹視之漢乗間裂裳為帛以自經欽天監博士楊永裕投賊自詡有異術能佐自成取天下請發獻王梓宮俄大聲起山谷如雷懼而止分兵掠潛江京山諸縣遂破雲夢蹂景陵方國安諸將退屯漢口賊先驅逼漢陽左良玉避之南下黄陂亦為凶威所讋置偽令焉惟鄖陽以降將王光恩同鄖撫徐起元設守自成百道攻圍終不能下自成初攻鄖不下于五月三日撤營退囘襄陽即往豫迎敵秦兵自成入秦後遣兵攻鄖者凡四光恩築砦于隘口賊營于砦下伐木積與砦平將攀援上光恩投火焚之礟擊砦破光恩以泥塗版且守且築賊以大船載砲光恩設水砦于漢江極汛處而以輕舟往來截殺舟載火藥焚其營江水為赤賊二十萬水陸並進光恩以步兵伏草莽出沒如神賊大潰光恩乃搗其水營盡獲其艅艎賊自是不敢窺鄖光恩乗勢復均鄧光化榖城進圍襄陽餉匱還光恩布衣疏食與士卒同甘苦故人樂為用賊初自稱老府奉天倡義大將軍尋進大元帥以羅汝才為代天撫民徳威大將軍分其衆曰標營領兵百隊曰左右營各領兵三十餘隊曰前後營各領兵三十餘隊標營白幟黑纛自成獨白鬃大纛銀浮屠左營幟白右緋前黑後黄纛各隨其色五營以序直晝夜他營次第休息巡徼嚴密人不得逃逃者謂之落草磔之且連營百里竟日不得越禁行囊勿藏白金精兵許攜妻子戒旁漁生子棄弗育收男子十五以上四十以下為兵一精兵容私從為之主芻掌械司磨執爨少者十餘人駝驢少者十餘載過城市不令處室廬寢興一單布幕製綿甲紉綻至百層輕厚矢礟不能入一兵倅馬三四冬則掠茵褥藉其蹏曰恐惡寒也剖人腹為之槽馬以此鋸牙思噬若虎豹軍止即出較騎射曰站隊及晡方畢夜四鼓蓐食以聽令所過值崇崗絶坂騰而直上毋得旁踰水惟黄河阻轡淮泗涇渭人皆翹足踞馬背或抱鬛緣尾呼風而前馬蹏所壅閼水為不行下流淺不盈尺步兵褰裳徑涉臨陣列馬三萬名三堵牆前者返顧後即殺之戰久不勝馬兵佯敗追之則歩卒之伉健者長鎗三萬擊刺若飛馬兵囘合無孑遺矣其攻城也束手降者不殺不焚守一日殺十之三二日殺十之七三日屠殺人束諸尸為燎謂之打亮城將陷步兵萬人周堞下防縋城者馬兵徼于外承其隙巡之張獻忠至殘忍所攻城一門陷則一門可逃自成若覆舟于海無噍類由其法嚴故也諸營校所獲馬騾者上賞弓矢鉛銃者亞賞幣帛次之珠玉為下自成不好酒色脫粟粗糲與其下共之羅汝才妻妾數十被服紈綺帳下有女樂數部嗜酒烹羊豚厚自奉自成常嗤之曰此老傭多嗜好不足數也汝才有衆數十萬倚山西孝廉吉珪為記室能用其謀自成之兵長于攻汝才之兵强于戰兩人相須如左右手所陷河南五十餘城鹵獲自成十之六汝才十之四其下稍為自成部衆所侵屢以駑駘易其善馬滋不平汝才雖權時推奉李兄恃舊故常自呼曹操呼自成老齊爾汝之自成之下宛葉克梁宋兵强士附有專制心憂汝才不為下間置酒讌語挑之曰吾與汝起草澤不自量至此今當圖關中割土以分王汝才粗疎時又醉張目答曰吾等横行天下為快耳何專土為自成意色大忤蘄黄賊帥賀一龍馬守應者與賀錦劉希堯藺養成歸自成于開封一龍等即所稱革左五營也賀一龍即革裏眼馬守應即老􅉰􅉰藺養成即左金王賀錦即爭世王劉希堯即治世王一龍守應惡相屬請自為一軍頗與汝才善自成疑之其下荆襄也令守應屯彛陵規取澧州一龍走徳安規取黄州一龍至黄陂前阻水僅收左良玉殘兵八百人以歸先過汝才營屏人耳語自成銜之不遽發吉珪謂汝才曰某觀李帥非容人者今羣雄皆俛首所頡頏者我與革左耳將軍何不早自計耶汝才始𢥠然然弗為備有黄州陳生者客居襄陽遇亂以才智為自成所識又因吉珪以交于汝才知其間私自念曰吾以口舌令二賊相圖可并滅也說自成曰汝才必為變自成不應過汝才曰將軍苦人以惡馬易善馬盍以字烙之令識别自為羣邪汝才曰善生其為我行之陳生故分前後左右烙馬字而先烙其左為一羣報自成曰羅營東通良玉馬用左字為號矣自成偵之而信盛為具請此二人汝才辭以疾一龍至宴笑甚歡五鼓已就縛羅兵猶不之知侵晨以二十騎入汝才營托言事徑造帳中汝才方櫛髮未竟即斬首持以示其下曰汝才反元帥令誅之一營大譟自成先用賀錦劉希堯以收一龍之心膂曰趙應元俾慰誘其衆汝才之將曰楊承恩甥曰王龍以其兵散去先後皆入關從孫督師李汝桂以數百騎走安廬從左帥其中軍楊山旗鼔朱養民他將王可懐郝有法及其叔羅戴恩皆慴伏側目思報亦未能以定自成見吉珪加勞勉後因事誅之陳生者其謀亦為自成所覺見殺自成徐按汝才軍簿即舊將分隷之叅之以親信于是兩軍之士皆屬牛金星敎以分等威申職守早自異于儕偶創為官名爵號大加署置自元帥以下次權將軍次制將軍次果毅將軍次威武將軍都尉掌旅部總哨總各以等第降殺自成諸子錦自成妻之弟髙必正皆居帳中號親信李巖為中營制將軍與其弟牟頗簡束其下勿縱掠田見秀為人寬厚以權將軍提督諸營事賊所過多所全宥皆見秀力也劉宗敏嗜殺狡悍善戰賊倚之亦為權將軍亞焉賀錦歸自蘄黄一見輸誠自成以為識所從又甚得曹賀兩營之心而能弭之不動拔為制將軍在諸將之右帥標正威武將軍張鼐自成養子也又威武將軍黨守素副之帥標左威武將軍辛思忠又果毅將軍谷可成副之標右威武將軍李友標前果毅將軍任繼榮標後果毅將軍吳汝義此其中權親軍也左營制將軍劉芳亮左營左果毅將軍馬世耀左營右威武將軍劉汝魁稱竈營右營制將軍劉希堯右營左果毅將軍白鳴鶴右營右果毅將軍劉體純前營制將軍袁宗弟前營左果毅將軍謝君友前營右果毅將軍田虎後營制將軍李過亦自成諸子也左目眇年少驍敢善戰後營左果毅將軍張能後營右果毅將軍馬重僖又有駱應標者亦後營此五營二十二將者凡進戰視中權所向四營制將軍各率其偏裨以從其次則分地以定衞帥自成在中州所畧城輒燒彛之無意守既渡漢江長驅入荆念天下莫予難者謀先守荆襄次守承天徳安漸以及于汝寧而增置衞帥十有三人襄陽者賊之腹心根本地也設襄陽衞左右威武將軍髙一功馮雄各領三千人為久戍又有楊彥昌守襄陽荆州襄之上游設通達衞用任光榮為制將軍配以六千人守荆州彛陵楚蜀之門户分通達衞左右威武將軍藺養成牛萬才兵千四百人佐以都尉張禮水師六百人共為守守荆門州者都尉葉雲林本郟縣諸生所將止六百人則以荆門有彜陵為之蔽也馬守應于己貳改用威武將軍王文耀配以荆州兵六千守澧州承天特置楊武衞以果毅將軍白旺守安陸左寧南曾遣惠登相攻德安白旺已棄城走既與惠兵戰而惠大敗旺又再入城故旺部下兵為最强而獻陵我師所必爭即左營都尉馬世泰為分駐又以威武將軍謝應龍守漢川防左帥之泝流西上也汝寧衞威武將軍韓華美守信陽北扼孔道均平衞果毅將軍周鳳梧守禹鄭二州西備關中諸鎮既以磐牙屯據乃改襄陽曰襄京修故王宮殿居之楊永裕勸以即真牛金星不可而止自成外雖寢永裕議而心善之頗采其言以設官分職置上相左輔右弼六政府侍郎郎中從事等官于要地設防禦使府曰府尹州曰牧縣曰令易印為信僭改崇王由樻為襄陽伯邵陵王在城為棗陽伯保寧王其為宣城伯肅寧王術授為順義伯禹州曰均平府承天府曰揚武州其所授偽官自左輔牛金星右弼來儀以下吏政府侍郎石首喻上猷户政府侍郎江陵蕭應坤禮政府侍郎招逺楊永裕兵政府侍郎米脂李振聲刑政府侍郎江陵鄧岩忠工政府侍郎西安姚錫𦙍郎中從事姓名之可攷者二十餘人郎中則户政府徐邱王家柱從事則户政府閻泰定郭附龍游啟運楊四畏禮政府劉清夢楊輝烈兵政府傅朝升邱之陶施鴻翽刑政府安民興工政府蔣芬之陶尋改為兵政侍郎後死于襄城尚有宣令司張翔紀功司李定一而紹興徐佳者知書數不受職在外則荆州防禦使洛陽孟長庚府尹長葛張虞機襄陽防禦使郟縣李之綱府尹盧氏牛佺佺金星子也南陽防禦使鍾祥吳大雍府尹江陵劉蘇汝寧防禦使江陵金有章府尹江陵鄧璉又揚武州防禦使陳藎信陽州防禦使江陵黄閣均平府尹鍾祥劉懋先其府守有丞荆州府丞張士政有理刑南陽胡邦彦汝寧鄒士闕均天吳闕周襄陽朱夢庚荆州王業昌安陸吳從繩州有判縣有簿州牧自荆州牧韓瓚以下揚武州姚欽明信陽州王璞鄧州徐即達祁州萬國定裕州吳騰芳光州方燧卭州趙之璧尉州申毅隨州洪聖翼許州劉定鄭州彭奕煜汝州裴叔度寶州陳可新闕陵田儲歸州武張澧州俞興言固州髙孝隨州汪鷺縣令自襄陽令楊士科以下若干人南陽吳鄞鎮平夏之弼泌陽康昇湘隂張光世南召李延大内鄉左懋延新野徐龍光葉縣王家楨真陽朱師熹汝陽樊仲表上蔡熊新運西平武顯祖新蔡徐必達遂平杜握瑜羅山張丹庭確山呂承顯光山鄭允孝商城梁凝祉固始呂相圉恩縣張文彬商水郁𢎞功沈平田維新均平稽錫太康姚通方淅川鄭際明鄢陵薄封賢扶溝陳周南中牟梁肯建西華姚聘臨潁王邦醇長葛陳濟鳴新鄭王克寬襄城武彥芳密縣冷英郾縣王槐𦙍漢陽石作霜熒澤某河陽蕭象新魯山劉爾箎郟縣周英宜城王克聖南陽金汝礪保康芮作聖榖城陳智均闕良鮑一駿光化武湛京山蔡國瑞潛江趙國珍沔陽王佑張來當陽朱維世江陵張允恭公安朱三宿石首張維寰監利田振訓松滋張勉枝江王鼎新宜都韓令卿長陽張耀國逺安王第魁司東王一垣梁山汪植華容汪一洪安陸鄧允漸孝感田助公内城魏文彪應山陳當道自成偽號新順王㑹左輔以下官議出兵所向牛金星請先取河北直走京師楊永裕謀順流下金陵斷運道則燕都自困兵政府從事顧君恩進曰兩人所言皆非也金陵勢居下流難濟大事其策失之緩直取京師萬一不勝退無所歸其䇿失之急不如先定關中為元帥桑梓之邦秦都百二山河已得天下三分之二建國立業然後旁掠三邊資其兵力攻取山西後向京師庶㡬進有可攻退有所守方為全䇿自成從之孫傅庭之敗於柿園也歸關中招邊勇開屯田猶恐不足法用三家出一甲首曰壯丁以五十金資之西人築樓櫓為守望令以一樓養兵一人選嚴明吏為趨辦又自以前出關饋糧不至為賊騎所乘仿古偏箱武剛之制載以神機曰火車俾得齎衣糧彀弓弩戰則驅之以拒馬止則環之以自衞州縣工匠皆㸐脂夜作得二萬輛即壯丁掌戎右而奏用降將白廣恩為火車總兵於西教塲講肄之時左光先者宿將傅庭老之勿任任廣恩又以髙杰副之廣恩在山海常桀傲不奉詔大掠臨洺關西走帝不得已命歸隷傅庭辦賊或以為反覆亂人傅庭弗恤也髙杰尤暴戾不可法度使特以竊自成之妻邢氏為所切齒又前者戰塚頭有功故專恃此兩人者為軍鋒然傅庭苦不欲速戰常中夜呼其叅軍定襄喬元柱曰我以權宜任兩人此豈自成敵哉且我軍初集若遲久閑習以乗賊敝庶可用其如帝意何王龍之踵楊承恩入關也其屬三千人皆驍卒傅庭問之以賊事龍曰賊勢重不可敵然襄陽野如赭百萬之衆何以供五月後必大饑因其饑而攻之可不勞而定督師厲威嚴以軍興法從事州郡皆震慄關中荒責豪右為捐助有不樂者譁於朝曰督師玩冦糜餉秦人日在湯火中累上書迎帝意催戰且傳危語以哃喝之曰督師苟不出關收者至矣傅庭頓足歎曰吾固知戰未必捷然僥倖有萬一功大丈夫豈能復對獄吏乎乃上書出關為師期自成在襄陽有傳其自内浙窺商雒者傅庭謀以秦撫馮師孔率甘蜀二帥駐商設防己則兼程出關先以總兵牛成虎秦人大族世將家也副將盧光祖提興運各營之兵三千二百人由靈陜入雒七月二十三日至澠池前驅游擊張守義與賊游兵于下池相遇薄有斬獲傅庭以八月十九日率平治十營與白廣恩期於新安來㑹當是時賊圍李際遇於登封之玉寨聞秦師之出也設伏於滋澗以邀我二十日我師至滋澗見道險命下馬捜伏賊乃遁歸龍門二十二日質明我師追至龍門而賊營已拔留哨騎於伊河之西我降將楊承祖單騎馳諭賊哨蘇某者以五十二人歸命盧光祖又招賊將髙紀祥降之傅庭全軍駐龍門催孟縣之糧别遣兵五千追賊於汝州賊已盡奔寶豐玉寨之圍亦已解豫帥則卜從善久在河北陳永福徘徊新灘秦所式方憂賊北渡請督師來救於進取未能贊萬一也自成聞秦師之出也盡發荆襄之賊㑹于河南步騎沿河列守自汜水至滎澤伐竹木結筏人佩三葫蘆將渡河先驅千餘人北渡劉洪起逐之逡巡南岸豫撫按飛檄趨永福還兵河北擊之永福稱奉督師令不敢擅離及河北無賊永福又以撫按檄避督師此所以徘徊郭家灘也總兵牛成虎稟稱河北無賊惟滎澤河口曾有百餘賊過渡已被劉洪起堵囘陳永福借駐郭家灘傅庭請加懲處有㫖從善永福實降為副將戴罪殺賊自贖客有説傅庭者曰公不奉駐軍雒陽之㫖乎自賊之西也歸徳修復舊城永城繕治新城皆不日告就今雒城故址餘二丈四門未隳公下令修築糾各寨鄉民匠役半月可畢土功河北流離之民聞洛陽復完不招自集公於此儲糗糧開屯田進戰退守經略中原繫四海之望此祖逖之鎮雍邱宗澤之復東京也公盍圖之傅庭曰吾據關不出猶為持重萬全今秦人棄親戚墳墓以從我奈何用版築阻士氣且賊不旋踵前送死致冦而不致於冦非計之得也九月初八日我師進次汝州之長阜鎮偽都尉李養純迎降聞自成在襄陽西築汝寧及其屬邑鄧襄葉唐郟豐七城者待戰諜者云賊老營在唐縣精鋭屯襄陽撤郟縣偽將吏歸保寶豐并兵設守以為犄角傅庭乃别遣游擊折增修從曾山間道搗唐縣而督師自以大軍從汝州進初十日我師次寶豐賊已改為州其守兵多且樓櫓亦甚固傅庭曰我師前爭利而寶豐或掎其後則腹背受敵矣諭降不下乃留攻之十一日自成來援白廣恩髙杰盧興福分兵夾擊戰小利賊却十二日自成再以精騎來援復為廣恩杰所却我師以是夜克寶豐擒偽州牧陳可新州判姜渭偽郟縣令周英主簿劉溥偽將蔣山李大存孫月等誅之十四日我師次郟縣賊萬騎迎敵我前鋒陷陣擒其果毅將軍謝君友砍賊坐纛旗尾自成㡬獲捕得汝才逃兵王定口稱賊唐縣老營十二日夜半為我師所破輜重俱盡妻子細口被殺一營皆哭督師軍聲大振㑹天大雨轉道濘數尺糧車日行三十里士馬多饑或勸退舍就委輸者傅庭曰師已行即還亦飢不如破郟縣就食遂攻郟縣破之郟窮邑也得馬臝數百頭噉割之立盡雨不止傅庭頓郟縣五日不能進十七日後軍譟於汝州降盜隂通賊賊突騎復大至賊以輕騎出汝州白沙抄絶餉道我師饑且困有流言傅庭不得已分其軍為三以白廣恩從大路已與髙杰從小路還師迎糧而陳永福閉營休士須糧至諸營進而齊發且戒之曰汝按甲三日以待我弗動也前屯既移後隊亦亂永福雖斬之不能止乃亦引所部殿而賊追之及於南陽二十一日我師返轡還戰賊置陣凡五重飢民處外步卒次之馬兵次之驍騎之選者又次之老營家口居中我師已破其馬兵過三重矣遇驍騎而死鬬將吏之怯者惶怖欲走陣稍動壯士推火車者新調發未習戰陳有思歸心見馬兵之小却也駭曰師敗矣盡脫其輓輅而奔馬兵見之亦奔火車傾輈塞道馬絓于局及衡者不得出賊鐵騎凌而騰之傅庭于各州縣三丁抽一名曰壯丁造火車約有二三萬皆上載火砲中載衣糧以白廣恩為火車總兵在西安教塲操演法非不善以壯丁為不教之民故敗步賊手白棓遮擊中者首與兜鍪俱碎遂大敗賊空壁躡我一日夜踰四百里官軍死者四萬失亡兵器車重數十萬傅庭之退軍也使髙傑斷後白廣恩設伏道左廣恩懼為賊所乗棄兵潛遁賊兵追躡之傑兵大敗獨廣恩兵得入關初自成之出襄陽也以兵政府侍郎邱之陶居守之陶相國瑜次子也宜城陷相國父仰藥死之陶為所得署兵政從事年二十餘有姿容器略自成甚重之擢其官委之筦留務襄陽尹牛佺雖賊相子倚任不及也之陶欲以竒計誤賊遣人間道走武關以蠟書進曰督師與之戰吾當詭左兵大至以搖賊心彼必返顧督師隨其後我從中起賊可擒也傅庭大喜報以手書其書為自成邏者所得督師與之陶不之知傅庭恃其有内應連營稍前自成故見其羸弱以誘之深入其計反為賊困之陶果舉火報東師之至自成驗得其詐呼而詰之襄縣出孫書責其負已支解之之陶大罵曰我豈從若者邪恨不能盡殲汝醜類以報吾君父言未畢於口而絶督師取儳道過河入晉傅庭渡垣曲走闕鄉賊兵追至孟津以轉達潼關諸將亦將其卒而至火車營步兵俱殲焉兵之脫者猶數千氣傷沮不復振髙杰曰三軍父母妻子在西安今戰敗思歸而强之守關此危道也不如棄關專守西安憑堅城以人自為戰傅庭叱曰若賊已進關則西安糜沸秦人尚為我用乎十月初七日自成率大衆攻關白廣恩猶苦戰髙杰以廣恩賣己於寶豐以致敗擁兵不顧賊從南山遶出其背為夾攻力不敵關破杰奔延安廣恩奔固原陳勇奔秦州髙汝利奔漢中賊遂破華隂傅庭收散卒圖還保渭南賊追及𫝊庭與叅軍喬元柱躍馬大呼而沒於陣知渭南楊暄偕訓導蔡其城守渭南舉人王命誥潛通賊開東門城陷暄死之是日賊支軍陷華州初九日屠商州商雒道黄世清不屈死初十日陷臨潼十一日逼西安主城守者為王根子而孫可闕練總兵專護秦王衆寡不敵留川兵之歸蜀者五千人助防兵無冬裝勸秦王以人給一綿衣弗應天寒傳餐皆結為冰根子射書城下開東門納賊城遂陷闕雜衆中逸去巡撫都御史馮師孔按察使黄炯長安知縣吳從義指揮使崔爾達死之秦王被執長史章世炯自經紳士則右都御史焦源溥大罵賊賊先斷其舌殺之副使祝萬齡從容拜孔子僉事王徵七日不食宣撫焦源清叅政田時震舉人席增光朱誼泉皆死賊放兵大掠三日乃下令不得妄殺一人誤者將吏償其命改西安府為長安據秦府為宮收姬妾數百以充實之命所司一依李唐制度即秦撫故署為吏政府都司為兵政府按察司為刑政府西安分守道為工政府偽授秦王為權將軍世子妃劉氏慟哭曰國破家亡不如一死自成遣歸其家分兵為三道以追捕諸將李過出北道追髙杰於延安杰東走宜川河冰適合遂渡河入蒲州絶蒲津以守賊追至冰解不得渡乃止田見秀出南道追髙汝利於漢中汝利遁入蜀尋復降賀珍劉宗敏袁宗弟党守素出西道追白廣恩進次固原廣恩亦以城降傳檄徇下邑知蒲城朱一銃知中部朱新鍱自盡餘從風而靡自成發民夫大修長安城挑濠塹具樓櫓視前制倍壯麗命楊永裕閱兵於渭橋金鼔之聲震地毀居民屋以大開馳道於城中毎三日即親至大教塲校射身御藍布袍張小黄葢乗馬百姓望見黄龍旗皆辟易十一月自成大㑹羣賊戎馬萬匹旌旗百里詣米脂祭墓墓向為官軍所發焚棄其遺骴自成乃築土封之訪求其宗人贈金封爵以去改延安為天保府米脂為天保縣自成又改清澗縣為天波府以三百騎行鳳翔守將誘而殲之囘師疾攻殺知府唐時明居人俱盡自成初入關自以為故鄉所過村鎮慰諭父老戒有所侵暴未一月而軍士束丁男以為奴突入廬舍剽掠婦女又以衣冠必不附己諸舊臣故家為鄉里所畏服者徵而閉之空舍加榜掠以索其金死者并一坎埋之家不知其所在責渭南南氏餉一百六十萬禮尚書南企仲年八十三遇害企仲之子進士南居業居業從兄工尚書南居益皆被炮烙死秦人大失望西安都司舍人邱從周長不滿三尺醉入秦府㦸手罵曰若一小民妄踞王府稱尊而所為若此何以得長久自成叱曰酗鬼趣提去初不以介意也秦士大夫如惠世揚耆耉之望匐匍受偽官然脅于凶逆非得已最甚者無如張國紳首倡僭號覬作賊相又為誘文太僕之室鄧夫人進之鄧江南令族知史書工詩國紳以為必見幸自成顧重太僕名怒曰若同輩不能庇其伉儷而行媚我叱國紳斬之禮鄧而歸之家白廣恩之降也自成挈其手與共飯相對極歡左光先聞之亦降陳永福猶擁衆為顧望自成遣廣恩諭意永福恐其賣己曰汴城之戰永福親集其矢于王之目今窮而歸命懼無以全腰領自成曰此各盡其事何害命取箭折之誓不食言諸將梁甫馬岱輩轉相誑惑多解甲上謁者惟榆林不從榆林王氏一門八元戎世國世臣者兄弟也尤世禄閥閱亞王而威重過之李昌齡西凉勲胄以故總兵僑居其地賊入關制將軍李過徇榆林兵使者都任率副戎劉惠兩將軍推世祿為帥而與王李三公同守賊遣辨士延安舒君睿者說之齎五萬金以犒城中自成為手書以曉譬禍福不聽因四面環攻城上强弩持滿發巨礟擊之數開城出戰殺賊數千人婦女小兒皆呌呼擊賊賊穿地道放迸崩城諸公巷戰力盡都公引佩刀自裁劉將軍罵賊賊磔之惠顯被縛過神木仰酖至二升乃絶二王尤李為所執去西安四十里曰囘軍店四公沐浴更衣曰將以下見祖宗也既入挺立仰視天賊欲跽之不屈自成曰吾虚上將以屈四將軍奈何固執不相與共富貴四公罵曰我大臣也汝草竊且滅不久毋汙我臨死歎曰我四人不早殄此賊致今日真死有餘恨賊舉城屠之遂以兵臨寧夏寧夏不支總兵官撫民開門降慶陽猶為我守攻四日陷屠之執韓王副使段復興知寧州董琬邑紳麻僖俱死三邊盡入於賊賊無所顧忌遂長驅而東過河入晉破平陽殺西河王等三百餘人平陽總兵陳尚智降是時秦隴皆沒惟甘肅帶河為固賊移兵取蘭州甘撫林日瑞以副將郭天吉四千騎守峽口而敗賊進薄城下乗夜雪坎而登日瑞及總兵馬爌中軍哈維新姚世儒等皆死郭天吉軍敗還守與苑馬寺監牧同知藍臺州紳羅俊傑趙宦等及于難殺居民四萬七千人西寧衞尚不下賊將辛思忠攻破之即令為守於是肅州山丹永昌鎮畨莊浪皆降進兵略青海党守素以一軍守蘭州置西寧節度使以故監軍僉事陳之龍為節度使而秦地悉沒矣十七年甲申正月李自成稱王於西安僭國號曰順更其名曰自晟改元永昌造甲申厯拜牛金星為天佑殿大學士釐定六政府尚書益置學士宏文館文諭院諫議直指從政統㑹尚契司驗馬寺知政使書寫房以乾州宋企郊為吏政尚書平湖陸之祺為户政尚書真寧鞏焴為禮政尚書歸安張璘然為兵政尚書有渭南舉人王命誥者亦為自成兵政尚書餘官從自襄陽者陞賞賊帥給珠琲瓌寶人二升銀千兩權將軍制將軍封侯果毅將軍以下封伯封子男如汝侯劉宗敏澤侯田見秀蘄侯谷英亳侯李錦李錦目亦眇軍中稱小李瞎子磁侯劉芳亮偀侯張鼐一曰義侯綿侯袁宗弟岳侯某失其姓名淮侯劉國昌伯七十二人光山伯劉體純太平伯吳從義巫山伯馬世耀桃源伯白廣恩鄢陵伯劉某河南人武陽伯李佐文水伯陳永福其可考者也伯以下封子三十人男五十五人定軍制有一馬儳行列者斬之馬騰入田苗者斬之兵死令妻妾縊以從無别配按冊步兵四十萬馬兵六十萬兵政侍郎楊王休為都肄出横門以至渭橋職志環轉不絶金鼔動地用怖三秦鑄大錢直白金一兩次當十次當五錢平物價從之設科目試士甯紹先充考官用定鼎長安賦拔扶風舉人張文熙為第一草偽檄宏文學士李化麟臺諫宋衞等頌功德張形勢以指斥乗輿脅汙州郡自平陽降後再陷河津稷山榮河山西望風送款賊以一軍上絳州一軍上蒲州二月自成率其前軍過河牛金星顧君恩宋獻策參預密謀宋企郊鞏焴陸之祺張璘然以偽尚書喻上猷李振聲楊王休黎志陞以偽侍郎皆驂乗攻汾州破之徇河曲靜樂遂攻太原執晉王晉撫蔡懋德殉節死自成兵至忻州攻代五臺令迎降寧武關總兵周遇吉殊死戰兵敗被殺自成歎曰使守將盡如周將軍吾何以得至於此犯大同巡撫衞景瑗總兵朱三樂死之自成入大同殺代藩宗室殆盡犯宣府白廣恩官撫民書與總兵姜瓖約降巡撫朱之馮謀守城軍士無應者拔刀自刎死自成遂犯陽和從栁溝以入居庸真保定大名皆不守自成以三月十三日至昌平十九日京師陷駕崩其事在國史故不著夫自成已破太原踰太行蹂真保可以直犯京師迺先攻寧武雁門者蓋以宣大天下勁兵處懼京師急而為之援也是以偏師行入趙地其正兵則從兩關出代上谷乗瓦解之勢以盡收宣大之兵然後轉攻居庸以進先斷我勤王之師而京師坐困彼其視内外三關之勢可從内以出又可從外以入而京師孤注遂落其掌中嗚呼豈非天哉自成之敗於山海由固關而逃也自成敗于山海之一片石或曰紅花淀五月初二日又敗於定州定州人殺偽州牧董一陽恨其虐政也斬其偽果毅將軍谷可成左光先負創走牛金星以自成為不足輔頗有鞅鞅心而李巖者向固勸自成以不殺者也其在京師劉宗敏居田宏遇故第李巖居嘉定伯府宗敏日殺人而巖於士大夫無所拷掠又嘗以大義脫懿安后於厄而俾之從容自死軍中多稱之宋獻策極與善密說曰十八孩兒之讖得母為公乎巖雖不敢應然殊自喜牛金星聞之因側目定州之敗鹿邑考城柘城諸縣令為丁叅將所誘執送之南都人言河南全境皆反正自成大驚與其下謀之巖曰誠予臣以精卒二萬馳至中州彼郡縣必不敢動即動亦可得而收也金星勸從其請既而自成以為疑金星見其疑也進曰河南天下形勝地且屬李巖故鄉若以大兵與之是假蛟龍以雲雨必不制矣異日者舉中州之豪傑以與關中爭勝負即主上且奈之何自成曰如是若何以勸我從之金星曰巖蓄叛已久臣始勸從之以安其心耳且巖與主上同姓前聞宋軍師讖語在衆中欣然有自負色今河南反彼不候軍令不薦他將而自請兵目中已無主矣國兵新敗人心動搖遂欲乗機竊柄以自王是豈復可信乎不如除之無貽後患自成曰善明日金星以自成命盛為具與巖帳飲伏壯士於幕後三爵後并其弟牟執而戮之宋獻策聞二李之死也扼腕憤歎劉宗敏按劒切齒以罵金星曰我見金星即手劒斬之文武不和軍士解體自成遂不能復戰而席卷歸秦矣自成既西徙三晉鄉紳富户以入關中榆次太谷聞闖敗閉城拒守自成攻破屠之定襄殺偽官為偽磁侯劉芳亮所攻屠俘壯丁膠置太原陳永福皆殺之屬城無不罹禍忻州祈州尤慘留其將陳永福府尹韓文銓守太原陳永福殺晉藩宗子殆盡身率軍過河駐韓城為策應在道怒吏政尚書宋企郊私其親故選補多用乾州人鎖其頸至西安釋之使視事如故三晉士大夫皆迫刦以行得蒲州人韓霖愛其才以為叅謀霖知名士久不第故樂為用以故太常卿張第元為兵政尚書給事中耿始然為刑政尚書第元之從於韓城也自成猝問之曰爾家在河北無恙乎第元倉卒不識忌諱謾應曰人皆以其為賊官相屠害自成大怒立誅之始然懼失自成指於刑政所奏讞輒當之以死牛金星謂之曰君為其職奈何無所平反始然稍敢爭執自成手其奏怒不測金星密以告始然惶恐夫婦皆自縊鞏焴之為禮政自成命以更定威儀服式雅不稱意指杖之㡬斃甲申八月自成新立其祖禰廟將以已生日往祀焴仿古法為山龍衮衣進自成被之忽寒栗索火左右熾炭於位禮卒不成怒焴曰若移兩山於肩以壓我將加僇金星力救免自成性好殺為衆意所矯强詐稱仁義以煽惑愚民既兵敗見齊晉多殺偽官以背之輒復狠强自用嘗住韓城二十五日鞭撻縣官斬斮掾吏召里甲而刑劓之發壯夫為丁多所造作徭役繁興米荳芻茭責之民者萬端韓人莫必其命戸政侍郎李天篤初論戍尋縊殺之妻子財物皆賞軍延安府尹賈我祺以贓穢死於市直指伍中愷謫為軍牧守以下如知鄜州袁某三水令李三楚朝邑令某并其教官某等坐受納用銅稅斬胥隷不敢下鄉民有盜人一雞者論死惴惴莫敢犯法自成呼其下相曰平章尚書曰樞密自以不知書命其下教之作字又令講通鑑而聽之輒用己意論臧否少時饑困盜主人羝羊鞭之見血既得志不修布衣之怨遇其家如故秦人又以此異之初自成即偽位天大風霾失色心不樂入燕都抽矢射承天門意有所命不中中其偏處既登殿而暈眩不能自持歸秦怪風作於西安麗譙象魏俱敗乙酉正月大雨雪二月本朝大兵至潼關攻之偽巫山伯馬世耀以六十萬衆大敗潼關破世耀死自成欲返據延安聞唐帥從黄甫川西渡谷英李過俱潰逃知西安不能守令田見秀開府庫任軍士分持去倉廩則燒之自成於十三日出東門至藍田由商州龍駒寨走武關以入襄陽婦女細弱凍死於七盤坡者數萬田見秀之焚積聚也自成欲并以爇宮室市里㑹其已去見秀殿曰秦人饑留此米活百姓止燒東城一樓追及自成於商州曰已焚矣宋企郊等皆於道亡牛金星亦留而從其子於襄陽自成至武昌左良玉時巳率衆南下武昌虚無人自成偕其妻髙氏李錦李過髙必正皆肺腑戚諸將田見秀袁宗弟劉體純劉芳亮張鼐吳從義牛萬才等猶從之其衆尚數十萬分為四十八部居武昌五十日改江夏為瑞符縣設偽令運銅炭鑄永昌錢謀奪舟南下取宣歙曰西北雖不定東南詎再失之將發而隂霾四塞暴雨烈風旗鎗盡折迺以四月二十四日改由金牛保安走延寧蒲圻沿道恣殺掠過通城命其下四十八部先發自成令嚴兵行無敢返顧者通城有九宮山一名羅公山山有元帝廟山民賽㑹以盟謀捍衞閭井自成止以二十騎殿又呵其二十騎止於山下而自以單騎登山入廟見帝像伏謁若有物擊之者不能起村人疑以為刦盜取所荷鍤碎其首既斃而腰下見金印且有非常衣服大駭從山後逃去二十騎訝久不出跡而求之則已血肉臠分矣彼其弑君后毒生靈上天震怒之日久矣數窮氣索猶思披猖自恣山神社鬼咸思剪其凶慝卒假手野夫以斃之云外史氏曰賊之所以敗者有三曰詐而難久也驕而難制也散而難收也自成天性兇殘身所屠滅者不知㡬億萬晚乃倡言不殺詭以收天下之心吾民父子兄弟皆死於賊手不得已姑從其令以紓一時之急賊又不加拊循而偽官之虐政隨其後愚民失望謀起而拒之彼自成者初勉强於一夫之說矯情易意以圖就大事既知其無成則將恣睢哮闞大逞其兇毒是以初用李巖既而殺之盖怒河南之叛已也使通城不死自成竄湖湘窺吳越其惡且不下於獻忠矣安在其不殺哉所謂詐而難久者此也自成初盜福邸之貲以號召宛雒附從始衆逮乎京師陷其下爭走金帛財物之府以分之此其為利同也始何以合今何以散若是其懸焉者則以前之所招饑民而後之所御驕兵也兵貪則驕驕則惰惰則不戰而潰矣赤眉之入長安也侯景之破臺城也皆不旋踵而敗彼饑寒乞活之人一旦見宮室帷帳珍怪重寶以千數志滿意得飲酒髙㑹有富貴歸故鄉之心胠篋擔囊惟恐在後何暇同心膽共功名哉所謂驕而難制者此也爾朱榮之料其子兆也曰彼止可綂三千騎為將耳過此則亂矣今以獻忠用寡而自成用衆然詎可以將百萬乎彼於羅汝才賀一龍殺其帥而并其衆皆怨軍也諸將惟陳永福以一矢之故反為効死白廣恩則性工反覆左光先官撫民則事急來歸皆强服也李巖見舉動之非宜宋獻策恨吾謀之不用劉宗敏以下見自成為帝王而已貴不益又其等彛故人也彼非側目思報觀望鞅鞅則懐布衣兄弟之心詎肯俛眉义手而為之下祗以狃於一勝貪財帛子女以形勢相從茍有所挫即渙然奔離耳所謂散而難收者此也當京師未破之前彗孛直掃黄河倒流四方訛言人心螘動逆賊如鬼蜮之蠱惑士民如豺虎之震怖遐邇未㡬天柱傾地維折而䝟貐饕餮之氣亦澌然其泯滅嗟乎自成一盜羊逋逃之人耳當其盛萬金之賞莫能購十道之師莫能征及其衰也二三蕘夫牧豎奮耰鋤擲瓦礫而賊之血膋肢體固已藉草棘而啖烏鳶矣昔成祖築元帝廟於嵾嶺見者彷彿帝容楚諸山各有特廟詩曰明明在下赫赫在上此必文皇在天之靈痛子孫而擊其賊也彼夫枕戈泣血之士未能手劒以馘仇人之頭徒使之貫瀆鬼神而降之罰千載而下讀其事者恫乎有餘恨焉附紀崇禎十六年有人運佛九座進武當山來京師掛號其佛髙六七尺下有車輪正陽門外布列三座觀者沸市後因事洩始知藏炮於佛腹中欲安置九門為賊内應下錦衣衞刑部勘問伏誅賊抵彰義門宋獻策初云此行觀兵城下十五年始可破城城樓上忽墮一天啓大錢一當五用獻策云此破城兆可急攻發一大炮樓角遂崩賊將白旺之守徳安也兵甚强且有紀律能得其下心當自成之敗其軍初棄婦女繼棄金寶至徳安已大疲惟旺一軍完且整兼各寨俱服而徳安城堅旺謀守之不肯去自成固强之始行追急自成掠江州至道士洑又登岸入興國與柯陳二姓交戰互有殺傷有王體中者竒士在旺軍中自成死旺軍亂體中乗便刺殺旺挾其衆以降與金聲桓同定江西金兵弱王兵强後以不肯相下金用計結其左右王得仁誘體中至都察院殺之此乙酉七月二十九日事也時王兵大譟與金兵戰於城中南昌西北民居盡燬次日得仁撫之乃定其後與聲桓同反者恃其强以得白旺之衆也自成之敗也李錦在榆林唐通從黄甫川過河以自成遇其家之酷也故别為一軍以抄其後錦頗善戰賊中號小李與通鬬殊有勝負其時惟榆林一隊能相持既而聞自成已去長安其下大潰故亦走自成入秦凡秦人之為賊者無不訪宗族修墳墓田見秀獨不然人問之見秀笑曰如今天下在那裏我要去認親故舊有至者密遺以金帛促之去及敗後劉宗敏宗族誅墳墓發見秀獨不知其為何邑人故免牛金星嘗在華州考諸生其題為所過者化所存者神上下與天地同流文體改八股為議中格者為縣令自成之待其下惟劉宗敏田見秀谷英張鼐袁宗弟劉芳亮李錦七侯者功最大禮遇為獨隆其初封也每侯賞珠一大斗金銀一車幣千端士卒從北都歸腰皆有黄金瓌寶飲村人酒擲金與之或手給珠一握無所吝内庫錦段如布價皆洪武時造然服之易毀云白廣恩家珊瑚樹髙累尺皆禁中物也自成去長安居民爭入其所居捜取金銀中夜失火秦府被燒㡬盡惟􅉰民有膽力得最多故大富者衆關中人遇雨後於布政司泥土中拾得珍珠至今不絶歸徳宋公權撫遵化之三日而自成陷京師分設偽將軍道府州縣官於京東而分捕諸舊官甚急公方出外巡徼母丁太夫人及百口猶在遵化遑遽欲歸僕王楷曰事急矣同死孤城無益也楷與楊俊及部下士孫之麒等數人擁護公一日夜走白羊峪宣府舊鎮唐珏者為自成執至京加拷掠脫身亡道遇公遂與之俱至白羊喘息未及定而太平路偽將黄定以五十騎跡公五十人皆舊卒心不忍公與珏及裨將殷壯猶等呼問之中一人語稍異珏即躍起斬之以其首誓衆曰急取太平路可也偽帥黄定方掠民間女飾衣服鼔吹講合卺禮忽聞公至殊不意忘取所佩刀入傳舍向上長揖公命左右縛且砍之定故秦人腰間尚有小刺子亟取以刺縛者盡卸其衣裸而走王楷持刀逐之未至中門見故吏陸魁春者帶刀入楷急呼曰殺賊魁春浙人力素弱刀又不利雙手持刀向定定奔急適與之值正揕其胸遂仆衆因攢矛殺之其黨箭從外射入者如雨久之乃定尚有喜峰松棚偽將馬應湖畢三才三屯偽將劉衷擁衆各數千公曰太平已定誰可分往殺賊者守備米富玉者鋭甚而公有死友曰姜承印請同行且曰不須兵吾二人足矣公壯之飲以酒兩人上馬攜一大囊抵喜峰語門者曰宋公有密語遣我白將軍賊見其人少不疑命之進賊方坐堂上富玉作拜跪狀承印西向侍賊欣然下扶玉玉奮力抱賊承印以刀砍之誤中玉左臂㡬斷玉終不釋承印遂殺賊環而呼曰官兵數千且至汝等不得動動即誅矣衆咸讋服遂以首投囊中歸報顧視玉衣袖重類有物解之血淋淋下而玉不知知乃昏暈絶急以藥傅之始甦而松棚諸處亦殺偽將以獻盖先後凡二日云自成敗於關門三屯賊劉衷不之知公令舊總鎮孔希貴子國治潛入三屯為内應而自以數騎抵其壁衷即擁衆去遵化城中偽道潘躍龍偽同知張耀然偽知縣李廷瑗亦不敢害公家公至城下密約舊將楊遇明張徳裕等以計誅之共得偽印七偽官十餘人而三協大定於是唐珏單騎往關門乞師公母丁太夫人泣語珏曰吾知公百口在京師然舉大事者不顧家公勉之萬一不測吾孫即若子也自成恨公之殺其將遣鐵騎數千來攻公乗城守出兵與之戰賊奔潰遵化以全唐公至闗得遇王師數日王師抵京師自成大敗歸秦公疏請歸田不許詔撫遵化如故綏冦紀略卷九
