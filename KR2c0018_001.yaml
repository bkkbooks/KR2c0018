body:
  text: 綏冦紀略卷一國子監祭酒吳偉業撰澠池渡崇禎元年戊辰三月二十日昧爽前全秦天赤如血五六七月西安有孽火入人家色青光熒熒然廣輪盈尺者數十旋于地若鬬不濫炎民磔雞犬禳之乃去自四月至七月不雨八月恆雨霜殺稼冬大雨雪木冰嵗大饑秦以延綏寧夏甘肅為三邊延綏據河為塞斥衍千二百里築三十六堡分險列戍沙磧不生五榖富民計口仰食縣官承平忨愒算崇禎改元上距萬厯四十七年延餉缺額者至一百三十八萬天啓中秦撫喬應甲延撫朱童蒙皆奄黨也應甲貪婪抂易法紀潰弛四封之內攻亭長殺長吏而莫禁嘗有道臣袁養和被劫請捕應甲反脅取養和千金中書張賀昌被劫執巡捕典史王允德索賂二百金以是被盜之家莫敢控告童蒙朘削軍廩助三殿大工兵民側目始禍實自兩人秦地所出新餉均輸間架三者專以備他急數日增吏因緣為奸羡餘輒倍西安鎮兵數萬率買閒占役以空名隸尺籍兵科劉懋疏秦兵屬邊操者賣于邊官嵗納班價屬參都者賣于參都月納班錢操兵三千占于各衙門司道宗室鄉紳以供役使民不堪復無所憚以此糾合邊人為賊十一月白水男子王二反王二劫宜君縣獄拒捕逃入苜蓿溝􅉰賊巢穴十一月內通白水衙役楊發蒲城王髙等為亂掠蒲城之孝童韓城之淄川鎮王左掛原名王之爵有苗美飛山虎大紅狼等同起起于宜川地名龍耳嘴十二月三邊總督武之望奏固原兵變元年十二月二十四日兵劫固原州庫總兵錢中選無軍紀得免論巡按御史吳煥糾巡撫胡廷宴瞶眊不視事與延撫嶽和聲以邊兵饑民互相推匿所奏報俱不實致成大患兵部尚書王洽請核其事以聞刑給事薛國觀奏言淳化綏德等處流賊千百為羣由喬應甲縱盜釀禍得㫖報聞二年己巳正月鄖陽撫治梁應澤奏陜西賊王大梁一名大梁王三千人入略陽逼漢中十月二十六日漢南賊大梁王從成縣兩當逼近略陽漢中官兵追至寧羌州逸去後復趨略陽官兵戰敗鄖撫告急商洛道劉應遇討白水賊王二斬之餘黨竄入黃龍山苜蓿溝固原逃兵掠涇陽富平執遊擊李英二月總督武之望病死胡廷宴間住以陜西左布政劉廣生為秦撫右副都御史楊鶴總督三邊嶽和聲罷吳煥疏盜自戊辰七月王二作難己巳盜首韓世盤韓世友胡之槐吳養臣皆邊兵故和聲亦罷以河南左布政張夢鯨為延撫吳自勉為延綏總兵四月階州叛兵周大旺等作亂副將賀虎臣捕得伏誅督糧道參議洪承疇率鄉勇圍左掛于雲陽幾成擒暮大雷雨作遁去三月草一日賊自真寧逼三水逰擊髙從龍卻之賊入馬蘭山四月九日復犯耀州承疇令官兵鄉勇萬餘人分十二營圍賊于雲陽幾獲之乘夜雷雨潰圍走淳化入神道嶺追斬二百餘級劉應遇追漢南賊于大石川所將卒斬王大梁于陳圍其餘黨于伏羌之五丁峽將盡殲之寧羌知州陳元瓚失防賊遁去劉應遇提毛兵入漢合川將吳國輔兵擊賊于略陽十戰皆捷賊屯垣口有守備王元極陷陳馬蹶被殺猶手握賊級不置賊退漢隂應遇令都司解文英同蜀將吳國輔李標竒追至大石川斬五百級把總李旺得賊首王大梁餘解散十一月京師戒嚴延綏總兵吳自勉入援侵行糧軍中道逃歸為亂延撫張夢鯨憤恚死自勉沿途逗遛賄放精兵變賣營馬夢鯨憤鬱以死瀕死移書楊鶴糾參鶴不以上聞山西巡撫耿如杞亦率兵入衛叛逃為賊耿所統皆沿邊徑卒巳至都下矣兵部調守通明日又調守昌又明日又調守良鄉功令兵到日不准開糧次日列營汛地乃給之西兵連調三日三日不得糧既餒且怒遂沿山東一帶劫掠耿以不戢軍士逮問耿既逮五千人哄然盡散潰歸山西而晉中流賊起矣以洪承疇為延綏巡撫兵部尚書王洽有罪下獄左侍郎申用懋晉尚書三年庚午正月申用懋自劾免以薊督梁廷棟為兵部尚書吳自勉罷以臨洮總兵王承恩為延綏總兵其改用王承恩以兵將不安剝軍士未上聞也後李應期閲邊據所聞參劾帝怒甚提問自勉于四年九月病故薊督張鳳翼留承恩春防甘肅總兵楊嘉謨入援踐更率其兵駐東協時錢中選亦入援行秦督撫以三邊四鎮止寧夏總兵賀虎臣一人非所以辦冦請用故總兵杜文煥攝承恩鎮西將事兼督延綏固原兵三千便宜勦撫報可王子順苗美勾逃兵掠綏德圍韓城復犯清澗總督楊鶴巡撫劉廣生擊卻之斬級三千降其衆三百人總兵杜文煥又敗之于安定先是萬厯時朝廷念西軍勞苦預給三月糧以為常崇禎己巳秦大旱粟踊貴軍餉告匱延撫楊鶴甘撫梅之煥分道勤王是年復以稽餉而譁其潰卒畏捕誅亡命山谷間倡饑民為亂時東事急朝議核兵餉各邊鎮咸釐汰裁額至數十萬乘障兵咸譟而下而兵科給事劉懋疏請裁定驛站嵗可節金錢數十萬帝喜著為令有濫豫者罪勿赦懋意謂蘇民力也而河北遊民藉食驛糈至是遂無所得食益無賴潰兵乘之而全陜無寧宇矣先是懋有補足兩年缺餉與賑金十萬之請事既不行再疏以陜西衛兵冒濫虛弱求按冊清汰操練并秦有司重火耗多贖鍰宜拏問其尤以謝關中之人亂將自定其論最剴切惟舉全秦公費存留巡方贓罰驛站節裁銀兩充勦撫之用頗有近于搜括然因號呼帑金弗應而疆事日益亟豈得已哉而京師向有劉給事裁省驛遞驅民為盜之謠不知何故愚謂必出于士大夫輶軒之口所以流傳至今夫鄜延絶塞無與流傳關隴饑民寧關輿隸若早從其請不啻曲突徙薪是不可以不辨然考之御史姜思睿疏云各遞貧民千百為羣任輦輿以續命者饑餓待死散而為盜聞懋易簀時亦深悔為此言後死京邸棺至山東莫有為輦負者各處饑民甚至呼其名而詛咒之圖其形而叢射之是又非無見云然姑兩存之二月杜文煥檄諭米脂清澗諸賊王左掛以其黨二百人降熒惑入東井退舍復嬴居數月又入鬼宿犯積尸氣延安知府張輦都司艾穆蹙賊于延川賊王子順張述聖姬三兒等俱乞降王嘉引掠延安慶陽城堡多陷楊鶴主撫不以聞鶴與劉廣生出示崇禎三年三四等月有賊首黃虎小紅狼一丈青龍得水混江龍掠地虎孟良等俱給免死牌安置延綏河曲其淫掠如故民罹荼毒有司莫敢禦冦患成于此矣四月賊從神木渡河入晉五月楊鶴移鎮耀州賊攻破金鎖關殺都司王廉調榆林道張福臻提兵討之六月御史李應期巡按陜西疏請招撫許之職方郎李繼貞兵科給事劉懋先後請以十萬金賑延綏不報賊王嘉引破黃甫川清水木瓜三堡孤山副將李釗被殺尋破府谷據其城又破孤山先是釗欲圖賊而左右皆賊黨釗出巡至清水營遂遇害賊在府谷不過數百官兵大集可以盡殲而輕用招安不渝旬日復號召成旅東陷山西河曲劉廣生稱病以陜西左布政王順行為陜撫以曹文詔為孤山副將七月李應期奏慶陽守備李極敗績于鄜州之雷公嶺巡檢陳其佐被殺守備白邦政重創失戰馬四十三匹王順行請三年裁扣驛站銀三萬兩充養兵費下戶部尚書畢自嚴酌議以聞楊鶴疏云帝允舊撫臣王順行之請准發裁扣站銀三萬金而布政呂遜又以抵補借動司庫之數是於順行去後從其請而終于不行也八月府谷賊王嘉引以其衆奔黃甫川王順行解任以太僕寺少卿練國事為秦撫九月洪承疇杜文煥攻黃甫川賊破走之降賊王左掛謀叛洪承疇李應期定計誅之錢中選罷以楊麒為固原總兵率其兵駐西協兵部尚書梁廷棟請敕秦督撫逮治二三貪殘有司盡補三邊兩年缺餉而用杜文煥為大將秦晉諸將兵皆屬焉兩省選精鋭萬人屬之沿河營衛聽節制各撫按道親歷行間監督陜西留站銀三萬兩山西留二萬兩兩省撫按再各借二萬五千兩以資軍費秦洊饑至是大祲山西以防河閉糶斗米六錢米脂清澗延長綏德之民流亡捐瘠米脂人從賊者十之七邑幾空吳甡疏請通晉中糴販有㫖在西安接濟其實西安逺而晉近而清澗綏德葭州與晉之臨縣興縣永寧州皆有渡口商民從來互相貿易今晉中設兵防盜因以遏糴榆林天下雄鎮多宿將徑兵若扼其吭絶之大可憂也膚施人張獻忠據十八寨十月賊王嘉引再陷清水木瓜等堡已又陷府谷殺遊擊李顯宗尋兵至走山西十一月賊李老柴攻合水十二月延綏叛兵神一元陷新安陷寧塞殺參將陳三槐四年辛未正月帝特發帑金十萬兩命御史吳甡往賑延安饑民務令賑恤以實宣布朝廷殲渠散脅德意即用甡代李應期察行間功罪洪承疇請撤王承恩還鎮許之帝召對各省監司諭陜西參政劉應遇曰冦亦吾赤子也宜招撫不可純勦二月神一元陷保安一元死弟一魁領其衆陷合水圍慶陽御史李應期報保安捷言斬賊二百四十級內有神一元首級及弟立賊不利棄城走二月十四日圍慶陽推官馬一荀知縣李含朴設守二十九日陷合水杜文煥張應昌來救慶陽圍解平凉固原􅉰囉為亂太白晝見熒惑再入魁宿犯積尸氣楊鶴移鎮寧州受神一魁降鶴責數其十罪一魁伏謝鶴奏言三月初三日定邊副將張應昌解慶陽圍初五日賊遣劉金劉鴻儒求撫初九日賊遣孫繼業茹成名等六十餘人投降送出合水縣知縣蔣應昌及保安縣印信練國事又報榆林道張福臻撫過拓光齡等數百人又金翅鵬過天星等八十餘人關內道翟師雄撫過田近菴等六百人雒川知縣劉三顧解散獨頭虎等數千人慶陽地方撫過劉道海白栁溪等數千人而㸃燈子當大敗後降于清澗時鶴設御座于城樓上賊跪拜呼萬嵗因宣聖諭令賊設誓或歸伍或歸農自此羣盜視總督如兒戲矣練國事移鎮鄜州率副將張全昌等屢勝賊于中部于郃陽于芝川韓城斬六百餘級國事上疏極言當一以大勦為主必使大夥强壯者盡誅而後别夥受撫者可服人是其言賊不沾泥攻圍米脂總兵王承恩張應昌率兵援之賊敗遁尋降不沾泥手殺雙翅虎縛紫金龍以自贖賊滿天星降于楊鶴尋叛去洪承疇命守備賀人龍勞降人酒降人入謝伏兵斬三百二十人五月王承恩擊宜川賊敗之闖王虎金翅鵬降金翅鵬即王子順之姪王成功餘賊走宜君曹變蛟擊敗寧塞遺賊于唐毛山四戰皆捷斬一千四百餘級兵部尚書梁廷棟革職吳甡至延安以西安推官史可法行賑救如詔書從事人便之秦三年旱至是始雨六月孤山副將曹文詔追斬王嘉引于山西之陽城兵部議撤西兵還秦以固原兵新至請先命楊嘉謨歸甘肅而留楊麒俟徐遣乃報可七月㸃燈子率六千餘衆東渡山西賊李老柴獨行狼陷中部時有受撫賊田近菴者以六百人守馬攔山應之署事同知鄭師𤣥奉楊鶴檄委任招撫賊至不成備以喪其邑練國事王承恩率兵先後攻圍困之賊上天龍馬老虎獨行狼復掠鄜州楊鶴王承恩擊走之上天龍等以二千人降給事曹履泰孟國祥各奏撫賊欺飾之弊御史吳甡亦言招安之弊載在史冊今宜以先勦後撫為定䇿如果投戈棄甲抱旗乞降則勦之中亦自寓撫之意而實以勦堅撫如或狡詐復逞聚掠不散則撫之時亦自有勦之用而不因撫廢勦人㫖其言八月賀虎臣擊斬慶陽賊劉六以曹文詔為臨洮總兵九月曹文詔殲㸃燈子于晉中班師神一魁竊寧塞以叛賊郝臨菴掠同官耀州宜君等處賊上天猴掠宜雒時合獨頭虎滿天星一丈青等五部恣掠宜雒副將趙大𦙍駐韓城去賊營二十里不救土人强之出報斬五十級驗之則皆婦女首也給事魏呈潤劾大𦙍革職十月楊鶴革職逮訊練國事戴罪自贖榆林道張福臻同總兵曹文詔下中部馘李老柴送京師賊上天猴詐入宜川尋降十一月延撫洪承疇總督三邊張福臻為延綏巡撫賊談雄陷安塞安塞知縣柴國弼固守後以積勞死遂陷談雄同髙自知等以十一月初七日通奸民入安塞城次日即出執生員郭汝盤以求撫閏十一月初九日復據安塞閏十一月降賊夜襲甘泉河西道張允登遇害混天猴等反除上天猴于鄜州督師急擊安塞談雄懼出降斬之承疇方圖寧塞計若株守賊將生心乃命曹文詔戴君恩等合圍而潛師夜趨安塞于十三日暮抵城下合王承恩李卑之兵四面急擊至二十五日早百道並登克其城共斬五百三十餘級擒六十餘人俘獲衣甲器械無算安塞賊平又有降賊黨雄王得貴拓亨髙凌志等糾賊千餘衆攻綏德州掠義合驛總兵王承恩同千總吳國偉守備賀人龍等追勦斬二百餘級指揮鄧得威以福臻令誘賊黨黨雄王得貴拓亨髙凌志等七人斬之賊不沾泥陷安定十二月洪承疇奏撫過延安吳家山黨家坪薛家崖大賊一十八寨賊首張獻忠羅汝才等一千九百餘名又分遣總兵曹文詔等同遊擊左光先崔宗引李國竒等五路勦宜綏清米四縣之賊于懷寧川黑泉峪綿湖峪封家溝大戰敗之追至祁家髙梁丑山掃地王授首帝以秦餉戶兵二部不覆奏召對切責兵部尚書熊明遇請措餉二十萬從之延撫同靖邊道戴君恩副將張應昌應昌係靖邊副將都司馬科等定寧塞神一魁誅死五年壬申正月帝用巡按御史吳甡言免延安慶陽新餉督師請留西鳳餉銀二十萬以勦賊勸農報可楊鶴論戍混天猴陷宜君三月初三日賊僞為米商進宜君縣知縣李迪康把總馬麟田恭魏安等俱逃二月陷鄜州僉事郭應響死之故總兵杜文煥以吳甡勘三年殺良冒功有實狀下獄三月臨洮總兵曹文詔甘肅總兵楊嘉謨大破賊于西濠西濠潰賊破華亭文詔嘉謨追至落水城賊紅軍友為其黨所殺四月督師合秦撫延撫追賊不沾泥于西川守備孫守法擒之七月馬科所將卒斬混天猴于延水關賊可天飛圍合水曹文詔楊嘉謨于銅川橋大戰越日文詔嘉謨偕固原總兵楊騏再戰于虎兕凹大破賊八月督師平賊鐵角城獨行狼可天飛伏誅餘賊伏大方山小方山于蒲河肆掠諸將遮絶要害曹文詔提兵一千五百人追殺于隴州平鳳界殲賊務盡張全昌馬科以千人自環縣應之時張福臻以撫賊故致王承恩之兵譁索餉解任去以陜西右布政陳竒瑜為延撫竒瑜亦能殺賊而右參政葉廷桂清軍道王振竒靖邊道戴君恩監軍道樊一蘅四人俱有功六年癸酉六月巡按御史范復粹上幕府軍功斬級三萬六千六百有竒曹文詔功第一楊嘉謨次之嘉謨西凉世職初以隨閣部孫承宗當關已推副將積功升甘肅總兵繼因援薊駐防於甘肅討賊賊平及歸秦僅用虛銜議叙補薊門總兵王承恩楊騏又次之諸將亦多可紀云當秦冦發難延綏以北為逃兵為邊盜延綏以南為土冦為饑民邊盜則神木之王嘉引靖邊之神一元為魁而支蔓于綏德之不沾泥慶陽之可天飛延安之郝臨菴鎮原之紅軍友也土冦則西川之王左掛苗美清澗之㸃燈子為魁而支蔓于中部之李老柴延州之混天猴保安之獨行狼也王嘉引以三年六月四日攻陷黃甫川清水木瓜三堡次日陷府谷縣據其城屢戰堅守詭約降縋而趨黃甫川圖大逞延撫洪承疇總兵杜文煥從孤山進勦斬首四百級晉兵亦得三百級賊窮送出縣印退保大小寬坪等寨十月二十日嘉引再陷清水已又陷府谷兵至走之晉晉總兵王國梁師大􅑒遂失河曲賊堞而守焉四年四月十八日裨將曹變蛟艾萬年艾萬年時為神木參將又有都司馬科杜大捷王世號曹文耀參謀袁廓守等從曹文詔收河曲斬首一千六百級獲軍資鎧仗數千計獲王嘉引銀印一王維嶽銀印一嘉引奪門走六月初一日得之陽城城下晉地也皆秦將士力云神一元以三年十二月一日破新安十三日破寧塞尋破栁樹澗二十五日攻靖邊三日夜副將李若梓固守微救兵至幾陷四年二月破保安副將張應昌左光先與戰大敗之神一元死御史李應期報保安之戰斬賊二百四十級內有一元首級衆推其弟一魁戰不利棄城走二月十四日圍慶陽推官馬一荀知縣李含朴設守二十九日陷合水杜文煥張應昌來救慶陽圍解二月初二日賊破饒陽堡遂長驅慶陽城外扎三大營張應昌力戰奪炮六位圍始解總督楊鶴移鎮寧州致一魁之壻于營中同臥起為其部强欲以陷諸賊一魁至數以十罪一破寧寨二殺將官陳三槐三破新安堡四搶栁樹澗五圍靖邊六破保安七勾西人入圍慶陽九破合水十殺戮良民淫汚婦女已服即宣詔赦豫以官處之寧塞衆四千有竒使參將吳𢎞器護焉憂其屬茹成名難制從一魁謀而去之一魁隂許諾衆莫知成名死成名挾賞未遂拳毆中軍范禮一魁執而杖之七月中一魁遣心腹劉金見楊鶴于三原鶴授意于金許以殺成名有賞九月十二日鶴在耀州一魁遣金同成名至鶴喜曰劉金至事濟矣張孟金黃友才皆猜懼九月十八日挾一魁以叛吳𢎞器他往執其下范禮尹鴻基等延撫張福臻率張應昌馬科之兵攻之斬一千七百一十八級友才見事急紿一魁圖之以為功尋自疑乃竄五年正月友才就縛王左掛同苗登雲苗登霧苗美起兵蹂躪綏德傷人挾參將石在廓擁衆南下三年正月十一日犯韓城掠韓城之龍門渡守將失利糧道洪承疇同撫院中軍李滿倉屯都司艾穆千總黃邑宰擊破之賊走清澗十七日犯郃陽據青澗之華嚴寺奔懷寧河二月杜文煥悉固原官軍陳而進左掛降賊首張述聖姬三兒乞降于河西道蔣士忠士忠遣故降人李光煃入營招諭左掛乃降苗美以八百人逸文煥追至鐵葉塞單騎入其營美叔登雲登霧降美再以百人遁遣都司王仲學跡之曰不得美無還也及之于賀家灣賊左右斬美首以獻并殺飛山虎大紅狼等副將李卑屯司艾穆等兵大集賊黨黃虎復乞降于守備白邦政八月左掛以賊白汝學攻綏德州謀內應為參將卜應第所覺不果九月按臣李應期與承疇文煥定計命遊擊左光先守備白邦政就綏德誅之邦政即按臣帳下剄王左掛苗登雲等五十七人餘黨在他境皆斃㸃燈子即趙四兒名勝初起于清澗之解家溝花牙寺逞于延南奔突韓城宜雒往來秦晉沿河州縣多苦之秦撫練國事以四年三月二十日于中部在中部國事率張全昌趙大𦙍夾攻斬六百餘級四月初二日于郃陽初七日于韓城賊掠韓城郃陽復窺芝川鎮靈州參將張全昌以五百人戰三日共斬三百餘級十一日于栁村十二日于上峪口乘勝纍尅斬級七百有竒賊以七月二十二日夜半渡河入晉督師延撫及曹文詔艾萬年追之八月初三日大敗之于桑落鎮又敗之于花地窊霧露山賊退屯石樓縣之烏龍寺康家山與綏清隔河二十里綏德知州周士竒守備孫守法伏兵于含峪以降丁賀思賢為導九月十八日夜守法渡河襲之㸃燈子出不意裸身提刀欲戰思賢識其聲直前砍之乃斃都司王世虎守備姚進忠前于霧露山陳歿語有之涓涓不絶乃成江河當賊初起匹夫瓦合倔强山谷間其偏袒大呼首事作難者不過嘉引左掛輩三數人耳而皆已撲滅中外大臣以為苟得始事者之首天下無事矣縱有餘孽州縣當就捕豈知後起之盛蔓不可圖哉李老柴獨行狼之攻中部也有受撫賊田近菴者以六百人守馬欄山應之署事同知鄭師𤣥楊鶴委以招撫賊至不成備以喪其邑練國事王承恩先後攻圍五月賊突不得出慶陽賊郝臨菴劉道江來援㑹文詔殺㸃燈子凱以歸于秦與張福臻合兵殄賊福臻先誘李老柴生致之福臻遣都司王雄誘李老柴一條龍出羈留之一鼓而下中部傳老柴磔都市中部逃賊見李老柴一條龍被執奔摩雲谷副將張𢎞業游擊李明輔遇賊戰沒不沾泥原名張存孟初從魚河川出不意襲安定城其後為王承恩所讋偕羣醜雲交月等送款不沾泥手刃雙翅虎傳獻紫金龍投誠尋相繼叛滿天星雲交月混天王黃龍眼等數萬四年四月結三營于宜川城外五月初二日王承恩勦之賊奔蟒頭山官軍復有斬獲賊首闖山虎陳龍不沾泥等乞降餘賊又遁宜君掠同官尋草上飛乞降五月二十七日滿天星雲交月金翅鵬金龍强虎鎖天鷂等俱降散餘黨萬二千餘人原籍安插十二月二十一日降賊復叛攻綏德州五年二月初二日雲交月叛四月不沾泥復叛搶米脂五月初七日入西川西川其窟穴也大山深谷初王左掛倚為固不沾泥取之立十二哨六十四寨壁天險為持久壬申四月攻米脂葭川延撫張福臻同道臣樊一蘅率三千人總兵王承恩同孤山副將侯拱極都司艾萬年唐通中協副將卜應第遊擊文鼎心和應薦都司張天禮守備賀人龍等同撫標遊擊費邑宰左光先崔重亨丁世虎等馬步三千席卷逐北與承疇㑹師雙湖塔壓其巢命孫守法遮絶河津斷其西走賊逃至含峪為馬科所躡過河才二十七騎守法追之河東三十里賊反鬬騎盡亡守法身得不沾泥麇以入福臻赦詿誤者李成材罪諭降凶徒三百人出皆其豪也總督委守備賀人龍領之先令脅從千人歸農承疇復親將張天禮唐通等幕下賊至驅出僇之止有喬六部混入我兵口稱殺賊脫走不沾泥劉民悅于綏德州斬訖民悅即甘泉縣劫餉殺官之魁也紅軍友李都司杜三楊老柴等乃神一魁餘孽屯萬人于鎮原之蒲河欲犯平凉走鳳漢練國事檄楊嘉謨及副將王性善等扼險設防國事移鎮涇州聞信疾馳固原檄固原道王振竒同副將王性善守鎮原要口檄平凉道徐如翰同副將董志義守涇州馬關諸路又檄總兵楊嘉謨游擊趙光逺嚴緝姦細殺賊塘馬斷其耳目遂不敢馳出口有回方山一路道臣王振竒復令􅉰兵把總海喬扼險拒之而承疇率文詔以臨洮兵三千從鄜州間道來㑹從鄜州間道裹糧四晝夜至慶陽按臣吳甡久駐慶陽復檄寧夏新兵疾趨西濠五年三月十一日于西濠大戰文詔嘉謨性善拔其三屯斬首千級所將卒得杜三楊老柴餘衆南奔奪武安監三月草四日賊入監正吳三才遁五月初三日署監録事周洪化殺賊陳亡破華亭草五日賊詐稱官兵襲華亭知縣徐兆麟遁殺教官鄒邦榮賊二日去攻莊浪大賊玉老虎等攻莊浪文詔嘉謨遣都司靳桂香游擊曹變蛟馮舉劉成功等追至張麻村大戰張麻村賊戰敗追二十餘里斬二百三十餘級賊遁入髙山賊憑山大戰射死千總李應春㑹性善之兵亦至同甘肅副將李鴻嗣參將莫與京等又共追之于咸寧關王性善斬二百九十八級咸寧關共斬一百二十九級賊將回向寶雞曹變蛟楊光烈等截斬三百五十級追之于隴安司賊披靡尚有衆數千緣趙光逺厄狹不得往漢南由長寧驛四月草二日臨洮副將蔣一陽值長寧逃賊于清水縣失亡數百人把總徐承斌陳沒都司李宮用見執赴張家川而文詔從隴州至縱反間以亂其心賊內自疑剚刃紅軍友我師從而乘之鏖水落城西大呼摧陷二十六日賊敗追至靜寧川賊走萆唐毛山以望我師我爭山不得上曹變蛟躍馬騰凌其巔將士同奮弓矢亂發賊應絃而倒寧塞餘賊殲盡先後斬一千四百餘級上天猴原名劉九思之窺宜川也劫知縣馬自然于靈岩嶺同混天猴曹操飛虎李仁友等五營劫自然至營內八日舁入城要以求撫賊住察院內合三戶養一賊楊鶴受之處其部二千人于鄜州有降卒白栁溪者夜勾賊掠河西道張允登所解民運十萬七千金于甘泉戕允登及知縣郭永固允登歷知咸陽咸寧有善政在鄜延當荒盜之餘備極勞苦士民聞變俱喪服迎哭罷市三日事聞與郭永固皆贈官有差上天猴在鄜州伏法混天猴名張應金向隸允登甘泉之亂與焉既叛去恣甚五年正月初四日陷宜君二月二十一日陷鄜州六月十九日襲靖邊張應昌追之真水川又追之中湖山射賊將白廣恩顛復得他馬以逸二十一日攻合水馬科從督師追之甘泉山中七月一日追之延水關東有黃河北有降丁賀得清劉應福堵截馬科同李卑共斬賊首六百二十級追至黃河畔溺死者無數馬科部卒楊茂春得混天猴之首以狥可天飛郝臨菴劉道江因接應中部為王承恩所敗歸保鐵魚城獨行狼跳入其伍别守蘆保嶺李都司亦往從焉分地耕牧混天猴死其黨煽動可天飛劉道江于五年七月初四日再圍合水游擊陳光先守兵四百人同知縣施喬旃力拒之焚東關左光先率衆巷戰曹文詔以千八百騎往救至花園寺聞炮聲疾馳賊匿精鋭山谷中用千人來逆且鬬且引抵南原伏四起城上譁言曰曹將軍已沒文詔瞋目持矛左右衝突匹馬縈回萬衆殊死戰士望見氣百倍表裏夾擊賊大敗僵尸蔽野初七日總兵楊嘉謨諜報賊自合水北分為二股不犯鎮原必犯驛馬關銅川橋與驛馬關關泉鎮不逺初十日曹文詔率都司馮舉游擊曹變蛟楊嘉謨率參將方茂功都司李召楊三才等大戰銅川橋兩將尾賊于關泉鎮賊二萬分精騎待戰東西兩溝伏步賊數千我兵進至銅川橋大戰追奔二十餘里文詔身自陷陳衝其中堅賊互相轔籍投崖塹死者無算㑹楊騏以固原之兵至賊又議攻鎮原以窺平固關曹楊賀三鎮于七月十三日自驛馬關移兵至十四日抵鎮原而楊騏先一日至縣于是四鎮合兵大勦文詔嘉謨及寧夏總兵賀虎臣虎臣後以寧夏邊警以六千人輕敵覆沒于十七日同破賊于甘泉之虎兕凹追奔五十里斬首七百賊大困二十四日楊騏追之于安口河二十九日追之于崇信窑八月初三日追之于白茅山功最著初八日督師次平凉宣言降者勿殺散去數千人追至何家老寨賊首何崇以其寨匿可天飛同亂陳斬可天飛李都司二賊白廣恩降十五日廣恩殺其黨降齊一勳郝惟端俱降請殺賊自效甘泉殺官劫餉賊石耀伏誅十月初四日官兵敗賊于髙家畔再戰于寧州于山水官家洞皆有斬獲十一月初四日追之于耀州錐子山吏士乘鋭騰逐賊窮蹙潛伏趙和尚寺監軍道飛書告諭二十二日始持郝臨菴獨行狼二首來扶服丐命二十五日承疇坑其猙獰僄悍者四百口餘釋而遣之此皆巨猾合全秦之力百戰而克之者也若夫談雄之于安寨薛紅旗一座城之于安定一座城薛紅旗一朵雲以四年閏十一月十四日夜襲安定入之二十六日遁去五年十月十九日搶掠西川胡坌延撫陳竒瑜委總兵王承恩赴勦賊首喬六斬一座城以降薛紅旗與拓先靈在骨都寺為戴君恩所殺拓先靈即一字王也申在庭馬丙貴之于葭州荷葉坪西賊與奸民任可學叛據薛州之荷葉坪延撫張福臻榆道樊一蘅參將唐通等統兵八百攻之七晝夜賊敗逃關溝黑水坎等處斬在庭丙貴等首級皆旋起旋滅何足數哉山西自河曲保興至蒲津千五百里與秦中接壤河身最狹秦賊自神木過河三年春大掠于襄陵吉州太平曲沃之間四月二十八日攻入蒲縣潞安官軍遇之于微子嶺一軍俱歿巡撫仙克謹在清源為標軍詹永福所刺不殊巡按御史王相說以聞克謹免以七月十八日革職聽勘八月宋統殷有疏救之奉㫖仙克謹托名討賊反以被刺求卸褫革豈苛宋統殷何得代為不平預行自便用宋統殷為巡撫七月十二日統殷蒞任賊自菜園溝渡河入寧鄉又入大寧統殷移鎮汾州八月二十六日以御史羅世錦為山西巡按統殷移軍保德偕秦師共圍府谷王嘉引大困縛其黨四人獻之統殷乞降已而于張家口劉家塢山神堂立三營謀渡河西入統殷不能難也十一月晉師大敗于河曲總兵王國梁遇賊誤爇紅衣炮我兵自亂為所乘河曲陷王嘉引據之宣大總督魏雲中言兵糧缺者二十月天寒士卒凍饑故潰宜速給布花補額餉章下所司科臣馬思理請辟王國梁并遇賊先逃參將李春方以肅軍紀報聞兵部尚書梁廷棟以王承恩未還王國梁新敗兩軍之帥皆失其官請用杜文煥提督山陜臨寧四鎮兵討賊而以道臣葉廷桂白貽清為監軍文煥偕曹文詔馳至河曲賊堅守官軍絶餉道困之㑹聞寧塞陷文煥家破宗人殲于賊遂留文詔圍城而拜表西救兵部調保定尤世祿為山西總兵世祿勳階在文煥右乃亦命以提督偕文詔共圍河曲世祿麾下多將材自汪士任以下十餘人皆敢戰又用饒勳領黔兵以佐之乃王嘉引以三千人出掠方裕昆敗績于櫻桃鎮又白雄遇賊戰歿虎大威尤勝龍等重傷世祿虛張首功塞帝意以此威望大損世祿後八年五月兵部再推為宣大總兵兵科常自裕糾之曰世祿軍前奏女樂在山西以兵威脅一鄉紳之室女淫之帳中晉人恨之入骨髓四年夏四月文詔破賊河曲平嘉引遁去五月潞安􅉰民作亂于壺關髙平陵川魏雲中罷以大同巡撫張宗衡為宣大總督是月也嘉引既出河曲以二十四日從嶽陽入屯留長子境此賊犯澤潞之始二十七日從髙平之長平取山徑至沁水坪上村正德間流賊亦于是日至坪上從榼山西南行入陽城縣之北鄉知縣楊鎮原固守賊從李邱長灣村而入南山官兵尾賊不能擊㸃燈子自秦入晉犯竇莊竇莊在沁水東北張忠烈公銓父五興築以防亂銓子道濬道澤官京師賊至衆議棄去忠烈妻霍氏曰避賊而出家不保出而遇賊身不保等死死于家不愈死于野乎躬率僮僕守發矢石傷賊四日退冀北道王肇生表之曰夫人城六月初二日王嘉引在陽城南山夜飲醉虐其下左右殺之以其首獻嘉引僞署右丞白玉柱降左丞紫金梁名王自用復糾衆起兵三十六營號二十萬三十六營八大王掃地王邢紅狼黑殺神曹操亂世王撞塌天闖將滿天星老􅉰􅉰李晉王黨家破甲錐八金剛混天王蝎子塊闖王不沾泥張妙手白九兒一陳風七郎大天王九條龍四天王㸃燈子上天猴丫頭子齊天王映山紅摧山虎冲天柱油裏滑屹烈眼等八月曹文詔率游擊談震同山西平陽道郭竹徵追㸃燈子二十七日至吉州寧鄉縣三十日至河津稷山文詔西從黃花峪進竹徵東由馬皮峪進賊窘急文詔單騎至其營諭降賊目陳爾先白應真等以七百人應命㸃燈子越山北逸九月乃于康家山就擒伏誅十月尤世祿稱病廷議以曹文詔代之帝以秦冦未靖不許以三屯總兵孫顯祖為寧武總兵顯祖以縱家丁為按臣吳煥所糾自上所叙功薦及文職楊鶴論其由媚璫為大帥且薦文臣為非體故罷任後復為三屯總兵領延兵三百于三年七月二十六日往宣撫之永寧為冬防故即就近推用顯祖奏閏十一月訖嵗終在寧鄉石樓稷山聞喜河津等處擊賊先後斬三千三百七十級驅畜産二千賊在聞喜稷山者衆且强官軍力不敵被賊最慘者寧鄉殺傷五千餘聞喜殺傷三百六十餘雙扁峪官兵損四五百參將周應乾被擒慘死以督陳內官王承詔為徴乞再發京營兵䇿應五年春孫顯祖敗賊于萬全之解店鎮賊走猗氏追敗之又及之于夏縣洪水鎮佯乞撫昏而傅我營以有備不得入宋統殷請留裁驛銀十萬兩從之二月孫顯祖部將劉敏元敏元勦靜樂冦逃回兵三百呼囂訴道臣索餉顯祖同監視內臣孫霖拊諭之乃定三月汾營游擊劉光祚敗績于臨縣之三教村賊犯沁水寧武營裨校猛忠陳于端民鎮㑹張道濬以罪戍雁門命家將張道法張瓚率蒼頭軍同擊賊忠中賊伏于平頭山戰死瓚馳救拔出其衆賊南趨澤州阻于河遂北掠長子宋統殷疏參孫顯祖罪奪其官帝以馬士麟為寧武總兵御史郭必昌奏孫顯祖寧武之兵一逃于靜樂再逃于永寧三逃于寧鄉皆統殷失調度疏三上有㫖統殷褫職勘以光祿寺少卿許鼎臣為巡撫馬士麟以病罷用張應昌為寧武總兵應昌之命八月初二日下御史張宸極言舊鎮尤世祿孫顯祖殺良􅐁貨狀户給事呂黃鍾請專任曹文詔以晉事以寧武兵習于潰逃命應昌文詔各將其兵三千人以從賊以七月破大寧八月破隰州再破石樓夀陽有客將吳開先者歙人竒士兵使者王肇生便宜用為將常挫賊澤州西著勇略賊從沁水攻陽城肇生以開先之兵至開先恃其能渡沁戰于北留墩下力鬬殺賊數百人炮盡無援一軍皆歿賊乃移營攻澤州州人參政張光奎者守八日救不至城陷死之澤大州也全晉為震動閲半月賊已南下太行山浸尋乎濟源修武而畿南豫俱中賊矣賊破臨縣臨縣倚黃龍山榆水出焉入于黃河其城三面鑱絶壁而西阻水前王嘉引攻八晝夜挫而去王之臣一名豹五乃神一魁餘黨有梁明倫者縣諸生與賊通道臣潘光祖信其語誤招安致陷王之臣得之以頓其資距守北河曲許鼎臣移苟伏威馬杰之軍攻之有㫖催急擊張宗衡亦以兵來㑹賊與永寧山土賊田福田科等為聲援久之不下當是時兵部以晉賊之急有三西在平陽東在澤潞西北在汾太沁遼三路並急議督臣張宗衡駐平陽任東西二賊所將白安虎大威之四千人加以李卑兵一千李卑時為孤山副將賀人龍兵一千左良玉兵二千五百得八千人以平陽澤潞四十一州縣責之撫臣許鼎臣駐汾州任西北之賊所將張應昌苟伏威之二千人加以史記頗希牧兵一千艾萬年兵一千五百寧武兵一千岢嵐代州北接利民馬站老營兵二千得七千人以汾太沁遼三十八州縣責之于是總督張宗衡提陽和兵從澤州潛師尾賊後至于陵川勝之再擊賊于潞州之西和大勝之斬首二千級十月陽和兵破賊于陽城縣之陽泉又破之于沁水毛連溝鹿臺寺石塔杏峪斬獲皆千人十一月賀人龍李卑艾萬年三將以關中之兵至鼎臣佯檄人龍令自從而隂令潛師由介休靈石以進平陽艾萬年入黃蘆嶺李卑入文峪口分道決鬭張宗衡以三將受撫臣節度也怒而檄之還三將惶惑無所聽命無何賊大隊轉入磨盤山山方廣六百里閻正虎據交文以窺太原邢滿川上天龍據吳城以窺汾州紫金梁衆十餘萬以秦兵豫兵毛兵盡聚澤潞東南乘虛突犯東北從沁州武鄉以陷遼州尤世祿病間張宗衡强起之與李卑賀人龍同援遼州自遼州以往軼榆社剪榆次逼夀陽距省㑹五十里鼎臣撤臨縣之圍反顧根本而專任總兵張應昌守道潘光祖以恢臨時五年十二月也六年正月朔官軍復遼州賊時已去諸將多殺遼民以為功李卑獨不可晉人稱之二十日復臨縣成約永寧山土賊于十八日㑹小神頭山謀劫營難民縋城出報撫中軍陳國威假稱豹五來迎手斬田福等懸之城下鑿城七八處賊始懼參將劉光祚功為多光祚前坐徵至是獲宥宋統殷猶在事擊賊于長子賊轉入沁水復犯竇莊張道濬率鄉人設守時官軍屢捷而秦兵將至賊乃請道濬相見紫金梁免胄前曰我王自用也誤隨王嘉引故至此道濬詰以既降何故縱火賊以衆為解有一人前致詞甚善問為誰曰宜川諸生韓廷憲也既聽其約統殷命守備薛天祿受之陽和兵乘不備襲賊賊怒而殺天祿敗約南下初紫金梁之敗約也韓廷憲欲圖之不遂乃以三騎來歸賊至郎壁廷憲偵亂世王得一民婦惑之言于軍曰是賊與紫金梁爭一婦人其釁可以說而離也貽書間之云紫金梁將縛以自贖賊久合聞之其衆遂分分七大股股萬人曰混世王曰關鎖曰八大王曰曹操曰撞闒天曰興加哈利或五千人圍盂縣殘欣州窺定襄踐五臺而曹文詔奉合勦之㫖再渡河入晉于是月十二日抵霍州遇賊萬衆過汾河即奮擊破之二十四日破賊于盂縣殺千人賊渠多死二十九日文詔追賊于定襄及之于夀陽縣許鼎臣命謀士張宰先大軍嘗賊賊驚潰猛如虎别戰于黑山大克姬關鎖一營殲焉二月六日文詔追賊于西堰十三日于碧霞村如虎皆力戰混世王死如虎號敢戰前以十二月擊邢紅狼解髙平之圍矣至是與文詔合擊賊如虎與頗希牧逐賊夀陽之東賊于固莊北遁㑹文詔兵自北至相遇于方山之開府村斬賊四百四十九級自混世王既死五臺盂定襄夀賊平許鼎臣以曹文詔軍平定州備太原東張應昌軍汾州備太原西十五日鼎臣偵賊在西山之奄峪逼祁縣遣陳國威猛如虎馬杰往及之于來逺寨破之二十日文詔與賊戰于大谷二十二日文詔與如虎國威逐賊于范村斬級數千二十九日文詔再破賊于榆杜太原餘孽幾盡三月賊從河內上太行曹文詔禦之澤州之九仙臺大破之張道濬遣張瓚伏兵三纏凹邀賊擒其渠首獻闕下賊遁入潞文詔以兵四千至陽城中途遇賊過之不顧曉抵沁水薄暮還濳師掩擊于芹池劉村寨上等村斬首千餘級初曹聲言平陽擊賊民失望至是始服初九日賀人龍兵潰按臣李嵩疏論張應昌逗遛避賊賊在寬水峪而南抵襄陵賊去黑龍關而宿劉村賊到蒲縣而方抵黑龍關賊從仁義驛東奔一股從汾西山南下舍之不追仍回平陽府三月初七日方起行置稷河西垣絳東賊不問南走曲沃無賊處十二日遇賊馬頭山有斬獲不乘勝追襲回兵太平致賊逺遁又黑龍關所斬級皆細弱驗係良民是月也猛如虎破賊于介休之紅山嶺四月賊駐陽城縣之潤城初四日賊陷平順知縣徐明揚被殺初七日文水縣降賊惠天庫叛陳國威討擒之曹文詔以十八日晡時抵周村周村去潤城十五里三鼓襲之出賊不意斬一千五百級張應昌亦再有斬獲賊紫金梁老􅉰􅉰從榆杜敗北奔武鄉過天星遁髙澤山先後為文詔追殺兵部奏曹文詔鼓舞李艾二將殺賊一月五捷今赴豫與鄧玘夾擊俱有功其弟曹文耀在欣州死賊難應恤蝎子塊尋為應昌所敗八大王掃地王則萬年人龍破之俱有功許撫疏云交城山古之呂梁山也土人據以為險靈石震山之間有韓信嶺太原潞安相通之路有南關翼城沁水之界有東烏嶺平定以東有柏井各宜設守備一員統兵六百又秦中降丁安插河岸上自西河驛與青龍渡相直五虎所轄也中自含峪村與花地窊相直黑殺神所轄也郭家河與石樓之崖頭關相直番山鷂所轄也又下至延水關與永和關相直金龍所轄也賀人龍有功宜用以設防職方郎李繼貞覆奏添兵五千四百馬一千留餉五萬必難如議河防現有兵一千但以馬五百與之駐劄青龍鎮賀人龍加都司僉事銜料理防河韓信嶺責之平陽南關責之澤潞柏井中西責之太原東烏嶺責之平陽澤潞三參將各以兵數百委官分守兵將俱可不增晉撫許鼎臣奏稱流冦三十萬流毒晉地五年仰藉皇上威靈就殲十之五解散十之三所存西賊萬餘遁濟源山中其山為王屋底柱析城中條今令李卑艾萬年從澤川陽沁之延巒天井關入賀人龍李杏芳從垣絳之邵源關瞽冢村入此西路進勦之大勢也東賊二萬遁輝林武涉山中其山為青羊峪赤狄國王莽嶺伏牛山碗子城小西天大王莊孫臏坡箕山遼山總兵曹文詔中軍孫茂林自潞安之黎城入臣遣麾下猛如虎等自遼和樂平之臯落山入此東路進勦之大勢也太汾西北有三關道臣在焉賊王剛等不滿三千總兵張應昌參將劉光祚任之自可計日奏功他盜如霍州之東山趙州之休糧山隰州之水頭鎮石樓之花地窊孝義之開府喬山二寨蝟毛而起則皆目為土賊可折箠笞不煩天兵然鼎臣之言亦聊以寬文法紓主憂而帝意亦苐謂此饑民不足置冦數也五月許鼎臣以饑民反者益衆請捐數年逋賦帝不允賊犯沁水陽城日急曹文詔大破之于小河村又破之于遼城毛嶺六月賊陷和順邑紳昌平兵備藥濟衆被傷不屈投井死時曹文詔調援豫李卑破賊于澤川之天井關艾萬年破賊于陽城之延家山七月初六日賊夜襲平樂陷之賊以曹文詔在豫也復返晉官軍㑹戰于岢嵐州失利游擊許國運被創死張應昌之卒潰于鳴謙驛曹文詔改大同總兵許鼎臣罷以陜西按察司戴君恩代之八月賊陷沁水賊自翼城逼沁水李卑駐髙平王肇生三檄之不應十一日賊攻沁水陷之賊渡河五犯沁水張道濬有城守功道濬前在朝以言事得罪公論冀用軍功湔祓㑹沁陷乃詘其勞不許十月朔戴君恩始視事先是孝義土賊通天柱臨縣賊王之臣皆來降而三關賊王剛者以十月降官軍由五臺深入捷書聞君恩既視事怵諸降賊桀黠反覆謀戮之七年甲戌正月召王剛詣軍中宴伏左右力士斷其首令軍中并殺通天柱王之臣于他所剛住交城文峪口天柱住孝義縣王之臣住黃河張家坪托犒賞致之正月初七日迎春雜壯士其中方席地飲即生縛剛餘以次擒其翻山動姬關鎖掌世王三賊尋生得獻俘京師惟岢嵐盜髙加討即顯道神勢甚張嵗惡饑民附賊日益衆帝發帑金十萬兩敕御史陳乾陽往賑新撫吳甡前任秦素習冦知君恩委辨多延綏人與賊通縻餉徵其尤害民者戮之察諸將惟猛如虎虎大威沈塞可任而麾下安集掾龔能具曉阻隘曲折能用諜以間賊賊果內自疑持其魁劉浩然即鄉里人首以降髙加討出掠我師追至欣代山中加討所用棗梃重三十斤長九尺馬上舞之鋭不可當正瞋目大呼虎大威迎射一矢中項乃殪加討之黨曰賀宗漢即活地草聞之懼僞乞降于寧州劉光祚伏兵山隘斬之是為八年乙亥春三月晉中三大盜俱斃先是曹文詔之入晉也論功僅中賞率不愜宜還之秦其改大同也以前在洪洞與劉御史之不相能而御史適按豫遂捃拾糾之文詔殺賊太行山中御史相見于懷慶是日蜀帥敗賴文詔力戰大破賊甫解甲而御史語言輕重不得文詔拂衣起面叱之廷議謂文詔怙勝而驕緣功大不能制量移大同大同尋有兩縣失事遂致其罪當吳甡按秦以慶陽之戰知文詔奏功于朝又薦其部將馮舉曹變蛟等比撫晉而文詔已論戍乃上書追訟其功承疇亦請貰文詔責後效用自助帝乃以文詔還之然賊已滋甚不可為矣蓋文詔有大將才在大同及得罪不與討賊者兩年而賊從畿南豫以復入于秦畿南之被冦也六年正月初四日賊騎闌入西山距順德百里大名道盧象升率兵禦卻之二月賊以左良玉兵挫于武安也從小山澗入真定井陘道冦從化檄守將李定王國璽李㟶救之國璽中賊伏㟶馳救士卒傷殆盡國璽潰圍出賊分其伍為二北向者西犯平縣東窺固關南向者剽河北慶輝諸府科臣孟國祚曰畿南咽喉重地順德為大平原千里直走京師非有河山為之蔽也今晉有曹文詔張應昌豫有左良玉鄧玘賊將何之乎昔之秦驅于晉晉驅于豫者今轉而驅之順德矣請通州兵二千馳救許之四月沙河臨洺告急按臣衛景瑗請昌平兵二千援之報可真保巡撫丁魁楚以四月二十一日移鎮順德丁魁楚奏騷動畿南者盡是遼兵由王威老耄剝削其軍故全營八百人俱逃威僅追回一百九十人其餘皆棄而為賊保定總兵梁甫以八千人馳至洺邯㑹勘西山義勇糾其父子兄弟紓家難自請殺賊二十八日自順德至內邱由臨城抵郝莊賊衆數萬屯小西天山中梁甫屯龍門距賊三十里大名道象升駐內邱西東黃寺井陘道從化駐臨城西五月初三日接戰明日又戰賊走臨城西山初七日游擊董維坤被圍于冷水村梁甫分兵救之别設覆于石城南賊遇伏大北退歸小西天老營翼日大名道象升再邀之于青龍岡破之象升臨陳以身為士卒先矢石滿前不為動軍中目之曰盧公真能將也時命太監陳大奎閻思印謝文舉孫茂霖為內中軍分監文詔應昌良玉玘軍發帑金四萬綵段干匹為軍前給賞文詔夜襲賊于偏店賊已走多墜崖谷諸將㑹兵逐之沙河從邯鄲南逸八月初四日賊復犯沙河縣之丹井入邢臺西太上井闕嶺盧象升同太監楊進朝擊之有斬獲二十四日賊屯元氏縣梁甫擊之于石家溝斬首百餘人九月犯平山縣賊首張有即一盞燈為張應昌所將卒楊芳所擒十月犯行唐靈夀阜平尋犯趙州至寧晉舉人李闕并其姊與弟皆死之賊阻清水河不得渡掠南宮縣甚酷梁甫兵在獲鹿不時至賊恣蹂柏鄉西去兵科盧兆龍請致梁甫于理不行五臺山廣袤數百里南通畿輔東枕雲中北接雁門西連太原賊據顯通寺以中臺為奧突其中糗糧足廬舍完賊阻其險以游魂假息我師有真保二鎮重兵兼鄧玘之川卒倪寵王朴之京營合諸將兵力殄逋亡延命之冦沛若有餘顧羣帥頡頏不前猥云山深路岐邊長而賊衆雖奉明詔夾勦實莫肯深入霆擊也七年報功疏曰流冦自六年正月追勦出境後再犯于四月七日自茨龍以至濬滑地幾千里衆逾十萬及十一月十二日始奏廓清六年正月賊入漿水川守備揚芳有白㑹村宋家莊之捷閏四月解武安之圍而遼和之賊大盛則有侯蘭村之捷進屯滹沱店有牛家峪之捷梁甫初㑹師有八方冷水石城之捷小魚山之捷賊遁南沙有石盆口支碢口之捷流氛剪艾略盡賊收餘衆而西又有桃樹坪許兒崖之捷京營紀倪兩總兵援豫次順德遇賊於牛皮窩破之所將卒又有漿水川之捷宋家莊及滹沱米花寨之捷鐵連山之捷贊西玉皇廟之捷秋後賊勢北向動萬以數撫臣所將卒有石家溝之捷許亭沙灘及銅冶之捷井陘道所將卒有洪洞張村之捷都司田時升有青沙黃沙之捷梁甫有溫塘場之捷游擊李定有北峪之捷小棗莊石頭寨之捷楊芳有南佐材成角村之捷王國璽有黑滹河之捷趙完璧有四社之捷鄧玘以川兵赴援甫入境則有白草關之捷賊冦平山有紅子店馬種川之捷賊遁青石嶺有紅澗村之捷又有醉漢口之捷賊南奔又折而犯臨城玘逆要其前有魚柱嶺之捷賊從山後奔入邢西梁甫扼于黃寺八方之間賊不能東㑹京營奉㫖赴畿賊悉逃入武安陽邑濟城等處為團結鄉勇所擊皆死遍搜山谷直抵丹井畿南之境幾于無賊或云畿南討賊有監視內臣撫鎮依之以濫功賞奏報多不以實當賊在內邱臨城間監軍者大名井陘二道大名道盧象升手與賊格戰刃及于鞍失馬以步鬭免為賊所憚不敢窺大名魏人至今言之疏止叙井陘而不及何也然盧卒以功名顯豫冦之劇也視秦與國難相終始不可以日月疆域為斷獨其初受兵實始于河北三郡三郡者懷慶為上彰德次之衛輝又次之當郝土膏之撫豫也三年十月二十九日豫撫郝土膏報移鎮豫士大夫憂賊以宗祿贏羡嵗四萬追溯鉤考可數十萬請練鄉兵中州富實搜贖鍰出捐助事亦易辦不果行昌平侍郎侯恂豫人初開軍府拔左良玉于行伍用為大將良玉感激思效豫士大夫亦信之五年九月賊掠懷濟焚清化破修武知修武事劉鳳翔縋城遁道被殺縣尉余守彬訓導朱家彥紳士侯來問等七十餘人俱死賊居三日陽和兵至乃去突入清華鎮焚殺數千家旁掠武涉輝縣遂圍懷慶參將黃士英戰沒于河內之大山口守道尹仲知府别如綸率紳民固守廷議用昌兵殺賊以千二百人付左良玉而陳永福以裨校從征其大指專在中州㑹修武清化之冦竄入平陽因檄良玉入晉十二月初十日賊抵王屋山犯西陽衆二萬官兵二千餘人用炮擊之賊死者三百西遁聚于髙平之間時撫豫者樊尚燝郝土膏後又有吳光義光義艱去尚燝由太僕少卿辛未升任以左良玉為請疏曰昌鎮之兵即河南之兵餉即河南之餉樞臣移緩就急臣不敢爭但豫非無事賊氛漸逼請以左良玉駐澤州適中之地北可以援髙平長子東可以救臨縣潞安西可以應陽城沁水為晉保境兼顧濟源詔從之聽良玉受尚燝節制并諭曹文詔以同心殺賊有急則秦兵騁而東豫兵逼而西晉兵從中橫擊勿以交境為解六年正月初九日賊在邢臺山三省接境名摩天嶺窄道崖直抵武安犯隰州初十日陽邑陷參將芮琦守備王繼統死之十四日左良玉勝之于涉縣之西坡賊望昌兵旗幟皆讋懾然謀噬中州益甚二月左良玉兵挫于武安賊以三四萬從趙寨而東都司蔡如薰禦之于急呼河中軍曹鳴鶚馬擢相策應至邰原關卒遇賊鳴鶚與戰勝之天晚結兩營相犄角平明鳴鶚提刀衝突戰至已賊益多火藥盡移營合擢軍營開為所乘二將及裨將姚應鵾皆死鳴鶚將種矯健善鬭擢持軍觀望不力故敗兵千餘悉沒賊得氣愈逞走輝縣知縣事張克儉有備賊乃聚衆于輝之百泉書院三日循楮邱而北屯據林縣之山溪元村趙村饑民揭竿相望而起樊尚燝罷以太常寺少卿𤣥默代之有㫖𤣥默同巡按劉令譽查前撫失事三月賊再入河內十七日左良玉逐賊于輝縣賊從十八盤黃端口南下奔河村入修武清化游擊越效忠登屋避賊墮賊執而戕之陶希謙故儒將賊追急馬驚落塹而死左良玉救武安二十日襲賊于萬善驛二十八日大戰于栁樹口再獲其首惡賊乃西奔四月十九日馬鳳儀邀賊于臨洺關二十六日左良玉破賊于武安獲賊將囚之逸追之復得曹文詔與黎城之賊戰涉縣之圍解先是豫中有毛兵有鄉兵不過七千賊犯覃懷失數百犯武安亦如之犯濟懷失千人至是再犯武安三犯清化效忠希謙之敗額兵折亡殆盡左良玉一旅之師勢成孤注不得已而請鄧玘川兵又以石砫土司馬鳳儀之兵益之玘以六千人戍遵化也久客思歸再復登州有功詔奬其成勞勉以便道殺賊許功成之日還蜀鳳儀從遵永調防固關登州平保兵還鎮龍固守禦有人改以赴中州之急禮給事中張鏡心有河南四路宿兵之議遂命良玉玘鳳儀當其三豫撫整頓毛兵當其一然毛兵屢敗不可以用也賊炮石甫發于孩兒村鳳儀以孤軍在侯家莊被圍孫𢎞謨楊芳等兩人保撫中軍不能救石砫兵俱沒五月鄧玘擊賊于濟源之善陽山射紫金梁殪之或曰王自用自病死其衆散他部以去十二日賊十餘萬逼礘川玘救之賊攻彭城鎮不得入鄧左二將㑹師于彭城賊在湯淇去衛輝十五里十六日二將勝之于清池栁莊賊乃退入林安山中川將楊遇春邀賊于大峰口二十五日賊至林縣遇春先驅毛營丁守賢繼之南陽兵錢繼功殿遇春中賊伏死賊得其旗幟誘守賢并歿復攻繼功勿動賊始輕鄧玘為不足憚二十九日曹文詔率五營兵夜襲賊于偏店村賊敗走墜崖谷無算鄧玘亦于胡谷村追及偕良玉同逐賊沙河賊自邯鄲南逸六月初六日賊圍湯隂鄧玘被困于土樵窩良玉救之始脫豫撫以輝縣急一日夜二百里穿賊中馳入城揮諸將追賊當是時賊負太行山為阻晉苦所備者多豫實單虛不能并力豫士大夫請以洪承疇移駐潼關兼制晉豫二撫與曹文詔鄧玘張應昌三鎮兵為便帝曰勦賊撫鎮專責别設總督反滋諉卸不如重兩撫事權副總以上奏請參遊以下軍法從事俾節制三大帥而責以三月必殄賊有不及期者罪之時潞王有疏告急言衛輝城庳土惡選護衛三百人助守先後捐米七百石銀三千兩嵗祿麥銀六千兩益餉又因故妃冢被發以鳳泗陵寢可虞并勸帝早行揃剃毋輕視賊帝特命倪寵王朴為總兵以京營兵六千行監以太監楊應朝盧九德賜二帥弓矢千五百戰馬三百皆選騎可用倪王以中官請竊爵賞職方郎李繼貞爭之曰倪寵揚歷邊疆在京營六年陟大帥尚未為過王朴乃王威子原無實歷副參之任纍次叙加多從其父分功推京營僅逾半載以府銜出征其誰輕之又求加總兵恐無以厭人望左良玉李卑皆身經百戰位次反出其下恐聞而解體宜量加左李二將以都督僉事署總兵庶無相臨之分有以安其心焉帝深頷其言命從之于倪王則中官以為有成命不欲奪也七月河北道袁楷追賊于濟源之南窰走之鄧左二將再破賊于官村于沁河于清化于萬善左軍武安八德之捷扼之于隘所斬獲尤多曹文詔又擊之懷慶之紫陵村湯九州駐兵水冶居安林磁武四邑要路賊不得逞八月六日賊焚溫縣之西關九月湯左二將及京營軍屢有斬獲十月賊之奔晉者復返豫京兵尾其後湯左扼其前湯兵勝之于青店石岡京兵勝之于石坡牛尾賊大困十一月官軍于武安之栁泉于猛虎村再破賊賊張妙手賀雙全等三十六家詭詞乞撫道臣常道立信之因太監楊進朝以請㑹天寒河冰合草四日賊從毛家寨䇿馬徑渡是為澠池縣之馬蹄窩防河中軍袁大權遇敵死河北諸軍謬云追之半渡因冰解不及自此三晉畿南懷慶彰德衛輝三郡不受賊禍者十年而遂有甲申之事舊史氏曰豫嘗觀靈寶許公邊鎮圖稱嘉靖七年延綏嵗饑軍民幾致禍亂深咎𢎞治成化中本色改折為非䇿蓋居延本嬴秦所開河南地漢唐用之控帶荒徼宋設重鎮專制夏人土風粗猛邊人不知作業用之則為我兵棄之則為我冦自昔然矣當崇禎元二年間朝廷若豫憂秦地俾主計者盡補三邊十年之餉而出內帑數十萬金以收召鄜延環慶之饑民三年可成徑旅即國家獲其死力豈徒西陲無警已乎胡為棄此孑遺立視顛仆而莫救彼皆河朔健兒長大帶劒豈能如嬰兒之絶哺乳老羸之轉溝中故王嘉引白梃作難清水營木瓜園蜂午景從神一元振臂大呼新安堡栁樹澗雲合響應其後兵拏不解乃至竭天下之財以填黑水之壑而究無濟于事中原幾無寧宇惜乎用之有遲速而治亂之形異也晉人之言曰賊虐始于秦而棄疾於我巡按羅世錦歸咎于秦謂以鄰為壑給事中裴君賜晉人也奏曰必責成秦之撫鎮驅之回秦而後再議勦撫夫孟門鎮先有盜千人永寧州之孟門鎮有盜千人勾陜西大同集口之盜合二千餘人而壺關􅉰民繼起此可盡謂之秦賊乎自鳥鼠至于勾注文弛武玩其病則一胡廷宴仙克謹以釀亂繩之未始有輕重也士大夫沿承平餘習端拜詳視需次而至公卿其出膺節鉞率坐不窺堂頤使鈐下虞侯示威重莫適勤念兵事者微獨此也烏程相密勿大臣戰守機宜思陵從之取計吳興化受命撫晉辭謁西朝房相國揖之曰流冦癬疥之疾不足多慮是時賊已踰底柱涉河津當國老謀猶置之度外此扁鵲視齊桓侯之疾在于骨髓而左右為禁方者以害未中于腠理有不瀕死者幾希矣書曰用命賞于祖不用命戮于社曹文詔喋血兩河﨑嶇百戰手挈全秦還之天子宜按勳格剖符定封乃苛以小文陷之他事內隳忠臣之氣外厭讒夫之謀賊因挺解得以養其梟雄王國梁孫顯祖喪師失律非有桑榆可收之才跋扈難施之勢若坐而斬之纛下即諸將軍股栗而逸罰自如功罪混淆其何以戰天子遣龍武親軍以重三輔儼如六飛之在行而將吏勤惰出于殿師夙沙觀軍朝恩之口左良玉湯九州之徒所以徘徊而弗擊也嗟乎三晉地形險固畿南河北山川犬牙相錯神京扼之于前黃河繞之于左閫外諸君并心滅賊譬如逐鹿園中探丸囊底飛走路絶形屈勢窮乃縱使渡河魚爛土崩不可復救當事知塞太行之口而不斷黃河之津君子于六年十一月澠池之事未嘗不撫卷太息以為此中原之所以潰國家之所以亡也余故詮次流冦始事之略而以澠池終焉附記杜文煥曰文煥于庚午二月督延綏固原兵三千諭降王之爵等七百人而苗美潛伏小滴流山再破之追至安塞縣之鐵葉塞已入其軍而美復遁尋獲其首于賀家灣賊黨所自獻也延東黃甫川賊王嘉引齊三等以延撫標下副將李釗求貨于賊怒而襲破黃甫清水木瓜三堡洪公以鎮西將軍印授余討之余先擊齊三以斷嘉引聲援陳于三神堂佯退誘之返鬬大破賊賊約嘉引同送款余不許勒兵誓衆陳斬王嘉引等露布入告時天旱民饑賊大起米脂賊張獻忠所據十八寨僞乞降余陽許之先討清澗保安安塞諸賊俘斬八百人而府谷餘孽王家用等復起陷山西河曲大司馬梁公廷棟請拜余為大將軍兼督秦晉兩巡撫親履行間運糧草紀功罪余聞命馳赴河曲家用阻險堅守天沍寒大雨雪梁公檄催戰余不可曰如此我士卒必傷絶其糧春至鼓而下之百全之道也㑹寧帥饑軍神一元攻陷延西新安寧塞栁樹澗三堡寧塞余所居宗人多死乃留曹文詔圍河曲而拜表西救神賊時棄寧塞陷保安已又據合水圍慶陽府余與戰慶陽城下斬首無算賊僞降總督楊公鶴信之下令曰一魁就款已題寧塞安插官兵妄殺一賊者用兩兵償余歎曰賊襲陷寧塞畏我而逃今借名城為盜資我宗人可與賊逼處此土乎遂以其族行尋為制府所中乃得罪以去觀此紀則嘉引已死于黃甫川而陷河曲者乃其黨王家用為兩人杜公榆中世將其論西事必核顧于督撫所奏報獨殊余疑之後讀李少司馬為職方所覆奏有云文煥身為大帥王嘉引之級真僞不辨信其已死懈于追擊然則杜公臨事已誤其著書示後猶護前不改邪梁大司馬為人有幹濟才嘗請補三邊缺餉并拏問秦中貪殘有司非前後數公可及其奏杜文煥為大將假事權用西人以辦西賊不為無見杜自謂勦撫異同受忌中傷而吳興化所勘延川殺良狀以杜部將李崇榮殺逃難民曹孟孝等一百九十九名口與李應期所糾相合杜因此下吏吳與應期先後以撫糾制府者也其事安所考信姑兩存之三年十月職方李繼貞請賑延綏疏曰皇上以數萬金錢而活數十萬生靈福澤莫大焉活數十萬生靈而農桑復業賦稅常供所獲不止數十萬金錢也利益莫大焉彼地斗米銀四錢發銀不如發粟之有濟宜先發四五萬金用董搏霄人運之法就近糴粟輸至軍前更敕省直援納事例及贖鍰俱輸粟入邊不許折銀酌量腳價低昂其值使輸者稍有饒益則輸必多可以撫饑可以賞功而依賊之民必散賊不就降即就縛耳四年正月二十三日再覆延撫杜鎮疏曰賊勢燎原延撫洪承疇秦帥杜文煥各以本地為急西馳不復東顧疏請撤王承恩還鎮夫入衛西將之宜撤回臣部籌之久矣不獨王承恩宜還鎮延綏雖楊騏亦當還鎮固原也不獨二將宜還鎮其部下之兵亦宜隨之西還非以逸之乃所以用之順其西歸之性使之殺賊賊平乃許歸鎮必爭效命秦中撫鎮既得西來兵將之助勇氣自倍賊當消沮而後乃可勦撫並用撫非撫賊撫我饑民之從賊者也已從賊者雖多猶有限未從賊而勢必從賊者無限當此斗米四錢之日慈父不能有其子而能禁其束手就斃乎撫臣請留站銀止可權給饑軍安能及民宜如神廟四十四年特遣御史賑荒東省之法一以宣布德意一以安輯流亡必得三十萬石之粟以往在附近州縣稍熟地方賢有司設法糴買運至近賊處所盡心賑濟賊就撫者給以耕種推誠安插如此則民之已化為賊者將還化為民而將化為賊者且永不為賊賊黨漸散賊勢自孤必有斬元惡以獻者矣此費應在户部户部有則宜立發無則亦宜力請若户部不請臣又不代為請日復一日殘破愈甚將費數百萬不能收拾而人民逃竄東作盡廢延西平汾之百萬錢糧歸烏有矣雖增兵增將何救于事哉度今日平賊之費與他日平賊之費孰多今日借出之費與他日有出無入之費孰得當有不俟臣言之畢者矣疏入帝乃令王承恩還鎮遣御史吳甡以十萬金往賑而藩王以下捐助五萬金粟麥二萬石然所救不及十之一四年七月因遣楊嘉謨還鎮李繼貞再疏爭之曰前賑臣攜十萬金往度一金一人止可活十萬人而斗米七錢亦止可活五十日耳皇上宜敕賑臣回奏前十萬金果足乎不則當早沛恩膏雖內帑不宜惜也余時初登朝李談及世事輒太息曰賊初起得十萬金便可濟吾爭之經年始見從今賊勢已十倍于前非三十萬石不可主上以國用匱乏慎惜金錢雖下手詔命專使所齎止此如以杯水救車薪庸有濟乎李清練有識其先幾料得失歷若指掌帝召見賞其有執撫天津有效尋倚為大司馬時冦勢已不可為李公亦大病臨歿猶以國事為念云辛未二月帝召輔臣九卿科道及各省監司于文華殿帝問山西按察使杜喬林曰河曲之城何以賊到輒破喬林曰賊未嘗攻有饑民為內應故失守帝問陜西參政劉應遇以近冦所在應遇曰一在延安一在宜川帝曰冦亦吾赤子也不可純以勦為事王左掛既降何又殺之應遇曰彼降仍掠不得已而戮之以示警時帝方勵精出治于輯瑞時遍咨地方得失河曲之失守左掛之詐降皆有關安危諸臣不能奏方略答明問終于勦撫不定廷議混淆負天子憂憫元元之意焉按臣李應期有秦中流賊旋撫旋叛疏帝命確查新按臣吳甡疏曰延慶屢年缺餉又連年旱荒盜賊蜂起東路則王嘉引攻府谷渡河入晉西路則神一元破寧塞破栁樹澗破安邊破保安一元死其弟一魁繼之又破合水圍慶陽督臣楊鶴以本年三月移鎮寧州招撫一魁安插寧塞者四千有竒尚有未盡餘黨如郝臨菴劉六等衆不下數萬督臣五月初旬才離寧州而保安餘賊已分掠環縣真定之間延安四載竒荒邊軍倡亂煽聚米綏清澗各鄉村被掠脅從甚衆幾于無民去年秋冬之間諸盜如㸃燈子整齊王不沾泥之類延山蔓野莫可嚮邇榆中州縣既無可掠遂流劫延南延撫洪承疇方收拾東西兩路于延南力不能及撫臣練國事初任西安屯卒單弱不能制賊三月間掠宜川雒水宜君中部等縣㸃燈子衆號數萬自山西過河而歸據黃龍山一帶聲勢甚熾臣遵㫖蠲征延北士民始有更生之望惟西安北界韓城白水澄城蒲城郃陽宜君中部數十州縣最受荼毒殺典史千總都司中軍運糧委官鄉村殘破者數百計男婦殺死者數萬計五月總兵王承恩榆林道臣張福臻始統勤王兵五千餘南下勦賊屢戰捷賊望風濳遁乃督臣楊鶴移鎮耀州下令招安諸頭目掠取已飽有赴耀州求撫者督臣給賞花紅鼓樂迎導造花名冊豫路費錢待之殊厚亦有臨陳抱旗乞降者如滿天星等榆林道臣張福臻收入行伍隨征者亦不下數百賊黨見大兵在南遂北歸延川安定清澗綏德米脂吳堡葭州故地解散者一二嘯聚者千百鄉村打糧士民有官賊之謠㸃燈子聚衆五六千在清澗之解家溝花牙寺名為就撫近復有渡河之報慶陽郝臨菴劉六等亦受道臣周自强之撫餘黨披猖于環合今又攻陷中部矣昔之命吳甡賑濟也延長見受賊圍同知趙鶴宣布德音其圍立解清澗有降賊黨雄等四百給散一如官軍米脂從賊者十之七聞賑還歸收入里籍凡三千人安見賊之不可款附乎楊鶴之于神一魁給賞花紅鼓樂迎導索劄副則豫以官求安插則定其地奉之惟恐不及有潼關道胡其俊者賊獨頭虎已出其境追送九十萬錢名曰餽贐又因其索酒􅖲梁肉傳致給之當賊初起輕胡廷宴之安坐不擊謂此吾省城賢主人關中傳以為笑余嘗疑其太甚由今觀之信乎其不虛矣秦人曰崇禎元年清澗有一書生孟長更于本處石油寺日則讀書夜則㸃燈抄寫鄉人訛言長更在石油寺若黃巢造兵書作反長更不能自白恐官司捕之遂倡衆作亂因長夜㸃燈逼迫至此衆號為㸃燈子云秦人刑給事中薛國觀疏曰賊之恣也由喬應甲撫秦置劫盜不問實釀其禍當魏璫修郤關中諸君子追贓令亟應甲狂易有心疾咆哮闞怒噬若瘈狗顧于探丸惡少煦煦畜之何哉夫盜賊小人一氣所出胡廷宴本閹黨也其名在逆案中瞶眊罷愞乃與凶暴者同害人皆知思陵遭遇百六而不知逆閹竊柄七年于建牙大吏遍置私人其政事衡決法令廢弛足以蘊災而召禍此可為太息者也鄒漪曰莊烈愍帝英明勤儉不可謂非令主乃其受病獨在慎惜金錢大學云財聚則民散財散則民聚孟子曰民為貴社稷次之當賊之初起不過數輩飢民從之者無幾若早聽李職方言解散可待乃爭之經年而始行賊已瀰山漫谷此區區十萬金猶以杯水救車薪庸有濟乎祗緣廟堂之上以延綏視延綏未嘗以全秦視延綏以秦視秦未嘗以天下安危視秦以故忠言不用謂賊旦暮可平豈知涓涓不塞漸成江河後雖欲圖有圖之而不可得者矣甚矣時之勿可失也夫人主富有四海內帑所積除御用外何非長物猶記吾師李宮允明睿之言曰先時發出一錢可當兩錢之費急時與人萬錢不敵一錢之用㫖哉斯言可為鑒戒即如諸藩之陷何莫不由乎此楚府之亡也獻忠見其庫中金百萬笑曰有如此資財而不設守朱鬍子真庸兒秦府之俘也天寒冰結不肯人給一綿衣福府之醢也惟謹録鑰牡坐視軍民疾首蹙額而莫之救蜀府之陷也成都令吳繼善請發帑金散朽粟王不聽而周邸之守汴梁捐金至一百二十萬殺一賊者豫一元寶以故人心成城攻凡三次圍至九月卒不得下成敗利鈍其效彰彰嗚呼只坐一慳遂成胥溺有國有天下莫不皆然御史姜思睿有疏云貪小利而成大害由今思之其言洵不謬矣綏冦紀略卷一
