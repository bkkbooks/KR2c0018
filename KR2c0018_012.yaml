body:
  text: 綏寇紀略卷十二國子監祭酒吳偉業撰虞淵沉傳曰天道不僭視人主之修德與否而降之禍福此自然之符也今以十七年已事觀之成湯之責六事箕子之陳五行未顯有失德或致厥罰况於三風十愆之必戒可得而知也齊莊中正以禋祀鬼神恐懼修省以禳塞災咎雖董仲舒劉向之徒執經義推隂陽無得而譏焉然則彗孛凌犯何自而生水旱札瘥曷為而作豈上帝之監觀或爽而政事感召其理不可信歟夫天道逺人事邇以武宗之戲渝馳驅保有大業乃思陵憂勤恭儉不免于亡者前人之餘殃處其極敝臣下之衆慝集于厥躬豈不然歟彼曲學小儒因成敗傅㑹其說此目睫之見何足道哉何足道哉於戲遭時亂亡靈臺太史之所紀蓋闕如也姑掇拾遺聞著於篇熒惑太白彗崇禎三年熒惑入東井退舍復嬴居數月案萬厯九年二月辛酉火星順行犯井宿北第一星十年八月戊申月入井宿與火星相犯二十五年十月戊寅火星逆行入井井者秦分兵將起于秦也秦地在嘉靖以前西陲多警朝廷以三邊為重調兵食修政治故秦可無憂萬厯中專意封賞秦兵缺額餉每鎮以數十萬又以調援怨咨挺為亡命秦督撫虐用其民匿寇盜不以上聞熒惑者火也火必藴隆而後發萬厯九年順行犯井二十五年逆行入井火繇微以至著也崇禎三年退舍復嬴居數月火燎于原不可嚮邇矣雲中定襄雁門代郡太原皆入東井躔度故秦寇而晉受之從神木過河三晉名城蹂躪殆遍其驗也崇禎三年庚午二月熒惑入鬼宿犯積尸氣楊鶴劉廣生主撫四年四月太白晝見熒惑再入鬼宿犯積尸氣楊鶴受神一魁降萬厯中熒惑四十二凌犯二年二月十七年七月三十四年五月犯房二年五月十七年二月二十年十一月三十七年十一月犯氐十二年十二月十三年二月犯張十三年二月自張歷栁四十二年十月犯栁十五年二月四月四十四年十二月四十七年二月三月丙戌甲午庚子犯翼十七年四月歷亢入角三十二年二月犯角十七年九月十九年七月犯南斗十九年四月六月犯箕二十一年七月九月犯室三十六年六月八月犯女三十八年八月犯婁四十七年正月二月犯軫二十五年七月三十四年十一月犯歲十三年正月犯軒轅餘犯太微者四犯井二事見前其犯輿鬼在二十八年二月與崇禎三四兩年之變相合自東井十六度過鬼入栁為鶉首秦之分野輿鬼主斬殺明秦寇宜殺而不殺將反為所害張為周翼軫為楚先是熒惑犯張自張歷栁犯翼犯軫豫楚亦將有寇災又萬厯中太白晝見者五其二十一年八月見井度二十四年四月犯井宿占專主於秦十一年六月獨書太白犯熒惑火與金並見與是年相類兵法五火止於燔爇炮則因機發石以投人者也自永樂中得西洋大小火炮之法而弓矢戈矛之技廢不講將吏狃于不復見敵一不中棄之以走反委諸羣盜之手故其初用之威天下而後以亡國天事恆象熒惑之數十見者殆為是乎三代車戰其法可勝而不至于大敗秦獻公十八年櫟陽雨金始盡改古法尚首功而楚趙之戰伏尸百萬二世時太白再經天勝廣起秦以瓦解使車戰法在則千乘萬乘耰鋤棘矜何自而勝之哉此金失其性者也自秦以下民之蹈白刃者不可勝算然火器未入中國尚有堅城可守今獻闖縱橫名都隳突者皆以寇得我火器雖孟賁之勇墨翟之智無所復施生民之劫數彌深五行之害氣畢究糜爛其民比諸鋒刃千百過之故熒惑犯積尸而寇禍燎原暴骨如莽此火失其性者也况金火合曰爍其為兵喪尚忍言哉八年乙亥九月熒惑犯太微占在次輔時何吾騶文震孟為相溫所劾免九年十二月熒惑如炬在太微東南十年五月熒惑晝見十一年四月十六日己酉夜熒惑逆行尾八度為月所掩五月初五日丁卯退至尾初度漸至心十二年十月熒惑逆行太微犯上相十六年正月熒惑逆行失其處十七年二月熒惑怒角次年五六月熒惑犯房心熒惑自犯鬼宿後其凌犯失度者凡有八莫甚于十一年從尾度漸至于心心太子之象郤萌曰犯太子太子憂犯庶子庶子憂按萬厯三十四年四月丙午熒惑入心其年二月皇太子第一子生是時鄭貴妃在帝旁太子將有動搖之議其後光廟雖立祚不長熹廟國統再絶思陵十年太子加元服出閣講學其明年熒惑入心太子二王後以國變遇害占曰王者絶嗣是其應也楊嗣昌時為兵尚書奏為占主中宫后妃今熹廟成妃發引所謂白衣之㑹也又歷舉漢光武明帝唐憲宗宋太宗時皆月食火星不為災其論明帝永平則云是年立皇后馬氏德冠後宫嗣昌主獻謏以寬帝意此語尤援引不倫科臣何楷駁之曰臣不知嗣昌何所指斥且心為明堂前後星皆太子之屬恐奸人踵邪說以危東宫宜以為戒是時田貴妃擅寵幸其父𢎞遇數犯法交結朝臣謀傾中宫漸有萌芽巫咸所占妃妾有謀后者天道信可畏何楷精於內學恐嗣昌險詐將結椒親以固權免禍故先事折之嗣昌尋入相舉朝爭之按萬厯五年九月晦張居正聞父喪十月朔彗星見吳中行趙用賢艾穆沈思孝鄒元標以爭奪情廷杖詔獄其後黨錮异同糾結不可解者數十年以至亡國楊嗣昌父母兩喪從兵尚書入閣適㑹熒惑入心范景文黃道周成勇劉同升趙士春何楷亦以爭奪情免官道周廷杖詔獄勇遣戍黨錮之事居正起之嗣昌終之皆楚人入相皆以奪情遇星變天道信不誣也十年春太白晝見六月太白經天十月太白晝見怒赤是年李自成等分五隊以踞關中老􅉰􅉰占鄖襄合曹操闖塌天諸賊以直窺江淮陪京大震楊嗣昌措兵十二萬餉二百八十萬薦熊文燦為總理寇禍遂至不收太白經天此其應也十二年十月初一日彗星見帝于初四日修省免刑罰彗星在萬厯中十有二見二十一年七月乙卯見于井至乙亥逆行紫微垣犯華蓋微垣者帝庭也三十五年八月辛酉彗見井度長二尺漸往西北壬午遂歷于心心者太子宫子孫危亡之象先是三十四年李自成張獻忠生于秦而自成以八月生彗之犯秦分也在其周月春秋傳曰美惡之復必周昔梁簡文之生其年與侯景相近僧寶志預知之思陵以三十八年誕於宫中為天地神人之主豈知飛亷惡來出于米脂膚施間者已三四年哉彗星自萬厯五年起訖于四十六年中間凌犯惟此兩年最大五年見西南長數丈而四十六年先以九月甲寅長星見東南形如匹布廣尺長二丈九日而滅所謂蚩尢旗也十月乙丑彗再出于氐自東南轉指西北掃太陽守星入于亢又漸往西北掃北斗天璇天璣文昌五車逼紫微垣次月十九而滅天意初以譴告人主而不悟其末載蚩尤旗竟天斗極微垣天子之宫庭而皆掃滅以見禍患已成消復亦不可為也已其至崇禎十二年十月復見者楊嗣昌以是年八月晦受命督師十月朔至襄陽大誓三軍而彗星即于其時見又帝以十月命王紹禹為河南總兵後紹禹兵叛失陷雒陽嗣昌開縣喪師襄陽繼破兩藩遇害京師之禍實基于此天意若曰彗之掃北斗紫微今害徴至矣於戲可不畏哉紫微帝座軒轅前星太階文昌十七年正月司天奏帝座下移是年十月紫微無光十七年五月軒轅絶續不常大小失次至九十月間乃復十七年十月前星下移四五度至次年八月乃復十三年六月太階坼十七年文昌坼按帝座有五北樞紫微太微天市大角心中央皆王者所居之處當八年九月熒惑犯太微占者以太微天子之宫庭流寇以八年春犯鳳陽祖陵燒享殿天垂象以陵寢不守賊將入天子之宫庭及乎帝座下移則其兆已成不可為矣軒轅者后妃之舍主內政以弼太微萬厯四十四年十一月四十七年九月月再犯軒轅其時王皇后崩當至尊偕周后同殉社稷而軒轅絶續不常者上天亦為之慘動也太子撫軍監國不離其位下移者為主器已亡藩王入繼之象太階坼大臣多戮死者文昌主國之上將十三年後武陵韓城宜興三相皆不以令終寧南興平靖南三將先後死國家之禍君后及將相並受之天道洵可畏哉歲星填星觜觹參井亢九年歲星犯南斗十一年四月歲星晝見十五年夏歲星逆行十二年十月填星暈十七年二月填失光道十二年五月觜宿下移十三年十月參足突出玉井乙酉四月月入井暈是年亢宿坼占曰君令逆則歲星逆行郤萌曰歲星逆行社稷亡天下兵起民去其鄉又歲星主齊魯東吳之國故梁武天監四年歲星晝見其後致侯景之禍思陵時李青山亂山東吳大饑海寇大作是其應也填星主豫州梁宋失次者進則失地退則為喪又占曰歲大風五穀不實有火災中原糜爛天象應之梁宋實受其咎參伐七星為虎尾觜為首共為白虎主西方考古法二十八舍觜宿列在參前但觜止半度形小而近參易于縮入參度崇禎中西人湯若望仰觀推測適㑹其時觜宿入參故以觜居參後非謬也若下移則又其未縮之時從參左肩以移之于右其占為虎狼食人又參足突出玉井其占亦曰虎狼暴害參觜既主西方闖獻恣睢秦蜀其為貙貐豺虎肉視斯民之應乎月犯井兵起人主憂又曰大臣誅有破軍殺將亢主宗廟其星變主王者絶嗣將致宗廟不守斯非其最驗者歟五車河鼓天津搖光十三年九月五車中隱三柱不見十七年二月河鼓坼次年天津坼十七年搖光坼芒角黑青五車天子之兵車舍也三柱動則車騎發崇禎中朝士勸上修車戰之法而孫傅庭郟縣之敗竟以火車致潰其三柱不見之效歟巫咸曰河鼓金官也主金鼓河鼓坼則金鼓不震天津主河梁石氏曰天津覆洪水滔天自汴梁沒後河再决于山東搖光者北斗之第七星其名為應主兵又曰應星色黑有水眚有徙民考之皆驗狼天弧王良駟房十七年十月狼怒躍至次年四月次年天弧引滿是年策置王良前駟房動徙荆州占曰狼為盜賊巫咸曰狼星易處天下大饑兵滿野又曰天弧引滿天下兵石氏曰王良策馬則天下大亂兵大起營頭天狗枉矢流星十七年三月營頭晝隕聲如雷五月天狗下尾長白竟天乙酉正月枉矢東流衝太隂九年六月丙子夜有星大如斗色赤芒耀數十丈自西南流東聲如雷十四年髙郵湖隕星大如屋十五年夏星流如織十七年二月星隕如雨六月後四川日月無光赤如血人仰視北斗不復見有大星出西方芒焰閃爍搖漾不定是時獻忠屠蜀賊滅後其星乃隱營頭所墜有破軍殺將流血三千里天狗下則四方相射其君失地兵大起枉矢所觸天下所伐滅亡之象流星在萬厯中凡五見其三十四年五月丁丑有星自西北流東北大如盂赤色有光是為李自成生于米脂之歲自西北流東北者繇秦以入于燕齊之象也自九年以前賊中以髙迎祥為闖王自成特其部曲將盧象升祖寬白沙朱龍橋之戰賊勢已衰㑹祖寬兵譁東歸象升召入京功垂成而中廢未幾迎祥死餘衆推自成為主乘總理無人橫行無忌彴約青赤者兵起此其應也天赤如血崇禎元年三月二十五日五鼓全陜天赤如血巳時漸黃日始出占曰此赤眚也主大旱有急兵是年白水賊王二反日變崇禎十年丁丑春正月辛丑朔日食免朝賀是年春白虹赤氣貫日十一年二月朔日光摩蕩竟日是年十一月五日日中黑子黑氣或青白氣日入光摩蕩如兩日十二年元旦日白無光三日日光摩蕩若鏡袋噴花自旦及暮五日日旁青黑氣若㦸東南有白虹是年二月十二日寧逺日變辰時日兩傍各一白丸俄日上有白氣申時有黑氣掩日忽侵日中忽從日內墜出摩蕩數次巡撫方一藻以聞十三年九月望兩日出沒十六年十二月朔日無光星晝見日食不為災唯正月朔為三朝之㑹漢惠帝七年正月辛丑朔日食哀帝元壽元年正月辛丑朔日食至崇禎十年正月為三辛丑朔日食矣惠帝失政祿産亂朝哀帝夭折王氏篡竊在明季則有樊並蘇令奮臂之禍昔漢臣有封事曰小民正月朔日尚畏毁器物而况天子日月之眚乎若白虹貫日日中黑子兩日竝出皆亡徴也天鼓鳴崇禎十年三月陜西天鼓鳴十二年二月四川保寧府天鼓鳴同時二月十七日易州白石口南城天聲自北起至南次日從東北起至西南皆晴日無雲風亦甚緩其響如雷又似桴鼓聲十四年二月山西偏頭關天鼓鳴萬厯中天鼓鳴凡五十一見在京師者一南京者三鳳陽祖陵者二它郡國者四十有四畿輔則景州髙邑遵化易州紫荆關遼左則松山蓋州寧逺山東則費縣登州館陶青城山西則代州宣大陽和左雲衛臨汾猗氏蒲州陜西則平凉凉州固原甘肅西寧金州西安洮州南直則揚州泰州鎮江四川則華陽豫則河南府江西則袁州內西寧見者三甘肅見者三易州遵化館陶臨汾寧夏皆見者二京房占人主憂神宗多歷年所海內無事左氏曰以樂慆憂其是之謂乎崇禎十一年賊入蜀破州縣三十有八今十二年保寧天鼓鳴明寇將再入蜀蜀人屠滅之徴也易州畿輔要地偏頭關燕晉厄塞十四年後賊由晉入于畿輔偏頭寧武正其所從入之處故天鼓鳴以譴告之也大雨雹木氷崇禎四年五月大同雨雹襄垣縣雨雹大如伏牛如丈石小如拳殺人畜甚衆八年四月初八日漂陽福賢等鄉雷雨氷雹竝作晝晦飛石揚沙平地盈尺植物與屋瓦俱盡十一年六月二十三日宣府乾石河山場驟雨怪風大雹打死馬騾四十八匹九月順撫陳祖苞奏境內氷雹為災十二年五月初九日未刻撫寧縣自靈溝起東至沙河長不老口西至榆關大雨雹田禾盡死八月白水同官雒南隴西大雨雹秦撫丁啓睿以聞十四年八月宣府氷雹為災是年六月湖廣大風雹巡按汪承詔以聞十六年十月十五日汝寧光州雨綿如絮飛田野者殆遍乾州氷雹大如斛毁民屋傷人元年十一月陜西木氷壓樹枝盡折其後大河以北歲有此異萬厯中京師雹災凡八見它郡國二十崇禎時雨雹止此乎殺人畜田禾甚者書之舉重也劉向曰雹者隂脅陽也君子以小人為隂外臣以內官為隂四年溫體仁方用事正類排斥殆盡張彛憲以奄宦總三部晏然受朝覲諸臣之庭謁十二年楊嗣昌在內閣黃道周成勇被譴呵熊文燦諂事禁旅太監劉元斌等其下大縱掠隂脅陽者此其應也劉歆曰上陽施不下通下隂施不上達故雨而木為之氷天啓中朱童䝉喬應甲皆以貪邪撫秦元年秦撫為胡廷晏憒眊不治事故隂陽上下不能通達以兆木氷為甲兵之象也風霾霧晝晦崇禎四年六月臨潁縣雷風大霾傾樓拔木磚瓦磁器墜地無恙銅鐵者碎六年癸酉春正月朔大風霾日出兩珥九年七月二十日沔陽州長夏門外居民劉敕甫白日黑風揭一屋去柱壁囊槖未動四鄰如故十年三月十四日真定晝晦大風霾發屋拔木巡按李模以聞十三年二月二十一日大名府濬縣等處東北見有黑黃雲氣一道忽分往西南二方傾刻四塞狂風晝晦黃埃中有青白氣及赤光隱隱時開時暗巡按韓文銓以聞是年冬河南府大風新安縣都御史吕孔學墓上石碣吹入雲中去四五里方墮十四年辛巳春正月壬寅黃霧四塞日眚無光十二月福建巡撫蕭奕輔奏異風十五年七月保撫楊文嶽奏怪風十六年正月二日大風晝晦五鳳樓前門拴風斷三截又風吹建極殿廡簷榱桷俱折殿瓦皆碎三月二十四日風霾晝晦大學士周延儒請急圖防彌十七年甲申正月朔大雨霧有占風從乾起主暴兵破城城未破之前十餘日風霾大作自辰至未止拔去關帝廟前旗杆琉璃厰大樹按萬厯中京師風霾二十二見最甚者四十六年三月庚午空中有聲如波濤黃塵蔽天日色晦冥將昏東方電流如火赤光照地少頃西亦如之又雨濛濛如霧霰土氣襲人人主五事皆失不得其中則不能立萬事失在眊悖故恆風隂以應之洪範傳曰厥咎凶短折厥極弱時則有下人伐上光熹二廟皆短祚凶短折也極弱者貴而無位髙而無民有南面之尊而無一人之助宰相如宜興井研皆不為國盡力大將如左寧南跋扈不用命是極弱也下人伐上則寇入京師之徴也雷震崇禎九年丙子春正月孝陵雷火十二年七月天雷擊破城鋪樓墻七丈有餘木炮擊破密雲巡撫趙光抃以聞十三年秋七月雷震襄府門樹樹有鹽數斗三月初十日夜三更去孝陵寶城十里長闕頭楓香樹松樹各一被雷火霹燒南兵尚書汪慶百以聞十四年閏四月初八日雷火起薊州城西北燒至趙家谷延二十餘里六月初二日雷震宣府西門城樓火藥冲發樓遂糜碎十五年壬午五月雷震孝陵樹十六年仲夏大雨沾衣如血雷霆越夕不止次日見太廟神主或橫或倒諸銅器為雷火所擊融而成灰六月二十三夜雷震奉先殿廟脊鴟吻碎中有劍削拔去不知落在何所廟門玲瓏雕刻處皆損壞有龍爪痕太監蘇允寧換鴟吻比前減小帝不悅降允寧級萬厯中雷擊建極殿端門承天門郊壇齊宫祖陵西華門太廟槐樹長陵明樓圜丘朝日壇正陽門社稷壇門凡十三見自二十年後郊社宗廟以公侯伯代行禮故天數出變異以告誡之思陵親郊者再宗廟之禮必䖍常以孝陵地脉侵毁使成國公朱純臣禮尚書林欲楫行視山陵然則孝陵曷為乎震司禮監王體乾內殿藏主陳設一不敬大受譴罰帝自以少失父母大具儀仗集百官迎孝純皇太后御容入奉內殿事死如事生孝之至也然則奉先殿曷為乎震曰前此矣前此則此何以書曰天變已成雖甚盛德不足以除禍患故震之也地震崇禎七年三月初二日黃州晝晦明日地震聲如雷九月應天地震九年五月江西臨江府南門城墻陷地二十餘丈十年閏四月初四日雅州地震十四日新鎮地震者二十六日又震者二同時十六日馬湖四土司地震者二又叙州府震建武所震瀘州震越巂衛震皆同日是月二十九日榮縣黃時太家地鳴聲聞半里十二月太監陳奏地震十一年正月薊鎮總兵王奏地震九月遼東地震巡撫方一藻以聞冬雒陽地震十二年六月宣府地震總督陳新甲以聞九月福建地震巡撫蕭奕輔以聞粵西地震巡按御史左永圖以聞十三年二月初十日巨鹿縣地震十二日又震六月二十四日渾源地震八月初九日復震十二月宣府地震總督張福臻以聞是年汝寧上蔡地裂十四年正月湖廣地震巡撫宋一鶴以聞二月福建地震巡撫蕭奕輔以聞四月天津地震巡撫李繼貞以聞七月二十六日大同地震者三八月陜西地震茶馬御史陳羽白以聞九月四川巡按陳奏龍安府地震是月應天巡撫黃希憲奏地震十五年四月十五日山西巡撫蔡懋德奏地震七月復奏地震七月十六日萊州府地震十五六七年鳳陽地震連歲不止其初寶頂中有聲如雷東西動蕩者數十晝夜而震乃發鳳陽巡撫田仰以聞泰州兩大山因地震合為一其民居兩山間者數百萬家皆被壓掩沒不見案萬厯四十八年中京師及郡國地震者二百五十有九自元年至十年四月相當之地臣道也京房曰臣事雖正專必震荆州居正所居地也元年荆州連震七日方止惡其專且戒以不終也十一年後帝召之京師十一震鳳陽二祖陵二舉其重則餘可推也是時鄭妃謀奪嫡內臣則礦使稅使為厲于民思陵之御相也常山華亭謫戍韓城宜興賜死雖以蒲州之定逆案一取决于御前紅本而髙陽當關武陵視師咸奉詔書進止則無所謂專也後宫無戚姬如意之嫌外家無博陸重合之勢近臣無𢎞恭石顯之寵然即位之後反者如蝟起如黔蜀土司河南北土寇閩廣江南海寇廣東九連山山寇山東蓮教曹南武城王沙諸寨江右密教之屬無慮數十反而國從之周之亡也山川震伯陽甫以為國必依山川山崩川竭亡之徴也十三四年黃河水竭國家本起于淮泗今祖陵震而河淮幾于涸流不亡何待旱蝗人相食崇禎元年陜西自四月不雨至于七月八月霪雨不止歲大饑七年河南大旱山西自六年八月至七年四月不雨永寧民蘇倚哥食父母南陽郭廷玉妻霍氏以母而食女山西聞喜廣盈里楊雷以父而食男又張河圖等十三名殺人母子而并食史亡其地云九年山西饑人相食十二年北京山東河南山西大饑民掘坑塹然火以驅蝗須㬰填滿四月十八日㑹寧縣降旱霜自春徂夏不雨十三年兩京山東河南山西陜浙旱蝗河南北數千里白骨縱橫民父子相食京房易傳曰上下皆蔽茲謂隔其旱天赤思陵有治天下之心相如烏程韓城壅閉阻遏俾賢材摧抑德澤不能下流此所謂隔也它占雨少隂之氣金也金為兵為刑刑不辜兵不戢金氣毁則不雨思陵持法太深秦豫楚山城小邑被寇失守為法受誅者其不辜為多易曰亢龍有悔思陵憤中外之失職盜賊未平嘗內結于心心者火也火勝則外彊中乾水不潤下故旱京房易傳曰臣安祿茲謂貪厥災蠱易飛候曰食祿不益聖化天視以蟲蟲無益于人而食萬物劉向曰魯哀公十二年春用田賦冬而螽虐取于民之效也崇禎中如楊嗣昌議增練餉者六百萬是以田賦虐取于民也史􅒇薛國觀吳昌時先後以賄敗謝秉謙按秦秦寇已急而秉謙大以賄聞是皆無益于人而食物故蟲災應之火災崇禎八年冬至帝以寇禍再郊天費十萬金威儀視初郊尤肅先一日駕幸齊宫而後端冕入祀乃內璫之熾炭于地室者太甚火延及于茵蓐御座為文皇帝盤龍椅皆焚從官有憂色曰天不享矣十年正月太監孫奏石塊生火延燒倉場等屋十一年四月新局火藥灾石板平起空中民家醬瓿移至屋極醬不動乘驢過者人驢飛至半空驢腸腹潰而人墮地無損六月初二日安民厰災貼厰太監王甫局官張之秀俱斃八月又災十二年九月二十日京師草場失火案萬厯火災凡三十五見最大者如慈寧宫災無逸殿災乾清坤寧宫災三殿災孝陵災御苑龍舟災大光明東配殿災朝日壇房災正陽門樓災隆德殿災易傳曰上不儉下不節孽火燒其室東漢中平二年南宫靈臺災未幾黃巾亂流寇之作即三殿兩宫火災之應也安民厰者以天啓六年王恭厰災而改焉者也逆璫施炮烙以鍛鍊楊左諸君子天啓六年五月朔人見都城隍廟唱名後宰門火神廟紅毬滚出次前門城樓角有數千螢火忽併合如車輪至初六日巳時王恭厰災震初作乾清宫御案皆碎建極殿飛瓦殺人御史何廷樞潘雲翌被震死全家覆入土中自順城門大街北至刑部街盡為虀粉有女人衣飭盡而身存有同伴頭去比肩無恙有從空墜人頭及鬚髮耳鼻大木逺落密雲石獅擲出城外衣服掛于西山樹杪銀錢器皿飄至昌平閲武場中若思陵則何為乎災曰內操之未罷也緝事衙門如董琨等則猶許顯純之餘焰也故火之也且安民厰所以修守備其後寇逼京師炮不置鉛丸賊不傷而城已陷天意若曰火不炎上徒以自斃也火異崇禎元年五月西安有火大如碾如斗色青光焰尺許數十磈入人家用羊豕禳之嘗留數日乃去不分晝夜亦不為民害至七月中而止占曰秦為德水水火牡也火出而妖火入秦鶉首先災害及鳥帑豫楚亦將有咎九年泰山神廟中青龍神口吐火是年丹徒田野火光燭天十五年蘄州樹杪火發焚其木殆盡十六年正月初五日大內諸殿脊及各門樓煙起閣臣皆出疑有火災視之冉冉若炊煙而微淡久而乃息齊武帝永明十一年先是魏地謡言赤火南流喪南國是歲有沙門從北齎此火至火赤于常火而微以療疾多驗都下名曰聖火此與今之煙草相類熹廟時童謡曰天下兵起遍地皆煙未幾閩人有此種名曰煙酒云可以已寒療疾此亦火異也刀矟旗竿上火崇禎十年太湖縣楓香店官兵營刀鎗上火光閃爍炮空鳴鬼夜哭時討寇鄭潘陸諸將全軍覆沒十一年孫傅庭奏西安風霾大作黑氣冲天兵刃火焰出現聽之有聲十三年八月西門旗竿上出火大如斗飛落城河十四年三月初二日天津遊擊張國安巡河至趙家場刀鎗上火星灼灼有光黑夜列㦸如星巡撫李繼貞以聞晉成都王頴與長沙王相攻隨堯君素守蒲州唐劉武周據并州反其兵器皆夜有火光萬厯中各邊臺竿有火凡十五見其墻子路有火時風雷大作綏靜邊堡軍執棍撲之棍亦生火孤山堡亦如之山東撫治令箭及刀鎗頭皆出火魏書曰輕民命好攻戰則金失其性而為變神宗非好戰之主而思陵用兵亦有所不得已也然則火何為乎作哉水災十年河南汝水變味甚惡飲者多病十三年華隂縣渭水赤十五年四川達州城濠水變為血城中井鳴十年蜀劍州大水先未水一日沿灘巨石數百皆反而覆水至民登州堂以避者免餘皆漂沒黃腸凶具架在民屋檀者纍纍水災莫甚于汴梁以其詳在寇志故不書鼓妖天啓七年丁卯八月御朝即帝位南面正位將就寶座而大聲發于殿之西若天崩地塌然仗馬皆驚百僚震恐帝亦為之悚動識者曰西方其有事乎此鼓妖也崇禎七年七月叙州母猪龍洞銅鼓聲聞一日夜是年蕭縣北山鳴明年又鳴者再十一年十一月山又鳴十二年十二月十三日夜西山復鳴如雷如風如濤連日夜不止九年十二月鎮江金雞嶺土山崩聞有神言十年鍾山鳴似虎哮吼三月㑹稽山石言聲如鍾十二年己卯二月初一日蘄州州署有石銃十一門自震堂瓦崩頽署州事李色鮮將火藥傾出移出堂前空地復于三月初一日自震煙火冲天堂柱亦自起火十三年杭州城門夜鳴三月十五日蘄州城隍廟古鐘不擊自鳴十五年鐵炮自鳴十六年冬建極殿鴟吻中有聲似鵓鳩曰苦苦其聲漸大後作犬吠聲三日夜不止十七年二月大學士魏藻德夜聞刀兵之聲入其寢三月初舉家聞哭泣晉文公殯于曲沃柩有聲如牛劉向以為怒象也將有急怒之謀以生兵革之禍漢相朱博受策有聲如鐘揚雄以為聽失之象也李尋以為人君不聰為衆所惑空名得進有聲無形不知所從生思陵性彊毅多權謀數有亟疾之怒即位之後宰相周延儒楊嗣昌等以空名得進後皆不終此鼓妖之應也春秋傳曰怨讟勤于民則有非言之物言山鳴近石言也宋災先有呌于太廟者曰嘻嘻出出今殿檁龍尾間如鳥鳴苦苦帝位不安宫室將空之象京房易傳曰令不修本下不安金母故自動若有音天寶十年大同殿鐘自鳴占曰庶雄為亂思陵發號施令未循其本下有怨叛之心起而為亂此物自鳴之應也言妖萬厯末年有道士歌于市曰委鬼當頭坐茄花遍地生北人讀客為楷茄又轉音魏客之兆也崇禎元年五鳳樓前獲一黃袱內襲小函一卷題云天啓七崇禎十七還有福王一清晨內侍得之奏御帝命巡視皇城各官推究科臣奏以此必奸人所為一加推究必有造訛立異簧鼓聖聽者帝可其奏立命火之十年帝過宫中一祕殿老閹以此先朝所封戒勿動帝命啓之得古畫數幅有十人帶進賢冠者七曰官多法亂有數十人隔河對泣曰軍民號泣妄男子得傳聞形之章奏帝亦弗詰人乃以為信帝好察邇言有人詣通政司投疏謂年號宜用古字作崈蓋以山壓宗故不安從古文則宗廟安于泰山也人以為妖言十七年正月沅州銅仁連界處掘出一古碑上有字二行云東也流西也流流到天南有盡頭張也敗李也敗敗出一個好世界成都東門外沿江十里有鎖江橋橋畔有回瀾塔萬厯中布政余一龍所修張獻忠破蜀後登塔見成都城池宫殿曰此不利于城命毁之修築將臺穿地取磚至四五丈得一古碑上有篆書云修塔余一龍拆塔張獻忠歲逢甲乙丙此地血流紅妖運終川北毒氣播川東吹簫不用竹一箭貫當胸漢炎興元年丞相諸葛孔明記後獻忠以一箭死乃知簫不用竹乃肅字也明初有十八子之䜟成化中有李龍子者結一中官入宫中謀不軌事發伏誅識者以宋太祖取淳風舊本亂其次第李繼朱者乃李亞子繼朱梁之䜟也流言訛僞宋獻策李巖以此鼓惑中原復倡為開城門迎闖王迎仔闖王不納糧令軍中傳歌之故河北逐其長吏以迎賊河北之謡曰鄴臺復鄴臺曹操再出來賊羅汝才自號曹操而天下大亂武昌未破前一月有異人呼于市曰一羣猪屠伯至矣楚宗最橫遇亂亦最酷萬厯末年民間好葉子戲圖趙宋時山東羣盜姓名于牌而鬬之至崇禎時大盛其法以百貫滅活為勝負有曰闖有曰獻曰大順初不知所自起後皆驗傳曰言之不從厥咎僭時則有詩妖訛言自陳啓新以淮安武生驟用口舌得官而張漢儒陸文聲希相溫微㫖告密以起黨人之獄易曰以訟受服相溫有焉書曰讒說震驚朕師漢儒文聲有焉詩曰如蜩如螳如沸如羮公卿臺諫無通經術持大體者故妖書起之于前閣訟繼之于後四方奸人亡命爭上書闕下而言之僭差夫亦甚矣此言妖所自起也草妖崇禎四五年河南草生戰鬭狀有人馬形皆若被甲持矛馳驅糾結亂乃大作七年河南孟縣民孫光顯祖墓在河陽驛之東有葡蔔草夏抽新條條列萬狀有美人者達官者為龍鳳為龜麟為雀魚蛇鼠為蟬為孔雀鸚鵡道臣曹應秋取得三美人一鳳一鸚鵡美人黃衣白裳面施粉黛鳳苞羽五采鸚鵡栖于架架上有盞盞中有粒㸃染生動善畫不及也其連陌王氏黨氏塋所産皆同有一草而枝蔓出二塋外者即與凡草無異蓋妖徴云十六年有商人自山東載花豆渡淮及出賣如人首然耳目口鼻咸具十七年太倉邑紳知臨川張采家李生黃瓜采歎曰古語云李生黃瓜民皆無家亂其至矣既而采亦幾及于難占曰王德將衰下人將起則有木生為人狀草亦木類也漢安帝中平元年夏東郡陳留濟陽長垣濟隂寃句縣界有草莖纍腫如手指為䧱雀龍蛇鳥獸之形五色各如其狀毛羽頭目足翅皆具是歲黃巾賊始起夫草民象也盜賊則惡草之宜除今以去惡之弗盡枝蔓為妖其驗為李自成之僞署置百官猶草之面目衣裳如人狀也僞號改年猶草之龜麟龍鳳自以為祥也天意若曰彼雖靦然人面哉何草不黃將失其潰茂以無煩尋斧此狂花妖木之不若者也神祖好用商人採辦每進黃封御廂內有八寶嵌成蝦蟇蚱蜢等物廂開則藏機發跳躑滿地帝大笑賞賚不資此蟲妖也閩師好以寶樹餉督撫按諸臣以金為枝幹花葉用異寶緝成五色備具視之如真一株以數萬計熊文燦得之以貽京師權要此木妖也服妖崇禎中朝臣好以紗縠竹籜為帶取其便易詩曰匪伊垂之帶則有餘傳曰帶其褊矣金銀貴而重紗籜賤而輕改而從之賤將乘貴重者為輕帶其褊而將盡之象也帝餞李建泰于正陽門建泰頓首拜謝印綬花怒張如斗同官謬賀此取金印如斗象也識者以為不祥百官冬朝戴貂暖耳陳啓新詭示其貧以布作袹君子曰暖耳中下者無甚價且禮亦可以弗著啓新近臣虧班聯之體以羞朝望且近于詐非禮也北方小民製幘低側其簷自掩眉目名曰不認親其後寇亂民散途遇親戚有飲泣而不敢認有掉臂而不欲認一以畏人避罪一以自為寡恩先見之于首服焉京師婦女宴㑹出遊好賃蟒服于質庫乘車去茀不避呵殿視其衣交龍燦然亂上下之序溷淆無别臺諫以為言然終莫能禁松江士大夫好著縑巾屋其上而廣之前後施幅武垂于肩雜以組紃而紕其旁緣其下此武士巾也其有期功之喪别綴白絛于其上有兵喪之象常熟婦女裳下齊殺為襞積者百而繂之與衰服無異人皆以為凶徴無錫一孝亷嘗衣短衣不蔽膝巾紫色而朱帶雙垂自首以屬于要金壇一公子跛而陋好施粉黛弓其足為婦人裝晝必寢其見客也常以夜後此兩人皆以凶終曹風之詩曰蜉蝣之羽衣裳楚楚百年以來世室豪家侈汰已甚飲酒則載號載呶歌舞則獶雜子女其風始于江漢宛雒而被于吳越帝屢下詔以寇盜災荒士大夫狃承平餘俗欲身率天下以儉而終不改於戲有葛屨履霜之心而不能變羔裘逍遙之習詩人刺共公之好奢而謂不稱其服者其咎在上也春秋戒子臧之身災而謂服之不衷者其咎在下也濫音附見兵未起時中州諸王府中樂府造絃索漸流江南其音繁促悽緊聽之哀蕩士大夫雅尚之又江南人多唱掛枝兒而大河以北所謂夸調者其言尤鄙大抵男女相愁離别之音靡細難辨自此以後政事日蹙情態纎迫兵滿天下夫婦仳離者不可勝計也物異思陵御乾清宫空中墜一鸛頸穿一箭至地猶飛鳴俄而鸛死又乾清宫後廡有青霞居遊藝齊皆陳設寶玉重器于御几物竟自移彼此互易其處或顛倒雜亂失而復得守者懼得罪伺之見御榻重茵中有溺而旋者狐毛零落其氣尚溫乃知向者狐怪也崇禎六年二月建昌民家生豕一首二身八蹄二尾十五年七月聊城縣民馬中杰家生豕一首二尾七蹄五行傳曰聽之不聰時則有豕禍萬厯中豕禍七天啓秦楚皆豕妖有長喙人足而一目者是年誤用陳竒瑜為總督因撫失賊聽不聰之效也六年冬十月莎雞數萬集于襄城山西河北賊南渡河澠池陷十五年冬團風鴨蛋洲有飛雀萬餘投蘄州南城濠後張獻忠破武昌從鴨蛋洲渡此比之鸜鵒來巢為羽蟲之孽近黑眚也黑色義主急有飛鳥之象焉六年十月汝寧有鳥鳩身猴足晝飛有聲時流寇渡河犯汝至十年此鳥復見于上蔡按本草此鳥名曰寇雉出主兵亂六七兩年鳳陽出惡鳥數萬兔頭雞身鼠足人取供饌甚肥但犯其骨立死七年大同牛疫號噭以數千十三年襄陽春山鄉獲牛犢兩頭二目京房易傳曰牛生子二首一身天下將分之象又曰牛少者榖不成萬厯中牛禍五皆二首或作人狀天啓間沅陵牛犢二首一目三尾並亂徴也聞是年李自成從車箱峽佚去寇禍以不解山西河南大饑七年寧夏鼠害稼銜尾食苗者十餘萬十二年黃州鼠食禾渡江五六日不絶傳曰鼠盜竊小蟲晝伏夜匿害稼者貪邪小人竊祿位而寇盜以滋生也萬厯四十四年後應天鼠渡江者三皆銜尾萬餘天啓陜西鼠怪狀若狸長廣尺餘無足兩肉翅足在翅中剖之腹有升黍妖在秦者秦將有鼠盜寧夏延綏鼠害稼者皆秦分也渡江而以黃州者張獻忠破武昌之應也又聞內殿奏章房多鼠盜食與人相觸而不畏十七年元旦後鼠忽屏跡寇入奏章盡焚易飛候曰鼠羣居不穴君死國亡它占曰鼠無故夜去邑有兵近黃祥也秦州關山中老鼠化為鵪鶉者以數千計九年十月朔淮安新城東門民家牝雞振羽啼躍而化為雄十年京師宣武門外斜街民家白雞羽毛鮮好喙距純赤重四十斤慈溪孝亷應廷吉見之愀然曰此鷔也所見之處國亡萬厯三十六年靖邊營軍人家雞雌化為雄五行傳曰不鳴不將無距者事不成今鷔則鳴將有距矣蓋是年寇患已大成故雞禍也十年三四月錢塘江木柿化為魚漁人網獲中有首尾未變者木如故十三年德安府天雨魚十四年楚府猫犬流淚有哭泣聲十四年太倉衛指揮姜周輔家雞伏子兩頭四翼八足揮使亦勳舊也衛將廢厥災見于其家十五年二月羣鼠渡江晝夜不絶十五年金縣田鼠殘食夏秋禾苗巡按李悅心奏又隴西縣田鼠灰黃白色咬傷麥穗十五年八月延綏定邊堡妖鼠産于蝦蟇腹中一産數十遍二三百里食禾稼皆盡門牡自開崇禎七年太康縣門牡自開者三知縣事許某集邑紳議其事屋梁墜知縣死妖辭曰關動牡飛辟為無道臣為非厥咎亂臣謀篡漢成帝元延元年門牡飛谷永以為郡國傷災黎庶窮困而有司奏請加賦城關守國之固固將去焉故牡為之飛今太康古夏陽也為楚漢相距地鞏雒汝潁之通衢是年寇既渡河郡國日亟軍興而災害並至牡飛邑屋自壞明汴雒皆失其固而棟折榱崩民將壓焉之應疫崇禎十六年春京營巡捕軍夜宿棊盤街之西更初定一老人囑曰夜半子分有婦人縞素涕泣自西至東勿令過過者厄不淺雞鳴則免矣吾乃土神故以告也夜半婦果至軍如所戒不聽前五鼓偶熟睡婦折而東旋返蹴邏者醒之曰我喪門神也上帝命我行罰此方若何聽老人言阻我災首及汝言畢不見邏者懼奔歸告家人言未終仆地死大疫乃作七月二十九日從駙馬鞏永固請發御前銀一千兩合藥施病者再發二萬兩令五城掩埋十六年舉場左右人鬼錯雜薄暮人屏不行一時貿易多得紙錢乃置水投之有聲則錢無聲則紙大疫定後乃已江南自京口起江隂無錫止民曉起或以黑圈記其門或釡底畫一梅一夜殆遍先是河北傳一小兒見人白而毛逐之入廢棺中發則白毛飛空幾滿俄而疫大作名曰羊毛瘟江南漸傳染民相戒曰無食茄食者必病既而驗之以手折茄中分之輒有一羊毛斷之以刀則無有此白眚也公羊傳曰大災者何太瘠也何休曰邪亂之氣所生先王設疾醫掌萬民之疾病又索鬼神而祭禜之以其時埋胔掩骼無弗蓋藏故民得考終厥命今兩河暴骨弗收惡氣藴崇而為疫羊金也金氣傷故羊禍轉入于疾病此其徴也其時又有書三字于門者相傳亦係釡底朱書故民爭效之是書也道藏中固以解疫生民短折人主不能救而天救之非其彰彰者乎人鬼之異崇禎二年己巳松江莫翁無子有一女嫁于李氏夫婦初相得後其夫漸不內御有鄰女學刺繡于莫氏而同寢俄有孕詰問得其情訟之太守按驗果有之乃命莫氏歸而娶此女為妻守斷詞曰莫翁無子而有子此女無夫而有夫郡人無不見之有欲上聞者莫固舊族恐以妖妄及禍固請乃已十五年冬山東婦人生一物雙猫首首有角角之顛有目身如人手垂過膝巡撫陳以聞于朝嘉定有一男子無家室忽腹大面黃人以為蠱其闕夜聞呼喚聲生一男將執以聞之官其人抱遁去不知所之十二年蘄州各街道每夜鬼哭咆哮聞之有聲逐之有影十五年蘄州有鬼白日成陳墻上及屋脊行走揶揄居人城遂陷十六年將祭太廟鹵薄已設忽見黑氣自空而墜如有婦人衣白者疾飛入宫軍人皆見之是年人見太廟中鬼皆嘯呼而出赤眚黑眚崇禎七年甲戌二月海豐雨血七年黃梅縣天雨黑子如栗八年八月宣城池中出血十年丁丑八月黃州天雨蟲色黑大如菽蠕蠕動食苗俱盡是年春北地紅雨八月山東雨血十一年新鄉雨黑水十二年黃州城南門流血五日又太倉嶽王市地湧血十五年青浦東門外河內一石又灘上一石又諸生楊家柱礎皆湧血不出三月之內蜀劍州民家有滴血汚其門城中數萬户皆同十一年都中黑眚似飛霾民大擾十六年京師黑眚見宫中常見如豕如犬者黑色行作鬼聲癸未年松江繡野橋雨血梓慎有言曰赤黑之祲喪氛也京房曰臨獄不解茲謂進非厥咎天罰故天雨血傳曰蟲從天而墜其國兵災並起劉向曰刑罰暴虐貪叨無厭則天雨蟲天雨麥雨毛地粉崇禎丙子年松江繡野橋雨毛十三年雨麥于吳郡關中渭南縣天雨蕎麥十四年江南池河守備髙策銓報于廣武衛之龍山英武衛之小橫土中變成紅緑白三色米粉軍民取以充饑取者日數千人名曰觀音糧榖梁傳曰著于上呈于下謂之雨夫十三四年闕無麥苖以無雨也無雨而雨麥則何以為雨闕變而為粉其異也為闕陵哭城愁神像流淚鳳陵未災前有遙見陵中二人一衣朱一衣青毆擊甚苦尋聞號泣聲乃集數十人持杖入惟二犬踉蹌走無何寇至崇禎十五年後鳳陽祖陵悲號震動三年不止十七年南京孝陵夜哭十四年嘉興城聲震如裂時稱城愁十六年癸未黃州城南門哭五日止九年曲阜縣孔子廟聖像兩目流淚如汗三日夜十五年十一月黃梅孔隴鎮地藏菩薩目出淚一縷循鼻而下拭而復出十二月二十三日城陷陵異止此乎曰賊將王克生僞揚武知州張聯奎謀發獻陵風雷大作被擊而死則不專主于哭也城異止此乎田十七年十一月滎澤縣東十里平地忽現一城雉堞井幹皆具久之始沒幾同影國則不止于聲也神像之異止此乎曰五皇子之薨慈聖李太后憑而告者數千百言自稱九蓮菩薩則天之靈不止像也嗚呼異矣綏寇紀略卷十二
